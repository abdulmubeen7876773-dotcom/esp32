paths:
  - title: Beginner Path
    icon: "01"
    description: Start with ESP32 basics, blink an LED, then learn button input, digital inputs, and floating pins before sensors and displays.
    steps_label: 7 missions
    difficulty: Beginner
    href: guides.html#missions
  - title: IoT Path
    icon: "IoT"
    description: Move from sensor readings to Wi-Fi dashboards, weather stations, MQTT, and connected devices.
    steps_label: 5 builds
    difficulty: Intermediate
    href: projects/esp32-iot-weather-station.html
  - title: Robotics Path
    icon: "BOT"
    description: Learn inputs, motor control, line following, Wi-Fi control, and robot behavior debugging.
    steps_label: 4 projects
    difficulty: Intermediate
    href: projects/esp32-line-following-robot.html
  - title: Smart Home Path
    icon: "HOME"
    description: Use sensors, relays, buttons, and automation logic to build thermostats, locks, and climate control.
    steps_label: 6 projects
    difficulty: Intermediate
    href: projects/esp32-smart-thermostat.html
  - title: AI Path
    icon: "AI"
    description: Build toward TinyML, sound classification, object detection, and edge intelligence on ESP32.
    steps_label: 3 projects
    difficulty: Advanced
    href: projects/esp32-tinyml-sound-classifier.html
  - title: Industrial Automation Path
    icon: "IND"
    description: Learn monitoring, vibration, power, machine nodes, and reliable field-style ESP32 systems.
    steps_label: 5 projects
    difficulty: Advanced
    href: projects/esp32-machine-monitoring-node.html
  - title: Teachers Path
    icon: "EDU"
    description: Use classroom-friendly missions, components, worksheets, and projects for structured STEM lessons.
    steps_label: Classroom-ready
    difficulty: Beginner
    href: teachers.html
  - title: Parents Path
    icon: "SAFE"
    description: Follow safe, beginner-friendly learning routes that help kids build confidence with real hardware.
    steps_label: Family-ready
    difficulty: Beginner
    href: parents.html
