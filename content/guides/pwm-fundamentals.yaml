    "title": "Control Brightness with Fast Switching",
    "story": "So far your ESP32 outputs have mostly been simple: ON or OFF. That is useful for blinking an LED, reading button states, and making clear digital decisions.\n\nBut many real projects need more than ON and OFF. A lamp may need to be half bright. A small fan may need to run slowly. A robot motor may need gentle speed control. PWM is the beginner-friendly bridge between digital switching and smooth-looking control.",
