  "faqs": [
    {
      "question": "What does PWM mean?",
      "answer": "PWM means Pulse Width Modulation. It controls how long a digital output stays ON during a repeating cycle."
    },
    {
      "question": "Is PWM real analog voltage?",
      "answer": "No. PWM is still digital switching. It creates an analog-like effect by switching ON and OFF very quickly."
    },
    {
      "question": "Why does PWM make an LED look dimmer?",
      "answer": "Your eyes average the fast blinking. If the LED is ON for less of each cycle, it looks dimmer."
    },
    {
      "question": "What is duty cycle?",
      "answer": "Duty cycle is the percentage of each PWM cycle that the signal is ON. 25% duty means ON for one quarter of the cycle."
    },
    {
      "question": "What does 0% duty cycle do?",
      "answer": "0% duty cycle means the output is always OFF, so the LED is off."
    },
    {
      "question": "What does 100% duty cycle do?",
      "answer": "100% duty cycle means the output is always ON, so the LED is at full brightness."
    },
    {
      "question": "What is PWM frequency?",
      "answer": "Frequency is how many PWM cycles happen each second. For beginners, think of it as how fast the ON/OFF switching repeats."
    },
    {
      "question": "Does higher frequency always mean brighter LED?",
      "answer": "No. Brightness mostly follows duty cycle. Frequency controls how fast the switching happens."
    },
    {
      "question": "Can PWM control motor speed?",
      "answer": "Yes, conceptually. A motor driver can receive PWM so the motor gets power in fast pulses, making the average speed lower or higher."
    },
    {
      "question": "Can I connect a motor directly to an ESP32 PWM pin?",
      "answer": "No. Motors need more current than a GPIO pin can safely provide. Use a motor driver or transistor circuit."
    },
    {
      "question": "Do I still need a resistor for a PWM LED?",
      "answer": "Yes. PWM changes average brightness, but the LED still needs a current-limiting resistor when it is ON."
    },
    {
      "question": "Why not just use delay() to blink fast?",
      "answer": "Manual delay blinking blocks your program and is not smooth. Hardware PWM keeps the timing steady while your code does other work."
    },
    {
      "question": "Does ESP32 use analogWrite() like Arduino Uno?",
      "answer": "Newer ESP32 Arduino cores may support analogWrite(), but learning ledcWrite() teaches the ESP32's native PWM system more clearly."
    },
    {
      "question": "Which ESP32 pins can use PWM?",
      "answer": "Many output-capable ESP32 GPIOs can generate PWM. Avoid input-only pins and boot-sensitive pins when you are just starting."
    },
    {
      "question": "Why does my LED flicker?",
      "answer": "The PWM frequency may be too low, the wiring may be loose, or the code may be repeatedly changing duty cycle too slowly."
    }
  ],
