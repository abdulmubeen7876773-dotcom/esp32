    "component_spotlight_lead": "The potentiometer is the safest beginner analog sensor because you control the voltage by turning the knob.",
    "concept": {
      "title": "Analog Values Are In-Between Values",
      "illustration_alt": "ESP32 ADC reading a potentiometer voltage from 0 volts to 3.3 volts and converting it into values from 0 to 4095",
      "body": "A digital input answers with two values. An analog input answers with many possible values.\n\nThe ESP32 ADC measures the voltage on an analog-capable pin. Near GND, the reading is near 0. Near 3.3 V, the reading is near 4095. Voltages between those two points become numbers between those two ends.\n\nThat number is not magic. It is the ESP32's best digital description of a real voltage."
    },
    "engineering_explanation": "ADC stands for Analog-to-Digital Converter. Analog means the voltage can vary continuously. Digital means the ESP32 stores the result as a number.\n\nIn this mission, the potentiometer is wired as a voltage divider. One outside leg connects to 3.3 V. The other outside leg connects to GND. The middle pin, called the wiper, slides between those two ends as you turn the knob. When the wiper is near GND, GPIO34 sees a low voltage. When it is near 3.3 V, GPIO34 sees a high voltage.\n\nThe ESP32 ADC samples that voltage and returns a raw number. With 12-bit readings, the possible values are 0 through 4095. A reading near 0 means the input is near GND. A reading near 4095 means the input is near the top of the safe range. A reading near 2048 means the input is roughly around the middle.\n\nReal ADC readings are not perfectly still. You may see small changes even when the knob is not moving. That is normal. Wires pick up noise, USB power is not perfectly clean, and ADC hardware has small variation. Engineers handle this by averaging readings, filtering, calibrating, and designing stable circuits.\n\nThe most important beginner habit is to print the raw value first. Before guessing what a sensor means, look at the number the ESP32 is actually reading.",
    "real_life_analogy": "A light switch is digital: it is either off or on. A volume knob is analog: it can be quiet, medium, loud, or anywhere between. That is the first analog idea: not two answers, but a range of answers.\n\nA thermometer is another example. Temperature does not jump only between cold and hot. It moves gradually. Analog inputs let a microcontroller notice those gradual changes.\n\nThink of the ADC like a ruler for voltage. The voltage is the real-world length. The ADC number is the ruler marking closest to where the voltage lands. The ruler is useful, but it still has marks, so the ESP32 reports a nearby number rather than an infinite perfect value.",
