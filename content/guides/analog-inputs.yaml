  "faqs": [
    {
      "question": "What is an analog signal?",
      "answer": "An analog signal can change smoothly through many values instead of being only ON or OFF."
    },
    {
      "question": "What is the difference between digital and analog input?",
      "answer": "A digital input gives two answers, HIGH or LOW. An analog input gives a number that represents a voltage level."
    },
    {
      "question": "What does ADC mean?",
      "answer": "ADC means Analog-to-Digital Converter. It turns a voltage into a number the ESP32 can use."
    },
    {
      "question": "Why does ESP32 analogRead() return 0 to 4095?",
      "answer": "The ESP32 ADC commonly uses 12-bit readings. Twelve bits can represent 4096 possible values, numbered 0 through 4095."
    },
    {
      "question": "What voltage should I use with ESP32 analog inputs?",
      "answer": "Keep analog inputs within the ESP32's safe 3.3 V range. Do not feed 5 V into an ESP32 GPIO."
    },
    {
      "question": "What is a potentiometer?",
      "answer": "A potentiometer is a variable resistor with a rotating shaft. It can act like a dial that outputs a changing voltage."
    },
    {
      "question": "Why does turning the potentiometer change the number smoothly?",
      "answer": "The middle pin of the potentiometer slides between 0 V and 3.3 V, so the ADC sees many voltage levels between the two ends."
    },
    {
      "question": "Why does my analog value wiggle when I am not touching the dial?",
      "answer": "Small electrical noise, loose wiring, USB power noise, and ADC variation can make readings move by a few counts."
    },
    {
      "question": "Is ADC noise a broken sensor?",
      "answer": "Usually no. Small changes are normal. Real products often average or filter analog readings."
    },
    {
      "question": "Can I use any ESP32 GPIO for analog input?",
      "answer": "No. Only ADC-capable pins can read analog values. For beginner lessons, use a known ADC1 pin such as GPIO34."
    },
    {
      "question": "Why use GPIO34 in this mission?",
      "answer": "GPIO34 is an input-only ADC1 pin, which makes it a good safe choice for reading a potentiometer."
    },
    {
      "question": "Can GPIO34 control an LED?",
      "answer": "No. GPIO34 is input-only. Use it for reading, not output."
    },
    {
      "question": "What happens if I connect the potentiometer backwards?",
      "answer": "The numbers will move in the opposite direction. Low becomes high and high becomes low, but the ESP32 should still read safely if the ends are 3.3 V and GND."
    },
    {
      "question": "Can analog input read negative voltage?",
      "answer": "No. ESP32 GPIO pins should not receive negative voltage. Keep the signal between GND and 3.3 V."
    },
    {
      "question": "Why do real products use analog inputs?",
      "answer": "Many real-world conditions change gradually, such as light, pressure, position, moisture, battery voltage, and sound level."
    }
  ],
