  "faqs": [
    {
      "question": "What is button debounce?",
      "answer": "Debounce is the process of ignoring the tiny rapid HIGH/LOW changes that happen when a mechanical button contact is settling."
    },
    {
      "question": "Is button bounce a hardware fault?",
      "answer": "No. Bounce is normal in mechanical switches. Even good buttons can bounce for a few milliseconds."
    },
    {
      "question": "Why does one press trigger multiple times?",
      "answer": "The ESP32 reads the pin much faster than your finger moves. If the contacts touch, separate, and touch again during one press, software can see several changes."
    },
    {
      "question": "How long does button bounce last?",
      "answer": "Many small buttons settle within about 5 to 50 milliseconds. The exact time depends on the switch, wiring, and how it is pressed."
    },
    {
      "question": "Do pull-up resistors fix bounce?",
      "answer": "No. Pull-ups and pull-downs fix floating inputs. Debouncing fixes contact chatter after the input already has a stable default state."
    },
    {
      "question": "Should I use delay() for debounce?",
      "answer": "Avoid delay() in real projects because it freezes the whole program. Using millis() lets the ESP32 keep doing other work."
    },
    {
      "question": "Do I need to debounce button release too?",
      "answer": "Yes. The contacts can bounce when they open as well as when they close."
    },
    {
      "question": "Can hardware debounce solve the problem?",
      "answer": "Yes. Resistor-capacitor filters or dedicated circuits can reduce bounce, but software debounce is easier for beginners and common in firmware."
    },
    {
      "question": "Is 50 ms a good debounce delay?",
      "answer": "50 ms is a safe starting point for many beginner projects. You can tune it shorter after testing your actual button."
    },
    {
      "question": "Does debounce make the ESP32 slower?",
      "answer": "No. Good debounce logic only delays trusting that one input. The rest of the program can keep running."
    },
    {
      "question": "Why does my counter jump by 2 or 3?",
      "answer": "That is usually switch bounce. The software is counting several contact changes from one physical press."
    },
    {
      "question": "Do all physical buttons bounce?",
      "answer": "Yes. Every mechanical button has some contact settling. The amount may be tiny, but professional firmware still accounts for it."
    }
  ],
