    "component_spotlight_lead": "This mission uses the same ESP32 DevKit and push button pattern from Mission 04.",
    "concept": {
      "title": "Why Buttons Bounce",
      "illustration_alt": "ESP32 GPIO27 connected to a button to GND, showing one physical press producing several fast electrical transitions before settling",
      "body": "A button is a mechanical part. Inside it, two small metal contacts touch when you press down. They do not always land perfectly on the first try.\n\nFor a few milliseconds, the contacts can chatter: touch, separate, touch again, separate again, then finally settle. That chatter is switch bounce.\n\nHumans cannot feel these tiny movements, but the ESP32 can read GPIO pins thousands of times per second. If your code trusts every change immediately, one press can look like many presses."
    },
    "engineering_explanation": "A pull-up resistor gives the input a default HIGH state. Pressing the button connects the GPIO to GND, so the intended pressed state is LOW. That solves floating, but it does not solve bounce.\n\nDuring a real press, the raw input may jump LOW-HIGH-LOW-HIGH-LOW before settling LOW. During release, it may jump HIGH-LOW-HIGH before settling HIGH. Each jump is real electricity, not a software mistake.\n\nSoftware debounce uses time as a filter. When the raw reading changes, the code starts a timer. Only if the new reading remains stable for the debounce window does the program accept it as the real button state. This lets the ESP32 ignore contact chatter while still responding quickly to normal button presses.\n\nProfessional firmware does this because physical switches are never perfect. Any button that controls a lock, menu, relay, alarm, counter, or robot mode should be debounced before the action is trusted.",
    "real_life_analogy": "Drop a basketball on the floor. You dropped it once, but it touches the floor several times before it stops bouncing. A button contact behaves the same way electrically: one press can create several tiny touches before the final stable touch.\n\nA light switch can do something similar. When metal contacts close, they may flicker for a split second before staying connected. Your eyes may not notice, but a microcontroller can.\n\nA car going over a speed bump is another version of the same idea. The bump is one event, but the car suspension moves up and down before settling. Debounce waits for the settling before making a decision.",
