  "faqs": [
    {
      "question": "What is a digital input on ESP32?",
      "answer": "A digital input is a GPIO pin configured so the ESP32 reads whether the voltage on that pin looks like HIGH or LOW."
    },
    {
      "question": "What voltage is HIGH on ESP32?",
      "answer": "ESP32 uses 3.3 V logic. A voltage near 3.3 V is read as HIGH. A voltage near GND is read as LOW."
    },
    {
      "question": "Why does an unconnected ESP32 pin change randomly?",
      "answer": "An unconnected input has no strong electrical reference. Tiny noise, nearby wires, your hand, or radio signals can nudge the pin above or below the input threshold."
    },
    {
      "question": "Is a floating pin dangerous?",
      "answer": "It usually does not damage the ESP32, but it makes your program unreliable. A floating input can trigger false button presses, false alarms, or unstable project behavior."
    },
    {
      "question": "Do digital inputs measure exact voltage?",
      "answer": "No. digitalRead() does not tell you the exact voltage. It only returns HIGH or LOW after the input circuit compares the pin voltage to logic thresholds."
    },
    {
      "question": "Why did Mission 02 use INPUT_PULLUP?",
      "answer": "INPUT_PULLUP gave the button pin a default HIGH value when the button was not pressed. Without that default, the pin could float."
    },
    {
      "question": "What should I learn after floating pins?",
      "answer": "The next concept is pull-up versus pull-down resistors. Those two patterns give input pins a reliable default HIGH or default LOW state."
    }
  ],
