    "code": {
      "filename": "digital_input_floating_pin.ino",
      "notes": "- This sketch intentionally uses INPUT, not INPUT_PULLUP.\n- GPIO27 is left floating at first so you can observe random values.\n- The code prints only when the input changes, so the behavior is easier to see.\n- Do not use this floating input pattern in real projects. It is only an experiment.",
      "content": "const int INPUT_PIN = 27;\n\nint lastReading = -1;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(INPUT_PIN, INPUT);\n\n  Serial.println(\"Mission 03: Digital input and floating pin test\");\n  Serial.println(\"Leave GPIO27 floating, then touch it to GND or 3.3V.\");\n}\n\nvoid loop() {\n  int reading = digitalRead(INPUT_PIN);\n\n  if (reading != lastReading) {\n    if (reading == HIGH) {\n      Serial.println(\"GPIO27 reads HIGH\");\n    } else {\n      Serial.println(\"GPIO27 reads LOW\");\n    }\n\n    lastReading = reading;\n  }\n\n  delay(50);\n}\n"
    },
    "code_explanation": [
      {
        "text": "const int INPUT_PIN = 27; gives the input pin a clear name so the rest of the code is easier to read."
      },
      {
        "text": "int lastReading = -1; stores the previous input value. -1 is used because the first real reading will be HIGH or LOW."
      },
      {
        "text": "Serial.begin(115200); starts communication with Serial Monitor."
      },
      {
        "text": "pinMode(INPUT_PIN, INPUT); tells the ESP32 to listen to GPIO27 without enabling an internal pull-up or pull-down."
      },
      {
        "text": "digitalRead(INPUT_PIN); asks whether GPIO27 looks HIGH or LOW right now."
      },
      {
        "text": "if (reading != lastReading) prints only when the value changes, which makes random floating behavior easier to notice."
      },
      {
        "text": "delay(50); slows the loop slightly so Serial Monitor stays readable."
      }
    ],
    "expected_output": "With the jumper floating, Serial Monitor may show changes like:\n\nGPIO27 reads HIGH\nGPIO27 reads LOW\nGPIO27 reads HIGH\n\nWhen you touch the jumper to GND, it should settle on:\nGPIO27 reads LOW\n\nWhen you touch the jumper to 3.3 V, it should settle on:\nGPIO27 reads HIGH\n\nWhen you release it again, the value may drift or change unpredictably.",
    "experiment": "Leave the loose end of the jumper wire in the air and move your hand near it without touching metal. You may see the value change. Touch the insulation of the wire, move it near the USB cable, or wave your hand nearby. The exact behavior will vary from desk to desk.\n\nThis happens because the loose wire acts a little like an antenna. It can pick up tiny electric fields from your body, the USB cable, nearby electronics, and the environment. Since GPIO27 is configured as INPUT with no pull-up or pull-down, there is no strong path forcing it to HIGH or LOW. The pin voltage can wander around the input threshold, so digitalRead() may report different values.\n\nThe fix is not to ignore the randomness. The fix is to design the input so it always has a default state. That is why Mission 04 teaches pull-up and pull-down resistors.",
