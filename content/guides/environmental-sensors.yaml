  "faqs": [
    {
      "question": "What is an environmental sensor?",
      "answer": "An environmental sensor measures conditions around the device, such as temperature, humidity, air pressure, light, air quality, or moisture."
    },
    {
      "question": "Why use the BME280 in this mission?",
      "answer": "The BME280 is a compact I2C sensor that can measure temperature, humidity, and atmospheric pressure with one module."
    },
    {
      "question": "How is the BME280 different from the DHT22?",
      "answer": "The DHT22 measures temperature and humidity. The BME280 also measures pressure and uses I2C, which makes it fit naturally after the I2C mission."
    },
    {
      "question": "Why do sensor readings keep changing?",
      "answer": "Real air is always moving, electronics have small noise, and sensors have limited precision. Small changes are normal, not a sign that the sensor is broken."
    },
    {
      "question": "What is sensor accuracy?",
      "answer": "Accuracy describes how close a reading is to the true value. A sensor can be stable but still slightly wrong."
    },
    {
      "question": "What is sensor precision?",
      "answer": "Precision describes how repeatable the readings are. A sensor can show very consistent numbers even if they are offset from the true value."
    },
    {
      "question": "What is calibration?",
      "answer": "Calibration means comparing sensor readings with a trusted reference and adjusting your interpretation or code so the result is more useful."
    },
    {
      "question": "Why does pressure change during the day?",
      "answer": "Atmospheric pressure changes as weather systems move, air temperature changes, and air masses rise or sink. Indoor pressure usually follows outdoor pressure slowly."
    },
    {
      "question": "Why does my sensor not match a weather app?",
      "answer": "Weather apps usually use outdoor station data or forecasts. Your BME280 measures the air at your desk, inside your room, near your electronics."
    },
    {
      "question": "Are cheap sensors useful?",
      "answer": "Yes. Cheap sensors are excellent for trends, learning, automation triggers, and relative changes, even when they are not laboratory instruments."
    },
    {
      "question": "Why do engineers average sensor readings?",
      "answer": "Averaging reduces small random changes so decisions are based on the general trend instead of one noisy sample."
    },
    {
      "question": "How often should I read a BME280?",
      "answer": "For a beginner environment monitor, every 1 to 5 seconds is usually enough. Reading too quickly often creates noise without adding useful information."
    }
  ],
