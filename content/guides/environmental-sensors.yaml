    "code": {
      "filename": "environmental_sensor_oled.ino",
      "notes": "- Required libraries: Adafruit BME280, Adafruit Unified Sensor, Adafruit SSD1306, and Adafruit GFX.\n- Install them from Arduino IDE Library Manager before compiling.\n- The sketch tries BME280 address 0x76 first, then 0x77.\n- OLED address is set to 0x3C, the most common SSD1306 address.\n- Sensor readings update every 2 seconds to keep the display readable.",
      "content": "#include <Wire.h>\n#include <Adafruit_GFX.h>\n#include <Adafruit_SSD1306.h>\n#include <Adafruit_BME280.h>\n\nconst int I2C_SDA = 21;\nconst int I2C_SCL = 22;\n\nconst int SCREEN_WIDTH = 128;\nconst int SCREEN_HEIGHT = 64;\nconst int OLED_RESET = -1;\nconst int OLED_ADDRESS = 0x3C;\n\nconst unsigned long SAMPLE_INTERVAL_MS = 2000;\n\nAdafruit_SSD1306 display(SCREEN_WIDTH, SCREEN_HEIGHT, &Wire, OLED_RESET);\nAdafruit_BME280 bme;\n\nunsigned long lastSampleTime = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n  delay(1000);\n\n  Wire.begin(I2C_SDA, I2C_SCL);\n\n  if (!display.begin(SSD1306_SWITCHCAPVCC, OLED_ADDRESS)) {\n    Serial.println(\"OLED not found. Check address, SDA, and SCL.\");\n    while (true) {\n      delay(1000);\n    }\n  }\n\n  bool bmeReady = bme.begin(0x76);\n\n  if (!bmeReady) {\n    bmeReady = bme.begin(0x77);\n  }\n\n  if (!bmeReady) {\n    Serial.println(\"BME280 not found at 0x76 or 0x77.\");\n    showMessage(\"BME280 not found\", \"Check wiring\");\n    while (true) {\n      delay(1000);\n    }\n  }\n\n  Serial.println(\"Mission 11: Environmental sensor ready\");\n  showMessage(\"ESP32 Engine\", \"BME280 ready\");\n  delay(1500);\n}\n\nvoid loop() {\n  unsigned long now = millis();\n\n  if (now - lastSampleTime >= SAMPLE_INTERVAL_MS) {\n    lastSampleTime = now;\n\n    float temperatureC = bme.readTemperature();\n    float humidity = bme.readHumidity();\n    float pressureHpa = bme.readPressure() / 100.0;\n\n    printToSerial(temperatureC, humidity, pressureHpa);\n    showOnDisplay(temperatureC, humidity, pressureHpa);\n  }\n}\n\nvoid printToSerial(float temperatureC, float humidity, float pressureHpa) {\n  Serial.print(\"Temperature: \");\n  Serial.print(temperatureC, 1);\n  Serial.print(\" C | Humidity: \");\n  Serial.print(humidity, 1);\n  Serial.print(\" % | Pressure: \");\n  Serial.print(pressureHpa, 1);\n  Serial.println(\" hPa\");\n}\n\nvoid showOnDisplay(float temperatureC, float humidity, float pressureHpa) {\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  display.setTextSize(1);\n\n  display.setCursor(0, 0);\n  display.println(\"Environment\");\n\n  display.setCursor(0, 16);\n  display.print(\"Temp: \");\n  display.print(temperatureC, 1);\n  display.println(\" C\");\n\n  display.setCursor(0, 32);\n  display.print(\"Hum:  \");\n  display.print(humidity, 1);\n  display.println(\" %\");\n\n  display.setCursor(0, 48);\n  display.print(\"Pres: \");\n  display.print(pressureHpa, 1);\n  display.println(\" hPa\");\n\n  display.display();\n}\n\nvoid showMessage(const char* line1, const char* line2) {\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  display.setTextSize(1);\n  display.setCursor(0, 12);\n  display.println(line1);\n  display.setCursor(0, 32);\n  display.println(line2);\n  display.display();\n}\n"
    },
    "code_explanation": [
      {
        "text": "Wire.h starts the I2C bus used by both the BME280 and OLED."
      },
      {
        "text": "Adafruit_GFX and Adafruit_SSD1306 control the OLED display."
      },
      {
        "text": "Adafruit_BME280 reads temperature, humidity, and pressure from the sensor."
      },
      {
        "text": "I2C_SDA and I2C_SCL keep the ESP32 on GPIO21 and GPIO22, matching Mission 10."
      },
      {
        "text": "SAMPLE_INTERVAL_MS sets how often the ESP32 reads the sensor. Two seconds is readable and calm."
      },
      {
        "text": "display.begin() checks that the OLED responds at address 0x3C."
      },
      {
        "text": "bme.begin(0x76) tries the common BME280 address first."
      },
      {
        "text": "If 0x76 fails, the sketch tries 0x77 because many BME280 modules use that address."
      },
      {
        "text": "millis() is used to sample every 2 seconds without needing a long blocking delay in the main loop."
      },
      {
        "text": "readTemperature() returns temperature in degrees Celsius."
      },
      {
        "text": "readHumidity() returns relative humidity as a percent."
      },
      {
        "text": "readPressure() returns pressure in pascals, so the code divides by 100 to display hPa."
      },
      {
        "text": "printToSerial() formats the values for debugging on your computer."
      },
      {
        "text": "showOnDisplay() formats the same values for the OLED so the project can stand alone."
      }
    ],
    "expected_output": "The OLED should show a compact live dashboard:\n\nEnvironment\nTemp: 24.6 C\nHum:  48.3 %\nPres: 1012.7 hPa\n\nSerial Monitor should print matching lines about every two seconds:\n\nMission 11: Environmental sensor ready\nTemperature: 24.6 C | Humidity: 48.3 % | Pressure: 1012.7 hPa\nTemperature: 24.7 C | Humidity: 48.1 % | Pressure: 1012.6 hPa\n\nDo not expect every line to be identical. Real air moves, the sensor has noise, and pressure changes through the day.",
