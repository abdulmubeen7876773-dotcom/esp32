  "faqs": [
    {
      "question": "What is an OLED display?",
      "answer": "An OLED display is a small screen where each pixel can create its own light. The SSD1306 module is popular because it is low power, sharp, and easy to control over I2C."
    },
    {
      "question": "Why use an OLED instead of Serial Monitor?",
      "answer": "Serial Monitor is only visible on your computer. An OLED lets the ESP32 project show information when it is running on a desk, wall, robot, or enclosure."
    },
    {
      "question": "What does SSD1306 mean?",
      "answer": "SSD1306 is the display controller chip used on many 0.96 inch OLED modules. Your Arduino code talks to this controller, and the controller updates the pixels."
    },
    {
      "question": "What is I2C?",
      "answer": "I2C is a communication bus that lets the ESP32 talk to smart parts using two signal wires: SDA for data and SCL for clock."
    },
    {
      "question": "Which ESP32 pins should I use for I2C OLED?",
      "answer": "For a typical ESP32 DevKit, use GPIO21 for SDA and GPIO22 for SCL. Those are the default I2C pins used in this mission."
    },
    {
      "question": "What OLED I2C address should I use?",
      "answer": "Most SSD1306 0.96 inch OLED modules use address 0x3C. Some use 0x3D. If the screen stays blank, address mismatch is one of the first things to check."
    },
    {
      "question": "Should OLED VCC connect to 3.3 V or 5 V?",
      "answer": "Use 3.3 V for this mission. Many modules tolerate 5 V on VCC, but the ESP32 GPIO signals are 3.3 V, so 3.3 V wiring is the safer beginner choice."
    },
    {
      "question": "Why does the code call display.display()?",
      "answer": "The library first draws into a memory buffer. display.display() sends that buffer to the real screen, so the pixels actually update."
    },
    {
      "question": "Why do we clear the display before drawing again?",
      "answer": "If you do not clear the display, old text can remain behind new text. clearDisplay() gives each refresh a clean screen."
    },
    {
      "question": "Can the OLED show sensor values?",
      "answer": "Yes. Any value you can print to Serial Monitor can usually be printed to the OLED, including temperature, humidity, light level, distance, and ADC readings."
    },
    {
      "question": "Why does the OLED flicker if I refresh too fast?",
      "answer": "Refreshing too often can make updates look unstable. Update only as fast as the user needs to read the value, such as a few times per second."
    },
    {
      "question": "What libraries do I need?",
      "answer": "Install Adafruit SSD1306 and Adafruit GFX from the Arduino Library Manager. The Wire library is included with the ESP32 Arduino core."
    },
    {
      "question": "Can I use a different OLED size?",
      "answer": "Yes, but you must match the screen width, height, and driver. This mission assumes a 128x64 SSD1306 OLED."
    },
    {
      "question": "Can many I2C devices share GPIO21 and GPIO22?",
      "answer": "Yes, if each device has a different I2C address and the wiring is clean. That is one reason I2C is useful."
    },
    {
      "question": "What should I do if the screen is blank?",
      "answer": "Check VCC, GND, SDA, SCL, the I2C address, library installation, and whether your module is really SSD1306."
    }
  ],
