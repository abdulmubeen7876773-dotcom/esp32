mission:
  badge: Mission 2
  icon: "🌡"
  title: Teach Your ESP32 to Feel the Weather!
  story: |
    Your ESP32 already knows how to blink. Now it needs senses — like a robot opening its eyes for the first time.

    The DHT22 is a small sensor that measures how warm and how humid the air is. You'll wire it up, ask it for readings, and watch numbers appear in the Serial Monitor.

    When those numbers change as you breathe near the sensor, you'll know your board can feel the real world — the same skill used in weather stations and greenhouse monitors worldwide.
  eli12: |
    - The DHT22 is a tiny weather box with three legs — power, ground, and data.
    - One leg gets 3.3 V power, one connects to ground, and the data leg sends numbers back to the ESP32.
    - The ESP32 asks "how warm is it?" and the sensor replies — like a text message that says "24 degrees and kind of sticky outside."
    - You read those numbers in Serial Monitor on your computer every two seconds.
  what_you_build: |
    - A breadboard circuit with DHT22 connected to your ESP32
    - A program that reads temperature (°C) and humidity (%) every two seconds
    - Proof that your board can sense the real world, not just blink lights
  things_you_need:
    - item: ESP32 DevKit board
      note: Any board with a USB port
      link: /components/esp32-devkit.html
      icon: "🖥"
    - item: DHT22 sensor module
      note: 3-pin or 4-pin module with built-in resistor is easiest
      link: /components/dht22.html
      icon: "🌡"
    - item: Breadboard
      note: Half-size works great
      icon: "🧩"
    - item: Jumper wires
      note: Male-to-male, at least 4
      icon: "🔗"
    - item: USB cable
      note: Must carry data — not charge-only
      icon: "🔌"
  safety:
    - text: Unplug USB before changing any wires.
    - text: Power the DHT22 at 3.3 V when connecting directly to ESP32 GPIO — never 5 V on the data pin.
    - text: Do not touch the exposed sensor grid while powered — oils from fingers can affect readings.
    - text: Keep liquids away from the breadboard and board. Ask an adult for help with USB if you need it.
  component_spotlight_lead: Meet your new weather sensor — tap to learn how the DHT22 works before you wire it up.
  concept:
    title: How Does the DHT22 Send Data?
    illustration_alt: DHT22 sensor with VCC, GND, and single data line connected to ESP32 GPIO4 with pull-up resistor
    body: |
      - The DHT22 uses one data wire to talk to the ESP32 — the ESP32 sends a start signal, then the sensor replies with a packet of bits.
      - A library on your computer turns those bits into temperature and humidity numbers you can read.
      - A pull-up resistor (often built into modules) keeps the data line stable at 3.3 V until the sensor pulls it low to send data.
      - setup() starts Serial and the sensor once. loop() asks for a reading, prints it, then waits two seconds before asking again.
  wiring:
    illustration_alt: DHT22 VCC to 3.3V, GND to GND, DATA to GPIO4
    steps:
      - "Unplug USB. Place the DHT22 module on the breadboard."
      - "Connect VCC on the module to ESP32 3.3 V (red wire)."
      - "Connect GND on the module to ESP32 GND (black wire)."
      - "Connect DATA on the module to ESP32 GPIO4 (yellow or green wire)."
      - "If using a bare DHT22 (not a module), add a 10 kΩ pull-up from DATA to 3.3 V."
      - "Double-check — 3.3 V → VCC, GND → GND, GPIO4 → DATA."
      - "Install the DHT sensor library in Arduino IDE (Library Manager → search DHT), then plug in USB and upload the code."
  code:
    filename: dht22_read.ino
    notes: |
      - setup() runs once — it starts Serial at 115200 baud and wakes up the DHT22.
      - loop() reads humidity and temperature, then waits two seconds — the DHT22 needs that pause between readings.
      - If you see "Read failed", check wiring on GPIO4 and 3.3 V power before changing code.
    content: |
      #include "DHT.h"

      #define DHTPIN 4
      #define DHTTYPE DHT22

      DHT dht(DHTPIN, DHTTYPE);

      void setup() {
        Serial.begin(115200);
        dht.begin();
        Serial.println("DHT22 ready!");
      }

      void loop() {
        float humidity = dht.readHumidity();
        float tempC = dht.readTemperature();

        if (isnan(humidity) || isnan(tempC)) {
          Serial.println("Read failed — check wiring");
          delay(2000);
          return;
        }

        Serial.print("Temperature: ");
        Serial.print(tempC);
        Serial.print(" °C  |  Humidity: ");
        Serial.print(humidity);
        Serial.println(" %");

        delay(2000);
      }
  expected_output: |
    - Open Serial Monitor at 115200 baud. Every two seconds you'll see lines like:

      Temperature: 24.3 °C  |  Humidity: 55.0 %

    - Breathe warm air near the sensor — temperature should rise slightly. Blow gently — humidity may change too.

    If you see "Read failed", check that DATA connects to GPIO4 and VCC connects to 3.3 V — not 5 V.
  quiz:
    - question: How often should you read the DHT22 at minimum?
      options:
        - About every 2 seconds
        - As fast as possible in a tight loop
        - Once per hour
      correct: 0
      correct_feedback: Yes! The DHT22 needs about two seconds to prepare each fresh reading.
      wrong_feedback: Good guess — but reading too fast gives bad data. The sensor needs a pause between reads.
      explanation: The DHT22 needs about 2 seconds between readings to prepare a fresh measurement. That's why our code uses delay(2000).
    - question: What does NaN mean in the Serial output?
      options:
        - The reading failed — usually a wiring issue
        - The temperature is zero
        - The sensor is working perfectly
      correct: 0
      correct_feedback: Right! NaN means the sensor didn't send valid numbers — check your wires first.
      wrong_feedback: Not quite — NaN is not zero. It means "no valid number" and usually points to wiring.
      explanation: NaN means Not a Number — the library couldn't get valid data. Check DATA on GPIO4, 3.3 V power, and GND.
    - question: Which pin is the DHT22 data wire connected to in this mission?
      options:
        - GPIO4
        - GPIO2
        - The USB port
      correct: 0
      correct_feedback: Correct! DHTPIN is 4 in the code — and your DATA wire goes to GPIO4 on the board.
      wrong_feedback: Look at the top of the code — #define DHTPIN 4. That's GPIO4, not GPIO2.
      explanation: "#define DHTPIN 4 matches the DATA wire you connected to GPIO4 on the ESP32."
  challenge_items:
    - icon: "🔥"
      text: Warm alert — if temperature goes above 28 °C, print "It's getting warm!"
    - icon: "💧"
      text: Humidity alert — if humidity goes above 70 %, print "Feels humid!"
    - icon: "🧊"
      text: Hold an ice cube near the sensor (not touching water to the board) and watch the temperature drop.
    - icon: "🎨"
      text: Combine with Mission 1 — blink an LED when the temperature crosses a limit you choose.
  complete:
