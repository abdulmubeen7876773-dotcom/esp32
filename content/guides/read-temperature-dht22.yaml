faqs:
  - question: Can I power the DHT22 from 5 V with an ESP32?
    answer: Use 3.3 V when the data pin connects directly to an ESP32 GPIO. Some DHT22 modules accept 5 V power, but their data output may also be pulled up to 5 V, which is not safe for ESP32 pins.
  - question: Why does the DHT22 sometimes return NaN?
    answer: NaN means the library did not receive a valid reading. The usual causes are wrong pin number, missing pull-up resistor, loose jumper wires, incorrect library, or reading faster than the sensor can update.
  - question: Is the DHT22 better than the DHT11?
    answer: Yes for most learning projects. DHT22 has a wider measurement range and better accuracy than DHT11, although it costs slightly more and still updates slowly.
  - question: Which ESP32 GPIO should I use for DHT22 data?
    answer: GPIO4 is a safe beginner choice. GPIO16, GPIO17, GPIO18, GPIO19, GPIO21, GPIO22, GPIO23, GPIO25, GPIO26, and GPIO27 can also work. Avoid boot strapping pins until you understand their startup behavior.
mission:
  badge: Mission 2
  icon: 🌡
  title: Teach Your ESP32 to Feel the Weather
  story: |
    Your ESP32 already knows how to blink an LED. Now it needs a sense of the room around it.

    The DHT22 is a beginner-friendly digital sensor that measures air temperature and relative humidity. It is used in small weather stations, room comfort monitors, greenhouse controllers, smart thermostats, and school science projects.

    In this mission you will connect the DHT22 to one ESP32 GPIO pin, read live values in Serial Monitor, and learn why sensor timing, pull-up resistors, and clean power matter.
  eli12: |
    The DHT22 is like a tiny weather reporter. It has power, ground, and one data wire. The ESP32 asks, "What is the room like right now?" and the sensor replies with two numbers: temperature and humidity.

    Humidity means how much water vapor is in the air. High humidity can feel sticky. Low humidity can feel dry. Temperature tells you how warm the air is.
  what_you_build: |
    - A breadboard circuit with a DHT22 connected to ESP32 GPIO4.
    - Arduino code that reads humidity and temperature every 2 seconds.
    - Serial Monitor output that shows real room values.
    - A safe troubleshooting checklist for the most common DHT22 problems.
  things_you_need:
    - item: ESP32 DevKit board
      note: Any ESP32 development board with a USB data port works.
      link: /components/esp32-devkit.html
      icon: 🖥
    - item: DHT22 temperature and humidity sensor module
      note: A 3-pin module is easiest because it usually includes the pull-up resistor.
      link: /components/dht22.html
      icon: 🌡
    - item: 10 k ohm resistor
      note: Only required if you use a bare 4-pin DHT22 sensor without a module board.
      icon: 🎚
    - item: Breadboard
      note: Half-size breadboard is enough.
      icon: 🧩
    - item: Jumper wires
      note: Use short, firm male-to-male wires for stable readings.
      icon: 🔗
    - item: USB data cable
      note: Charge-only cables can power the board but cannot upload code.
      icon: 🔌
  safety:
    - text: Power the sensor from ESP32 3.3 V when the data line connects directly to a GPIO pin.
    - text: Do not connect a 5 V pulled-up data signal to an ESP32 input pin.
    - text: Unplug USB before moving wires on the breadboard.
    - text: Keep water, soil, and condensation away from the ESP32 and breadboard.
  component_spotlight_lead: "These two parts do most of the work: the ESP32 reads the signal, and the DHT22 measures the air."
  concept:
    title: How the DHT22 Actually Works
    illustration_alt: DHT22 data line connected to ESP32 GPIO4 with 3.3 V, ground, and a pull-up resistor
    body: |
      The DHT22 is a digital temperature and humidity sensor. Inside the package are a humidity sensing element, a temperature sensor, and a small controller that converts the measurement into a digital signal.

      It does not behave like an analog sensor. The ESP32 cannot use analogRead() here. Instead, the ESP32 sends a start signal on one GPIO pin. The DHT22 replies by pulling that same data line HIGH and LOW in a timed pattern. The Arduino DHT library measures those pulses and converts them into humidity and temperature values.

      The data line needs a pull-up resistor so it normally rests at 3.3 V. Many DHT22 modules already include this resistor. A bare DHT22 sensor usually needs an external 10 k ohm resistor between DATA and 3.3 V.

      The DHT22 is useful, but it is slow. Read it about once every 2 seconds. Reading faster often causes failed values because the sensor has not prepared a new measurement yet.
  wiring:
    illustration_alt: DHT22 VCC to ESP32 3.3 V, GND to ESP32 GND, DATA to ESP32 GPIO4, optional 10 k ohm pull-up from DATA to 3.3 V
    steps:
      - Unplug the ESP32 USB cable before wiring.
      - Place the DHT22 module on the breadboard so each pin has its own row.
      - Connect DHT22 VCC or + to ESP32 3.3 V.
      - Connect DHT22 GND or - to ESP32 GND.
      - Connect DHT22 DATA or OUT to ESP32 GPIO4.
      - If you are using a bare 4-pin DHT22, add a 10 k ohm resistor from DATA to 3.3 V.
      - Leave the unused NC pin on a bare DHT22 disconnected.
      - In Arduino IDE, install "DHT sensor library" by Adafruit and "Adafruit Unified Sensor" from Library Manager.
  code:
    filename: dht22_esp32_room_sensor.ino
    notes: |
      - DHTPIN must match the GPIO you wired to the DATA pin.
      - DHTTYPE tells the library this is a DHT22, not a DHT11.
      - The code waits 2 seconds between reads because the DHT22 is a slow sensor.
      - isnan() protects your program from printing bad values when a read fails.
    content: |
      #include "DHT.h"

      // DHT22 data pin connected to ESP32 GPIO4.
      #define DHTPIN 4

      // Tell the library which DHT sensor model you are using.
      #define DHTTYPE DHT22

      DHT dht(DHTPIN, DHTTYPE);

      void setup() {
        Serial.begin(115200);
        delay(1000);

        dht.begin();
        Serial.println("DHT22 ESP32 room sensor ready");
        Serial.println("Reading every 2 seconds...");
      }

      void loop() {
        float humidity = dht.readHumidity();
        float temperatureC = dht.readTemperature();
        float temperatureF = dht.readTemperature(true);

        if (isnan(humidity) || isnan(temperatureC) || isnan(temperatureF)) {
          Serial.println("Read failed. Check wiring, power, pull-up resistor, and library setup.");
          delay(2000);
          return;
        }

        float heatIndexC = dht.computeHeatIndex(temperatureC, humidity, false);

        Serial.print("Temperature: ");
        Serial.print(temperatureC, 1);
        Serial.print(" C / ");
        Serial.print(temperatureF, 1);
        Serial.print(" F  |  Humidity: ");
        Serial.print(humidity, 1);
        Serial.print(" %  |  Heat index: ");
        Serial.print(heatIndexC, 1);
        Serial.println(" C");

        delay(2000);
      }
  expected_output: |
    Open Serial Monitor at 115200 baud. Every 2 seconds you should see a line like this:

    Temperature: 24.3 C / 75.7 F  |  Humidity: 55.0 %  |  Heat index: 24.1 C

    Warm the sensor gently with your hand or breathe near it from a short distance. Temperature or humidity should change slowly. Do not touch the sensor grill or expose the board to moisture.
  quiz:
    - question: Why should you wait about 2 seconds between DHT22 readings?
      options:
        - The sensor needs time to prepare a fresh measurement
        - The ESP32 cannot run faster than that
        - Serial Monitor only updates every 2 seconds
      correct: 0
      explanation: The DHT22 is a slow digital sensor. Reading too often can return failed or repeated values.
    - question: What does NaN mean in the Serial output?
      options:
        - The reading failed, usually because of wiring, timing, or library setup
        - The room temperature is zero
        - The sensor is measuring humidity perfectly
      correct: 0
      explanation: NaN means Not a Number. The library could not decode a valid measurement from the sensor.
    - question: Why does the DATA pin need a pull-up resistor?
      options:
        - It keeps the data line stable when the sensor is not pulling it low
        - It converts humidity into voltage
        - It makes the ESP32 Wi-Fi stronger
      correct: 0
      explanation: The pull-up resistor holds the one-wire data line HIGH so the timed pulses can be read cleanly.
  challenge_items:
    - icon: ⚠
      text: Print "Too warm" when temperature is above 28 C.
    - icon: 💧
