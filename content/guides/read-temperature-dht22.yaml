  common_problems:
    - problem: Serial Monitor says "Read failed"
      cause: DATA is on the wrong GPIO, the pull-up resistor is missing, or the sensor is being read too quickly.
      fix: Confirm DATA goes to GPIO4, use 3.3 V and GND, add a 10 k ohm pull-up for a bare sensor, and keep delay(2000).
    - problem: Code does not compile because DHT.h is missing
      cause: The Adafruit DHT library is not installed, or the wrong library was installed.
      fix: Open Arduino IDE Library Manager and install "DHT sensor library" by Adafruit plus "Adafruit Unified Sensor".
    - problem: Values are unrealistic or stuck
      cause: Loose jumper wires, poor breadboard contact, heat from your fingers, or airflow directly onto the sensor.
      fix: Reseat the wires, keep the sensor away from the warm ESP32 board, and wait a few readings for the value to settle.
    - problem: ESP32 uploads fail after wiring the sensor
      cause: The sensor may be connected to a boot strapping pin or a wiring mistake may pull a pin into the wrong state during reset.
      fix: Use GPIO4 for this beginner circuit and disconnect power before rewiring.
    - problem: Sensor works on Arduino Uno examples but not ESP32
      cause: Some examples use 5 V assumptions or a different pin number.
      fix: Use 3.3 V logic, update DHTPIN to your ESP32 GPIO number, and select an ESP32 board in Arduino IDE.
