mission:
  badge: Mission 1
  icon: 💡
  title: Make Your First Light Blink!
  story: 'You''re the captain of a tiny spaceship — the ESP32.


    Right now every light on your ship is off. Mission Control is waiting for a sign you''re online.


    Your first command? Turn on one small LED. When it blinks, you''ll know your ship heard you — and
    you''re officially a maker.

    '
  eli12: '- An LED is a tiny light on a chip.

    - Your ESP32 is the brain — it has pins you connect wires to.

    - Power on → LED glows. Power off → LED goes dark.

    - Blink on, blink off — that''s your first program!

    '
  what_you_build: '- A breadboard circuit with one LED and your ESP32

    - A short program that blinks the light every half second

    - Proof that you can build hardware and write code

    '
  things_you_need:
  - item: ESP32 DevKit board
    note: Any board with a USB port
    link: /components/esp32-devkit.html
    icon: 🖥
  - item: LED
    note: Any color — 5 mm works great
    icon: 💡
  - item: 220 Ω resistor
    note: Red-red-brown stripes on the body
    icon: 🎚
  - item: Breadboard
    note: Half-size is perfect
    icon: 🧩
  - item: Jumper wires
    note: Male-to-male, at least 3
    icon: 🔗
  - item: USB cable
    note: Must carry data — not charge-only
    icon: 🔌
  safety:
  - text: Unplug USB before changing any wires.
  - text: ESP32 pins use 3.3 V — never connect 5 V directly to a pin.
  - text: Ask an adult for help with USB and small parts if you need it.
  component_spotlight_lead: Meet the brain of your circuit — tap to learn more about your board.
  concept:
    title: How Does Blinking Work?
    illustration_alt: ESP32 pin sends power through a resistor to the LED long leg, short leg returns
      to ground
    body: '- Each pin on the ESP32 can be ON or OFF — these are called GPIO pins.

      - The resistor protects the LED from too much power — like a speed bump for electricity.

      - setup() runs once and tells the pin to be an output.

      - loop() repeats forever — turn on, wait, turn off, wait. That''s the blink!

      '
  wiring:
    illustration_alt: Breadboard wiring diagram — ESP32 GPIO 2 through a 220 ohm resistor to the LED long
      leg, LED short leg to GND
    image: /assets/visuals/guides/wiring/blink-led-wiring-esp32.svg
    steps:
    - Unplug USB. Place the ESP32 on the left and the breadboard on the right.
    - Push the LED into the breadboard — long leg (+) in one row, short leg (−) in a different row.
    - Connect GPIO 2 on the ESP32 to one end of the 220 Ω resistor (yellow wire).
    - Connect the other end of the resistor to the same row as the LED's long leg (+).
    - Connect the LED's short leg (−) row to GND on the ESP32 (black wire).
    - Double-check — GPIO 2 → resistor → long leg → LED → short leg → GND.
    - Plug in USB and upload the code. Watch your LED blink!
  code:
    filename: blink_led.ino
    notes: '- setup() runs once — it tells the ESP32 that pin 2 is an output.

      - loop() runs forever — turn the LED on, wait half a second, turn off, wait again.

      - Try changing 500 to 200 for fast blinks or 1000 for slow ones.

      '
    content: "#define LED_PIN 2\n\nvoid setup() {\n  pinMode(LED_PIN, OUTPUT);\n}\n\nvoid loop() {\n \
      \ digitalWrite(LED_PIN, HIGH);\n  delay(500);\n  digitalWrite(LED_PIN, LOW);\n  delay(500);\n}\n"
  expected_output: '- The LED turns on for half a second, then off for half a second — over and over.

    - Many DevKit boards also blink a tiny onboard LED near the USB port — that''s normal!


    If nothing happens, check that your wire goes to GPIO 2 and the long LED leg connects to the resistor.

    '
  quiz:
  - question: Why do we use a resistor with the LED?
    options:
    - To limit current so the LED doesn't burn out
    - To make the LED brighter
    - Because the ESP32 can't send power
    correct: 0
    correct_feedback: Yes! The resistor is like a speed bump — it protects the LED.
    wrong_feedback: Good guess, but the resistor protects the LED from too much power.
    explanation: It limits how much current flows through the LED, protecting both the LED and the ESP32
      pin.
  - question: Which line of code turns the LED on?
    options:
    - digitalWrite(LED_PIN, HIGH)
    - pinMode(LED_PIN, OUTPUT)
    - delay(500)
    correct: 0
    correct_feedback: You got it! HIGH sends power to the pin and lights the LED.
    wrong_feedback: Close! pinMode sets up the pin — digitalWrite actually turns the light on.
    explanation: digitalWrite with HIGH sends 3.3 V to the pin. pinMode runs once in setup; delay just
      waits.
  - question: Which pin is the LED connected to in this mission?
    options:
    - GPIO 2
    - The USB port
    - The 3.3 V power pin
    correct: 0
    correct_feedback: Correct! We wired the LED to GPIO 2 — and the code uses pin 2 too.
    wrong_feedback: Look at the top of the code — LED_PIN is set to 2. That's GPIO 2 on your board.
    explanation: '#define LED_PIN 2 matches the wire you connected to GPIO 2 on the ESP32.'
  challenge_items:
  - icon: ⚡
    text: Blink faster — change delay(500) to delay(200).
  - icon: 🐢
    text: Blink slower — try delay(1000) for a calm, slow pulse.
  - icon: 🆘
    text: Blink SOS — three short, three long, three short.
  - icon: 🎨
    text: Invent your own pattern — can you make a heartbeat or a disco flash?
