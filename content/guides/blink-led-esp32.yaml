mission:
  badge: Mission 1
  icon: "💡"
  title: Make Your First Light Blink!
  story: |
    Imagine you're the captain of a tiny spaceship — the ESP32. Right now your ship is quiet. No blinking lights, no signs of life. Mission Control wants proof that you're online.

    Today you send your first command: turn on a small LED. When it blinks, you'll know your ESP32 heard you, your wiring works, and you're officially a maker.
  eli12: |
    An LED is a tiny light. Your ESP32 is like a brain with wires called pins. When the brain sends power to a pin, electricity flows through the LED and it glows. Turn power off — light goes dark. Blink on, blink off — that's your first program!
  what_you_build: |
    A breadboard circuit with one LED connected to your ESP32. You'll upload a short program that blinks the LED every half second — proof that your board, USB cable, and code all work together.
  things_you_need:
    - item: ESP32 DevKit board
      note: Any board with USB port
      link: /components/esp32-devkit.html
    - item: LED
      note: Any color — 5 mm is perfect
    - item: 220 Ω resistor
      note: Red-Red-Brown bands
    - item: Breadboard
      note: Half-size is fine
    - item: Jumper wires
      note: Male-to-male, at least 3
    - item: USB cable
      note: Data-capable, not charge-only
  safety:
    - text: Use 3.3 V logic only — do not connect 5 V directly to ESP32 GPIO pins.
    - text: Ask an adult to help if you're unsure about plugging in USB or handling small parts.
    - text: Disconnect power before changing wiring.
  concept:
    title: How Does Blinking Work?
    illustration_alt: ESP32 GPIO pin connected through a resistor to an LED anode, LED cathode to ground
    body: |
      GPIO means General Purpose Input/Output — a pin the ESP32 can turn HIGH (3.3 V) or LOW (0 V). Your LED needs a resistor so too much current doesn't burn it out.

      In code, pinMode sets the pin as output. digitalWrite(HIGH) turns the LED on. delay waits. digitalWrite(LOW) turns it off. Repeat — blink!
  wiring:
    illustration_alt: Breadboard diagram — ESP32 GPIO2 to resistor to LED anode, LED cathode to GND
    steps:
      - "Unplug USB. Place ESP32 and breadboard side by side."
      - "Insert the LED — long leg (anode) in one row, short leg (cathode) in another."
      - "Connect 220 Ω resistor from ESP32 GPIO2 to the LED anode row."
      - "Connect LED cathode row to ESP32 GND with a jumper wire."
      - "Double-check: resistor between GPIO2 and anode, cathode to GND."
      - "Plug in USB. Many DevKit boards also have a built-in LED on GPIO2."
  code:
    filename: blink_led.ino
    content: |
      #define LED_PIN 2

      void setup() {
        pinMode(LED_PIN, OUTPUT);
      }

      void loop() {
        digitalWrite(LED_PIN, HIGH);
        delay(500);
        digitalWrite(LED_PIN, LOW);
        delay(500);
      }
  expected_output: |
    The LED blinks on for half a second, off for half a second, repeating forever. On many DevKit boards you'll see the same blink on the tiny onboard LED near the USB port.

    If nothing happens, check that GPIO2 matches your wire and that the LED long leg faces the resistor.
  quiz:
    - question: Why do we use a resistor with the LED?
      options:
        - To limit current so the LED doesn't burn out
        - To make the LED brighter
        - Because ESP32 can't output voltage
      correct: 0
      explanation: The resistor limits how much current flows through the LED, protecting both the LED and the ESP32 pin.
    - question: Which function turns the LED on?
      options:
        - digitalWrite(pin, HIGH)
        - pinMode(pin, INPUT)
        - delay(500)
      correct: 0
      explanation: digitalWrite with HIGH sends 3.3 V to the pin. pinMode sets direction; delay just waits.
  challenge: |
    Change the blink speed — try delay(200) for a fast blink or delay(1000) for a slow pulse. Can you make the LED blink a SOS pattern (three short, three long, three short)?
  complete:
    summary: |
      You did it! You wired a circuit, wrote code, and made something physical happen. That's the heart of every ESP32 project — from weather stations to robots.
    skills:
      - Connect an LED safely with a resistor
      - Use GPIO2 as a digital output
      - Upload and run your first Arduino sketch
