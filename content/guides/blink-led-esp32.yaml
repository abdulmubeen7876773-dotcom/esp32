faqs:
- question: Why does the LED need a resistor?
  answer: The resistor limits current. Without it, too much current can flow through the LED and possibly damage the LED or the ESP32 GPIO pin.
- question: Which ESP32 pin should I use for the blink mission?
  answer: This mission uses GPIO2 because many ESP32 DevKit boards expose it clearly and often connect it to an onboard LED. You can use another safe output pin later if you update the code and wiring together.
- question: What does HIGH mean in the blink code?
  answer: HIGH tells the ESP32 to drive the output pin toward 3.3 V. In this circuit, that lets current flow through the resistor and LED, so the LED turns on.
- question: What does LOW mean in the blink code?
  answer: LOW tells the ESP32 to drive the output pin toward GND. With no voltage pushing current through the LED, the LED turns off.
