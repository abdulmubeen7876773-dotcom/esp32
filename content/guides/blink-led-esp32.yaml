  common_problems:
  - problem: LED does not turn on
    cause: The LED may be backwards, the wire may be on the wrong GPIO, or the resistor may not share the same row as the LED long leg.
    fix: Confirm the code uses GPIO2, connect GPIO2 to the resistor, connect the resistor to the LED long leg, and connect the short leg to GND.
  - problem: LED is very dim
    cause: The resistor value may be too large or the LED may not be fully seated in the breadboard.
    fix: Use a 220 ohm to 330 ohm resistor and press the LED and resistor legs firmly into separate breadboard rows.
  - problem: Upload succeeds but nothing blinks
    cause: Some boards do not connect the onboard LED to GPIO2, or the external LED wiring is incomplete.
    fix: Use the external LED circuit from the wiring diagram and check the exact GPIO label on your board.
  - problem: Upload fails
    cause: The wrong board, wrong port, or a charge-only USB cable is selected.
    fix: Select the ESP32 board and port in Arduino IDE, then try a known data-capable USB cable.
