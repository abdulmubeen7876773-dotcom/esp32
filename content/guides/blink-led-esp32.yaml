mission:
  badge: Mission 1
  icon: "💡"
  title: Make Your First Light Blink!
  story: |
    Imagine you're the captain of a tiny spaceship — the ESP32. Right now your ship is quiet. No blinking lights, no signs of life. Mission Control wants proof that you're online.

    Today you send your first command: turn on a small LED. When it blinks, you'll know your ESP32 heard you, your wiring works, and you're officially a maker.
  eli12: |
    An LED is a tiny light. Your ESP32 is like a brain with wires called pins. When the brain sends power to a pin, electricity flows through the LED and it glows. Turn power off — light goes dark. Blink on, blink off — that's your first program!
  what_you_build: |
    A simple breadboard circuit with one LED and your ESP32. You'll upload a short program that blinks the light every half second.
  things_you_need:
    - item: ESP32 DevKit board
      note: Any board with USB port
      link: /components/esp32-devkit.html
      icon: "🖥"
    - item: LED
      note: Any color — 5 mm is perfect
      icon: "💡"
    - item: 220 Ω resistor
      note: Look for red-red-brown stripes
      icon: "🎚"
    - item: Breadboard
      note: Half-size is fine
      icon: "🧩"
    - item: Jumper wires
      note: Male-to-male, at least 3
      icon: "🔗"
    - item: USB cable
      note: Data-capable, not charge-only
      icon: "🔌"
  safety:
    - text: ESP32 pins use 3.3 V — never plug 5 V directly into a GPIO pin.
    - text: Ask an adult for help with USB cables and small parts if you need it.
    - text: Unplug USB before changing any wires.
  concept:
    title: How Does Blinking Work?
    illustration_alt: ESP32 GPIO pin connected through a resistor to an LED anode, LED cathode to ground
    body: |
      Each pin on the ESP32 can be ON (3.3 V) or OFF (0 V). These pins are called GPIO.

      The resistor protects the LED from too much power.

      In code, pinMode sets the pin as an output. digitalWrite(HIGH) turns the LED on. delay(500) waits half a second. digitalWrite(LOW) turns it off. Then it repeats — blink!
  wiring:
    illustration_alt: Breadboard wiring diagram — ESP32 GPIO 2 through a 220 ohm resistor to the LED long leg, LED short leg to GND
    image: /assets/visuals/guides/wiring/blink-led-wiring-esp32.svg
    steps:
      - "Unplug USB. Put the ESP32 and breadboard side by side."
      - "Push the LED into the breadboard — long leg (+) in one row, short leg (−) in a different row."
      - "Connect GPIO2 on the ESP32 to one end of the 220 Ω resistor with a jumper wire."
      - "Connect the other end of the resistor to the same breadboard row as the LED's long leg."
      - "Connect the LED's short leg row to GND on the ESP32 with a jumper wire."
      - "Check your work — GPIO2 → resistor → long leg → LED → short leg → GND."
      - "Plug in USB and upload the code. Your LED should blink!"
  code:
    filename: blink_led.ino
    content: |
      #define LED_PIN 2

      void setup() {
        pinMode(LED_PIN, OUTPUT);
      }

      void loop() {
        digitalWrite(LED_PIN, HIGH);
        delay(500);
        digitalWrite(LED_PIN, LOW);
        delay(500);
      }
  expected_output: |
    The LED turns on for half a second, then off for half a second — over and over.

    Many DevKit boards also blink a tiny onboard LED near the USB port.

    If nothing happens, check that your wire goes to GPIO2 and that the long LED leg connects to the resistor.
  quiz:
    - question: Why do we use a resistor with the LED?
      options:
        - To limit current so the LED doesn't burn out
        - To make the LED brighter
        - Because ESP32 can't output voltage
      correct: 0
      explanation: The resistor limits how much current flows through the LED, protecting both the LED and the ESP32 pin.
    - question: Which function turns the LED on?
      options:
        - digitalWrite(pin, HIGH)
        - pinMode(pin, INPUT)
        - delay(500)
      correct: 0
      explanation: digitalWrite with HIGH sends 3.3 V to the pin. pinMode sets direction; delay just waits.
  challenge: |
    Try changing the blink speed — use delay(200) for fast blinks or delay(1000) for slow ones.

    Bonus — can you blink SOS? Three short blinks, three long blinks, three short blinks.
  complete:
    summary: |
      You did it! You built a circuit, wrote code, and made a real light blink. Every ESP32 project starts just like this.
    skills:
      - Connect an LED safely with a resistor
      - Use GPIO2 as a digital output
      - Upload and run your first Arduino sketch
