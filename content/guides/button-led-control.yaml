  "faqs": [
    {
      "question": "Why is my ESP32 button backwards?",
      "answer": "With INPUT_PULLUP, the pin reads HIGH when the button is not pressed and LOW when the button is pressed. That feels backwards at first, but it is normal and reliable."
    },
    {
      "question": "Do I need an external resistor for this button?",
      "answer": "No. This mission uses the ESP32 internal pull-up resistor by setting pinMode(BUTTON_PIN, INPUT_PULLUP). The button connects the pin to GND when pressed."
    },
    {
      "question": "Why does the LED flicker or change by itself?",
      "answer": "That usually means the button input is floating. Use INPUT_PULLUP, connect one side of the button to GPIO, and connect the other side to GND."
    },
    {
      "question": "Can I use any ESP32 GPIO for a button?",
      "answer": "Many GPIO pins work, but avoid boot strapping pins while learning. GPIO27 is a safe beginner choice for this mission."
    }
  ],
