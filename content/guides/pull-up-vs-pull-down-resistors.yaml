  "faqs": [
    {
      "question": "What is a pull-up resistor?",
      "answer": "A pull-up resistor connects an input pin weakly to 3.3 V so the pin reads HIGH when nothing else is pressing it LOW."
    },
    {
      "question": "What is a pull-down resistor?",
      "answer": "A pull-down resistor connects an input pin weakly to GND so the pin reads LOW when nothing else is pressing it HIGH."
    },
    {
      "question": "Why do buttons need pull-up or pull-down resistors?",
      "answer": "A button is open most of the time. Without a default path to 3.3 V or GND, the input can float and produce random readings."
    },
    {
      "question": "Why does INPUT_PULLUP read LOW when the button is pressed?",
      "answer": "With INPUT_PULLUP the pin normally rests HIGH through the internal resistor. Pressing the button connects the pin to GND, so the pressed state becomes LOW."
    },
    {
      "question": "Is LOW a problem in INPUT_PULLUP button logic?",
      "answer": "No. LOW simply means pressed in that wiring style. Your code can name it clearly, for example bool buttonPressed = digitalRead(pin) == LOW."
    },
    {
      "question": "When should I use INPUT?",
      "answer": "Use INPUT when an external circuit already drives the pin HIGH or LOW, such as a sensor output, or when you add your own external pull-up or pull-down resistor."
    },
    {
      "question": "When should I use INPUT_PULLUP?",
      "answer": "Use INPUT_PULLUP for simple buttons or switches where one side of the button connects to GND and you want the ESP32 to provide the default HIGH state."
    },
    {
      "question": "Does ESP32 have INPUT_PULLDOWN?",
      "answer": "Many ESP32 GPIOs support internal pull-down too, but beginner button examples usually use INPUT_PULLUP because it is simple, common, and works well with a button to GND."
    },
    {
      "question": "What resistor value should I use for an external pull-up or pull-down?",
      "answer": "10 kOhm is a common beginner-friendly value. It is strong enough to define the input but weak enough that only a tiny current flows when the button is pressed."
    },
    {
      "question": "Can I connect a button directly without a resistor?",
      "answer": "Only if you use an internal pull-up or pull-down mode. A plain INPUT button without a resistor will usually float when the button is open."
    },
    {
      "question": "Can a pull resistor damage the ESP32?",
      "answer": "A normal pull resistor such as 10 kOhm connected between a GPIO input and 3.3 V or GND is safe. The dangerous mistake is shorting 3.3 V directly to GND."
    },
    {
      "question": "Can I use 5 V with an ESP32 button input?",
      "answer": "No. ESP32 GPIO pins are 3.3 V logic and are not 5 V tolerant. Use 3.3 V for button circuits connected to GPIO."
    },
    {
      "question": "Why do many ESP32 tutorials use INPUT_PULLUP?",
      "answer": "It reduces parts, avoids an external resistor, and gives a stable default state with only a button wired between the GPIO and GND."
    },
    {
      "question": "Which is better, pull-up or pull-down?",
      "answer": "Neither is universally better. Pull-up is very common for buttons because internal pull-ups are available and wiring to GND is convenient. Pull-down is easier for beginners to read because pressed often equals HIGH."
    },
    {
      "question": "What happens if I remove the pull-up resistor?",
      "answer": "The input loses its default HIGH state. When the button is open, the pin can float and random HIGH/LOW readings can return."
    },
    {
      "question": "Why not use a very small resistor like 100 ohms?",
      "answer": "A small resistor wastes more current when the button is pressed. Pull resistors should be weak defaults, not strong loads."
    },
    {
      "question": "Do pull-up resistors debounce a button?",
      "answer": "No. Pull resistors stop floating. Debouncing handles the tiny rapid on/off transitions caused by the mechanical contacts inside a real button."
    },
    {
      "question": "Can one resistor serve multiple buttons?",
      "answer": "Usually each independent button input should have its own pull-up or pull-down path so every GPIO has a clear default state."
    },
    {
      "question": "Does a PIR sensor need INPUT_PULLUP?",
      "answer": "Usually no. Most PIR modules actively drive their output HIGH or LOW, so the ESP32 can read them as INPUT. Check the module documentation if the output is open-drain."
    },
    {
      "question": "What should I learn after pull-up and pull-down resistors?",
      "answer": "Learn button debouncing. Once the input has a stable default state, debouncing helps your code ignore the brief mechanical chatter of a real button press."
    }
  ],
