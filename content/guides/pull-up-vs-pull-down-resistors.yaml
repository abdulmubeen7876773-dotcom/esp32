    "code": {
      "filename": "pull_up_pull_down_buttons.ino",
      "notes": "This file includes two examples. Upload Example A for the external pull-down circuit. Then rewire the button and upload Example B for INPUT_PULLUP. Do not use both setups on the breadboard at the same time.",
      "content": "// Mission 04 - Example A: external pull-down resistor\n// Wiring: GPIO27 -> button -> 3.3V, and GPIO27 -> 10k resistor -> GND\n\nconst int BUTTON_PIN = 27;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(BUTTON_PIN, INPUT);\n  Serial.println(\"Example A: INPUT with external pull-down\");\n}\n\nvoid loop() {\n  int reading = digitalRead(BUTTON_PIN);\n\n  if (reading == HIGH) {\n    Serial.println(\"Button is PRESSED\");\n  } else {\n    Serial.println(\"Button is RELEASED\");\n  }\n\n  delay(250);\n}\n\n/*\nMission 04 - Example B: internal pull-up resistor\nRewire first: GPIO27 -> button -> GND. No external resistor needed.\nThen replace setup() and loop() with the code below.\n\nconst int BUTTON_PIN = 27;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(BUTTON_PIN, INPUT_PULLUP);\n  Serial.println(\"Example B: INPUT_PULLUP internal pull-up\");\n}\n\nvoid loop() {\n  int reading = digitalRead(BUTTON_PIN);\n\n  if (reading == LOW) {\n    Serial.println(\"Button is PRESSED\");\n  } else {\n    Serial.println(\"Button is RELEASED\");\n  }\n\n  delay(250);\n}\n*/\n"
    },
