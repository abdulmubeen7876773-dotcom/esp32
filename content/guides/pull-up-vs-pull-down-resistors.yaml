    "story": "Mission 03 showed the problem: an input pin with no clear connection can drift between HIGH and LOW. That was not a software bug. It was an unfinished circuit.\n\nMission 04 fixes that circuit. You will add a weak electrical default so the ESP32 always knows what the button means when it is not being pressed.",
    "eli12": "Imagine a door that should normally stay closed. A pull-down resistor is like a gentle spring that keeps it closed until someone pushes it open. A pull-up resistor is the opposite: the spring keeps it open until someone pulls it closed.\n\nThe spring is weak on purpose. A real button press easily wins, but when nobody touches the button, the input still has a clear answer.",
