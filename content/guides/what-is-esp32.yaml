headline: What Is ESP32? Complete Beginner's Guide
meta_description: Learn what ESP32 is, how dual-core Wi-Fi microcontrollers work, and how to start IoT projects. Comparisons, examples, FAQs, and troubleshooting for beginners.
lead: ESP32 is a low-cost, Wi-Fi and Bluetooth capable microcontroller that lets you build connected sensors, automation, and IoT devices without a separate computer on every node. This guide explains how it works, where it fits in your toolkit, and how to start your first project safely.
intro:
  story: |
    Imagine a tiny computer smaller than a postage stamp — but it can connect to Wi-Fi, read sensors, and control lights. That's ESP32! Makers around the world use it to build weather stations, robot cars, and smart garden helpers.
  eli12: |
    ESP32 is like a mini brain for electronics projects. You write simple instructions, plug in sensors or LEDs, and the board makes things happen — blink a light, measure temperature, or send data to your phone over Wi-Fi.
  safety:
    - text: Always use 3.3 V parts with ESP32 GPIO pins — never connect 5 V signals directly.
    - text: Ask an adult for help when plugging in USB cables or soldering.
    - text: Work on a dry, uncluttered desk away from water.
