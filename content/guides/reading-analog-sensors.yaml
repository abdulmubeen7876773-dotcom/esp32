    "story": "Mission 08 used a potentiometer, which is a human-controlled analog input. You turned the knob, the voltage changed, and the ESP32 printed a different number.\n\nMission 09 replaces your hand with a sensor. An LDR changes when light changes. That means the room itself can move the ADC value. This is the bridge from reading a test dial to building projects that react to the environment.",
