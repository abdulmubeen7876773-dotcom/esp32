  "faqs": [
    {
      "question": "What is an analog sensor?",
      "answer": "An analog sensor is a component or circuit that changes its output voltage as the real-world condition changes."
    },
    {
      "question": "What is an LDR?",
      "answer": "An LDR is a light-dependent resistor. Its resistance changes when the amount of light hitting it changes."
    },
    {
      "question": "Can the ESP32 read an LDR directly?",
      "answer": "The ESP32 reads voltage, not resistance directly. The LDR needs a resistor divider so light changes become voltage changes."
    },
    {
      "question": "Why do I need a 10 kOhm resistor with the LDR?",
      "answer": "The fixed resistor and LDR form a voltage divider. Without the fixed resistor, the ADC pin will not get a meaningful changing voltage."
    },
    {
      "question": "Why are my bright and dark values different from yours?",
      "answer": "Room lighting, LDR type, resistor value, wiring direction, and USB power can all change the exact raw ADC numbers."
    },
    {
      "question": "What is calibration?",
      "answer": "Calibration means measuring the real values your sensor produces in known conditions before deciding what those values mean."
    },
    {
      "question": "What is a threshold?",
      "answer": "A threshold is a chosen cutoff value. If the sensor reading crosses that value, your code changes its decision."
    },
    {
      "question": "Why does the sensor value jump around?",
      "answer": "Analog sensor readings often contain noise from wiring, power, nearby light changes, and ADC variation."
    },
    {
      "question": "Is sensor noise bad?",
      "answer": "Small noise is normal. Engineers handle it with averaging, filtering, stable wiring, and carefully chosen thresholds."
    },
    {
      "question": "Can I use ADC2 pins for analog sensors with WiFi?",
      "answer": "Avoid ADC2 pins when using WiFi on ESP32. Use ADC1 pins such as GPIO34 for beginner analog sensor projects."
    },
    {
      "question": "Why does covering the LDR make the number go up in some circuits?",
      "answer": "The direction depends on whether the LDR is connected to 3.3 V or GND in the voltage divider. The trend matters more than the direction."
    },
    {
      "question": "How do soil moisture sensors relate to this mission?",
      "answer": "Many soil moisture modules output a changing analog voltage. You calibrate dry and wet values just like dark and bright values."
    },
    {
      "question": "Should I convert every sensor value to percent?",
      "answer": "Percent can help humans understand the value, but always inspect the raw ADC number first."
    },
    {
      "question": "Can analog sensors be used in real products?",
      "answer": "Yes. Products use analog sensing for light, moisture, pressure, position, battery voltage, sound level, and many other measurements."
    },
    {
      "question": "What should I learn after analog sensors?",
      "answer": "Learn I2C communication. Many modern sensors are smart digital devices that communicate measured values over data wires."
    }
  ],
