    "code": {
      "filename": "multiple_buttons_state_detection.ino",
      "notes": "- Each button has its own pin, name, raw reading, stable state, and debounce timer.\n- INPUT_PULLUP means released is HIGH and pressed is LOW.\n- A press event is detected only when the debounced state changes from HIGH to LOW.\n- A release event is detected when the debounced state changes from LOW to HIGH.",
      "content": "const byte BUTTON_COUNT = 3;\n\nconst byte buttonPins[BUTTON_COUNT] = {25, 26, 27};\nconst char* buttonNames[BUTTON_COUNT] = {\"START\", \"STOP\", \"MODE\"};\n\nconst unsigned long DEBOUNCE_DELAY = 50;\n\nint lastRawReading[BUTTON_COUNT] = {HIGH, HIGH, HIGH};\nint stableState[BUTTON_COUNT] = {HIGH, HIGH, HIGH};\nunsigned long lastChangeTime[BUTTON_COUNT] = {0, 0, 0};\n\nvoid setup() {\n  Serial.begin(115200);\n\n  for (byte i = 0; i < BUTTON_COUNT; i++) {\n    pinMode(buttonPins[i], INPUT_PULLUP);\n  }\n\n  Serial.println(\"Mission 06: Multiple buttons ready\");\n  Serial.println(\"Press START, STOP, or MODE.\");\n}\n\nvoid loop() {\n  for (byte i = 0; i < BUTTON_COUNT; i++) {\n    checkButton(i);\n  }\n}\n\nvoid checkButton(byte index) {\n  int rawReading = digitalRead(buttonPins[index]);\n\n  if (rawReading != lastRawReading[index]) {\n    lastChangeTime[index] = millis();\n    lastRawReading[index] = rawReading;\n  }\n\n  bool readingHasSettled = (millis() - lastChangeTime[index]) > DEBOUNCE_DELAY;\n\n  if (readingHasSettled && rawReading != stableState[index]) {\n    stableState[index] = rawReading;\n\n    if (stableState[index] == LOW) {\n      Serial.print(buttonNames[index]);\n      Serial.println(\" pressed\");\n    } else {\n      Serial.print(buttonNames[index]);\n      Serial.println(\" released\");\n    }\n  }\n}\n"
    },
    "code_explanation": [
      {
        "text": "BUTTON_COUNT tells the program how many buttons are in the panel."
      },
      {
        "text": "buttonPins stores the GPIO number for each button. Button 0 uses GPIO25, button 1 uses GPIO26, and button 2 uses GPIO27."
      },
      {
        "text": "buttonNames stores human-friendly labels so Serial Monitor prints START, STOP, and MODE instead of only numbers."
      },
      {
        "text": "lastRawReading keeps the latest immediate digitalRead() value for each button."
      },
      {
        "text": "stableState keeps the trusted debounced state for each button."
      },
      {
        "text": "lastChangeTime keeps a separate debounce timer for each button so one button's bounce does not affect another button."
      },
      {
        "text": "setup() uses a for loop to set every button pin to INPUT_PULLUP."
      },
      {
        "text": "loop() checks every button every time it runs. The ESP32 is fast enough that this feels instant for a small button panel."
      },
      {
        "text": "checkButton(index) runs the same debounce logic for whichever button number is passed in."
      },
      {
        "text": "When the debounced state becomes LOW, the code prints a press event. When it becomes HIGH, the code prints a release event."
      }
    ],
