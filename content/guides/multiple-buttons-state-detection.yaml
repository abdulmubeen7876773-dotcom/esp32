  "faqs": [
    {
      "question": "Can two buttons share one GPIO pin?",
      "answer": "Not if you want to know which button was pressed. Each normal button should use its own GPIO pin so the ESP32 can read it independently."
    },
    {
      "question": "Do I need separate debounce timing for each button?",
      "answer": "Yes. Each mechanical button bounces on its own schedule, so each button needs its own last reading, stable state, and change time."
    },
    {
      "question": "Will pressing two buttons at once damage the ESP32?",
      "answer": "No. With the INPUT_PULLUP wiring in this mission, pressing two buttons at once is safe. Your code simply needs to decide how to respond."
    },
    {
      "question": "Is reading multiple buttons much slower than reading one?",
      "answer": "No. Reading a few GPIO pins takes a tiny amount of time. The bigger challenge is keeping the code organized and the states separate."
    },
    {
      "question": "What is the difference between button state and button event?",
      "answer": "State means what the button is doing right now, such as pressed or released. Event means something just changed, such as a new press or a new release."
    },
    {
      "question": "Why does my code trigger again while I hold the button?",
      "answer": "That usually happens when the code reacts to the current pressed state every loop instead of reacting only to the moment the state changes."
    },
    {
      "question": "Can I copy the same debounce code three times?",
      "answer": "You can, but it becomes easy to make mistakes. Arrays and a small helper function keep the same logic consistent for every button."
    },
    {
      "question": "Should all buttons use INPUT_PULLUP?",
      "answer": "For beginner projects, yes. Keeping all buttons wired the same way reduces confusion because released means HIGH and pressed means LOW for every button."
    },
    {
      "question": "What happens if I mix up the wire order?",
      "answer": "The wrong button name will appear in Serial Monitor or the wrong action will run. Label your pins and test one button at a time."
    },
    {
      "question": "Can I detect both press and release?",
      "answer": "Yes. A press event happens when the debounced state changes to LOW. A release event happens when it changes back to HIGH."
    },
    {
      "question": "Why use arrays for buttons?",
      "answer": "Arrays let one piece of code handle several buttons. Instead of writing the same logic over and over, the loop can check each button by index."
    },
    {
      "question": "Do I need interrupts for multiple buttons?",
      "answer": "No. For beginner button panels, checking the buttons in loop() is simpler, reliable, and easier to debug."
    },
    {
      "question": "What if two buttons are pressed at exactly the same time?",
      "answer": "The ESP32 can detect both. Your program should define what that means, such as allowing both actions or giving one action priority."
    },
    {
      "question": "Why not use the same variable for every button?",
      "answer": "One variable can only remember one thing at a time. If several buttons share the same state variable, one button can overwrite another button's information."
    },
    {
      "question": "How should I name buttons in code?",
      "answer": "Use names that describe purpose, such as START, STOP, and MODE, instead of vague names like btn1 and btn2."
    }
  ],
