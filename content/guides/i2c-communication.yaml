    "story": "In Mission 09, the OLED worked because the ESP32 knew how to send instructions over two wires. That was I2C at work.\n\nNow you will slow down and learn the rule system behind that connection. Once I2C makes sense, displays, environmental sensors, clocks, expanders, and many other modules stop feeling mysterious.",
    "eli12": "Imagine one teacher and several students sitting in the same classroom. The teacher calls a student's name before asking a question. Everyone hears the question, but only the student with that name answers.\n\nI2C works like that. The ESP32 speaks on shared wires, says an address, and the device with that address responds.",
