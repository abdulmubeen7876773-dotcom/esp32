  "faqs": [
    {
      "question": "What is a communication protocol?",
      "answer": "A communication protocol is an agreed set of rules for how devices send and receive information. Without a protocol, the ESP32 and a sensor would not know how to understand each other."
    },
    {
      "question": "What does I2C mean?",
      "answer": "I2C means Inter-Integrated Circuit. It is a two-wire communication bus used by many displays, sensors, clocks, memory chips, and small modules."
    },
    {
      "question": "Which pins does ESP32 use for I2C?",
      "answer": "A common ESP32 DevKit uses GPIO21 as SDA and GPIO22 as SCL by default. This mission uses those pins."
    },
    {
      "question": "What is SDA?",
      "answer": "SDA is the data line. It carries the bits that represent addresses, commands, and data."
    },
    {
      "question": "What is SCL?",
      "answer": "SCL is the clock line. It provides timing so devices know when each data bit should be read."
    },
    {
      "question": "What is an I2C address?",
      "answer": "An I2C address is a small number that identifies one device on the bus. The ESP32 sends the address first so only the selected device responds."
    },
    {
      "question": "Why can multiple devices share SDA and SCL?",
      "answer": "They can share the wires because each device listens for its own address. The ESP32 talks to one addressed device at a time."
    },
    {
      "question": "What address does an SSD1306 OLED usually use?",
      "answer": "Most SSD1306 0.96 inch OLED modules use 0x3C. Some use 0x3D."
    },
    {
      "question": "What address does a BME280 usually use?",
      "answer": "Many BME280 modules use 0x76 or 0x77 depending on the module wiring."
    },
    {
      "question": "What is an I2C scanner?",
      "answer": "An I2C scanner is a small sketch that tests addresses and prints the devices that answer. It is one of the best first debugging tools for I2C wiring."
    },
    {
      "question": "Do I need pull-up resistors for I2C?",
      "answer": "Yes, I2C needs pull-up resistors on SDA and SCL. Many breakout modules already include them, but long wires or many modules can still cause problems."
    },
    {
      "question": "Can I use 5 V I2C modules with ESP32?",
      "answer": "Be careful. ESP32 GPIO pins are 3.3 V pins. Use 3.3 V-compatible modules or a proper level shifter when needed."
    },
    {
      "question": "Why does the scanner show no devices?",
      "answer": "The most common causes are missing power, missing ground, swapped SDA/SCL, wrong pins, or a module that is not I2C."
    },
    {
      "question": "Can two I2C devices have the same address?",
      "answer": "Not on the same bus unless you use extra hardware such as an I2C multiplexer or can change one device address."
    },
    {
      "question": "Is I2C good for long cables?",
      "answer": "I2C is best for short connections on the same board or inside the same small device. Long wires can make the signals unreliable."
    }
  ],
