    "component_spotlight_lead": "I2C matters because it lets one ESP32 talk to several smart parts without using a separate pin for every signal.",
    "concept": {
      "title": "I2C Is a Shared Conversation Bus",
      "illustration_alt": "ESP32 I2C bus with GPIO21 SDA and GPIO22 SCL shared by an SSD1306 OLED and BME280 sensor",
      "body": "A protocol is a rulebook for communication. It defines who talks, when they talk, how bits are timed, and how the receiver knows the message is meant for it.\n\nI2C uses two signal wires. SDA carries data. SCL carries the clock. The ESP32 usually controls the conversation, and the connected modules respond when their address is called.\n\nOlder tutorials often say master and slave. You will still see those words in datasheets and library code. A clearer modern way to say the same idea is controller and peripheral. In this mission, the ESP32 is the controller. The OLED and BME280 are peripherals."
    },
    "engineering_explanation": "The ESP32 needs protocols because raw wires are not enough. A GPIO can be HIGH or LOW, but a display or sensor needs structured information: start here, send this address, write this command, read these bytes, stop now.\n\nI2C solves that with a bus. The bus is shared by all connected I2C devices. The controller pulls the clock line to create timing. The data line changes in sync with that clock. At the start of a transaction, the controller sends a device address. Only the peripheral with that address should respond.\n\nThis is why the OLED and BME280 can both use GPIO21 and GPIO22. They are not connected to private signal wires. They share the same bus, but they use different addresses. The OLED might answer at 0x3C, while the BME280 might answer at 0x76 or 0x77.\n\nI2C lines normally rest HIGH because of pull-up resistors. Devices communicate by pulling the lines LOW at the right times. Many modules already include pull-up resistors, which is why beginner circuits often work without adding extra resistors. But if the wires are long, the modules are many, or the pull-ups are missing, the bus can become unreliable.\n\nI2C is excellent for short, low-pin-count communication inside a project. It is not the best choice for long cables, very high speed, or devices that all have the same fixed address.",
    "real_life_analogy": "Think of I2C like an apartment building intercom. Everyone is connected to the same intercom system, but the visitor presses one apartment number. Only that apartment should answer.\n\nSDA is the spoken message. SCL is the rhythm that keeps the message understandable, like a metronome.\n\nThe address is the apartment number. Without the address, every device would hear noise and nobody would know who should respond.",
