    "code": {
      "filename": "smart_environment_monitor_capstone.ino",
      "notes": "- Required libraries: Adafruit BME280, Adafruit Unified Sensor, Adafruit SSD1306, and Adafruit GFX.\n- The BME280 and OLED share GPIO21 SDA and GPIO22 SCL.\n- The button uses INPUT_PULLUP, so pressed means LOW.\n- Green LED means normal, red LED means temperature warning.\n- Change TEMP_WARNING_C and TEMP_APPROACH_C to match your room.",
      "content": "#include <Wire.h>\n#include <Adafruit_GFX.h>\n#include <Adafruit_SSD1306.h>\n#include <Adafruit_BME280.h>\n\nconst int I2C_SDA = 21;\nconst int I2C_SCL = 22;\n\nconst int GREEN_LED_PIN = 18;\nconst int RED_LED_PIN = 19;\nconst int BUTTON_PIN = 23;\n\nconst int SCREEN_WIDTH = 128;\nconst int SCREEN_HEIGHT = 64;\nconst int OLED_RESET = -1;\nconst int OLED_ADDRESS = 0x3C;\n\nconst float TEMP_APPROACH_C = 28.0;\nconst float TEMP_WARNING_C = 30.0;\n\nconst unsigned long SAMPLE_INTERVAL_MS = 2000;\nconst unsigned long DEBOUNCE_MS = 40;\n\nAdafruit_SSD1306 display(SCREEN_WIDTH, SCREEN_HEIGHT, &Wire, OLED_RESET);\nAdafruit_BME280 bme;\n\nfloat temperatureC = 0.0;\nfloat humidity = 0.0;\nfloat pressureHpa = 0.0;\n\nint currentPage = 0;\nint lastButtonReading = HIGH;\nint stableButtonState = HIGH;\nunsigned long lastButtonChangeTime = 0;\nunsigned long lastSampleTime = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n  delay(1000);\n\n  pinMode(GREEN_LED_PIN, OUTPUT);\n  pinMode(RED_LED_PIN, OUTPUT);\n  pinMode(BUTTON_PIN, INPUT_PULLUP);\n\n  Wire.begin(I2C_SDA, I2C_SCL);\n\n  if (!display.begin(SSD1306_SWITCHCAPVCC, OLED_ADDRESS)) {\n    Serial.println(\"OLED not found. Check wiring and address.\");\n    while (true) {\n      delay(1000);\n    }\n  }\n\n  bool bmeReady = bme.begin(0x76);\n  if (!bmeReady) {\n    bmeReady = bme.begin(0x77);\n  }\n\n  if (!bmeReady) {\n    Serial.println(\"BME280 not found at 0x76 or 0x77.\");\n    showMessage(\"BME280 not found\", \"Check I2C wiring\");\n    while (true) {\n      delay(1000);\n    }\n  }\n\n  showMessage(\"Course 01\", \"Capstone ready\");\n  Serial.println(\"Mission 12: Smart Environment Monitor ready\");\n  delay(1500);\n}\n\nvoid loop() {\n  handleButton();\n\n  unsigned long now = millis();\n  if (now - lastSampleTime >= SAMPLE_INTERVAL_MS) {\n    lastSampleTime = now;\n    readSensorData();\n    updateAlerts();\n    printSerialReport();\n    updateDisplay();\n  }\n}\n\nvoid handleButton() {\n  int reading = digitalRead(BUTTON_PIN);\n\n  if (reading != lastButtonReading) {\n    lastButtonChangeTime = millis();\n    lastButtonReading = reading;\n  }\n\n  if ((millis() - lastButtonChangeTime) > DEBOUNCE_MS) {\n    if (reading != stableButtonState) {\n      stableButtonState = reading;\n\n      if (stableButtonState == LOW) {\n        currentPage = 1 - currentPage;\n        updateDisplay();\n      }\n    }\n  }\n}\n\nvoid readSensorData() {\n  temperatureC = bme.readTemperature();\n  humidity = bme.readHumidity();\n  pressureHpa = bme.readPressure() / 100.0;\n}\n\nString environmentStatus() {\n  if (temperatureC >= TEMP_WARNING_C) {\n    return \"WARNING\";\n  }\n\n  if (temperatureC >= TEMP_APPROACH_C) {\n    return \"WARM\";\n  }\n\n  return \"NORMAL\";\n}\n\nvoid updateAlerts() {\n  String status = environmentStatus();\n\n  digitalWrite(GREEN_LED_PIN, status == \"NORMAL\" ? HIGH : LOW);\n  digitalWrite(RED_LED_PIN, status == \"WARNING\" ? HIGH : LOW);\n}\n\nvoid updateDisplay() {\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  display.setTextSize(1);\n\n  if (currentPage == 0) {\n    display.setCursor(0, 0);\n    display.println(\"Page 1: Climate\");\n    display.setCursor(0, 20);\n    display.print(\"Temp: \");\n    display.print(temperatureC, 1);\n    display.println(\" C\");\n    display.setCursor(0, 38);\n    display.print(\"Hum:  \");\n    display.print(humidity, 1);\n    display.println(\" %\");\n  } else {\n    display.setCursor(0, 0);\n    display.println(\"Page 2: Status\");\n    display.setCursor(0, 20);\n    display.print(\"Pres: \");\n    display.print(pressureHpa, 1);\n    display.println(\" hPa\");\n    display.setCursor(0, 42);\n    display.print(\"Status: \");\n    display.println(environmentStatus());\n  }\n\n  display.display();\n}\n\nvoid printSerialReport() {\n  Serial.print(\"Temperature: \");\n  Serial.print(temperatureC, 1);\n  Serial.print(\" C | Humidity: \");\n  Serial.print(humidity, 1);\n  Serial.print(\" % | Pressure: \");\n  Serial.print(pressureHpa, 1);\n  Serial.print(\" hPa | Status: \");\n  Serial.println(environmentStatus());\n}\n\nvoid showMessage(const char* line1, const char* line2) {\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  display.setTextSize(1);\n  display.setCursor(0, 14);\n  display.println(line1);\n  display.setCursor(0, 34);\n  display.println(line2);\n  display.display();\n}\n"
    },
    "code_explanation": [
      {
        "text": "The include lines load the I2C, OLED, graphics, and BME280 libraries needed by the project."
      },
      {
        "text": "GPIO21 and GPIO22 are used for the shared I2C bus, matching the OLED and BME280 lessons."
      },
      {
        "text": "GPIO18 and GPIO19 control the green and red LED alert outputs."
      },
      {
        "text": "GPIO23 reads the page button with INPUT_PULLUP, so pressing the button connects the pin to GND and reads LOW."
      },
      {
        "text": "TEMP_APPROACH_C and TEMP_WARNING_C are the decision thresholds. They turn numbers into status."
      },
      {
        "text": "SAMPLE_INTERVAL_MS keeps sensor reading stable instead of reading as fast as possible."
      },
      {
        "text": "The button handler uses debounce timing so one physical press changes the page once."
      },
      {
        "text": "readSensorData() keeps measurement code separate from display and alert code."
      },
      {
        "text": "environmentStatus() is the decision-making function. It returns NORMAL, WARM, or WARNING."
      },
      {
        "text": "updateAlerts() turns the LEDs on or off based on the current status."
      },
      {
        "text": "updateDisplay() shows either Page 1 or Page 2 depending on the button-selected page."
      },
      {
        "text": "printSerialReport() prints complete formatted data for debugging and testing."
      }
    ],
