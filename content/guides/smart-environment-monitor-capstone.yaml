    "eli12": "A smart monitor is like a careful assistant. It looks at the room, writes down the numbers, decides whether things are normal, and shows a simple status.\n\nThe BME280 is the monitor's senses. The ESP32 is the brain. The OLED is the face. The LEDs are quick warning lights. The button lets the user ask for a different page.",
