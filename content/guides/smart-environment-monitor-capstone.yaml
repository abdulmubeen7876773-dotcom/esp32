  "faqs": [
    {
      "question": "Why is this mission called a capstone?",
      "answer": "A capstone combines many earlier skills into one complete project. This monitor uses GPIO, buttons, debouncing, I2C, OLED display, sensor readings, thresholds, and debugging."
    },
    {
      "question": "Why does the monitor need thresholds?",
      "answer": "Thresholds turn raw measurements into decisions. The ESP32 does not just read temperature; it decides whether the environment is normal or needs attention."
    },
    {
      "question": "Why use two OLED pages?",
      "answer": "A small OLED cannot show everything clearly at once. Pages make the display easier to read, just like menus in real devices."
    },
    {
      "question": "Why use a button if the OLED can update automatically?",
      "answer": "The button gives the user control. It also lets you practice reliable input handling in a complete project."
    },
    {
      "question": "Why does the Serial Monitor still matter?",
      "answer": "Serial Monitor is the engineering view. The OLED is the user view. Real projects often keep both during development."
    },
    {
      "question": "Why not read the BME280 as fast as possible?",
      "answer": "Room conditions change slowly. Fast reading wastes effort and can make normal noise look more important than it is."
    },
    {
      "question": "Can I use a DHT22 instead of BME280?",
      "answer": "You can build a simpler version with DHT22 for temperature and humidity, but this capstone uses BME280 because it also measures pressure and uses I2C."
    },
    {
      "question": "Why are the LEDs useful if the OLED already shows status?",
      "answer": "LEDs provide instant glanceable feedback. A user can see normal or warning status without reading the screen."
    },
    {
