title: 'Installing Arduino IDE for ESP32: Complete Setup Guide | ESP32 Engine'
headline: 'Installing Arduino IDE for ESP32: Complete Setup Guide'
meta_description: Install Arduino IDE and the ESP32 board package step by step. Fix COM port errors, configure
  upload settings, and run your first blink sketch on any DevKit.
lead: Before you wire sensors or publish Wi-Fi dashboards, your computer must recognize the ESP32 DevKit
  and compile firmware with the correct board package. This guide walks through a complete Arduino IDE
  setup on Windows, macOS, and Linuxâ€”from download to a verified blink upload.
intro:
  story: 'Every great maker needs a workshop. For ESP32, your workshop is the Arduino IDE on your computer
    â€” the place where you write code and send it to your board. Today you''ll set up that workshop so
    your ESP32 is ready for its first mission.

    '
  eli12: 'Arduino IDE is a free app where you type instructions for your ESP32. You connect the board
    with USB, click Upload, and your code runs on the chip. Setting it up once means every future project
    starts faster.

    '
  safety:
  - text: Download Arduino IDE only from arduino.cc or the official Espressif board package URL.
  - text: Ask an adult before installing software if you're not sure.
  - text: Use a data-capable USB cable â€” charge-only cables won't work for uploads.
