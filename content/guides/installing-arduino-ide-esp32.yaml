conclusion: A reliable Arduino IDE setup is the foundation of every ESP32 project on ESP32 Engine. Install
  the current IDE, add the Espressif board package once, install the correct USB driver, and verify with
  a blink sketch before opening multi-stage tutorials. Save your board and port selections, keep libraries
  updated deliberately, and treat Wi-Fi credentials as secrets when you advance to connected builds.
faqs:
- question: Do I need Arduino IDE 1.x or 2.x for ESP32?
  answer: Both work. Arduino IDE 2.x is recommended for beginners because of the built-in board manager
    UI, serial plotter, and clearer error panel. IDE 1.8.x remains supported if you already use it in
    a classroom lab image.
- question: What URL do I add for the ESP32 board manager?
  answer: Add https://espressif.github.io/arduino-esp32/package_esp32_index.json in File â†’ Preferences
    â†’ Additional boards manager URLs, then install esp32 by Espressif Systems from Tools â†’ Board â†’ Boards
    Manager.
- question: Why does my ESP32 not show a COM port?
  answer: Common causes are charge-only USB cables, missing CP210x or CH340 drivers on Windows, wrong
    cable port on the DevKit, or a board stuck in boot mode. Try another cable, install the driver matching
    your USB chip, and press BOOT while starting upload.
- question: What board should I select for a generic DevKit?
  answer: Choose ESP32 Dev Module or the exact DevKit name printed on your PCB such as ESP32 DevKitC V4.
    Match the module type if you know itâ€”WROOM-32 is the most common starting point.
- question: What upload speed should I use?
  answer: 921600 baud is fast on quality USB cables. If upload fails intermittently, drop to 460800 or
    115200 for stability during classroom or laptop-powered sessions.
- question: Can I use PlatformIO instead of Arduino IDE?
  answer: Yes. PlatformIO inside VS Code offers better library versioning and multi-board workflows. Arduino
    IDE is still the fastest path for absolute beginners following wiring-table tutorials.
- question: Why do I get a fatal Failed to connect error during upload?
  answer: The chip did not enter download mode. Hold BOOT, tap EN/RESET, release BOOT after upload starts,
    or enable USB CDC on boot for native USB boards. Check port selection and driver installation.
- question: Does Arduino IDE support ESP32-S3 and C3?
  answer: Yes, through the same esp32 board package version 3.x. Select the matching board entry such
    as ESP32S3 Dev Module or ESP32C3 Dev Module before uploading.
- question: Where are ESP32 libraries installed?
  answer: On Windows they live under Documents\Arduino\libraries. On macOS and Linux they are in ~/Arduino/libraries.
    Use Sketch â†’ Include Library â†’ Manage Libraries for search-based installs.
- question: What should I do after the first successful upload?
  answer: Open Serial Monitor at 115200 baud, run a serial print example, then open an ESP32 Engine Beginner
    project and compare its board settings with yours before changing wiring.
