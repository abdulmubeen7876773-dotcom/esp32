body_html: "<h2 id=\"introduction\">Introduction</h2>\n<p>Installing Arduino IDE for ESP32 means preparing\
  \ your computer to compile C++ sketches and flash them onto Espressif microcontrollers through USB.\
  \ The Arduino IDE is not ESP32-specific out of the boxâ€”you add a board package that teaches the IDE\
  \ how to call the compiler, linker, and upload tool (<code>esptool</code>) for each module variant.</p>\n\
  <p>This setup step matters because every ESP32 Engine project assumes you can select the correct board,\
  \ pick a serial port, and upload without fighting driver or partition errors. Skipping proper installation\
  \ leads to hours lost on \"board not found\" messages when the real issue is a missing URL in Board\
  \ Manager or a charge-only cable.</p>\n<p>Use this workflow when you are starting ESP32 from scratch,\
  \ rebuilding a laptop after OS upgrade, or standardizing a classroom lab image. If you already upload\
  \ reliably, jump to the Configuration Guide and Example Project sections to validate settings against\
  \ our project defaults.</p>\n\n<h2 id=\"prerequisites\">Prerequisites</h2>\n<p>Gather these items before\
  \ installing software:</p>\n<ul>\n<li><strong>Hardware:</strong> ESP32 DevKit with USB data cable, breadboard,\
  \ LED, and 220 Î© resistor for the verification sketch.</li>\n<li><strong>Computer:</strong> Windows\
  \ 10/11, macOS 12+, or a mainstream Linux distro with USB permissions.</li>\n<li><strong>Disk space:</strong>\
  \ At least 2 GB free for IDE, toolchains, and cached board files.</li>\n<li><strong>Internet:</strong>\
  \ Required once to download IDE and board package index.</li>\n<li><strong>Administrator rights:</strong>\
  \ Needed on Windows to install USB drivers; macOS may prompt for security approval.</li>\n<li><strong>Basic\
  \ familiarity:</strong> Downloading files, unzipping folders, and clicking through installers.</li>\n\
  </ul>\n<p>Optional but helpful: a USB hub with stable power if you use multiple DevKits in a lab, and\
  \ a label on each board noting its USB chip type (CP2102, CH340, or native USB).</p>\n\n<h3 id=\"prereq-windows\"\
  >Windows-specific notes</h3>\n<p>Install the Arduino IDE with the Win64 installer unless you require\
  \ a portable ZIP for restricted school accounts. After driver installation, confirm the COM port in\
  \ Device Manager under Ports (COM &amp; LPT)â€”not under Other devices with a yellow warning icon.</p>\n\
  \n<h3 id=\"prereq-macos\">macOS-specific notes</h3>\n<p>Drag Arduino IDE to Applications, launch once,\
  \ and approve the security prompt. macOS Ventura and later may block unsigned CH340 driversâ€”download\
  \ the manufacturer package and allow it in System Settings â†’ Privacy &amp; Security.</p>\n\n<h3 id=\"\
  prereq-linux\">Linux-specific notes</h3>\n<p>Install the AppImage or use your distribution package if\
  \ available. Add udev rules for Espressif boards if upload fails with permission errorsâ€”the Espressif\
  \ documentation ships a rules file you copy to <code>/etc/udev/rules.d/</code>. Log out after adding\
  \ your user to the <code>dialout</code> group.</p>\n\n<h2 id=\"step-by-step\">Step-by-Step Setup</h2>\n\
  <h3 id=\"step1-download\">Step 1 â€” Download Arduino IDE</h3>\n<p>Visit the official Arduino download\
  \ page and choose Arduino IDE 2.x for your operating system. IDE 2.x uses the same sketch format as\
  \ 1.x but adds a modern editor and clearer board manager search. Install with default options unless\
  \ your IT department requires a portable zip build.</p>\n\n<h3 id=\"step2-board-url\">Step 2 â€” Add the\
  \ ESP32 Board Manager URL</h3>\n<p>Open <strong>File â†’ Preferences</strong> (Arduino IDE 2: <strong>File\
  \ â†’ Preferences</strong> from the menu bar). In <strong>Additional boards manager URLs</strong>, paste:</p>\n\
  <pre><code>https://espressif.github.io/arduino-esp32/package_esp32_index.json</code></pre>\n<p>If you\
  \ already have other URLs, separate them with commas on one line or use the icon to add multiple entries.\
  \ Click OK.</p>\n\n<h3 id=\"step3-install-package\">Step 3 â€” Install the esp32 Board Package</h3>\n\
  <p>Open <strong>Tools â†’ Board â†’ Boards Manager</strong>. Search for <strong>esp32</strong>. Install\
  \ <strong>esp32 by Espressif Systems</strong> (version 3.x at time of writing). The download includes\
  \ compiler tools and core librariesâ€”expect several hundred megabytes. When finished, close Boards Manager.</p>\n\
  \n<h3 id=\"step4-drivers\">Step 4 â€” Install USB Serial Drivers</h3>\n<p>Plug in your DevKit with a known\
  \ data cable. Windows users: open Device Manager. If you see unknown USB device or no COM port, install\
  \ the driver for your bridge chipâ€”Silicon Labs CP210x or WCH CH340 are the most common. macOS users:\
  \ allow the driver in Privacy &amp; Security if blocked. Linux users: add your user to the <code>dialout</code>\
  \ group on Debian/Ubuntu (<code>sudo usermod -a -G dialout $USER</code>) and log out/in.</p>\n\n<h3\
  \ id=\"step5-select-board\">Step 5 â€” Select Board and Port</h3>\n<p>In <strong>Tools â†’ Board â†’ esp32</strong>,\
  \ choose <strong>ESP32 Dev Module</strong> for generic WROOM DevKits. In <strong>Tools â†’ Port</strong>,\
  \ select the new serial portâ€”COMx on Windows, /dev/cu.usbserial-* on macOS, /dev/ttyUSB0 on Linux. If\
  \ no port appears, revisit drivers and cable.</p>\n\n<h3 id=\"step6-first-upload\">Step 6 â€” Upload the\
  \ Verification Sketch</h3>\n<p>Open <strong>File â†’ Examples â†’ 01.Basics â†’ Blink</strong>. Change <code>LED_BUILTIN</code>\
  \ to pin <strong>2</strong> if your board lacks a built-in LEDâ€”many DevKits use GPIO2. Click Upload.\
  \ Watch the status bar for compile progress and upload percentage. On failure, hold BOOT, press EN once,\
  \ release BOOT when \"Connecting...\" appears.</p>\n<p>A successful upload ends with \"Hard resetting\
  \ via RTS pin...\" or similar. The onboard LED should blink immediately. If compile succeeds but nothing\
  \ blinks, you likely targeted the wrong GPIOâ€”consult your DevKit pinout card and update the pin constant\
  \ before debugging drivers again.</p>\n\n<h2 id=\"understanding\">Understanding the Process</h2>\n<p>When\
  \ you click Upload, Arduino IDE runs several hidden steps. Your sketch is merged with core libraries\
  \ into one translation unit. The Xtensa GCC compiler builds a binary with partitions for bootloader,\
  \ application, and NVS storage. <code>esptool</code> resets the chip into serial bootloader mode, writes\
  \ flash blocks, verifies checksums, and reboots into your firmware.</p>\n<p>The board package supplies\
  \ pin mapping macros like <code>GPIO_NUM_26</code> and abstracts Wi-Fi stacks you will use later. Partition\
  \ schemes define how much flash is reserved for over-the-air updates. Upload speed affects reliability\
  \ more than compile timeâ€”high baud rates fail on long or poor cables.</p>\n<p>Serial Monitor opens a\
  \ UART channel separate from upload. After boot, your firmware can print debug lines at 115200 baud\
  \ while GPIO continues running. That splitâ€”flash once, monitor many timesâ€”is the daily ESP32 developer\
  \ loop.</p>\n\n<h2 id=\"configuration\">Configuration Guide</h2>\n<p>These Tools menu settings cover\
  \ most ESP32 Engine Beginner projects:</p>\n<ul>\n<li><strong>Board:</strong> ESP32 Dev Module (or exact\
  \ DevKit name).</li>\n<li><strong>Upload Speed:</strong> 921600, fallback 115200 if unstable.</li>\n\
  <li><strong>CPU Frequency:</strong> 240 MHz default; lower to 160 MHz if power debugging.</li>\n<li><strong>Flash\
  \ Frequency:</strong> 80 MHz for WROOM modules.</li>\n<li><strong>Flash Mode:</strong> QIO for most\
  \ DevKits.</li>\n<li><strong>Flash Size:</strong> 4 MB (32 Mb) unless your module label states otherwise.</li>\n\
  <li><strong>Partition Scheme:</strong> Default 4 MB with spiffs (fine for tutorials) or Minimal SPIFFS\
  \ if you need more app space later.</li>\n<li><strong>Core Debug Level:</strong> None for beginners;\
  \ Verbose when diagnosing Wi-Fi association failures.</li>\n<li><strong>PSRAM:</strong> Disabled unless\
  \ your board includes PSRAM and the project uses camera or large buffers.</li>\n<li><strong>Port:</strong>\
  \ Re-select after every unplugâ€”COM numbers shift on Windows.</li>\n</ul>\n<p>Save a screenshot of these\
  \ settings once they work. Classroom labs benefit from a printed card taped to each bench.</p>\n\n<h3\
  \ id=\"advanced-config\">Intermediate settings explained</h3>\n<p><strong>Events run on:</strong> Core\
  \ 1 is the default for Arduino setup/loop on many coresâ€”change only when mixing Wi-Fi-heavy tasks with\
  \ tight timing loops. <strong>Erase All Flash Before Sketch Upload:</strong> enable when migrating from\
  \ a failed OTA test to a clean bench image; leave disabled for daily work to preserve NVS Wi-Fi credentials\
  \ during sensor bring-up. <strong>JTAG Adapter:</strong> leave Disabled until you attach external debug\
  \ hardware. <strong>Arduino Runs On / Events Run On:</strong> document changes in your README if you\
  \ split tasks across cores for motor PWM stability.</p>\n\n<h2 id=\"example-project\">Example Project\
  \ â€” Blink Plus Serial Heartbeat</h2>\n<p>After the stock Blink example works, upload this sketch to\
  \ confirm serial output and pin control togetherâ€”patterns used in nearly every ESP32 Engine wiring guide.</p>\n\
  <pre><code>const int ledPin = 2;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(ledPin, OUTPUT);\n\
  \  Serial.println(\"ESP32 Engine setup OK\");\n}\n\nvoid loop() {\n  digitalWrite(ledPin, HIGH);\n \
  \ Serial.println(\"LED ON\");\n  delay(500);\n  digitalWrite(ledPin, LOW);\n  Serial.println(\"LED OFF\"\
  );\n  delay(500);\n}</code></pre>\n<p>Open <strong>Tools â†’ Serial Monitor</strong>, set baud to <strong>115200</strong>,\
  \ press EN to reset. You should see alternating ON/OFF lines while the LED blinks. If text is garbled,\
  \ baud rate mismatch is the causeâ€”double-check the dropdown.</p>\n\n<h2 id=\"comparison-tools\">Toolchain\
  \ Comparison</h2>\n<div class=\"pin-table-wrap\">\n<table class=\"pin-table pin-table-3\">\n<thead><tr><th>Tool</th><th>Best\
  \ for</th><th>Learning curve</th><th>Library management</th></tr></thead>\n<tbody>\n<tr><td>Arduino\
  \ IDE 2.x</td><td>Beginners, classrooms, quick examples</td><td>Low</td><td>Library Manager UI</td></tr>\n\
  <tr><td>Arduino IDE 1.8.x</td><td>Legacy lab images</td><td>Low</td><td>Same as 2.x</td></tr>\n<tr><td>PlatformIO\
  \ + VS Code</td><td>Multi-board products, CI pipelines</td><td>Medium</td><td>platformio.ini pinning</td></tr>\n\
  <tr><td>ESP-IDF</td><td>Shipping firmware, deep power tuning</td><td>High</td><td>Component manager</td></tr>\n\
  </tbody>\n</table>\n</div>\n\n<h2 id=\"pros-cons\">Arduino IDE for ESP32 â€” Pros and Cons</h2>\n<div\
  \ class=\"pin-table-wrap\">\n<table class=\"pin-table pin-table-3\">\n<thead><tr><th>Pros</th><th>Cons</th></tr></thead>\n\
  <tbody>\n<tr><td>Familiar sketch structure shared with Arduino Uno tutorials</td><td>Less precise library\
  \ version locking than PlatformIO</td></tr>\n<tr><td>One-click Board Manager install for Espressif cores</td><td>Large\
  \ toolchains consume disk space per version</td></tr>\n<tr><td>Huge library ecosystem for sensors and\
  \ displays</td><td>Advanced debugging weaker than ESP-IDF + OpenOCD</td></tr>\n<tr><td>Fast path from\
  \ blink to Wi-Fi examples</td><td>Manual board settings easy to misconfigure in labs</td></tr>\n<tr><td>Serial\
  \ Monitor and Plotter built in</td><td>No native unit test runnerâ€”projects rely on serial checks</td></tr>\n\
  </tbody>\n</table>\n</div>\n\n<h2 id=\"common-errors\">Common Errors</h2>\n<div class=\"pin-table-wrap\"\
  >\n<table class=\"pin-table pin-table-3\">\n<thead><tr><th>Error message</th><th>Typical cause</th><th>Quick\
  \ fix</th></tr></thead>\n<tbody>\n<tr><td>Board not found / unknown board</td><td>ESP32 package not\
  \ installed</td><td>Install esp32 in Boards Manager</td></tr>\n<tr><td>Failed to connect to ESP32</td><td>Not\
  \ in download mode</td><td>BOOT + EN sequence; lower upload speed</td></tr>\n<tr><td>Port grayed out</td><td>Driver\
  \ or cable</td><td>Data cable; CP210x/CH340 driver</td></tr>\n<tr><td>Compilation error: No such file</td><td>Missing\
  \ library</td><td>Library Manager install</td></tr>\n<tr><td>Sketch too big</td><td>Wrong partition\
  \ or huge debug</td><td>Minimal SPIFFS scheme; reduce buffers</td></tr>\n<tr><td>Guru Meditation Error</td><td>Runtime\
  \ crash, not IDE issue</td><td>Check wiring voltage; read backtrace</td></tr>\n<tr><td>Permission denied\
  \ (Linux)</td><td>User not in dialout</td><td>Add group; replug device</td></tr>\n</tbody>\n</table>\n\
  </div>\n\n<h2 id=\"troubleshooting\">Troubleshooting</h2>\n<h3>Upload hangs at \"Connecting....\"</h3>\n\
  <p>Close Serial Monitor during uploadâ€”it locks the port on some systems. Lower upload speed. Manually\
  \ enter bootloader: hold BOOT, tap EN, release BOOT, start upload within three seconds.</p>\n<h3>Board\
  \ resets loop after upload</h3>\n<p>Check for wiring on strapping pins GPIO0, GPIO2, GPIO12, GPIO15.\
  \ Disconnect breadboard wires, upload bare board, then reconnect peripherals one at a time.</p>\n<h3>Multiple\
  \ COM ports appear</h3>\n<p>Some S3 boards expose separate USB JTAG and UART ports. Pick the port that\
  \ appears when you plug the labeled UART USB connectorâ€”often the one that disappears when you hold BOOT.</p>\n\
  <h3>Board package update broke old sketches</h3>\n<p>Pin a working version in Boards Manager via the\
  \ version dropdown, or update sketch APIsâ€”Wi-FiClientSecure method names changed across major core releases.\
  \ Read the release notes before mass classroom upgrades.</p>\n\n<h2 id=\"best-practices\">Best Practices</h2>\n\
  <ul>\n<li>Document working board settings in a text file stored with your project folder.</li>\n<li>Use\
  \ branded USB data cables shorter than one meter for upload benches.</li>\n<li>Install board package\
  \ updates on one test machine before rolling out to a full lab.</li>\n<li>Keep a spare DevKit flashed\
  \ with Blink-only for hardware sanity checks.</li>\n<li>Name sketches with project slug and stageâ€”<code>esp32-air-quality_beginner.ino</code>\
  \ matches ESP32 Engine pages.</li>\n<li>Close unrelated serial terminal apps (PuTTY, PlatformIO monitor)\
  \ before Arduino upload.</li>\n</ul>\n\n<h2 id=\"performance-tips\">Performance Tips</h2>\n<ul>\n<li>Raise\
  \ CPU frequency only after power supply is validated under Wi-Fi load.</li>\n<li>Disable verbose core\
  \ debug in production buildsâ€”it adds flash and slows boot.</li>\n<li>Use <code>Serial.printf</code>\
  \ sparingly in tight loops; excessive printing causes timing jitter in motor or PID sketches.</li>\n\
  <li>Prefer <code>millis()</code> timing over long <code>delay()</code> when you plan to add Wi-Fi in\
  \ the next project stage.</li>\n<li>Clean build artifacts occasionally via deleting build cache folders\
  \ if compile times grow on classroom PCs.</li>\n</ul>\n\n<h2 id=\"security\">Security Considerations</h2>\n\
  <p>Arduino IDE stores sketches in plain text. Never commit Wi-Fi passwords or API keys to public repositoriesâ€”use\
  \ a separate <code>secrets.h</code> file listed in <code>.gitignore</code> or NVS provisioning for field\
  \ devices. Download board packages only from the official Espressif index URL above; third-party index\
  \ files can supply tampered toolchains.</p>\n<p>When enabling OTA updates later, protect update endpoints\
  \ with tokens and HTTPS. Classroom networks should isolate IoT devices from staff laptops if students\
  \ upload experimental firmware with open HTTP servers.</p>\n<p>Physical USB access equals full flash\
  \ read/write on most DevKitsâ€”treat bench access as trusted in product development, and enable flash\
  \ encryption only after you outgrow beginner tutorials.</p>\n\n<h2 id=\"lab-workflow\">Classroom and\
  \ Team Workflow</h2>\n<p>Standardizing Arduino IDE for ESP32 across a lab saves support time. Create\
  \ a golden image with IDE version, esp32 core version, and preinstalled libraries used in your course\
  \ sequence (WiFi, PubSubClient, Adafruit Unified Sensor). Export the board package version number on\
  \ a wall chart. Assign each bench a numbered DevKit and record its USB chip typeâ€”CH340 boards need different\
  \ drivers than CP2102 units on the same Windows image.</p>\n<p>When a student reports \"it worked yesterday,\"\
  \ check three items first: port renumbered after reboot, Serial Monitor left open during upload, and\
  \ breadboard wiring pulling strapping pins low. Keeping a known-good Blink-only board at the instructor\
  \ desk isolates software from hardware failures in under two minutes.</p>\n\n<h2 id=\"next-steps\">What\
  \ to Do After Setup</h2>\n<p>Once Blink and serial heartbeat succeed, read our <a href=\"/guides/what-is-esp32.html\"\
  >What Is ESP32?</a> guide for GPIO voltage rules, then open the ESP32 Learning Trainer Beginner stage.\
  \ Match your Tools menu settings to the project sidebar notes before changing any wiring. Intermediate\
  \ developers should clone a working sketch folder, pin library versions in a README, and only then enable\
  \ Wi-Fi examples that store SSID credentials.</p>\n<p>If you maintain multiple computers, sync only\
  \ your sketch folders through Gitâ€”never commit the entire Arduino15 packages directory. Reinstall the\
  \ esp32 board package on each machine using the same version number to avoid subtle compile differences\
  \ between laptop and desktop.</p>\n"
