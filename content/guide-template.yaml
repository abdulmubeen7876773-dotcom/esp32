# ESP32 Engine — Golden Guide Template
# Copy this file to content/guides/your-mission-slug.yaml
# Authoring standard: docs/editorial/GOLDEN_GUIDE_STANDARD.md
# Do not deploy this template file — it is a blank scaffold only.

# ── FORMAT ────────────────────────────────────────────────────────────────────
# Use "mission" for hands-on build guides. Omit or use reference layout for
# conceptual guides (see what-is-esp32.yaml — intro + body_html instead).
format: mission

# ── CATALOG METADATA ──────────────────────────────────────────────────────────
phase: 1
sort_order: 99
mission_number: 99
slug: your-mission-slug

# SEO title — primary keyword + brand suffix
title: Your Mission Title | ESP32 Engine

# Human H1 on the page — no keyword stuffing
headline: Your Mission Title

# Parent + search skim line — mention mission number, outcome, quiz/challenge, age hint
meta_description: Mission 99 — one sentence outcome, kid-friendly steps, wiring, code, quiz, and challenge. Perfect for ages 10+.

# Hero promise — emotional, short, active voice
lead: One sentence — what the learner will do and why it feels exciting.

keywords: ESP32 your topic, ESP32 beginner, first keyword, second keyword
proficiency_level: Beginner
reading_time: 10–15 min
date_published: '2026-06-26'
date_modified: '2026-06-26'

# ── OPTIONAL ROOT FIELDS (reference guides + cross-links) ─────────────────────
# Link capstone projects that use skills from this mission (recommended from Mission 2+).
# related_projects:
#   - title: Project title
#     href: /projects/your-project-slug.html
#     description: One line — why this mission prepares you for that build.

# related_guides:
#   - title: Related guide title
#     href: /guides/other-guide-slug.html
#     description: One line — how it connects to this mission.

# ── MISSION BLOCK (required when format: mission) ───────────────────────────────
mission:
  # Card badge and icon — visible in hero
  badge: Mission 99
  icon: "💡"
  title: Emotional Mission Card Title!

  # THE STORY — 2–4 short paragraphs. Learner is the protagonist. Present tense.
  # Hook before explanation. No specs or GPIO numbers here.
  story: |
    You're the captain of a tiny spaceship — the ESP32.

    Right now every light on your ship is off. Mission Control is waiting for a sign you're online.

    Your first command? Replace with the emotional stakes of THIS mission.

  # EXPLAIN LIKE I'M 12 — plain language before concept section jargon.
  # Bullets or short lines. Real-life analogy. No shame language.
  eli12: |
    - First plain-language fact about the part or skill.
    - Second fact — connect to something kids already know.
    - Third fact — what the ESP32 does in this mission.
    - Fourth fact — the satisfying outcome they'll see.

  # WHAT YOU'LL BUILD — success picture before steps
  what_you_build: |
    - The circuit or setup they'll have on the breadboard
    - The program behavior they'll upload
    - Proof of learning — what they'll be able to explain after

  # THINGS YOU'LL NEED — scannable prep list. Link /components/{slug}.html when catalog exists.
  things_you_need:
    - item: ESP32 DevKit board
      note: Any board with a USB port
      link: /components/esp32-devkit.html
      icon: "🖥"
    - item: Main part for this mission
      note: Size, color, or module vs bare part hint
      link: /components/your-part-slug.html
      icon: "🔌"
    - item: Breadboard
      note: Half-size is perfect
      icon: "🧩"
    - item: Jumper wires
      note: Male-to-male, count needed
      icon: "🔗"
    - item: USB cable
      note: Must carry data — not charge-only
      icon: "🔌"

  # SAFETY — first bullet MUST be unplug-before-rewiring for hardware missions
  safety:
    - text: Unplug USB before changing any wires.
    - text: ESP32 pins use 3.3 V — never connect 5 V directly to a GPIO pin.
    - text: Ask an adult for help with USB and small parts if you need it.

  # COMPONENT SPOTLIGHT — copy above auto-generated spotlight cards from linked parts
  component_spotlight_lead: Meet the brain of your circuit — tap to learn more about your board.

  # CONCEPT — mental model before wiring and code
  concept:
    title: How Does [Topic] Work?
    illustration_alt: Describe the full idea for screen readers — every connection and signal labeled
    body: |
      - First concept bullet — GPIO, protocol, or behavior in plain language.
      - Second bullet — why a resistor, library, or wire matters.
      - Third bullet — what setup() does once.
      - Fourth bullet — what loop() repeats forever.

  # WIRING — numbered steps. Unplug first. GPIO labels must match code.
  wiring:
    illustration_alt: Breadboard wiring diagram — describe every wire, GPIO number, and part leg
    image: /assets/visuals/guides/wiring/your-mission-wiring-esp32.svg
    steps:
      - "Unplug USB. Place the ESP32 on the left and the breadboard on the right."
      - "Place the main part on the breadboard."
      - "Connect GPIO X on the ESP32 to [destination] (describe wire color if helpful)."
      - "Connect [part leg] to GND on the ESP32."
      - "Double-check — list the full path GPIO → part → GND."
      - "Plug in USB and upload the code. Watch for expected behavior!"

  # CODE — pin constants must match wiring section
  code:
    filename: your_mission.ino
    notes: |
      - setup() runs once — explain the one-time configuration.
      - loop() runs forever — explain the repeating behavior.
      - Try changing one number to see how behavior changes.
    content: |
      #define MAIN_PIN 4

      void setup() {
        pinMode(MAIN_PIN, OUTPUT);
      }

      void loop() {
        digitalWrite(MAIN_PIN, HIGH);
        delay(500);
        digitalWrite(MAIN_PIN, LOW);
        delay(500);
      }

  # EXPECTED OUTPUT — success criteria + gentle troubleshooting hint
  expected_output: |
    - Describe exactly what the learner should see — LED blink, Serial line, or screen text.
    - Mention normal edge cases (onboard LED, warm-up time, etc.).

    If nothing happens, check the most common wiring mistake for this mission.

  # MINI QUIZ — 2–4 questions. Every question needs feedback fields.
  quiz:
    - question: First confidence-check question about concept or wiring?
      options:
        - Correct answer
        - Plausible wrong answer
        - Another plausible wrong answer
      correct: 0
      correct_feedback: Yes! Short celebration — why this answer is right.
      wrong_feedback: Good guess — gentle redirect without shame.
      explanation: One sentence teaching moment — the full why.
    - question: Second question — tie to code or GPIO used in this mission?
      options:
        - Correct answer
        - Wrong answer A
        - Wrong answer B
      correct: 0
      correct_feedback: You got it! Reinforce the key idea.
      wrong_feedback: Close! Point to wiring or code clue.
      explanation: Connect answer to the actual pin, function, or part name.

  # CHALLENGE — prefer icon cards for fast finishers (optional curiosity, not graded)
  challenge_items:
    - icon: "⚡"
      text: Speed variant — change a delay or reading interval.
    - icon: "🎨"
      text: Creative variant — invent a pattern or custom message.
    - icon: "🆘"
      text: Pattern variant — SOS, alert threshold, or combo with another skill.

  # Alternative to challenge_items — prose block with multiple ideas (legacy OK)
  # challenge: |
  #   Add an alert when a value crosses a threshold.
  #   Combine with Mission 1 LED blink for visual feedback.

  # MISSION COMPLETE — pride ritual + learning outcomes for teachers
  complete:
    subtitle: You just became an ESP32 maker.
    summary: |
      Two or three sentences — what they achieved emotionally and technically.
      Every inventor started exactly here.
    skills:
      - First concrete skill — matches wiring and code
      - Second concrete skill — library, protocol, or debugging
      - Third concrete skill — transferable maker habit

  # NEXT MISSION — 1–2 forward cards. Prevents dead-end after completion.
  next_missions:
    - slug: next-mission-slug
      title: Next Mission Title
      description: One line — why the learner should continue here.
    - slug: optional-second-slug
      title: Optional Second Mission
      description: Complementary skill or easier revisit.

