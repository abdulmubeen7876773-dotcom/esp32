start_here:
  - slug: esp32-learning-trainer
    reason: Repeatable bench practice with simple input, output, and Serial feedback.
  - slug: esp32-distance-monitoring-system
    reason: Visible sensor readings and a clear alert make debugging easy to see.
  - slug: esp32-water-leak-detector
    reason: Safe low-voltage sensing with a practical household-style result.
learning_paths:
  - title: ESP32 Basics
    description: Start with GPIO, wiring habits, and short missions.
    href: guides.html
    featured_project: esp32-learning-trainer
  - title: Sensors and Monitoring
    description: Read distance, moisture, air, weather, and other real-world signals.
    href: category/sensor-projects.html
    featured_project: esp32-distance-monitoring-system
  - title: IoT and Automation
    description: Move from local tests to MQTT, dashboards, alerts, and control.
    href: category/iot-projects.html
    featured_project: esp32-mqtt-sensor-dashboard
  - title: Robotics
    description: Practice motor control, feedback, and motion decisions.
    href: category/robotics.html
    featured_project: esp32-line-following-robot
  - title: ESP32-CAM
    description: Learn camera power, capture, QR scanning, and honest vision limits.
    href: category/esp32-cam.html
    featured_project: esp32-camera-capture-server
  - title: Classroom Builds
    description: Use repeatable projects with visible outcomes and discussion prompts.
    href: category/education.html
    featured_project: esp32-learning-trainer
build_experiment_upgrade:
  build:
    title: Build
    text: Complete a working base project and verify it with the wiring table and code.
    href: projects/esp32-learning-trainer.html
  experiment:
    title: Experiment
    text: Change one input, threshold, or output and observe the result before adding more parts.
    href: guides/reading-analog-sensors.html
  upgrade:
    title: Upgrade
    text: Extend a stable project with a display, dashboard, alert, or next challenge.
    href: projects/esp32-iot-weather-station.html
