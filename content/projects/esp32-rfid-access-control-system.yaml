  faqs:
  - question: Why does my MFRC522 RFID reader reading look wrong?
    answer: Check SPI wiring, reader power, ground, and card distance. MFRC522 modules are sensitive to loose wires
      and poor antenna placement.
  - question: Why does relay or servo lock output not respond?
    answer: Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the
      output module uses active HIGH or active LOW logic.
  - question: Should I use this as a real door access system?
    answer: No. This is a low-voltage learning prototype. A real access system needs proper mechanical security,
      fail-safe design, logging, enclosure, and installation review.
