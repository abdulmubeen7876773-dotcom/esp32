  wiring:
    illustration_alt: ESP32 RFID Access Control System wiring diagram
    summary: Wire the MFRC522 RFID reader first, verify readings, then connect the relay or servo lock output.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the MFRC522 RFID reader power pins to the correct 3.3 V or 5 V rail according to its module label.
    - Connect the MFRC522 RFID reader signal line to SPI pins.
    - Connect the relay or servo lock output control input to GPIO26 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: MFRC522 RFID reader
    esp32_pin: SPI pins
    direction: Input
    notes: Read before controlling output
  - signal: relay or servo lock output
    esp32_pin: GPIO26
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: rfid-access-control-system.ino
    content: "#include <SPI.h>\n#include <MFRC522.h>\n\n#define SS_PIN 5\n#define RST_PIN 22\n#define RELAY_PIN\
      \ 26\n\nMFRC522 rfid(SS_PIN, RST_PIN);\nbyte allowedUid[] = {0xDE, 0xAD, 0xBE, 0xEF};\n\nbool uidMatches()\
      \ {\n  if (rfid.uid.size != sizeof(allowedUid)) return false;\n  for (byte i = 0; i < rfid.uid.size; i++)\
      \ {\n    if (rfid.uid.uidByte[i] != allowedUid[i]) return false;\n  }\n  return true;\n}\n\nvoid setup() {\n\
      \  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, LOW);\n  SPI.begin();\n\
      \  rfid.PCD_Init();\n  Serial.println(\"Scan RFID card\");\n}\n\nvoid loop() {\n  if (!rfid.PICC_IsNewCardPresent()\
      \ || !rfid.PICC_ReadCardSerial()) return;\n  bool allowed = uidMatches();\n  Serial.println(allowed ? \"Access\
      \ granted\" : \"Access denied\");\n  digitalWrite(RELAY_PIN, allowed ? HIGH : LOW);\n  delay(1500);\n  digitalWrite(RELAY_PIN,\
      \ LOW);\n  rfid.PICC_HaltA();\n}\n"
  expected_output: Serial Monitor should show a changing reading. When the MFRC522 RFID reader reaches the test
    condition, the status LED and relay or servo lock output should switch state. If the reading changes but the
    output does not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: MFRC522 RFID reader never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: relay or servo lock output does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
