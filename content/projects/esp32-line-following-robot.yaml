  faqs:
  - question: Why does my left and right IR line sensors reading look wrong?
    answer: Check the sensor height, track contrast, and GPIO34/GPIO35 wiring. Glossy paper and uneven lighting can
      make the two sensors disagree.
  - question: Why does motor driver not respond?
    answer: Confirm the shared ground, motor supply, and GPIO16-GPIO19 control wiring. The ESP32 GPIO pins control
      the driver; they do not power the motors directly.
  - question: Why does the robot reset when motors start?
    answer: Motor startup current can pull the supply down. Use a separate motor supply with common ground and test
      sensor readings before enabling movement.
