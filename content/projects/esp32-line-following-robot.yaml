  wiring:
    illustration_alt: ESP32 Line Following Robot wiring diagram
    summary: Wire the left and right IR line sensors first, verify readings, then connect the motor driver.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the left and right IR line sensors power pins to the correct 3.3 V or 5 V rail according to its module
      label.
    - Connect the left and right IR line sensors signal line to GPIO34/GPIO35.
    - Connect the motor driver control input to GPIO16-GPIO19 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: left and right IR line sensors
    esp32_pin: GPIO34/GPIO35
    direction: Input
    notes: Read before controlling output
  - signal: motor driver
    esp32_pin: GPIO16-GPIO19
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: line-following-robot.ino
    content: "const int LEFT_SENSOR = 34;\nconst int RIGHT_SENSOR = 35;\nconst int L_IN1 = 16;\nconst int L_IN2\
      \ = 17;\nconst int R_IN1 = 18;\nconst int R_IN2 = 19;\nconst int LINE_THRESHOLD = 1800;\n\nvoid leftMotor(bool\
      \ forward) {\n  digitalWrite(L_IN1, forward ? HIGH : LOW);\n  digitalWrite(L_IN2, forward ? LOW : HIGH);\n\
      }\n\nvoid rightMotor(bool forward) {\n  digitalWrite(R_IN1, forward ? HIGH : LOW);\n  digitalWrite(R_IN2,\
      \ forward ? LOW : HIGH);\n}\n\nvoid stopMotors() {\n  digitalWrite(L_IN1, LOW); digitalWrite(L_IN2, LOW);\n\
      \  digitalWrite(R_IN1, LOW); digitalWrite(R_IN2, LOW);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(L_IN1,\
      \ OUTPUT); pinMode(L_IN2, OUTPUT);\n  pinMode(R_IN1, OUTPUT); pinMode(R_IN2, OUTPUT);\n}\n\nvoid loop() {\n\
      \  bool leftOnLine = analogRead(LEFT_SENSOR) > LINE_THRESHOLD;\n  bool rightOnLine = analogRead(RIGHT_SENSOR)\
      \ > LINE_THRESHOLD;\n\n  if (leftOnLine && rightOnLine) { leftMotor(true); rightMotor(true); }\n  else if\
      \ (leftOnLine) { stopMotors(); rightMotor(true); }\n  else if (rightOnLine) { leftMotor(true); stopMotors();\
      \ }\n  else { stopMotors(); }\n\n  Serial.printf(\"L:%d R:%d\\n\", leftOnLine, rightOnLine);\n  delay(40);\n\
      }\n"
  expected_output: Serial Monitor should show a changing reading. When the left and right IR line sensors reaches
    the test condition, the status LED and motor driver should switch state. If the reading changes but the output
    does not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: left and right IR line sensors never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: motor driver does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
