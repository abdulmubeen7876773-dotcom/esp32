    note: USB-programmable ESP32 board used as the trainer brain.
    link: /components/esp32-devkit.html
  - item: Push button module or momentary button
    note: Connects GPIO12 to ground when pressed; the sketch uses the ESP32 internal pull-up.
  - item: Status LED with series resistor
    note: LED output on GPIO14; use a resistor or LED module.
  - item: Breadboard and jumper wires
    note: Keeps the lesson easy to inspect.
