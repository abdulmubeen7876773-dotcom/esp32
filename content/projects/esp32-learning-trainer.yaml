project:
  icon: PROJ
  mission_title: Build a Classroom ESP32 Trainer
  difficulty: Beginner
  age: Ages 10+
  estimated_time: 45-60 min
  budget: Under 15 USD
  what_you_build: A trainer circuit where a push button on GPIO12 controls a status LED on GPIO14 and prints clear state messages
    to Serial Monitor.
  story: A good ESP32 class starts with one input, one output, one shared ground, and visible feedback. GPIO12 reads the button,
    GPIO14 drives the LED, and Serial Monitor reports the same state so learners can compare code with hardware. The component
    list, wiring table, GPIO map, code constants, expected output, troubleshooting, and FAQ now describe the same bench build
    so a learner can verify each step instead of guessing.
  eli12: The button is like a doorbell for the ESP32. Pressing it changes GPIO12, and the program turns on the LED at GPIO14
    as the answer. Prove the local wiring and code first, then add displays, logging, or Wi-Fi after the simple version behaves
    exactly as expected.
  parent_safety: This is a USB-powered classroom GPIO project. Use an LED module or a proper series resistor for a loose LED.
    Unplug USB and any external supply before rewiring, keep the build low-voltage on the bench, and stop immediately if a
    module becomes hot or behaves unexpectedly.
  learning_objectives:
  - Wire the exact GPIO pins used by the sketch.
  - Run the starter code and compare output with the wiring table.
  - Explain the main sensor or input signal in plain language.
  - Troubleshoot one wiring mistake using Serial Monitor evidence.
  components:
