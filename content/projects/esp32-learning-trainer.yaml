  wiring:
    illustration_alt: ESP32 Learning Trainer Board wiring diagram
    summary: A trainer circuit where a push button on GPIO12 controls a status LED on GPIO14 and prints clear state messages
      to Serial Monitor.
    steps:
    - Unplug USB before changing any trainer wires.
    - Connect one side of the button to GPIO12.
    - Connect the other side of the button to GND.
    - Connect the resistor-protected LED signal to GPIO14.
    - Connect the LED ground side to GND.
    - Reconnect USB and open Serial Monitor at 115200 baud.
  gpio_map:
  - signal: Button input
    esp32_pin: GPIO12
    direction: Input
    notes: Uses INPUT_PULLUP, so pressed reads LOW.
  - signal: Status LED
    esp32_pin: GPIO14
    direction: Output
    notes: Turns on when the button is pressed.
  - signal: GND
    esp32_pin: GND
    direction: Ground
    notes: Shared reference.
  circuit_explanation: The internal pull-up keeps GPIO12 HIGH until the button connects it to GND. GPIO14 drives the LED output.
  engineering_explanation: This project teaches the input-output loop used in larger ESP32 systems without adding Wi-Fi or
    sensor complexity.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-learning-trainer.ino
    content: "// ESP32 Learning Trainer - button and status LED\nconst int BUTTON_PIN = 12;\nconst int LED_PIN = 14;\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(BUTTON_PIN, INPUT_PULLUP);\n  pinMode(LED_PIN, OUTPUT);\n}\n\nvoid loop()\
      \ {\n  bool pressed = digitalRead(BUTTON_PIN) == LOW;\n  digitalWrite(LED_PIN, pressed ? HIGH : LOW);\n  Serial.println(pressed\
      \ ? \"pressed\" : \"released\");\n  delay(50);\n}"
  code_explanation: BUTTON_PIN is GPIO12 and LED_PIN is GPIO14. loop() reads the button, lights the LED only when pressed,
    and prints pressed or released.
  expected_output: With the button released, Serial Monitor prints released and the LED stays off. Pressing the button prints
    pressed and turns the LED on. Releasing it returns both to the released state.
  common_mistakes:
  - text: Expecting HIGH to mean pressed when INPUT_PULLUP makes pressed read LOW.
  - text: Forgetting the LED resistor when using a loose LED.
  - text: Moving wires while USB is connected.
  troubleshooting:
  - problem: LED is always on
    fix: Check that the button is not permanently shorting GPIO12 to GND.
  - problem: Serial Monitor never changes
    fix: Verify the button is wired to GPIO12 and GND.
  - problem: LED never lights
    fix: Check LED polarity, current limiting, and the GPIO14 connection.
  testing_checklist:
  - Upload the sketch with only the documented circuit attached.
  - Open Serial Monitor and confirm the expected messages.
  - Move or trigger the input and watch the output change.
  - Power-cycle the project and confirm it starts safely.
  engineer_tips:
  - Change one variable at a time.
  - Keep wires short and labeled while testing.
  - Record any calibrated threshold before installing the project.
  upgrade_ideas:
  - Add a second LED that shows the opposite state.
  - Count button presses and print the count.
  - Add an OLED display after serial output is understood.
  real_world_applications:
  - Classroom lab build
  - Bench prototype
  - Local ESP32 learning project
