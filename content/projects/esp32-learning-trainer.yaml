  faqs:
  - question: Why does pressed read LOW?
    answer: INPUT_PULLUP holds the pin HIGH until the button connects it to ground.
  - question: Can I use another GPIO?
    answer: Yes, choose a general-purpose GPIO and update the code and wiring together.
  - question: Is 5 V needed?
    answer: No. USB power is enough for this trainer.
