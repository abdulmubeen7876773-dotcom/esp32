  story: 'ECG projects can easily sound medical. This page keeps the scope to waveform education and explicitly avoids diagnosis,
    heart-rate claims, or health decisions. The Golden version keeps the implementation narrow and testable: code constants,
    wiring, GPIO notes, expected output, limitations, and troubleshooting all describe the same educational prototype.'
  eli12: The AD8232 makes a small body-signal waveform easier for the ESP32 to read. The ESP32 prints numbers so the Serial
    Plotter can draw the shape. The ESP32 reads a signal, checks it against a simple rule, and prints or changes an output
    so you can see what happened.
  parent_safety: This is not a medical device and must not be used for diagnosis or health decisions. Use battery power and
    proper medical isolation for any body-connected demo; never use damaged leads or uncomfortable electrodes. Unplug USB
    and external power before rewiring. Stop if hardware becomes hot, uncomfortable, unstable, or unclear.
