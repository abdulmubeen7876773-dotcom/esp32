slug: esp32-ecg-monitor
title: ESP32 ECG Monitor
category: Healthcare
description: Connect the AD8232 ECG front-end to the ESP32 to capture heart electrical signals, visualise
  waveforms in real time, calculate beats per minute, and stream live ECG data to a web dashboard for
  health monitoring.
