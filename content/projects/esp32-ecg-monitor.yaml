levels:
  beginner:
    level: beginner
    overview_html: <p>An educational AD8232 waveform viewer that prints raw ADC samples to Serial Plotter at about 250 Hz.
      This is not a medical device and must not be used for diagnosis or health decisions. Use battery power and proper medical
      isolation for any body-connected demo; never use damaged leads or uncomfortable electrodes.</p>
    components:
    - ESP32 DevKit board
    - AD8232 ECG module
    - Disposable ECG electrode pads
    - ECG lead cable
    - Battery power or medical isolation
    wiring:
    - - AD8232 OUT
      - GPIO34
      - ADC1 input-only analog waveform.
    - - AD8232 LO+
      - GPIO32
      - Leads-off positive.
    - - AD8232 LO-
      - GPIO33
      - Leads-off negative.
    key_concepts:
    - The AD8232 conditions a small biopotential waveform into an ESP32-readable analog signal. Leads-off pins help detect
      disconnected electrodes.
    - ESP32 ADC readings are raw counts and may include noise, baseline drift, motion artifacts, and contact problems. The
      sketch does not compute clinical units or heart-rate accuracy.
    applications: &id003
    - Biopotential waveform lesson
    - ADC sampling demo
    - Medical-device safety discussion
    troubleshooting:
    - - Flat line
      - Check LO+ and LO- status and electrode contact.
    - - Very noisy waveform
      - Reduce movement, improve contact, and use battery/isolated power.
    - - Signal clips
      - Check module power and electrode connection; do not force clinical conclusions.
    improvements: &id002
    - Save raw samples to CSV.
    - Add offline smoothing for visualization.
    - Add a clear on-screen safety banner.
    code: "// ESP32 Educational ECG Waveform Viewer\n// Not a medical device. Use battery power and medical isolation for\
      \ any body-connected demo.\nconst int ECG_PIN = 34;\nconst int LO_PLUS = 32;\nconst int LO_MINUS = 33;\n\nvoid setup()\
      \ {\n  Serial.begin(115200);\n  pinMode(LO_PLUS, INPUT);\n  pinMode(LO_MINUS, INPUT);\n  analogReadResolution(12);\n\
      \  analogSetPinAttenuation(ECG_PIN, ADC_11db);\n  Serial.println(\"Educational waveform viewer only - not for diagnosis.\"\
      );\n}\n\nvoid loop() {\n  if (digitalRead(LO_PLUS) == HIGH || digitalRead(LO_MINUS) == HIGH) {\n    Serial.println(2048);\n\
      \    delayMicroseconds(4000);\n    return;\n  }\n  int sample = analogRead(ECG_PIN);\n  Serial.println(sample);\n  delayMicroseconds(4000);\n\
      }\n"
    code_filename: esp32-ecg-monitor-beginner.ino
