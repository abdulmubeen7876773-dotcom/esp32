slug: esp32-ac-power-monitor
title: ESP32 AC Power Monitor
category: Energy Monitoring
description: Measure real AC mains power consumption with an ESP32, ZMPT101B voltage transformer, and
  SCT-013 current transformer. Calculate Vrms, Irms, true power, power factor, and daily kWh, then publish
  results to an MQTT energy dashboard.
meta_description: Build an ESP32 AC power monitor using a ZMPT101B voltage transformer and SCT-013 current
  transformer. Measure Vrms, Irms, real power, power factor, and daily kWh consumption.
