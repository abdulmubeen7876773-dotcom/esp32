levels:
  beginner:
    level: beginner
    overview_html: <p>A low-voltage ESP32 current-monitor prototype using an SCT-013-030 clamp, ADC midpoint bias, and EmonLib
      RMS calculations. Do not place mains voltage on a breadboard. Do not open panels or live wiring. This is not a certified
      or billing-grade energy meter.</p>
    components:
    - ESP32 DevKit board
    - SCT-013-030 current transformer clamp
    - 10 kOhm resistor pair
    - 10 uF electrolytic capacitor
    - 3.5 mm jack socket
    wiring:
    - - Biased CT waveform
      - GPIO34
      - ADC1 input-only; signal must stay within 0-3.3 V.
    - - Bias midpoint
      - 3.3 V / GND
      - 10 kOhm divider creates about mid-rail.
    key_concepts:
    - The SCT-013 produces an isolated AC signal proportional to current. The bias network shifts that waveform into the ESP32
      ADC range so EmonLib can estimate RMS current.
    - The sketch estimates current and apparent power only. True power, power factor, and kWh require voltage measurement,
      phase calibration, isolation, and proper enclosure.
    applications: &id003
    - Current transformer lesson
    - Energy-estimation prototype
    - Electrical-safety discussion
    troubleshooting:
    - - Current reads near zero
      - Confirm the clamp surrounds one conductor only and the jack wiring reaches GPIO34.
    - - Readings drift
      - Check the midpoint bias and capacitor orientation.
    - - Values disagree with a meter
      - Tune ICAL against a known safe reference; do not claim precision.
    improvements: &id002
    - Add OLED display for estimated current.
    - Add SD logging of estimates.
    - Add isolated voltage sensing only with qualified enclosure design.
    code: "// ESP32 Isolated AC Current Monitor Prototype\n// Educational estimate only. Mains wiring must be handled by a\
      \ qualified adult/electrician.\n#include \"EmonLib.h\"\n\nEnergyMonitor emon;\nconst int CT_PIN = 34;          // ADC1\
      \ input at 1.65 V biased midpoint\nconst float ICAL = 29.0;        // Starter calibration; tune with a known safe reference\n\
      const float ASSUMED_VOLTAGE = 120.0; // Change to your region only for apparent-power estimates\n\nvoid setup() {\n\
      \  Serial.begin(115200);\n  analogReadResolution(12);\n  analogSetPinAttenuation(CT_PIN, ADC_11db);\n  emon.current(CT_PIN,\
      \ ICAL);\n  Serial.println(\"Educational isolated CT current monitor. Not billing-grade.\");\n}\n\nvoid loop() {\n \
      \ double irms = emon.calcIrms(1480);\n  double apparentPower = irms * ASSUMED_VOLTAGE;\n  Serial.printf(\"Irms estimate:\
      \ %.3f A  Apparent power estimate: %.1f VA\\n\", irms, apparentPower);\n  delay(5000);\n}\n"
    code_filename: esp32-ac-power-monitor-beginner.ino
