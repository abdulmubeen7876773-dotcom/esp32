  wiring:
    illustration_alt: Build an Isolated AC Current Monitor Prototype wiring diagram
    summary: GPIO34 reads the biased CT waveform. The 10 kOhm divider creates a 1.65 V midpoint; the CT signal couples through
      a capacitor.
    steps:
    - Unplug USB before changing the ADC bias circuit.
    - Build the 10 kOhm / 10 kOhm divider between 3.3 V and GND.
    - Connect the divider midpoint to GPIO34.
    - Couple the SCT-013 tip signal into the midpoint through the 10 uF capacitor, observing capacitor polarity for the biased
      node.
    - Connect the SCT-013 sleeve to ESP32 GND on the low-voltage side.
    - Clamp only around one insulated conductor in a qualified setup; never expose live mains on the breadboard.
