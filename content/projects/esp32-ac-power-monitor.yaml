  story: 'AC power projects deserve extra caution. This version measures only the isolated current-transformer output on the
    ESP32 side and avoids breadboard mains wiring. The Golden version keeps the implementation narrow and testable: code constants,
    wiring, GPIO notes, expected output, limitations, and troubleshooting all describe the same educational prototype.'
  eli12: The clamp acts like a sensor around one insulated wire. It creates a small safe signal that the ESP32 can estimate,
    after the circuit shifts it into the ADC range. The ESP32 reads a signal, checks it against a simple rule, and prints
    or changes an output so you can see what happened.
  parent_safety: Do not place mains voltage on a breadboard. Do not open panels or live wiring. This is not a certified or
    billing-grade energy meter. Unplug USB and external power before rewiring. Stop if hardware becomes hot, uncomfortable,
    unstable, or unclear.
