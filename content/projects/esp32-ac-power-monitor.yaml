  code:
    filename: esp32-ac-power-monitor.ino
    content: "// ESP32 Isolated AC Current Monitor Prototype\n// Educational estimate only. Mains wiring must be handled by\
      \ a qualified adult/electrician.\n#include \"EmonLib.h\"\n\nEnergyMonitor emon;\nconst int CT_PIN = 34;          //\
      \ ADC1 input at 1.65 V biased midpoint\nconst float ICAL = 29.0;        // Starter calibration; tune with a known safe\
      \ reference\nconst float ASSUMED_VOLTAGE = 120.0; // Change to your region only for apparent-power estimates\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  analogReadResolution(12);\n  analogSetPinAttenuation(CT_PIN, ADC_11db);\n  emon.current(CT_PIN,\
      \ ICAL);\n  Serial.println(\"Educational isolated CT current monitor. Not billing-grade.\");\n}\n\nvoid loop() {\n \
      \ double irms = emon.calcIrms(1480);\n  double apparentPower = irms * ASSUMED_VOLTAGE;\n  Serial.printf(\"Irms estimate:\
      \ %.3f A  Apparent power estimate: %.1f VA\\n\", irms, apparentPower);\n  delay(5000);\n}\n"
  code_explanation: CT_PIN is GPIO34. EmonLib samples the biased waveform, estimates RMS current, and multiplies by an assumed
    voltage only for apparent-power practice.
  expected_output: Serial Monitor prints Irms estimate and apparent power estimate every five seconds. Treat both as prototype
    estimates that need calibration.
  common_mistakes:
  - text: Putting mains voltage on a breadboard.
  - text: Clamping around both live and neutral, which cancels the magnetic field.
  - text: Claiming billing-grade accuracy.
  - text: Letting the ADC input exceed 3.3 V.
  troubleshooting:
  - problem: Current reads near zero
    fix: Confirm the clamp surrounds one conductor only and the jack wiring reaches GPIO34.
  - problem: Readings drift
    fix: Check the midpoint bias and capacitor orientation.
  - problem: Values disagree with a meter
    fix: Tune ICAL against a known safe reference; do not claim precision.
  testing_checklist:
  - Verify midpoint voltage before connecting the CT.
  - Run with no load and record baseline.
  - Use a known safe load under qualified supervision.
  - Power-cycle and confirm readings remain estimates.
  engineer_tips:
  - Keep mains and ESP32 wiring physically separated.
  - Use an enclosure for the low-voltage interface.
  - Document calibration assumptions with every reading.
