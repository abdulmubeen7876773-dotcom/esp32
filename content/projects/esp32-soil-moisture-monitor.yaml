  wiring:
    illustration_alt: ESP32 Soil Moisture Monitor wiring diagram
    summary: Wire the input hardware first, confirm readings in Serial Monitor, then connect the output hardware. The capacitive
      probe produces an analog voltage that changes with the moisture around the sensor.
    steps:
    - Unplug USB before changing wires.
    - Connect Sensor AOUT to GPIO 34 (ADC1 channel — input only, do not drive HIGH).
    - Connect Sensor VCC to 3.3 V (Some sensors accept 3.3–5 V; check your module).
    - Connect Sensor GND to GND.
    - Connect Green LED (+ 220 Ω) to GPIO 25 (Moist (> 60%)).
    - Connect Yellow LED (+ 220 Ω) to GPIO 26 (Moderate (30–60%)).
    - Connect Red LED (+ 220 Ω) to GPIO 27 (Dry (< 30%)).
    - Connect Buzzer + to GPIO 32 (Only sounds when critically dry).
    - Reconnect USB, upload the sketch, and open Serial Monitor at 115200 baud unless the code says otherwise.
  gpio_map:
  - signal: Sensor AOUT
    esp32_pin: GPIO 34
    direction: Input
    notes: ADC1 channel — input only, do not drive HIGH
  - signal: Sensor VCC
    esp32_pin: 3.3 V
    direction: Power
    notes: Some sensors accept 3.3–5 V; check your module
  - signal: Sensor GND
    esp32_pin: GND
    direction: Ground
    notes: Match this wire to the code constant.
  - signal: Green LED (+ 220 Ω)
    esp32_pin: GPIO 25
    direction: Output
    notes: Moist (> 60%)
  - signal: Yellow LED (+ 220 Ω)
    esp32_pin: GPIO 26
    direction: Output
    notes: Moderate (30–60%)
  - signal: Red LED (+ 220 Ω)
    esp32_pin: GPIO 27
    direction: Output
    notes: Dry (< 30%)
  - signal: Buzzer +
    esp32_pin: GPIO 32
    direction: Output
    notes: Only sounds when critically dry
  circuit_explanation: The capacitive probe produces an analog voltage that changes with the moisture around the sensor. GPIO34
    is an ADC input, so it can read voltage but cannot drive an output. LEDs use separate GPIO pins through resistors so the
    ESP32 only supplies safe indicator current. The buzzer is optional and should be tested after the moisture reading works.
  engineering_explanation: Soil moisture sensors are not absolute instruments. Soil type, sensor depth, salt content, and
    temperature all change the raw ADC reading. A reliable monitor is calibrated in your own dry and wet conditions, averages
    several samples, and uses thresholds that are tested with real soil instead of copied from another build.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-soil-moisture-monitor.ino
    content: "/*\n * ESP32 Soil Moisture Monitor — Beginner\n * Reads capacitive soil sensor, maps to percentage, lights LEDs.\n\
      \ *\n * CALIBRATION REQUIRED:\n *   1) Place sensor in dry air → note AIR_VALUE (should be ~2800–3200)\n *   2) Submerge\
      \ sensor tip in water → note WATER_VALUE (should be ~1200–1500)\n *   Update the defines below with your sensor's actual\
      \ values.\n */\n#define SENSOR_PIN  34\n#define LED_GREEN   25   // Moist\n#define LED_YELLOW  26   // Moderate\n#define\
      \ LED_RED     27   // Dry\n#define BUZZER      32\n\n// ── CALIBRATE THESE for your sensor ─────────────────────────────\n\
      #define AIR_VALUE   2800  // ADC reading in dry air (0% moisture)\n#define WATER_VALUE 1200  // ADC reading fully in\
      \ water (100% moisture)\n// ────────────────────────────────────────────────────────────────\n\nint readMoisturePercent()\
      \ {\n  // Average 10 readings to reduce ADC noise on ESP32\n  long sum = 0;\n  for (int i = 0; i < 10; i++) { sum +=\
      \ analogRead(SENSOR_PIN); delay(5); }\n  int raw = sum / 10;\n  int pct = map(raw, AIR_VALUE, WATER_VALUE, 0, 100);\n\
      \  return constrain(pct, 0, 100);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  analogReadResolution(12);   // 12-bit\
      \ ADC: 0–4095\n  pinMode(LED_GREEN,  OUTPUT);\n  pinMode(LED_YELLOW, OUTPUT);\n  pinMode(LED_RED,    OUTPUT);\n  pinMode(BUZZER,\
      \     OUTPUT);\n  Serial.println(\"Soil Moisture Monitor started.\");\n  Serial.printf(\"Calibration: AIR=%d, WATER=%dn\"\
      , AIR_VALUE, WATER_VALUE);\n}\n\nvoid loop() {\n  int pct = readMoisturePercent();\n  Serial.printf(\"Moisture: %d%%n\"\
      , pct);\n\n  // Turn all LEDs off first\n  digitalWrite(LED_GREEN,  LOW);\n  digitalWrite(LED_YELLOW, LOW);\n  digitalWrite(LED_RED,\
      \    LOW);\n  digitalWrite(BUZZER,     LOW);\n\n  if (pct >= 60) {\n    digitalWrite(LED_GREEN, HIGH);\n    Serial.println(\"\
      Status: Moist — plant is happy\");\n  } else if (pct >= 30) {\n    digitalWrite(LED_YELLOW, HIGH);\n    Serial.println(\"\
      Status: Moderate — consider watering soon\");\n  } else {\n    digitalWrite(LED_RED, HIGH);\n    // Pulse buzzer 3 times\
      \ for critical alert\n    for (int i = 0; i < 3; i++) {\n      digitalWrite(BUZZER, HIGH); delay(200);\n      digitalWrite(BUZZER,\
      \ LOW);  delay(200);\n    }\n    Serial.println(\"Status: DRY — water the plant now!\");\n  }\n\n  delay(10000);   //\
      \ Read every 10 seconds\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output pins in
    setup(), then repeats the measurement and decision logic in loop(). The loop prints the live reading first, compares it
    with a threshold, then changes the output. Printing before controlling the output makes debugging much easier because
    you can see what the ESP32 believes is happening.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when the tested
    condition for esp32 soil moisture monitor is reached.
  common_mistakes:
  - text: Using a resistive fork-style sensor for a long-term outdoor build; those probes corrode quickly.
  - text: Copying calibration values without measuring your own dry and wet readings.
  - text: Driving an LED without a current-limiting resistor.
  - text: Assuming 0 percent and 100 percent readings will be identical across soil types.
  - text: Reading the sensor while Wi-Fi is active and then wondering why ADC values are noisier.
  troubleshooting:
  - problem: Moisture is always 0 percent or 100 percent
    fix: Print the raw ADC value first. Update AIR_VALUE and WATER_VALUE with readings from your own dry air and wet test.
  - problem: Readings jump while the sensor is not moving
    fix: Average multiple samples, keep wires short, and keep the sensor lead away from motors, pumps, and Wi-Fi antennas.
  - problem: LED status looks backwards
    fix: Check whether your calibration has AIR_VALUE greater than WATER_VALUE. Many capacitive modules output lower voltage
      when wetter.
  - problem: Buzzer sounds too often
    fix: Raise the dry threshold or require several dry readings in a row before sounding the buzzer.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use GPIO34, GPIO35, GPIO36, or GPIO39 for analog-only sensor inputs.
  - Record raw ADC values before writing percentage logic.
  - Keep the sensor electronics above the soil; only the probe area should enter the soil.
  - If you add a pump later, power it from a separate supply and share ground only where the driver requires it.
  - Label dry, damp, and wet readings in a notebook before choosing thresholds.
  performance_tips:
  - Average 10-20 readings to reduce ADC noise.
  - Read every few seconds or minutes; soil changes slowly.
  - Power the sensor only while reading if you need lower corrosion and lower battery use.
  - Use deep sleep for battery plant monitors.
