  story: 'ESP32 Soil Moisture Monitor solves a real beginner problem: turning an ESP32 reading into a useful physical or networked
    result. Build this if you want to understand analog sensors, calibration, and threshold logic before moving to automatic
    irrigation.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code, then test
    the output under real conditions.'
  eli12: The ESP32 is a plant caretaker with a moisture meter. The sensor gives a changing number, the code decides whether
    that number means wet or dry, and the LEDs explain the decision.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug power before
    rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32 unless a proper driver,
    enclosure, and adult supervision are used.
