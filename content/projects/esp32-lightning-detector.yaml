    content: "// ESP32 AS3935 educational lightning sensor demo\n// Not a life-safety warning system. Follow official weather\
      \ alerts.\n#include <SPI.h>\n#include <Wire.h>\n#include <Adafruit_SSD1306.h>\n#include <SparkFun_AS3935.h>\n\nconst\
      \ int AS3935_CS = 5;\nconst int AS3935_IRQ = 4;\nconst int LED_PIN = 26;\n\nSparkFun_AS3935 lightning(AS3935_CS);\n\
      Adafruit_SSD1306 oled(128, 64, &Wire, -1);\n\nvolatile bool eventFlag = false;\n\nvoid IRAM_ATTR onAs3935Event() {\n\
      \  eventFlag = true;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n  SPI.begin(18, 19, 23, AS3935_CS);\n\
      \  oled.begin(SSD1306_SWITCHCAPVCC, 0x3C);\n  oled.setTextColor(WHITE);\n  pinMode(LED_PIN, OUTPUT);\n  pinMode(AS3935_IRQ,\
      \ INPUT);\n\n  if (!lightning.beginSPI(AS3935_CS, 2000000)) {\n    Serial.println(\"AS3935 not found. Check SPI wiring\
      \ and 3.3 V power.\");\n    while (true) delay(10);\n  }\n\n  lightning.setIndoorOutdoor(INDOOR);\n  lightning.maskDisturber(false);\n\
      \  lightning.setNoiseLevel(2);\n  lightning.spikeRejection(2);\n  attachInterrupt(digitalPinToInterrupt(AS3935_IRQ),\
      \ onAs3935Event, RISING);\n\n  Serial.println(\"AS3935 demo ready. Do not test outdoors during storms.\");\n}\n\nvoid\
      \ loop() {\n  if (!eventFlag) return;\n  eventFlag = false;\n  delay(5);\n\n  int type = lightning.readInterruptReg();\n\
      \  if (type == NOISE_INT) {\n    Serial.println(\"Noise event. Move the sensor away from electronics or raise noise\
      \ level.\");\n  } else if (type == DISTURBER_INT) {\n    Serial.println(\"Disturber event. Electrical interference,\
      \ not confirmed lightning.\");\n  } else if (type == LIGHTNING_INT) {\n    int distanceKm = lightning.distanceToStorm();\n\
      \    Serial.print(\"Lightning-like event. Estimated distance code: \");\n    Serial.print(distanceKm);\n    Serial.println(\"\
      \ km. Treat as educational only.\");\n\n    digitalWrite(LED_PIN, HIGH);\n    delay(100);\n    digitalWrite(LED_PIN,\
      \ LOW);\n\n    oled.clearDisplay();\n    oled.setTextSize(1);\n    oled.setCursor(0, 0);\n    oled.println(\"Lightning-like\
      \ event\");\n    oled.print(\"Distance code: \");\n    oled.print(distanceKm);\n    oled.println(\" km\");\n    oled.println(\"\
      Use official alerts\");\n    oled.display();\n  }\n}\n"
  code_explanation: GPIO4 sets an event flag. The loop reads the AS3935 interrupt register and prints noise, disturber, or
    lightning-like event messages.
  expected_output: Serial Monitor reports noise/disturber/lightning-like event categories. The LED flashes only on lightning-like
    events.
