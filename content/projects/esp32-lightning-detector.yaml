slug: esp32-lightning-detector
title: ESP32 Lightning Detector
category: Environmental
description: Detect approaching electrical storms with the ESP32 and AS3935 Franklin lightning sensor
  IC. Measure estimated distance to lightning strikes in kilometres, filter false positives from indoor
  noise, and publish alerts to Telegram and MQTT the moment a strike is detected.
meta_description: Build an ESP32 lightning detector using the AS3935 Franklin lightning sensor. Detect
  electrical storms, estimate distance to the strike, and send real-time Telegram alerts with strike maps.
