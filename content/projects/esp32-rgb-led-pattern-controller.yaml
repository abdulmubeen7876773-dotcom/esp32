  troubleshooting:
  - problem: Colors are inverted
    fix: You may have a common-anode LED; use common-cathode or invert PWM.
  - problem: One color is missing
    fix: Check that channel's resistor and LED pin.
  - problem: Button double-triggers
    fix: Increase debounce time or check wiring.
  testing_checklist:
