levels:
  beginner:
    level: beginner
    overview_html: <p>A single common-cathode RGB LED pattern controller using three PWM channels and one button. Use one
      resistor per color channel. Do not scale this single-LED wiring to strips without redesigning power.</p>
    components:
    - ESP32 DevKit board
    - Common-cathode 4-pin RGB LED
    - Three 220 ohm resistors
    - Push button
    - Breadboard and jumper wires
    wiring:
    - - RGB red anode
      - GPIO25
      - Series resistor required.
    - - RGB green anode
      - GPIO26
      - Series resistor required.
    - - RGB blue anode
      - GPIO27
      - Series resistor required.
    - - Pattern button
      - GPIO14
      - INPUT_PULLUP; button to GND.
    key_concepts:
    - Each color channel is a separate LED controlled by PWM. The button advances a pattern variable without delay-based blocking.
    - Common-cathode means higher PWM duty makes the selected color brighter. Common-anode LEDs need inverted PWM and are
      not used here.
    applications: &id003
    - Additive color lesson
    - PWM demonstration
    - Button state-machine exercise
    troubleshooting:
    - - Colors are inverted
      - You may have a common-anode LED; use common-cathode or invert PWM.
    - - One color is missing
      - Check that channel's resistor and LED pin.
    - - Button double-triggers
      - Increase debounce time or check wiring.
    improvements: &id002
    - Add adjustable fade speed.
    - Add a potentiometer color mixer.
    - Save last pattern in preferences.
    code: "// ESP32 common-cathode RGB LED pattern controller\n// Single low-power RGB LED, not an addressable strip.\nconst\
      \ int RED_PIN = 25;\nconst int GREEN_PIN = 26;\nconst int BLUE_PIN = 27;\nconst int BUTTON_PIN = 14;\n\nconst int RED_CH\
      \ = 0;\nconst int GREEN_CH = 1;\nconst int BLUE_CH = 2;\nconst int PWM_FREQ = 5000;\nconst int PWM_RES = 8;\n\nint pattern\
      \ = 0;\nbool lastButton = HIGH;\nunsigned long lastDebounceMs = 0;\nunsigned long frameMs = 0;\n\nvoid writeRgb(uint8_t\
      \ r, uint8_t g, uint8_t b) {\n  ledcWrite(RED_CH, r);\n  ledcWrite(GREEN_CH, g);\n  ledcWrite(BLUE_CH, b);\n}\n\nvoid\
      \ setupPwm() {\n  ledcSetup(RED_CH, PWM_FREQ, PWM_RES);\n  ledcSetup(GREEN_CH, PWM_FREQ, PWM_RES);\n  ledcSetup(BLUE_CH,\
      \ PWM_FREQ, PWM_RES);\n  ledcAttachPin(RED_PIN, RED_CH);\n  ledcAttachPin(GREEN_PIN, GREEN_CH);\n  ledcAttachPin(BLUE_PIN,\
      \ BLUE_CH);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  setupPwm();\n  pinMode(BUTTON_PIN, INPUT_PULLUP);\n  writeRgb(255,\
      \ 0, 0);\n}\n\nvoid loop() {\n  bool button = digitalRead(BUTTON_PIN);\n  if (button != lastButton && millis() - lastDebounceMs\
      \ > 40) {\n    lastDebounceMs = millis();\n    lastButton = button;\n    if (button == LOW) {\n      pattern = (pattern\
      \ + 1) % 3;\n      Serial.printf(\"Pattern %d\\n\", pattern);\n    }\n  }\n\n  unsigned long now = millis();\n  if (now\
      \ - frameMs < 20) return;\n  frameMs = now;\n\n  uint8_t phase = (now / 8) & 0xFF;\n  if (pattern == 0) {\n    writeRgb(255,\
      \ 0, 0);\n  } else if (pattern == 1) {\n    writeRgb(phase, 255 - phase, 128);\n  } else {\n    int step = (now / 500)\
      \ % 6;\n    const uint8_t colors[6][3] = {{255,0,0},{255,80,0},{0,255,0},{0,255,255},{0,0,255},{160,0,255}};\n    writeRgb(colors[step][0],\
      \ colors[step][1], colors[step][2]);\n  }\n}\n"
    code_filename: esp32-rgb-led-pattern-controller-beginner.ino
