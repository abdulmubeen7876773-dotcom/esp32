    content: "// ESP32 common-cathode RGB LED pattern controller\n// Single low-power RGB LED, not an addressable strip.\n\
      const int RED_PIN = 25;\nconst int GREEN_PIN = 26;\nconst int BLUE_PIN = 27;\nconst int BUTTON_PIN = 14;\n\nconst int\
      \ RED_CH = 0;\nconst int GREEN_CH = 1;\nconst int BLUE_CH = 2;\nconst int PWM_FREQ = 5000;\nconst int PWM_RES = 8;\n\
      \nint pattern = 0;\nbool lastButton = HIGH;\nunsigned long lastDebounceMs = 0;\nunsigned long frameMs = 0;\n\nvoid writeRgb(uint8_t\
      \ r, uint8_t g, uint8_t b) {\n  ledcWrite(RED_CH, r);\n  ledcWrite(GREEN_CH, g);\n  ledcWrite(BLUE_CH, b);\n}\n\nvoid\
      \ setupPwm() {\n  ledcSetup(RED_CH, PWM_FREQ, PWM_RES);\n  ledcSetup(GREEN_CH, PWM_FREQ, PWM_RES);\n  ledcSetup(BLUE_CH,\
      \ PWM_FREQ, PWM_RES);\n  ledcAttachPin(RED_PIN, RED_CH);\n  ledcAttachPin(GREEN_PIN, GREEN_CH);\n  ledcAttachPin(BLUE_PIN,\
      \ BLUE_CH);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  setupPwm();\n  pinMode(BUTTON_PIN, INPUT_PULLUP);\n  writeRgb(255,\
      \ 0, 0);\n}\n\nvoid loop() {\n  bool button = digitalRead(BUTTON_PIN);\n  if (button != lastButton && millis() - lastDebounceMs\
      \ > 40) {\n    lastDebounceMs = millis();\n    lastButton = button;\n    if (button == LOW) {\n      pattern = (pattern\
      \ + 1) % 3;\n      Serial.printf(\"Pattern %d\\n\", pattern);\n    }\n  }\n\n  unsigned long now = millis();\n  if (now\
      \ - frameMs < 20) return;\n  frameMs = now;\n\n  uint8_t phase = (now / 8) & 0xFF;\n  if (pattern == 0) {\n    writeRgb(255,\
      \ 0, 0);\n  } else if (pattern == 1) {\n    writeRgb(phase, 255 - phase, 128);\n  } else {\n    int step = (now / 500)\
      \ % 6;\n    const uint8_t colors[6][3] = {{255,0,0},{255,80,0},{0,255,0},{0,255,255},{0,0,255},{160,0,255}};\n    writeRgb(colors[step][0],\
      \ colors[step][1], colors[step][2]);\n  }\n}\n"
  code_explanation: Three LEDC channels drive RGB pins. The button is debounced with millis() and advances a non-blocking
    pattern state.
  expected_output: The RGB LED changes pattern on each button press without long pauses or double-triggering.
