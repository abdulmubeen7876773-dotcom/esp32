    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Matrix Display: ESP32 watches Ws2812B Led Strip signal and activates Push\
      \ Button control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n\
      \        <li>Ws2812B Led Strip signal connects to GPIO13 (ADC input)</li><li>Threshold is set to\
      \ 1605 in firmware (adjust after calibration)</li><li>Push Button control is driven on GPIO14 when\
      \ the condition is met</li><li>The main loop samples every 300 ms while powered</li>\n      </ul>\n\
      \      </section>"
