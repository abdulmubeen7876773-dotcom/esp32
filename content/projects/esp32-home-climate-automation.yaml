    "code": {
      "filename": "home-climate-automation.ino",
      "content": "#include \"DHT.h\"\n\n#define DHTPIN 4\n#define DHTTYPE DHT22\n#define RELAY_PIN 26\n\nDHT dht(DHTPIN, DHTTYPE);\nconst float HUMIDITY_ON = 70.0;\nconst float HUMIDITY_OFF = 62.0;\nbool fanOn = false;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, LOW);\n  dht.begin();\n}\n\nvoid loop() {\n  float humidity = dht.readHumidity();\n  float tempC = dht.readTemperature();\n  if (isnan(humidity) || isnan(tempC)) {\n    Serial.println(\"Climate sensor read failed\");\n    delay(2000);\n    return;\n  }\n  if (!fanOn && humidity >= HUMIDITY_ON) fanOn = true;\n  if (fanOn && humidity <= HUMIDITY_OFF) fanOn = false;\n  digitalWrite(RELAY_PIN, fanOn ? HIGH : LOW);\n  Serial.printf(\"Temp %.1f C | Humidity %.1f %% | Fan %s\\n\", tempC, humidity, fanOn ? \"ON\" : \"OFF\");\n  delay(2000);\n}\n"
    },
