  faqs:
  - question: Why does my DHT22 or BME280 climate sensor reading look wrong?
    answer: Most wrong readings come from reversed power, loose breadboard rows, the wrong GPIO number in code,
      or reading the sensor before it has settled.
  - question: Why does relay output not respond?
    answer: Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the
      output module uses active HIGH or active LOW logic.
  - question: Can this control a household HVAC system?
    answer: No. Keep this as a low-voltage fan, vent, or indicator prototype unless a qualified adult redesigns the
      power and enclosure outside the breadboard lesson.
