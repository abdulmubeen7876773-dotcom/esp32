  wiring:
    illustration_alt: ESP32 Home Climate Automation wiring diagram
    summary: Wire the DHT22 or BME280 climate sensor first, verify readings, then connect the relay output.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the DHT22 or BME280 climate sensor power pins to the correct 3.3 V or 5 V rail according to its module
      label.
    - Connect the DHT22 or BME280 climate sensor signal line to GPIO4 or I2C.
    - Connect the relay output control input to GPIO26 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: DHT22 or BME280 climate sensor
    esp32_pin: GPIO4 or I2C
    direction: Input
    notes: Read before controlling output
  - signal: relay output
    esp32_pin: GPIO26
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: home-climate-automation.ino
    content: "#include \"DHT.h\"\n\n#define DHTPIN 4\n#define DHTTYPE DHT22\n#define RELAY_PIN 26\n\nDHT dht(DHTPIN,\
      \ DHTTYPE);\nconst float HUMIDITY_ON = 70.0;\nconst float HUMIDITY_OFF = 62.0;\nbool fanOn = false;\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, LOW);\n  dht.begin();\n\
      }\n\nvoid loop() {\n  float humidity = dht.readHumidity();\n  float tempC = dht.readTemperature();\n  if (isnan(humidity)\
      \ || isnan(tempC)) {\n    Serial.println(\"Climate sensor read failed\");\n    delay(2000);\n    return;\n\
      \  }\n  if (!fanOn && humidity >= HUMIDITY_ON) fanOn = true;\n  if (fanOn && humidity <= HUMIDITY_OFF) fanOn\
      \ = false;\n  digitalWrite(RELAY_PIN, fanOn ? HIGH : LOW);\n  Serial.printf(\"Temp %.1f C | Humidity %.1f\
      \ %% | Fan %s\\n\", tempC, humidity, fanOn ? \"ON\" : \"OFF\");\n  delay(2000);\n}\n"
  expected_output: Serial Monitor should show a changing reading. When the DHT22 or BME280 climate sensor reaches
    the test condition, the status LED and relay output should switch state. If the reading changes but the output
    does not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: DHT22 or BME280 climate sensor never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: relay output does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
