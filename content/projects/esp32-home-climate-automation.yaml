    code: "// ESP32 Home Climate Automation for Apartment with Cloud Sync\nconst int SENSOR_PIN = 27;\n\
      const int OUTPUT_PIN = 23;\nconst int THRESHOLD = 1812;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n\
      \  Serial.println(\"Starting: home climate automation for apartment with cloud sync\");\n  Serial.print(\"\
      Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n\
      \  Serial.print(\"Dht22 Sensor signal: \");\n  Serial.println(reading);\n  bool active = reading\
      \ < THRESHOLD;\n  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
