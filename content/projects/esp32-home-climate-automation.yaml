  story: 'ESP32 Home Climate Automation turns the ESP32 into a real object that senses something, decides what it
    means, and reacts in the physical world.


    The important lesson is not only the finished climate automation system. You learn how to separate input, decision
    logic, and output so a project stays debuggable instead of becoming a pile of wires and guesses.'
  eli12: Think of the ESP32 as the brain. The DHT22 or BME280 climate sensor is how it notices the world. The relay
    output is how it answers back. The code is the rule book that tells the brain what to do when the numbers change.
  parent_safety: This tutorial is designed for low-voltage learning on USB or a regulated low-voltage supply. Unplug
    the ESP32 before changing wires. Keep motors, pumps, door hardware, and relay loads separate from the USB programming
    circuit. Do not use mains voltage on a breadboard.
  learning_objectives:
  - Wire and test the DHT22 or BME280 climate sensor before connecting the rest of the circuit.
  - Map each signal to a named ESP32 GPIO and keep the code constants readable.
  - Control relay output using a clear threshold or command instead of hidden magic numbers.
  - Use Serial Monitor as an engineering tool, not only as a success message.
  - Identify power, wiring, and timing faults using a repeatable test checklist.
  circuit_explanation: The circuit is split into an input side and an output side. The DHT22 or BME280 climate sensor
    tells the ESP32 what is happening. The relay output receives a controlled signal from the ESP32, usually through
    a driver, relay, or module that can handle more current than a GPIO pin.
  engineering_explanation: A reliable climate automation system is built in layers. First prove the input, then
    prove the output, then join them with simple state logic. This prevents a common beginner problem where the
    robot, lock, or automation fails and every wire looks suspicious at the same time.
  code_explanation: The example uses named pins, reads the input, converts the reading into a true or false decision,
    and then updates the output and status LED. Replace the threshold with values measured from your own DHT22 or
    BME280 climate sensor because modules vary.
  testing_checklist:
  - ESP32 appears on the correct port and accepts a basic blink upload.
  - Ground is shared between every module that exchanges signals with the ESP32.
  - Each GPIO in the code matches the wire connected on the breadboard.
  - Serial Monitor prints startup text at 115200 baud.
  - The DHT22 or BME280 climate sensor value changes when you create a real test condition.
  - The relay output changes only when the expected condition is reached.
  - The circuit still behaves correctly after power is removed and restored.
