project:
  icon: BLE
  mission_title: Build a BLE Beacon
  difficulty: Beginner
  age: Ages 12+
  estimated_time: 45-70 min
  budget: Under 15 USD
  what_you_build: A no-extra-hardware ESP32 BLE beacon and iBeacon demo that advertises a packet and lets you detect
    it from a phone app.
  story: 'ESP32 BLE Beacon solves a real beginner problem: turning an ESP32 reading into a useful physical or networked
    result. Build this to understand wireless advertising before building BLE sensors, asset tags, attendance systems,
    or proximity projects.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code,
    then test the output under real conditions.'
  eli12: A BLE beacon is like a lighthouse. It does not hold a conversation; it repeatedly announces a small identity
    signal so nearby devices can notice it.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug
    power before rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32
    unless a proper driver, enclosure, and adult supervision are used.
  learning_objectives:
  - Create a BLE advertiser on the ESP32.
  - Read the beacon from a phone scanner app.
  - Understand UUID, advertising interval, and RSSI.
  - Recognize why RSSI is not accurate distance.
  - Prepare for BLE sensor and proximity projects.
