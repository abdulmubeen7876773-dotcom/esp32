  faqs:
  - question: Why does RSSI change when the beacon is not moving?
    answer: BLE signal strength changes with walls, metal objects, phone position, antenna direction, and people near
      the board. Use RSSI as a rough signal clue, not as a stable measurement.
  - question: Can the beacon measure exact distance?
    answer: No. The TX_POWER value gives a calibration reference, but RSSI is too environment-dependent for exact
      distance without extra filtering and testing.
  - question: Does this BLE beacon need internet?
    answer: No. The ESP32 advertises over Bluetooth Low Energy locally, and a phone scanner app can see it without
      Wi-Fi or cloud services.
