  advanced:
    level: advanced
    overview_html: <p>The advanced build implements a three-beacon indoor positioning system. Three ESP32
      beacons in known positions publish their RSSI readings for a target device to an MQTT broker. A
      Node-RED flow runs multilateration on the three RSSI values to estimate the target device location
      in 2D coordinates and displays it on a live floor plan dashboard. Estimated coordinates are also
      published back via MQTT for further automation.</p>
    components:
    - 3× ESP32 DevKit V1 — One per beacon position
    - 1× MQTT broker (Mosquitto) — Central data aggregator
    - 1× Node-RED instance — Multilateration and dashboard
    - 1× Smartphone (target device) — Broadcasting BLE advertisements
    - 1× Wi-Fi router — All ESP32s on same network
    wiring:
    - - No external wiring
      - Built-in BLE and Wi-Fi
      - Position each ESP32 at known coordinates in the room
    how:
    - 'Distributed RSSI Collection: Each anchor ESP32 independently scans for the target device BLE advertisement
      and measures its RSSI. An exponential moving average (alpha=0.3) smooths rapid RSSI fluctuations.
      Every 500 ms each anchor publishes its smoothed RSSI, physical position (x, y in metres), and beacon
      ID to ips/rssi on MQTT.'
    - 'MQTT Aggregation in Node-RED: A Node-RED join node collects RSSI messages from all three anchors
      within a 1-second window. When all three are received, a function node runs the multilateration
      algorithm converting three (RSSI, x, y) tuples into estimated (x, y) coordinates for the target
      device.'
    - 'RSSI-to-Distance Conversion: Distance = 10^((TxPower - RSSI) / (10 * n)) where TxPower is the calibrated
      1-metre RSSI and n is the path-loss exponent (typically 2.0-3.5 indoors). Three distance estimates
      from three anchors define three circles; their intersection is the position estimate.'
    - 'Multilateration Position Estimate: With three distance estimates and known anchor positions, the
      system solves a least-squares optimisation to find the (x, y) point minimising the sum of squared
      residuals. Node-RED publishes the result to ips/position and displays it on a UI floor plan overlay.'
    apps:
    - Office hot-desk occupancy tracking showing who is at which desk
    - Warehouse worker location monitoring for safety zone compliance
    - Museum visitor flow analysis showing dwell time at each exhibit
    - Hospital asset tracking for locating mobile equipment in real time
    troubleshooting:
    - - Position estimate jumps erratically
      - Increase the ALPHA smoothing factor to 0.1 for heavier filtering. Also apply a Kalman filter in
        Node-RED to further smooth the (x, y) estimate over time.
    - - One anchor never receives the target RSSI
      - The target device BLE advertising interval may be too long. On Android, BLE advertising from apps
        runs at 160-1000 ms intervals. Extend the anchor scan window to 2 seconds.
    - - Position accuracy is poor (off by several metres)
      - 'Calibrate TxPower for each anchor by measuring actual RSSI at 1 metre. Tune the path-loss exponent
        n for your environment: open offices need n=2.0, cluttered spaces need n=3.0-3.5.'
    upgrades:
    - Add a fourth anchor beacon to improve accuracy and handle dead zones
    - Implement a particle filter in Node-RED for smoother tracking in dynamic environments
    - Add a floor plan image to the Node-RED dashboard as a background layer
    - Extend to multiple target devices tracked simultaneously using their unique BLE names
    code: "// ESP32 BLE Beacon - Advanced (Indoor positioning via RSSI + MQTT)\n// Deploy one instance\
      \ per anchor beacon; set BEACON_ID and POSITION per device\n#include <BLEDevice.h>\n#include <BLEScan.h>\n\
      #include <WiFi.h>\n#include <PubSubClient.h>\n#include <ArduinoJson.h>\n\nconst char* SSID=\"YourSSID\"\
      , *PASS=\"YourPass\";\nconst char* MQTT_HOST=\"192.168.1.100\";\nconst char* BEACON_ID=\"beacon-A\"\
      ;    // Unique per anchor: beacon-A, beacon-B, beacon-C\nconst float POS_X=0.0, POS_Y=0.0;   //\
      \ Anchor position in metres\nconst char* TARGET_NAME=\"YourPhone\"; // BLE name of target device\n\
      \nWiFiClient wifiClient;\nPubSubClient mqtt(wifiClient);\nBLEScan *pScan;\n\n// Smooth RSSI with\
      \ exponential moving average\nfloat smoothRSSI=-100.0f;\nconst float ALPHA=0.3f;\n\nclass ScanCB:\
      \ public BLEAdvertisedDeviceCallbacks {\n  void onResult(BLEAdvertisedDevice dev){\n    String name=dev.getName().c_str();\n\
      \    if(name==TARGET_NAME){\n      float rssi=(float)dev.getRSSI();\n      smoothRSSI=ALPHA*rssi+(1-ALPHA)*smoothRSSI;\n\
      \    }\n  }\n};\n\nvoid publishRSSI(){\n  if(!mqtt.connected()) return;\n  StaticJsonDocument<128>\
      \ doc;\n  doc[\"beacon\"]  = BEACON_ID;\n  doc[\"rssi\"]    = (int)smoothRSSI;\n  doc[\"x\"]   \
      \    = POS_X;\n  doc[\"y\"]       = POS_Y;\n  char buf[128]; serializeJson(doc,buf);\n  mqtt.publish(\"\
      ips/rssi\",buf);\n  Serial.printf(\"%s RSSI=%.1fn\",BEACON_ID,smoothRSSI);\n}\n\nvoid setup(){\n\
      \  Serial.begin(115200);\n  WiFi.begin(SSID,PASS);\n  while(WiFi.status()!=WL_CONNECTED) delay(500);\n\
      \  mqtt.setServer(MQTT_HOST,1883);\n  BLEDevice::init(\"Anchor-\"+String(BEACON_ID));\n  pScan=BLEDevice::getScan();\n\
      \  pScan->setAdvertisedDeviceCallbacks(new ScanCB());\n  pScan->setActiveScan(false);\n  pScan->setInterval(50);\
      \ pScan->setWindow(40);\n}\n\nvoid loop(){\n  if(!mqtt.connected()) mqtt.connect(BEACON_ID);\n \
      \ mqtt.loop();\n  pScan->start(1,false);\n  pScan->clearResults();\n  publishRSSI();\n  delay(500);\n\
      }"
