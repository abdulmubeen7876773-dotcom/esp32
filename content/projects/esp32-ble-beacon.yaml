  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output
    pins in setup(), then repeats the measurement and decision logic in loop(). The BLE setup creates an advertiser,
    sets the beacon identity, and starts broadcasting. The loop can stay light because advertising continues in
    the BLE stack.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when
    the tested condition for esp32 ble beacon is reached.
  common_mistakes:
  - text: Expecting RSSI to behave like a tape measure.
  - text: Holding the ESP32 antenna while testing signal strength.
  - text: Using Wi-Fi-heavy code at the same time without understanding radio sharing.
  - text: Forgetting that phones cache BLE scan results.
  - text: Using the same UUID for every test beacon.
  troubleshooting:
  - problem: Phone cannot see the beacon
    fix: Reset the ESP32, restart the BLE scanner app, and confirm Bluetooth permission is enabled on the phone.
  - problem: RSSI jumps a lot
    fix: Move away from metal objects and test with the board still on a table.
  - problem: Upload fails
    fix: Hold BOOT during upload if your ESP32 board requires manual boot mode.
  - problem: Beacon name does not update
    fix: Forget the device or restart the scanner app because BLE scan results can be cached.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use unique UUIDs for different beacon projects.
  - Keep the antenna end of the ESP32 away from metal enclosures.
  - Use RSSI bands such as near/far instead of exact centimeters.
  - Lower advertising rate for battery experiments.
  - Record RSSI at fixed distances to understand your environment.
  performance_tips:
  - Increase advertising interval to reduce power use.
  - Use deep sleep between advertising windows for battery beacons.
  - Avoid running Wi-Fi unless the project really needs both radios.
  - Keep advertisement payload short.
