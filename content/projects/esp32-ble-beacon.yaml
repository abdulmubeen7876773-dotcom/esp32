  engineering_explanation: BLE advertising is designed for short, low-power messages. A phone scanner receives the
    advertisement and estimates signal strength with RSSI. RSSI is useful for near/far behavior, but it is not a
    precise distance measurement because walls, hands, and antenna orientation change the reading.
