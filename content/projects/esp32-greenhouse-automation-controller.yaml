levels:
  beginner:
    level: beginner
    overview_html: <p>A low-voltage greenhouse ventilation prototype using DHT22 air readings, OLED status, and a relay-controlled
      fan. Use low-voltage loads only. Keep water away from electronics. Do not wire mains-powered fans in this beginner build.</p>
    components:
    - ESP32 DevKit board
    - DHT22 temperature and humidity sensor
    - Relay module
    - SSD1306 OLED display
    - Low-voltage DC fan and matching supply
    - Breadboard and jumper wires
    wiring:
    - - DHT22 DATA
      - GPIO4
      - Use pull-up if using a bare sensor.
    - - Relay IN
      - GPIO26
      - Assumes common active-LOW module.
    - - OLED SDA
      - GPIO21
      - Optional status display.
    - - OLED SCL
      - GPIO22
      - Optional status display.
    key_concepts:
    - The ESP32 reads DHT22 data and drives the relay input. The relay switches external low-voltage fan power while sharing
      only the required control-side ground.
    - Hysteresis uses separate on/off thresholds so the relay does not chatter near a boundary. Sensor errors turn the fan
      off in this educational default.
    applications: &id003
    - Grow-tent ventilation lesson
    - Hysteresis control demo
    - Low-voltage automation prototype
    troubleshooting:
    - - DHT22 read failed
      - Check data pin, pull-up, and power; wait at least two seconds between reads.
    - - Relay logic is backwards
      - Confirm whether your module is active LOW or active HIGH and adjust setFan().
    - - Fan does not run
      - Check separate fan supply, relay rating, and load wiring.
    improvements: &id002
    - Add capacitive soil moisture monitoring.
    - Add minimum fan runtime.
    - Log readings to an MQTT dashboard.
    code: "// ESP32 low-voltage greenhouse controller demo\n// DHT22 air readings control a relay with hysteresis.\n#include\
      \ <Wire.h>\n#include <Adafruit_SSD1306.h>\n#include <DHT.h>\n\nconst int DHT_PIN = 4;\nconst int FAN_RELAY = 26;\nconst\
      \ float TEMP_ON_C = 30.0;\nconst float TEMP_OFF_C = 28.0;\nconst float HUM_ON_PERCENT = 85.0;\nconst float HUM_OFF_PERCENT\
      \ = 78.0;\n\nDHT dht(DHT_PIN, DHT22);\nAdafruit_SSD1306 oled(128, 64, &Wire, -1);\n\nbool fanOn = false;\nunsigned long\
      \ lastReadMs = 0;\n\nvoid setFan(bool on) {\n  fanOn = on;\n  digitalWrite(FAN_RELAY, fanOn ? LOW : HIGH); // common\
      \ active-LOW relay module\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n  dht.begin();\n  oled.begin(SSD1306_SWITCHCAPVCC,\
      \ 0x3C);\n  oled.setTextColor(WHITE);\n  pinMode(FAN_RELAY, OUTPUT);\n  setFan(false);\n  Serial.println(\"Greenhouse\
      \ controller ready. Low-voltage loads only.\");\n}\n\nvoid loop() {\n  if (millis() - lastReadMs < 2500) return;\n \
      \ lastReadMs = millis();\n\n  float tempC = dht.readTemperature();\n  float humidity = dht.readHumidity();\n  if (isnan(tempC)\
      \ || isnan(humidity)) {\n    setFan(false);\n    Serial.println(\"DHT22 read failed. Fan set off until readings recover.\"\
      );\n    return;\n  }\n\n  if (!fanOn && (tempC >= TEMP_ON_C || humidity >= HUM_ON_PERCENT)) {\n    setFan(true);\n \
      \ } else if (fanOn && tempC <= TEMP_OFF_C && humidity <= HUM_OFF_PERCENT) {\n    setFan(false);\n  }\n\n  Serial.printf(\"\
      Temp %.1f C  Hum %.1f %%  Fan %s\\n\", tempC, humidity, fanOn ? \"ON\" : \"off\");\n\n  oled.clearDisplay();\n  oled.setTextSize(1);\n\
      \  oled.setCursor(0, 0);\n  oled.printf(\"Temp: %.1f C\\n\", tempC);\n  oled.printf(\"Hum:  %.1f %%\\n\", humidity);\n\
      \  oled.printf(\"Fan:  %s\\n\", fanOn ? \"ON\" : \"off\");\n  oled.println(\"Hysteresis enabled\");\n  oled.display();\n\
      }\n"
    code_filename: esp32-greenhouse-automation-controller-beginner.ino
