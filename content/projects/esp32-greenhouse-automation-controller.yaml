slug: esp32-greenhouse-automation-controller
title: ESP32 Greenhouse Automation Controller
category: Agriculture
description: Automate a greenhouse or grow tent with the ESP32 by monitoring temperature, humidity, and
  CO2, then controlling exhaust fans, grow lights, and nutrient pumps on schedule and threshold. Scale
  from a simple climate relay to a full PID-controlled CO2 enrichment system with MQTT integration.
meta_description: Build an ESP32 greenhouse automation controller managing temperature, humidity, CO2
  enrichment, grow lights, and ventilation fans from a unified web dashboard.
