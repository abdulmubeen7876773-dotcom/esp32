  wiring:
    illustration_alt: Build a Low-Voltage Greenhouse Vent Controller wiring diagram
    summary: DHT22 DATA is GPIO4. Relay IN is GPIO26. OLED shares I2C GPIO21/GPIO22. Fan power is switched by the relay, not
      by ESP32 GPIO.
    steps:
    - Unplug USB and fan supply before wiring.
    - Connect DHT22 VCC to 3.3 V, GND to GND, and DATA to GPIO4 with pull-up if needed.
    - Connect relay VCC/GND as required by the relay module and relay IN to GPIO26.
    - Connect OLED SDA to GPIO21 and SCL to GPIO22.
    - Wire only a low-voltage fan/load through the relay contacts.
    - Keep the electronics dry and separated from plant trays.
  gpio_map:
  - signal: DHT22 DATA
    esp32_pin: GPIO4
    direction: Input
    notes: Use pull-up if using a bare sensor.
  - signal: Relay IN
    esp32_pin: GPIO26
    direction: Output
    notes: Assumes common active-LOW module.
  - signal: OLED SDA
    esp32_pin: GPIO21
    direction: I2C data
    notes: Optional status display.
  - signal: OLED SCL
    esp32_pin: GPIO22
    direction: I2C clock
    notes: Optional status display.
  circuit_explanation: The ESP32 reads DHT22 data and drives the relay input. The relay switches external low-voltage fan
