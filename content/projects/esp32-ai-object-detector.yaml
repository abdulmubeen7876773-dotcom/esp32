levels:
  beginner:
    level: beginner
    overview_html: <p>A local ESP32-CAM color-object presence demo that scans RGB565 frames and lights the onboard
      LED when enough orange pixels are present. Do not use this for surveillance, safety decisions, or reliable
      person detection. Ask permission before using cameras around people.</p>
    components:
    - ESP32-CAM AI-Thinker board with OV2640
    - FTDI USB-to-serial adapter
    - Jumper wires
    wiring:
    - - OV2640 camera bus
      - AI-Thinker fixed camera pins
      - Do not remap unless using another board profile.
    - - FTDI UART
      - GPIO3 / GPIO1
      - Programming serial only.
    - - Onboard LED
      - GPIO33
      - Detection indicator; active level varies by board.
    key_concepts:
    - The OV2640 is already wired to fixed ESP32-CAM pins. The sketch captures RGB565 frames and counts pixels in
      a color range.
    - This is color thresholding, not bounding-box object detection. It is sensitive to lighting, camera angle,
      background colors, and exposure.
    applications: &id003
    - Image processing lesson
    - Camera threshold experiment
    - AI limitations discussion
    troubleshooting:
    - - Camera init failed
      - Check AI-Thinker board selection, stable 5 V power, and ribbon cable.
    - - Always detected
      - Raise the threshold or reduce matching background colors.
    - - Never detected
      - Improve lighting or adjust RGB threshold values.
    improvements: &id002
    - Show fraction on a local web page.
    - Add a bounding box only after implementing real localization.
    - Port a real model to ESP32-S3 with documented assets.
    code: "// ESP32-CAM color object presence demo\n// This is image processing, not machine-learning object detection.\n\
      #include \"esp_camera.h\"\n\n#define PWDN_GPIO 32\n#define RESET_GPIO -1\n#define XCLK_GPIO 0\n#define SIOD_GPIO\
      \ 26\n#define SIOC_GPIO 27\n#define Y9_GPIO 35\n#define Y8_GPIO 34\n#define Y7_GPIO 39\n#define Y6_GPIO 36\n\
      #define Y5_GPIO 21\n#define Y4_GPIO 19\n#define Y3_GPIO 18\n#define Y2_GPIO 5\n#define VSYNC_GPIO 25\n#define\
      \ HREF_GPIO 23\n#define PCLK_GPIO 22\n\nconst int LED_PIN = 33;\nconst float DETECT_THRESHOLD = 0.05;\n\n\
      bool setupCamera() {\n  camera_config_t config;\n  config.ledc_channel = LEDC_CHANNEL_0;\n  config.ledc_timer\
      \ = LEDC_TIMER_0;\n  config.pin_d0 = Y2_GPIO; config.pin_d1 = Y3_GPIO; config.pin_d2 = Y4_GPIO; config.pin_d3\
      \ = Y5_GPIO;\n  config.pin_d4 = Y6_GPIO; config.pin_d5 = Y7_GPIO; config.pin_d6 = Y8_GPIO; config.pin_d7 =\
      \ Y9_GPIO;\n  config.pin_xclk = XCLK_GPIO; config.pin_pclk = PCLK_GPIO; config.pin_vsync = VSYNC_GPIO; config.pin_href\
      \ = HREF_GPIO;\n  config.pin_sscb_sda = SIOD_GPIO; config.pin_sscb_scl = SIOC_GPIO;\n  config.pin_pwdn = PWDN_GPIO;\
      \ config.pin_reset = RESET_GPIO;\n  config.xclk_freq_hz = 20000000;\n  config.pixel_format = PIXFORMAT_RGB565;\n\
      \  config.frame_size = FRAMESIZE_QQVGA;\n  config.jpeg_quality = 12;\n  config.fb_count = 1;\n  return esp_camera_init(&config)\
      \ == ESP_OK;\n}\n\nfloat orangeFraction(camera_fb_t *fb) {\n  uint16_t *pixels = (uint16_t *)fb->buf;\n  size_t\
      \ total = fb->width * fb->height;\n  size_t matches = 0;\n  for (size_t i = 0; i < total; i++) {\n    uint16_t\
      \ px = pixels[i];\n    int r = (px >> 11) & 0x1F;\n    int g = (px >> 5) & 0x3F;\n    int b = px & 0x1F;\n\
      \    if (r > 18 && g > 18 && g < 50 && b < 14) matches++;\n  }\n  return (float)matches / (float)total;\n\
      }\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(LED_PIN, OUTPUT);\n  if (!setupCamera()) {\n    Serial.println(\"\
      Camera init failed\");\n    while (true) delay(1000);\n  }\n  Serial.println(\"Color object presence demo\
      \ ready.\");\n}\n\nvoid loop() {\n  camera_fb_t *fb = esp_camera_fb_get();\n  if (!fb) {\n    Serial.println(\"\
      Capture failed\");\n    delay(1000);\n    return;\n  }\n  float fraction = orangeFraction(fb);\n  esp_camera_fb_return(fb);\n\
      \  bool detected = fraction > DETECT_THRESHOLD;\n  digitalWrite(LED_PIN, detected ? LOW : HIGH); // AI-Thinker\
      \ flash LED is often active LOW\n  Serial.printf(\"orange_fraction=%.3f detected=%s\\n\", fraction, detected\
      \ ? \"YES\" : \"no\");\n  delay(1000);\n}\n"
    code_filename: esp32-ai-object-detector-beginner.ino
