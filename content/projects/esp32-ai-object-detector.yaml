slug: esp32-ai-object-detector
title: ESP32 AI Object Detector
category: AI Projects
description: Run machine learning inference directly on the ESP32 to detect objects in a live camera feed.
  Start with simple colour-based detection, progress to TensorFlow Lite Micro person detection, and finish
  with a multi-class detector publishing JSON alerts to MQTT.
meta_description: Build an ESP32-CAM AI object detector using TensorFlow Lite Micro. From colour blob
  detection to on-device MobileNet person detection and multi-class MQTT alerts.
