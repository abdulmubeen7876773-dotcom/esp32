  story: 'The slug says AI object detector, but this repository evidence supports a color-image-processing starter.
    The page names the boundary honestly. The Golden version keeps the implementation narrow and testable: code
    constants, wiring, GPIO notes, expected output, limitations, and troubleshooting all describe the same educational
    prototype.'
  eli12: The camera picture is made of tiny color dots. The ESP32 counts dots that look orange and decides whether
    enough of them are present. The ESP32 reads a signal, checks it against a simple rule, and prints or changes
    an output so you can see what happened.
  parent_safety: Do not use this for surveillance, safety decisions, or reliable person detection. Ask permission
    before using cameras around people. Unplug USB and external power before rewiring. Stop if hardware becomes
    hot, uncomfortable, unstable, or unclear.
