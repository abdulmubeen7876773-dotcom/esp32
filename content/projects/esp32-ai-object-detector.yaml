  code_explanation: The sketch initializes the AI-Thinker pin map, captures QQVGA RGB565 frames, counts orange-like
    pixels, and compares the fraction with 0.05.
  expected_output: Serial Monitor prints orange_fraction and detected state once per second. The indicator changes
    when the colored target fills enough of the frame.
  common_mistakes:
  - text: Calling color thresholding a trained AI model.
  - text: Leaving IO0 connected after upload.
  - text: Using weak power for ESP32-CAM.
  - text: Testing with private scenes or people without consent.
  troubleshooting:
  - problem: Camera init failed
    fix: Check AI-Thinker board selection, stable 5 V power, and ribbon cable.
  - problem: Always detected
    fix: Raise the threshold or reduce matching background colors.
  - problem: Never detected
    fix: Improve lighting or adjust RGB threshold values.
  testing_checklist:
  - Upload with IO0 grounded, then remove IO0 jumper.
  - Point at a neutral background and record baseline fraction.
  - Move an orange card into frame.
  - Change threshold and repeat.
  engineer_tips:
  - Use controlled lighting.
  - Use QQVGA for memory headroom.
  - Do not claim detection classes without a model.
