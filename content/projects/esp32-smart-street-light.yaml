    code: "// ESP32 Street Light for Urban Node\nconst int SENSOR_PIN = 33;\nconst int OUTPUT_PIN = 25;\n\
      const int THRESHOLD = 1812;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: street\
      \ light for urban node\");\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\n\
      void loop() {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"Ldr Sensor signal: \");\n\
      \  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN, active\
      \ ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
