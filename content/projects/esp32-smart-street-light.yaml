  mission_title: Build a Smart Street Light
  difficulty: Beginner
  age: Ages 12+
  estimated_time: 70-100 min
  budget: Under 30 USD
  what_you_build: A light-sensing ESP32 controller that turns a lamp output on at night and can use motion sensing
    to brighten only when movement is detected.
  story: 'ESP32 Smart Street Light solves a real beginner problem: turning an ESP32 reading into a useful physical
    or networked result. Build this to learn LDR analog sensing, relay/driver control, hysteresis, and smart-city
    style automation.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code,
    then test the output under real conditions.'
  eli12: The LDR is the project eye. In daylight it tells the ESP32 the area is bright; after sunset the number
    changes and the code decides the street light should turn on.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug
    power before rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32
    unless a proper driver, enclosure, and adult supervision are used.
  learning_objectives:
  - Read an LDR voltage divider with ESP32 analog input.
  - Use a threshold and hysteresis for stable day/night control.
  - Drive a relay or transistor-controlled lamp output safely.
  - Understand why sensor placement matters outdoors.
  - Add motion-based brightness logic as an upgrade.
