  circuit_explanation: An LDR forms a voltage divider so changing light becomes changing voltage. The ESP32 reads
    that voltage on an ADC pin. A relay or driver pin controls the lamp side, but actual lamps need a properly rated
    isolated module and safe enclosure.
  engineering_explanation: Outdoor lighting controllers need hysteresis because light changes gradually at sunrise
    and sunset. Without hysteresis the output may chatter around the threshold. Professional systems also separate
    sensor placement from lamp glare so the light does not fool its own sensor.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-smart-street-light.ino
    content: "// ESP32 Street Light for Urban Node\nconst int SENSOR_PIN = 33;\nconst int OUTPUT_PIN = 25;\nconst\
      \ int THRESHOLD = 1812;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(OUTPUT_PIN,\
      \ OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: street light for urban node\");\n\
      \  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n\
      \  Serial.print(\"Ldr Sensor signal: \");\n  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n\
      \  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output
    pins in setup(), then repeats the measurement and decision logic in loop(). The loop prints the live reading
    first, compares it with a threshold, then changes the output. Printing before controlling the output makes debugging
    much easier because you can see what the ESP32 believes is happening.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when
    the tested condition for esp32 smart street light is reached.
  common_mistakes:
  - text: Pointing the LDR at the lamp it controls.
  - text: Switching a mains light on a breadboard.
  - text: Skipping hysteresis and creating relay chatter.
  - text: Powering a relay coil from a GPIO pin.
  - text: Using ADC2 pins while Wi-Fi is active.
  troubleshooting:
  - problem: Light turns on and off repeatedly
    fix: Add hysteresis and move the LDR away from the lamp beam.
  - problem: Relay does not click
    fix: Use a relay module with proper VCC, GND, IN wiring and common ground.
  - problem: Analog reading is stuck
    fix: 'Check the voltage divider: the LDR and fixed resistor must not both go to the same rail.'
  - problem: Motion sensor retriggers oddly
    fix: Give PIR modules warm-up time and avoid pointing them at heat sources.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use an LDR divider with a known resistor such as 10 kOhm.
  - Keep high-voltage lamp wiring out of breadboards.
  - Add hysteresis before adding Wi-Fi.
  - Test the LDR reading with a flashlight and by covering it with your hand.
  - Use a MOSFET for low-voltage LED strips and a relay only when isolation is needed.
  performance_tips:
  - Sample light every few seconds; daylight does not change millisecond by millisecond.
  - Use deep sleep for solar prototypes.
  - Dim LEDs with PWM instead of hard switching when using low-voltage lighting.
  - Publish only state changes to save network traffic.
