      \      <p>Designed for Parking Sensor: ESP32 watches Ldr Sensor signal and activates Street Light\
      \ Relay control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n\
      \        <li>Ldr Sensor signal connects to GPIO33 (ADC input)</li><li>Threshold is set to 1605 in\
