  faqs:
  - question: Why does the light turn on and off repeatedly?
    answer: Relay chatter usually means the LDR reading is near the threshold or the lamp is shining back onto the
      sensor. Add hysteresis and point the LDR away from the controlled light.
  - question: Can I switch a household street light with this breadboard build?
    answer: No. This tutorial is a low-voltage learning build only. Do not connect mains-powered lamps or outdoor
      wiring to a breadboard relay circuit.
  - question: Why is the analog reading stuck?
    answer: Check the LDR module power, ground, signal wire, and GPIO33 connection before changing thresholds in the
      sketch.
