  what_you_build: A low-voltage water leak alarm that detects moisture on a sensor strip, sounds a buzzer, and can later send
    alerts over Wi-Fi.
  story: 'ESP32 Water Leak Detector solves a real beginner problem: turning an ESP32 reading into a useful physical or networked
    result. Build this to learn practical threshold sensing, corrosion limits, and how a small ESP32 circuit can prevent real
    damage.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code, then test
    the output under real conditions.'
  eli12: The water sensor is like two metal rails on the floor. Dry rails are mostly disconnected. Water bridges them, current
    can pass through the module, and the ESP32 sees the change.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug power before
    rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32 unless a proper driver,
    enclosure, and adult supervision are used.
  learning_objectives:
  - Detect water using analog and digital sensor outputs.
  - Understand why resistive water probes corrode over time.
  - Create a safe local buzzer/LED alarm.
  - Choose sensor placement for real leaks.
  - Prepare the project for future Wi-Fi alerts.
