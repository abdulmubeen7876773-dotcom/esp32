  circuit_explanation: The water strip exposes conductive traces. When water touches the traces, resistance changes and the
    module output changes. The ESP32 can read the analog output for wetness level or digital output for simple leak/no-leak
    detection. LEDs and buzzer provide immediate local feedback.
  engineering_explanation: Water detection is simple electrically but tricky in real installations. Minerals in water, corrosion,
    condensation, sensor placement, and cable length affect reliability. A good detector powers the sensor only while reading,
    tests both wet and dry states, and places the probe where water appears first.
