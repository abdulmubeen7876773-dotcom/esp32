  code:
    filename: esp32-water-leak-detector.ino
    content: "// ESP32 Water Leak Detector - Beginner\n// Resistive moisture sensor; buzzer + LED alert\n\nconst int SENSOR_AOUT\
      \ = 34;\nconst int SENSOR_DOUT = 35;\nconst int BUZZER  = 25;\nconst int LED_RED = 26;\nconst int LED_GRN = 27;\n\n\
      const int WET_THRESHOLD = 2000; // tune from Serial output; 0-4095\n\nvoid setup() {\n  Serial.begin(115200);\n  analogReadResolution(12);\n\
      \  pinMode(SENSOR_DOUT, INPUT);\n  pinMode(BUZZER,  OUTPUT);\n  pinMode(LED_RED, OUTPUT);\n  pinMode(LED_GRN, OUTPUT);\n\
      }\n\nvoid loop() {\n  int raw = analogRead(SENSOR_AOUT);\n  bool wet = (raw > WET_THRESHOLD) || (digitalRead(SENSOR_DOUT)\
      \ == HIGH);\n\n  Serial.printf(\"Sensor: %d  Status: %sn\", raw, wet ? \"WET!\" : \"dry\");\n\n  if (wet) {\n    digitalWrite(LED_RED,\
      \ HIGH);\n    digitalWrite(LED_GRN, LOW);\n    digitalWrite(BUZZER,  HIGH);\n  } else {\n    digitalWrite(LED_RED, LOW);\n\
      \    digitalWrite(LED_GRN, HIGH);\n    digitalWrite(BUZZER,  LOW);\n  }\n  delay(1000);\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output pins in
    setup(), then repeats the measurement and decision logic in loop(). The loop prints the live reading first, compares it
    with a threshold, then changes the output. Printing before controlling the output makes debugging much easier because
    you can see what the ESP32 believes is happening.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when the tested
    condition for esp32 water leak detector is reached.
  common_mistakes:
  - text: Leaving a resistive water sensor powered continuously for months.
  - text: Placing the sensor where water reaches it too late.
  - text: Using the buzzer before proving the sensor reading works.
  - text: Ignoring corrosion after repeated wet tests.
  - text: Forgetting to dry the sensor completely before retesting.
  troubleshooting:
  - problem: Alarm always stays on
    fix: Dry the sensor, check for residue between traces, and print raw readings before threshold logic.
  - problem: Alarm never triggers
    fix: Touch the traces with a damp cloth and verify VCC, GND, and signal wiring.
  - problem: False alarms happen overnight
    fix: Move the sensor away from condensation sources or raise the threshold after logging dry readings.
  - problem: Buzzer is weak
    fix: Use an active buzzer module and check whether it needs 5 V or a transistor driver.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Power the sensor only during measurement to reduce electrolysis.
  - Keep the ESP32 board away from the wet area.
  - Use a drip loop in cables so water cannot run toward electronics.
  - Test with a damp cloth, not a cup of water near the board.
  - Use a plastic enclosure for permanent monitoring.
  performance_tips:
  - Sleep between checks for battery operation.
  - Use digital output for simple alarms and analog output for wetness trend.
  - Require two wet readings before sounding the alarm.
  - Send network alerts only when the state changes.
