  what_you_build: An ESP32-CAM project that captures images from the OV2640 camera and serves or stores them for inspection,
    timelapse, or simple monitoring.
  story: 'ESP32 Camera Capture Server solves a real beginner problem: turning an ESP32 reading into a useful physical or networked
    result. Build this when you are ready to combine camera hardware, Wi-Fi, memory limits, and power stability in one project.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code, then test
    the output under real conditions.'
  eli12: The ESP32-CAM is a tiny digital camera with a web window. The camera captures a frame, the ESP32 compresses or buffers
    it, and the browser asks for the latest picture.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug power before
    rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32 unless a proper driver,
    enclosure, and adult supervision are used.
  learning_objectives:
  - Program an ESP32-CAM safely with an FTDI adapter.
  - Understand boot mode using IO0.
  - Capture a camera frame and serve or store it.
  - Recognize power-related camera failures.
  - Tune resolution and JPEG quality for reliability.
