  circuit_explanation: The ESP32-CAM board already connects the OV2640 camera to the ESP32 internally. Programming usually
    uses an FTDI adapter. Stable 5 V power is important because camera capture and Wi-Fi transmit peaks can reset weak supplies.
    IO0 is grounded only for flashing and released for normal boot.
  engineering_explanation: Camera projects are memory and power sensitive. Resolution, JPEG quality, PSRAM availability, Wi-Fi
    signal, and SD card writes all affect reliability. Start with low resolution, confirm capture works, then increase quality
    one step at a time.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-camera-capture-server.ino
    content: "#include \"esp_camera.h\"\n#include <WiFi.h>\n#include <WebServer.h>\n\nconst char* WIFI_SSID = \"YOUR_SSID\";\nconst char* WIFI_PASS = \"YOUR_PASSWORD\";\nWebServer server(80);\n\n#define PWDN_GPIO_NUM 32\n#define RESET_GPIO_NUM -1\n#define XCLK_GPIO_NUM 0\n#define SIOD_GPIO_NUM 26\n#define SIOC_GPIO_NUM 27\n#define Y9_GPIO_NUM 35\n#define Y8_GPIO_NUM 34\n#define Y7_GPIO_NUM 39\n#define Y6_GPIO_NUM 36\n#define Y5_GPIO_NUM 21\n#define Y4_GPIO_NUM 19\n#define Y3_GPIO_NUM 18\n#define Y2_GPIO_NUM 5\n#define VSYNC_GPIO_NUM 25\n#define HREF_GPIO_NUM 23\n#define PCLK_GPIO_NUM 22\n\nvoid handleCapture() {\n  camera_fb_t* fb = esp_camera_fb_get();\n  if (!fb) {\n    server.send(500, \"text/plain\", \"Camera capture failed\");\n    return;\n  }\n  server.send_P(200, \"image/jpeg\", (const char*)fb->buf, fb->len);\n  esp_camera_fb_return(fb);\n}\n\nvoid setupCamera() {\n  camera_config_t config;\n  config.ledc_channel = LEDC_CHANNEL_0;\n  config.ledc_timer = LEDC_TIMER_0;\n  config.pin_d0 = Y2_GPIO_NUM;\n  config.pin_d1 = Y3_GPIO_NUM;\n  config.pin_d2 = Y4_GPIO_NUM;\n  config.pin_d3 = Y5_GPIO_NUM;\n  config.pin_d4 = Y6_GPIO_NUM;\n  config.pin_d5 = Y7_GPIO_NUM;\n  config.pin_d6 = Y8_GPIO_NUM;\n  config.pin_d7 = Y9_GPIO_NUM;\n  config.pin_xclk = XCLK_GPIO_NUM;\n  config.pin_pclk = PCLK_GPIO_NUM;\n  config.pin_vsync = VSYNC_GPIO_NUM;\n  config.pin_href = HREF_GPIO_NUM;\n  config.pin_sscb_sda = SIOD_GPIO_NUM;\n  config.pin_sscb_scl = SIOC_GPIO_NUM;\n  config.pin_pwdn = PWDN_GPIO_NUM;\n  config.pin_reset = RESET_GPIO_NUM;\n  config.xclk_freq_hz = 20000000;\n  config.pixel_format = PIXFORMAT_JPEG;\n  config.frame_size = FRAMESIZE_QVGA;\n  config.jpeg_quality = 12;\n  config.fb_count = 1;\n\n  esp_err_t err = esp_camera_init(&config);\n  if (err != ESP_OK) {\n    Serial.printf(\"Camera init failed: 0x%x\\n\", err);\n    while (true) delay(1000);\n  }\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  setupCamera();\n  WiFi.begin(WIFI_SSID, WIFI_PASS);\n  while (WiFi.status() != WL_CONNECTED) delay(300);\n  server.on(\"/capture\", HTTP_GET, handleCapture);\n  server.begin();\n  Serial.print(\"Open http://\");\n  Serial.print(WiFi.localIP());\n  Serial.println(\"/capture\");\n}\n\nvoid loop() {\n  server.handleClient();\n}"
  code_explanation: 'The sketch starts Serial Monitor, defines readable pin constants, configures input and output pins in
    setup(), then repeats the measurement and decision logic in loop(). Camera setup selects the correct ESP32-CAM pin map,
    initializes the OV2640, then captures frames. Keep the first test simple: prove the camera initializes before adding storage,
    scanning, or network actions.'
  expected_output: Serial Monitor should print the ESP32-CAM IP address. Opening /capture in a browser on the same network
    should return a JPEG snapshot from the OV2640 camera.
  common_mistakes:
  - text: Leaving IO0 connected to GND after upload.
  - text: Powering ESP32-CAM from a weak USB serial adapter.
  - text: Selecting the wrong camera model in code.
  - text: Using high resolution before confirming basic capture.
  - text: Touching the camera ribbon cable while powered.
  troubleshooting:
  - problem: Camera init failed
    fix: Check camera model, ribbon cable seating, and use a stable 5 V supply.
  - problem: Brownout reset appears
    fix: Use a better 5 V supply and shorter power wires.
  - problem: Web page loads but image is blank
    fix: Lower resolution and confirm PSRAM availability.
  - problem: Upload works but board will not run
    fix: Remove IO0 from GND and press reset after flashing.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Upload with IO0 connected to GND, then remove the jumper for normal boot.
  - Confirm Serial Monitor prints the local IP address.
  - Open the /capture URL and verify a JPEG image appears.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Start with the official CameraWebServer example.
  - Use 5 V power with enough current headroom.
  - Avoid high frame rate expectations; ESP32-CAM is not a full CCTV system.
  - Keep camera ribbon cable fully seated and locked.
  - Test on a local network before exposing anything outside your LAN.
  performance_tips:
  - Use lower resolution for faster capture.
  - Reduce JPEG quality number carefully; smaller files use less network time.
  - Store images only when motion or a timer requires it.
  - Keep Wi-Fi signal strong to reduce failed transfers.
