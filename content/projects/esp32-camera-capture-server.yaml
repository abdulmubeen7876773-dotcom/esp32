    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Motion Capture: ESP32 watches Camera Module signal and activates Microsd\
      \ Card control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n \
      \       <li>Camera Module signal connects to GPIO4 (ADC input)</li><li>Threshold is set to 1606\
      \ in firmware (adjust after calibration)</li><li>Microsd Card control is driven on GPIO2 when the\
      \ condition is met</li><li>The main loop samples every 300 ms while powered</li>\n      </ul>\n\
      \      </section>"
