    code: "// ESP32 Camera Capture for Timelapse Cam\nconst int SENSOR_PIN = 4;\nconst int OUTPUT_PIN = 2;\nconst int THRESHOLD\
      \ = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(OUTPUT_PIN, OUTPUT);\n\
      \  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: camera capture for timelapse cam\");\n  Serial.print(\"\
      Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"\
      Camera Module signal: \");\n  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN,\
      \ active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
