  advanced:
    level: advanced
    overview_html: <p>The advanced build sends a Telegram bot notification with delivery time, mailbox
      temperature, and a snapshot from a small camera module when the lid opens. The mailbox unit wakes
      from deep sleep, connects to Wi-Fi, takes a photo, sends the Telegram message with photo attachment
      via the Bot API, logs the event to an NTP-timestamped NVS record, and returns to deep sleep within
      10 seconds to preserve battery life.</p>
    components:
    - 1× ESP32-CAM module — Camera + ESP32 combo for mailbox unit
    - 1× Magnetic reed switch
    - 1× DS18B20 temperature sensor — Inside mailbox ambient temperature
    - 1× 18650 cell + TP4056 + boost converter — Battery power supply
    - 1× Telegram bot token — Create via BotFather on Telegram
    - 1× Chat ID — Your Telegram account chat ID
    wiring:
    - - Reed switch
      - GPIO 13 (ESP32-CAM)
      - EXT0 deep sleep wakeup pin
    - - DS18B20 DATA
      - GPIO 3 (U0RXD)
      - Only available when not using Serial; use GPIO 12 if possible
    - - Camera
      - Built-in on ESP32-CAM
      - OV2640 camera module
    how:
    - 'Wake-and-Burst Operation: The ESP32-CAM wakes from deep sleep in approximately 1 second. It then
      connects to Wi-Fi (3-5 seconds), captures a photo, sends it to Telegram (2-4 seconds), logs to NVS,
      and returns to deep sleep. The entire wakeup cycle completes in under 10 seconds and consumes approximately
      0.2 mAh per delivery event.'
    - 'Telegram Bot API Photo Upload: The Telegram sendPhoto endpoint accepts a multipart/form-data HTTP
      POST over HTTPS. The photo JPEG is sent as one part of the multipart body alongside the chat_id
      and caption fields. WiFiClientSecure handles TLS without certificate verification (setInsecure())
      for simplicity.'
    - 'Camera Autoexposure Settle Time: The OV2640 camera takes 100-500 ms after initialisation to complete
      automatic exposure adjustment. A 300 ms delay before calling esp_camera_fb_get() ensures the first
      captured frame is not underexposed. In dark mailboxes, add an LED flash GPIO to illuminate the interior
      before capture.'
    - 'NVS Delivery Log: Each delivery event is stored in NVS as a Unix timestamp keyed by the delivery
      count. This log can be read on the next wakeup and formatted as a delivery history page if a web
      server is included. NVS survives deep sleep, power cycling, and firmware updates (if NVS partition
      is not erased).'
    apps:
    - Smart home mailbox with photo proof of delivery
    - Pharmacy prescription delivery notification service
    - Office mail room automated delivery logging
    - Rural property parcel delivery alert with date-stamped photos
    troubleshooting:
    - - Telegram bot does not receive messages
      - 'Verify BOT_TOKEN and CHAT_ID are correct. The CHAT_ID is a numeric ID (not the bot username).
        Send a message to your bot first, then call the getUpdates API endpoint to find your chat ID.
        Ensure the ESP32-CAM has DNS resolution; if it cannot resolve api.telegram.org, add Google DNS:
        WiFi.config(INADDR_NONE,INADDR_NONE,INADDR_NONE,(IPAddress)8,8,8,8).'
    - - Photo is completely black
      - The mailbox interior is dark when the lid is closed. Add a small LED (GPIO controlled) that turns
        on immediately after wakeup and off after the photo is taken. Alternatively use a larger frame
        size and increase JPEG quality to compensate for low-light noise.
    - - Battery drains in days instead of months
      - Measure current in deep sleep with a multimeter in series. The ESP32-CAM has an onboard LED and
        voltage regulator that can draw 1-5 mA even in sleep. Disable the onboard red LED by writing HIGH
        to GPIO 33 before sleep, and verify the power supply is not powering unnecessary peripherals.
    upgrades:
    - Add OCR via Telegram API to extract sender name from the photo and include it in the notification
    - Add a weight sensor to estimate whether the delivery was a letter (under 50 g) or a parcel (above
      50 g)
    - Add a second reed switch for the collection slot to alert when mail has been collected
    - Add a solar panel to recharge the battery and enable indefinite outdoor deployment
    code: "// ESP32 Smart Mailbox - Advanced (ESP32-CAM + Telegram photo alert)\n#include <WiFi.h>\n#include\
      \ <esp_camera.h>\n#include <OneWire.h>\n#include <DallasTemperature.h>\n#include <HTTPClient.h>\n\
      #include <Preferences.h>\n#include <time.h>\n\nOneWire ow(12); DallasTemperature ds(&ow);\nPreferences\
      \ prefs;\n\nconst char* SSID=\"YourSSID\", *PASS=\"YourPass\";\nconst char* BOT_TOKEN=\"YOUR_BOT_TOKEN\"\
      ;\nconst char* CHAT_ID=\"YOUR_CHAT_ID\";\n\nRTC_DATA_ATTR uint32_t mailCount=0;\n\n// AI-Thinker\
      \ ESP32-CAM pin map\ncamera_config_t camCfg(){\n  camera_config_t c={};\n  c.ledc_channel=LEDC_CHANNEL_0;\
      \ c.ledc_timer=LEDC_TIMER_0;\n  c.pin_d0=5;c.pin_d1=18;c.pin_d2=19;c.pin_d3=21;\n  c.pin_d4=36;c.pin_d5=39;c.pin_d6=34;c.pin_d7=35;\n\
      \  c.pin_xclk=0;c.pin_pclk=22;c.pin_vsync=25;c.pin_href=23;\n  c.pin_sscb_sda=26;c.pin_sscb_scl=27;c.pin_reset=-1;c.pin_pwdn=32;\n\
      \  c.xclk_freq_hz=20000000;c.pixel_format=PIXFORMAT_JPEG;\n  c.frame_size=FRAMESIZE_QVGA; c.jpeg_quality=12;\
      \ c.fb_count=1;\n  return c;\n}\n\nvoid sendTelegramPhoto(camera_fb_t *fb, float temp){\n  WiFiClientSecure\
      \ client; client.setInsecure();\n  String boundary=\"----ESP32Boundary\";\n  String head=\"--\"\
      +boundary+\"rnContent-Disposition: form-data; name=\"chat_id\"rnrn\"\n              +String(CHAT_ID)+\"\
      rn\"\n              \"--\"+boundary+\"rnContent-Disposition: form-data; name=\"caption\"rnrn\"\n\
      \              \"Mail delivery! Count: \"+String(mailCount)+\" Temp: \"+String(temp,1)+\"Crn\"\n\
      \              \"--\"+boundary+\"rnContent-Disposition: form-data; name=\"photo\"; filename=\"mail.jpg\"\
      rn\"\n              \"Content-Type: image/jpegrnrn\";\n  String tail=\"rn--\"+boundary+\"--rn\"\
      ;\n  int totalLen=head.length()+fb->len+tail.length();\n  if(!client.connect(\"api.telegram.org\"\
      ,443)) return;\n  client.printf(\"POST /bot%s/sendPhoto HTTP/1.1rn\"\n    \"Host: api.telegram.orgrn\"\
      \n    \"Content-Type: multipart/form-data; boundary=%srn\"\n    \"Content-Length: %drnrn\",BOT_TOKEN,boundary.c_str(),totalLen);\n\
      \  client.print(head);\n  client.write(fb->buf,fb->len);\n  client.print(tail);\n  delay(2000);\n\
      \  client.stop();\n}\n\nvoid setup(){\n  Serial.begin(115200);\n  if(esp_sleep_get_wakeup_cause()==ESP_SLEEP_WAKEUP_EXT0){\n\
      \    mailCount++;\n    WiFi.begin(SSID,PASS);\n    int tries=0;\n    while(WiFi.status()!=WL_CONNECTED&&tries++<20)\
      \ delay(500);\n    if(WiFi.status()==WL_CONNECTED){\n      configTime(0,0,\"pool.ntp.org\");\n \
      \     ds.begin(); ds.requestTemperatures();\n      float temp=ds.getTempCByIndex(0);\n      camera_config_t\
      \ c=camCfg();\n      esp_camera_init(&c);\n      delay(300); // let auto-exposure settle\n     \
      \ camera_fb_t *fb=esp_camera_fb_get();\n      if(fb){ sendTelegramPhoto(fb,temp); esp_camera_fb_return(fb);\
      \ }\n      // Log to NVS\n      time_t now=time(nullptr);\n      prefs.begin(\"mail\",false);\n\
      \      prefs.putULong(String(mailCount).c_str(),(unsigned long)now);\n      prefs.end();\n    }\n\
      \    WiFi.disconnect(true);\n  }\n  esp_sleep_enable_ext0_wakeup(GPIO_NUM_13,0);\n  esp_deep_sleep_start();\n\
      }\nvoid loop(){}"
