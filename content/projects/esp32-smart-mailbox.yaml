levels:
  beginner:
    level: beginner
    overview_html: <p>In this beginner project you will attach a magnetic reed switch to the mailbox lid
      and connect it to the ESP32. When the lid opens (magnet moves away from the switch), the ESP32 wakes
      from light sleep, connects to Wi-Fi, sends an alert to the Serial Monitor, sounds a piezo buzzer
      inside the house, and goes back to light sleep. No cloud service required; this is a fully local
      alert system.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× Magnetic reed switch (normally open) — Mounts in mailbox lid frame
    - 1× Neodymium magnet (small) — Mounts on lid; closes reed switch when lid shut
    - 1× Passive piezo buzzer — Indoor alert; wire to ESP32
    - 1× 10 kohm resistor — Reed switch pull-down
    - 1× 18650 Li-Ion cell + holder — Or USB power bank
    - 1× Weatherproof project box — Protects ESP32 inside mailbox
    wiring:
    - - Reed switch terminal 1
      - GPIO 4
      - Also connect 10k pull-down to GND
    - - Reed switch terminal 2
      - 3.3 V
      - Switch pulls GPIO HIGH when closed (lid shut)
    - - Piezo buzzer +
      - GPIO 25
      - PWM tone output
    - - Piezo buzzer -
      - GND
      - ''
    - - Power supply
      - 5 V (Vin) or USB
      - 18650 via TP4056 charger + boost converter
    how:
    - 'Reed Switch Operation: The magnetic reed switch contains two ferromagnetic contacts inside a glass
      tube. When the magnet on the lid is close (lid shut), the contacts are pulled together (closed).
      When the lid opens and the magnet moves away, the spring contacts separate (open). This transition
      is the mail delivery event.'
    - 'GPIO Deep Sleep Wakeup: esp_sleep_enable_ext0_wakeup() configures the ESP32 to wake on a specific
      GPIO level. The reed switch closing and opening changes the GPIO level via the pull-down resistor.
      The ESP32 consumes under 10 uA in deep sleep, waking only when mail arrives.'
    - 'Wakeup Cause Detection: esp_sleep_get_wakeup_cause() returns ESP_SLEEP_WAKEUP_EXT0 if the wake
      was triggered by the GPIO. Any other cause (power-on, reset) returns a different value. This allows
      setup() to distinguish a mail event from initial power-on.'
    - 'Battery Life Calculation: In deep sleep the ESP32 draws approximately 10 uA. An 18650 cell at 2500
      mAh lasts 2500/0.01 = 250,000 hours (28 years) in sleep alone. In practice, each wakeup uses about
      80 mA for 2 seconds = 0.044 mAh. At 10 mail deliveries per day: 0.44 mAh/day battery life is many
      months.'
    apps:
    - Home mailbox mail delivery notification
    - Package delivery box tamper alert
    - Medicine cabinet opening monitor for elderly care
    - Gate or fence panel open alert system
    troubleshooting:
    - - ESP32 wakes up continuously even when lid is closed
      - 'The magnet is not close enough to the reed switch. Move the magnet within 5-10 mm of the reed
        switch when the lid is shut. Test with a multimeter: continuity should show closed when the magnet
        is adjacent.'
    - - No deep sleep wakeup on lid open
      - Verify the GPIO pull-down resistor is connected. Without it, the GPIO floats when the switch opens
        and may not reliably reach a LOW level. Also check that GPIO 4 is not used for another function
        that prevents EXT0 wakeup.
    - - Buzzer produces no sound
      - Confirm it is a passive buzzer (not active). Active buzzers sound at one fixed frequency and do
        not respond to PWM frequency changes. ledcSetup() requires a passive buzzer that responds to the
        2000 Hz square wave.
    - - Wakeup fires multiple times for one lid opening
      - Switch bounce can trigger multiple wakeups in rapid succession. Add a 100 nF capacitor across
        the reed switch terminals to debounce. In firmware, record the last wakeup time in RTC memory
        and ignore events within 5 seconds of the previous one.
    upgrades:
    - Add Wi-Fi and send a Telegram message with the date and time of each delivery
    - Add a small load cell to detect parcel weight (was it a letter or a package?)
    - Add an ESP-NOW transmitter to alert an indoor receiver unit without Wi-Fi
    - Add a photoresistor inside the mailbox to detect mail even if the lid was already open
    code: "// ESP32 Smart Mailbox - Beginner\n// Reed switch on GPIO 4; buzzer on GPIO 25\n// Uses GPIO\
      \ wakeup from deep sleep on lid open\n\nconst int REED_PIN = 4;\nconst int BUZZER   = 25;\n\nvoid\
      \ alertTone() {\n  ledcSetup(0, 2000, 8);\n  ledcAttachPin(BUZZER, 0);\n  for (int i = 0; i < 3;\
      \ i++) {\n    ledcWrite(0, 128); delay(200);\n    ledcWrite(0, 0);   delay(100);\n  }\n  ledcDetachPin(BUZZER);\n\
      }\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(REED_PIN, INPUT);\n\n  esp_sleep_wakeup_cause_t\
      \ cause = esp_sleep_get_wakeup_cause();\n  if (cause == ESP_SLEEP_WAKEUP_EXT0) {\n    Serial.println(\"\
      MAIL DELIVERED! Lid was opened.\");\n    alertTone();\n  } else {\n    Serial.println(\"Mailbox\
      \ monitor armed. Waiting for lid open...\");\n  }\n\n  // Wake when GPIO 4 goes LOW (lid opens;\
      \ reed switch opens; pull-down pulls LOW)\n  esp_sleep_enable_ext0_wakeup(GPIO_NUM_4, 0);\n  Serial.println(\"\
      Entering deep sleep.\");\n  Serial.flush();\n  esp_deep_sleep_start();\n}\n\nvoid loop() {} // Never\
      \ reached; deep sleep restarts setup()"
    code_filename: esp32-smart-mailbox-beginner.ino
  intermediate:
    level: intermediate
    overview_html: '<p>The intermediate build uses two ESP32s: one inside the mailbox (transmitter) that
      wakes on lid-open and sends an ESP-NOW packet, and one indoors (receiver) that picks up the packet
      and sounds an audible alert with an LED and buzzer. No Wi-Fi router is needed for communication.
      The indoor receiver also stores arrival timestamps in NVS and displays a count of today''s deliveries
      on an OLED.</p>'
    components:
    - 2× ESP32 DevKit V1 — One outdoor mailbox unit, one indoor receiver
    - 1× Magnetic reed switch — Mailbox unit
    - 1× SSD1306 OLED 128x64 I2C — Indoor receiver display
    - 1× Active buzzer — Indoor audible alert
    - 1× Red LED — Indicator light
    - 1× 18650 cell + TP4056 charger + boost converter — Mailbox unit power supply
    wiring:
    - - 'MAILBOX UNIT: Reed switch'
      - GPIO 4 + 10k pull-down
      - Deep sleep wakeup trigger
    - - 'INDOOR RECEIVER: OLED SDA/SCL'
      - GPIO 21 / 22
      - ''
    - - 'INDOOR RECEIVER: Buzzer'
      - GPIO 25
      - Active buzzer
    - - 'INDOOR RECEIVER: Red LED'
      - GPIO 26
      - 220 ohm resistor
    how:
    - 'ESP-NOW Peer-to-Peer Communication: ESP-NOW is a Espressif proprietary protocol that allows two
      ESP32 devices to exchange data directly at the Wi-Fi PHY layer without a router or internet connection.
      Range is 100-200 m in open air. The transmitter must know the receiver''s MAC address in advance.'
    - 'RTC Memory for Count Persistence: RTC_DATA_ATTR variables survive deep sleep because they are stored
      in the RTC SRAM that remains powered during sleep. mailCount accumulates across every wakeup without
      needing NVS writes (which wear flash). It resets only on power-off.'
    - 'One-Way Encrypted-Free Pairing: The transmitter adds the receiver as a peer using esp_now_add_peer()
      with a known MAC address. encrypt=false keeps the payload in clear text; for the mailbox use case
      this is acceptable since the payload contains no sensitive data.'
    - 'Indoor Receiver Always-On: The indoor receiver runs continuously, monitoring for incoming ESP-NOW
      packets. When a packet arrives, onRecv() fires on the Wi-Fi task and updates the OLED, buzzer, and
      LED. The receiver can simultaneously connect to a home Wi-Fi network for optional cloud forwarding.'
    apps:
    - Neighbour mailbox sharing alert system
    - Parcel locker delivery notification for apartment blocks
    - Remote alarm bell for outbuildings without mains wiring
    - Pill dispenser alert system for care home residents
    troubleshooting:
    - - ESP-NOW send always returns FAIL
      - Verify RECEIVER_MAC exactly matches the MAC address printed by the receiver on Serial. MAC addresses
        are hardware-coded and are printed by WiFi.macAddress() as six colon-separated hex pairs.
    - - Indoor receiver does not sound alarm
      - Confirm the receiver sketch is compiled and flashed to the second ESP32. Both ESP32s must call
        WiFi.mode(WIFI_STA) and esp_now_init() before data exchange will work. Check that the receiver's
        onRecv callback is registered.
    - - ESP-NOW range is very short (under 10 m)
      - Metal mailboxes attenuate the 2.4 GHz signal significantly. Mount the transmitter antenna (the
        PCB trace strip at the top of the ESP32 module) outside the metal enclosure, or use an ESP32 with
        an external antenna connector.
    upgrades:
    - Add a timestamp from NTP to each delivery event logged by the receiver
    - Add a Telegram forwarding on the indoor receiver when Wi-Fi is available
    - Add a second reed switch on a parcel compartment for large package detection
    - Add a small camera module to capture a photo when the lid opens
    code: "// ESP32 Smart Mailbox - Intermediate (ESP-NOW two-unit system)\n// ===== MAILBOX UNIT (transmitter)\
      \ =====\n// Flash this to the outdoor ESP32 inside the mailbox\n\n#include <esp_now.h>\n#include\
      \ <WiFi.h>\n#include <esp_wifi.h>\n\n// MAC address of the INDOOR RECEIVER ESP32 (run receiver first,\
      \ note its MAC)\nuint8_t RECEIVER_MAC[] = {0xFF,0xFF,0xFF,0xFF,0xFF,0xFF}; // replace with real\
      \ MAC\n\ntypedef struct { char msg[16]; uint32_t count; } MailPayload;\n\nRTC_DATA_ATTR uint32_t\
      \ mailCount = 0; // survives deep sleep\n\nvoid onSent(const uint8_t *mac, esp_now_send_status_t\
      \ s){\n  Serial.printf(\"ESP-NOW send: %sn\", s==ESP_NOW_SEND_SUCCESS?\"OK\":\"FAIL\");\n}\n\nvoid\
      \ setup(){\n  Serial.begin(115200);\n  if(esp_sleep_get_wakeup_cause()==ESP_SLEEP_WAKEUP_EXT0){\n\
      \    mailCount++;\n    WiFi.mode(WIFI_STA);\n    esp_now_init();\n    esp_now_register_send_cb(onSent);\n\
      \    esp_now_peer_info_t peer={};\n    memcpy(peer.peer_addr,RECEIVER_MAC,6);\n    peer.channel=0;\
      \ peer.encrypt=false;\n    esp_now_add_peer(&peer);\n    MailPayload p; strcpy(p.msg,\"MAIL!\");\
      \ p.count=mailCount;\n    esp_now_send(RECEIVER_MAC,(uint8_t*)&p,sizeof(p));\n    delay(500); //\
      \ wait for send callback\n  }\n  esp_sleep_enable_ext0_wakeup(GPIO_NUM_4,0);\n  esp_deep_sleep_start();\n\
      }\nvoid loop(){}\n\n// ===== INDOOR RECEIVER (separate sketch) =====\n// #include <esp_now.h>\n\
      // #include <WiFi.h>\n// #include <Wire.h>\n// #include <Adafruit_SSD1306.h>\n// #include <Preferences.h>\n\
      // Adafruit_SSD1306 oled(128,64,&Wire,-1);\n// Preferences prefs;\n// const int BUZ=25, LED=26;\n\
