      //   pinMode(BUZ,OUTPUT); pinMode(LED,OUTPUT);\n//   WiFi.mode(WIFI_STA); esp_now_init();\n//  \
      \ esp_now_register_recv_cb(onRecv);\n//   Serial.printf(\"Receiver MAC: %sn\",WiFi.macAddress().c_str());\n\
