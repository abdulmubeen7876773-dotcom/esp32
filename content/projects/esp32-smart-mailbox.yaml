slug: esp32-smart-mailbox
title: ESP32 Smart Mailbox
category: IoT Projects
description: Add an ESP32 to your mailbox to detect when the lid is opened and mail is delivered. Send
  instant Telegram notifications, relay alerts via ESP-NOW to an indoor receiver, and run for months on
  a single battery using deep sleep.
meta_description: Build an ESP32 smart mailbox that detects mail delivery with a reed switch and sends
  Telegram notifications. Covers basic alert, ESP-NOW indoor relay, and deep-sleep battery operation.
