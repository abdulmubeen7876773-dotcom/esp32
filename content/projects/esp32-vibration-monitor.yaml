slug: esp32-vibration-monitor
title: ESP32 Vibration Monitor
category: Industrial Automation
description: Mount an MPU6050 IMU on rotating machinery and use the ESP32 to detect abnormal vibration levels, perform FFT
  spectrum analysis, and publish maintenance alerts over MQTT before failures occur.
meta_description: Build an ESP32 vibration monitor with MPU6050 accelerometer. From threshold alerts to FFT spectrum analysis
  and MQTT predictive maintenance dashboards.
