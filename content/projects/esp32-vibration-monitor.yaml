  what_you_build: A bench vibration threshold monitor using an MPU6050 on I2C and local LED/buzzer outputs.
  story: 'Machine-monitoring language can overpromise. This project stays educational: it measures acceleration magnitude
    and shows how a simple threshold behaves. This Golden version keeps the promise narrow: the parts list, code constants,
    GPIO table, expected output, safety notes, and troubleshooting all describe the same low-voltage educational build.'
  eli12: 'The MPU6050 feels movement in three directions. The ESP32 combines those numbers into one movement size and turns
    on the alert when it is above the threshold. The ESP32 is the decision maker: it reads one signal, compares it with simple
    rules, then changes an output you can see or hear.'
  parent_safety: Do not attach the breadboard to unsafe machinery. Test with a small fan, table tap, or handheld movement
    only. Unplug USB and any external supply before rewiring. Keep the build low-voltage on the bench and do not treat it
    as certified equipment.
