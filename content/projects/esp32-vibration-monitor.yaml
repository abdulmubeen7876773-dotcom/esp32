  code_explanation: Wire.begin uses GPIO21 and GPIO22. The loop reads acceleration, computes magnitude, prints it, and drives
    GPIO25/GPIO26/GPIO27 from the threshold comparison.
  expected_output: Serial Plotter shows magnitude values around the still baseline and spikes when the module is moved. Values
    above 15.0 turn on red LED and buzzer.
  common_mistakes:
  - text: Claiming predictive maintenance from one threshold.
  - text: Powering MPU6050 from 5 V when the module is not 5 V tolerant.
  - text: Using boot pins for alert outputs.
  - text: Mounting the circuit on unsafe machinery.
  troubleshooting:
  - problem: MPU6050 not found
    fix: Check 3V3, GND, SDA GPIO21, SCL GPIO22, and AD0.
  - problem: Alerts never stop
    fix: Record a still baseline and raise the threshold.
  - problem: Readings are noisy
    fix: Secure the module and add averaging or filtering.
  testing_checklist:
