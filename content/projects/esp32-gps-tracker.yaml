levels:
  beginner:
    level: beginner
    overview_html: <p>A local GPS/GNSS reader that prints valid coordinates from a NEO-6M module to Serial Monitor. Do not
      track people, vehicles, or property without consent. Do not publish real coordinates from a private location.</p>
    components:
    - ESP32 DevKit board
    - NEO-6M GPS/GNSS module with antenna
    - Breadboard and jumper wires
    - Optional USB power bank
    wiring:
    - - NEO-6M TX
      - GPIO16
      - GPS transmits NMEA to ESP32 RX2.
    - - NEO-6M RX
      - GPIO17
      - Optional; not needed for basic reading.
    - - GPS VCC/GND
      - Module-rated VCC / GND
      - Follow the breakout's voltage rating.
    key_concepts:
    - The GNSS module streams NMEA sentences at 9600 baud. TinyGPS++ decodes bytes into fix status, coordinates, satellites,
      and HDOP.
    - GPS needs sky view and time for a cold start. Indoor tests often receive UART text but no valid coordinates.
    applications: &id003
    - Satellite navigation lesson
    - Outdoor data logger prototype
    - Consent-based field mapping demo
    troubleshooting:
    - - No characters processed
      - Check that GPS TX goes to GPIO16 and the baud rate is 9600.
    - - No valid fix
      - Move outdoors or near a window and wait for cold start.
    - - Coordinates look stale
      - Check location.isUpdated() and antenna placement.
    improvements: &id002
    - Add OLED display.
    - Save local CSV logs only with consent.
    - Add a waypoint distance calculator using fake demo coordinates.
    code: "// ESP32 NEO-6M GPS reader\n// Prints only valid fixes; no fabricated coordinates are used.\n#include <TinyGPS++.h>\n\
      \nTinyGPSPlus gps;\nHardwareSerial gpsSerial(2);\n\nconst int GPS_RX = 16; // ESP32 receives GPS TX here\nconst int\
      \ GPS_TX = 17; // Optional ESP32 TX to GPS RX\n\nunsigned long lastStatusMs = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  gpsSerial.begin(9600, SERIAL_8N1, GPS_RX, GPS_TX);\n  Serial.println(\"GPS reader ready. Place the antenna with a\
      \ clear sky view.\");\n}\n\nvoid loop() {\n  while (gpsSerial.available()) {\n    gps.encode(gpsSerial.read());\n  }\n\
      \n  if (gps.location.isUpdated()) {\n    if (gps.location.isValid()) {\n      Serial.print(\"Latitude: \");\n      Serial.println(gps.location.lat(),\
      \ 6);\n      Serial.print(\"Longitude: \");\n      Serial.println(gps.location.lng(), 6);\n      Serial.print(\"Satellites:\
      \ \");\n      Serial.println(gps.satellites.value());\n      Serial.print(\"HDOP: \");\n      Serial.println(gps.hdop.isValid()\
      \ ? gps.hdop.hdop() : 0.0, 2);\n      Serial.println(\"---\");\n    } else {\n      Serial.println(\"GPS data received,\
      \ but no valid location fix yet.\");\n    }\n  }\n\n  if (millis() - lastStatusMs > 5000) {\n    lastStatusMs = millis();\n\
      \    if (gps.charsProcessed() < 10) {\n      Serial.println(\"No NMEA characters yet. Check TX-to-RX wiring and module\
      \ power.\");\n    } else if (!gps.location.isValid()) {\n      Serial.println(\"Waiting for satellite lock. Move antenna\
      \ near a window or outdoors.\");\n    }\n  }\n}\n"
    code_filename: esp32-gps-tracker-beginner.ino
