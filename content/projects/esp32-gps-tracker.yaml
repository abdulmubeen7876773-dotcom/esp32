    content: "// ESP32 NEO-6M GPS reader\n// Prints only valid fixes; no fabricated coordinates are used.\n#include <TinyGPS++.h>\n\
      \nTinyGPSPlus gps;\nHardwareSerial gpsSerial(2);\n\nconst int GPS_RX = 16; // ESP32 receives GPS TX here\nconst int\
      \ GPS_TX = 17; // Optional ESP32 TX to GPS RX\n\nunsigned long lastStatusMs = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  gpsSerial.begin(9600, SERIAL_8N1, GPS_RX, GPS_TX);\n  Serial.println(\"GPS reader ready. Place the antenna with a\
      \ clear sky view.\");\n}\n\nvoid loop() {\n  while (gpsSerial.available()) {\n    gps.encode(gpsSerial.read());\n  }\n\
      \n  if (gps.location.isUpdated()) {\n    if (gps.location.isValid()) {\n      Serial.print(\"Latitude: \");\n      Serial.println(gps.location.lat(),\
      \ 6);\n      Serial.print(\"Longitude: \");\n      Serial.println(gps.location.lng(), 6);\n      Serial.print(\"Satellites:\
      \ \");\n      Serial.println(gps.satellites.value());\n      Serial.print(\"HDOP: \");\n      Serial.println(gps.hdop.isValid()\
      \ ? gps.hdop.hdop() : 0.0, 2);\n      Serial.println(\"---\");\n    } else {\n      Serial.println(\"GPS data received,\
      \ but no valid location fix yet.\");\n    }\n  }\n\n  if (millis() - lastStatusMs > 5000) {\n    lastStatusMs = millis();\n\
      \    if (gps.charsProcessed() < 10) {\n      Serial.println(\"No NMEA characters yet. Check TX-to-RX wiring and module\
      \ power.\");\n    } else if (!gps.location.isValid()) {\n      Serial.println(\"Waiting for satellite lock. Move antenna\
      \ near a window or outdoors.\");\n    }\n  }\n}\n"
  code_explanation: UART2 reads GPS bytes on GPIO16/GPIO17. The sketch prints location only when TinyGPS++ reports a valid
    updated fix.
  expected_output: Before satellite lock, Serial Monitor says it is waiting for a fix. After a valid fix, it prints latitude,
    longitude, satellites, and HDOP.
