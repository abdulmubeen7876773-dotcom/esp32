  wiring:
    illustration_alt: ESP32 WiFi Robot Controller wiring diagram
    summary: Wire the web control commands first, verify readings, then connect the dual motor driver.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the web control commands power pins to the correct 3.3 V or 5 V rail according to its module label.
    - Connect the web control commands signal line to Wi-Fi.
    - Connect the dual motor driver control input to GPIO16-GPIO19 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: web control commands
    esp32_pin: Wi-Fi
    direction: Input
    notes: Read before controlling output
  - signal: dual motor driver
    esp32_pin: GPIO16-GPIO19
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: wifi-robot-controller.ino
    content: "#include <WiFi.h>\n#include <WebServer.h>\n\nconst char* ssid = \"ESP32-Robot\";\nconst char* password\
      \ = \"robot1234\";\nWebServer server(80);\n\nconst int L1 = 16, L2 = 17, R1 = 18, R2 = 19;\n\nvoid drive(bool\
      \ lf, bool lb, bool rf, bool rb) {\n  digitalWrite(L1, lf); digitalWrite(L2, lb);\n  digitalWrite(R1, rf);\
      \ digitalWrite(R2, rb);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(L1, OUTPUT); pinMode(L2,\
      \ OUTPUT); pinMode(R1, OUTPUT); pinMode(R2, OUTPUT);\n  WiFi.softAP(ssid, password);\n  server.on(\"/\", [](){\
      \ server.send(200, \"text/html\", \"<a href=/f>Forward</a> <a href=/l>Left</a> <a href=/r>Right</a> <a href=/s>Stop</a>\"\
      ); });\n  server.on(\"/f\", [](){ drive(1,0,1,0); server.send(200, \"text/plain\", \"forward\"); });\n  server.on(\"\
      /l\", [](){ drive(0,0,1,0); server.send(200, \"text/plain\", \"left\"); });\n  server.on(\"/r\", [](){ drive(1,0,0,0);\
      \ server.send(200, \"text/plain\", \"right\"); });\n  server.on(\"/s\", [](){ drive(0,0,0,0); server.send(200,\
      \ \"text/plain\", \"stop\"); });\n  server.begin();\n  Serial.println(WiFi.softAPIP());\n}\n\nvoid loop()\
      \ {\n  server.handleClient();\n}\n"
  expected_output: Serial Monitor should show a changing reading. When the web control commands reaches the test
    condition, the status LED and dual motor driver should switch state. If the reading changes but the output does
    not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: web control commands never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: dual motor driver does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
