      {
        "question": "Is ESP32 WiFi Robot Controller good for beginners?",
        "answer": "Yes. Start with USB power, build the wiring slowly, and test one signal at a time before adding the full Wi-Fi robot controller behavior."
      },
      {
        "question": "Which ESP32 board should I use for ESP32 WiFi Robot Controller?",
        "answer": "A standard ESP32 DevKit is the safest choice because it has USB programming, many GPIO pins, and strong Arduino IDE support."
      },
      {
        "question": "Can I power ESP32 WiFi Robot Controller from a phone charger?",
        "answer": "For bench testing, use the USB cable connected to your computer. Use a regulated 5 V supply only after the circuit works and the current requirement is known."
      },
      {
        "question": "Why does my web control commands reading look wrong?",
        "answer": "Most wrong readings come from reversed power, loose breadboard rows, the wrong GPIO number in code, or reading the sensor before it has settled."
      },
      {
        "question": "Can I change the GPIO pins?",
        "answer": "Yes, but update the constants at the top of the sketch and avoid ESP32 boot strapping pins unless you understand their startup behavior."
      },
      {
        "question": "Does ESP32 WiFi Robot Controller need Wi-Fi?",
        "answer": "The core lesson works locally. Wi-Fi is useful for dashboards, alerts, and remote control, but it should be added after the hardware is stable."
      },
      {
        "question": "Can I use 5 V signals with ESP32 in ESP32 WiFi Robot Controller?",
        "answer": "Do not feed 5 V logic into an ESP32 GPIO. ESP32 pins are 3.3 V logic pins and can be damaged by 5 V signals."
      },
      {
        "question": "Why does dual motor driver not respond?",
        "answer": "Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the output module uses active HIGH or active LOW logic."
      },
      {
        "question": "What should I test first?",
        "answer": "Upload a tiny sketch that reads only web control commands. Once that is reliable, add dual motor driver, then add the full decision logic."
      },
      {
        "question": "How accurate is this project?",
        "answer": "It is accurate enough for learning and prototypes. For production work you should calibrate sensors, protect wiring, and test across temperature and voltage changes."
      },
      {
        "question": "Can this run on batteries?",
        "answer": "Yes, but runtime depends on Wi-Fi usage, sensor current, output current, and sleep mode. First measure current with a multimeter."
      },
      {
        "question": "Should I solder the circuit?",
        "answer": "Use a breadboard while learning. Solder a final version only after every wire and GPIO has been tested for several sessions."
      },
      {
        "question": "Why does the ESP32 reset randomly?",
        "answer": "Random resets usually mean weak USB power, motor or relay noise, brownout from high current loads, or a loose breadboard power rail."
      },
      {
        "question": "Can I use PlatformIO instead of Arduino IDE?",
        "answer": "Yes. The same sketch structure works in PlatformIO after adding the required libraries to the project configuration."
      },
      {
        "question": "How do I make ESP32 WiFi Robot Controller safer?",
        "answer": "Keep high-current loads isolated, unplug before rewiring, use fused supplies for motors or pumps, and never connect mains voltage on a breadboard."
      },
      {
        "question": "What is the most common mistake?",
        "answer": "Beginners often trust the breadboard rows without checking continuity. Always trace each signal from ESP32 pin to module pin."
      },
      {
