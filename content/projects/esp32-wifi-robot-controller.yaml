  faqs:
  - question: Why does my web control commands reading look wrong?
    answer: Confirm the phone or computer is on the robot's Wi-Fi page, then test each command in Serial Monitor
      before enabling motor movement.
  - question: Why does dual motor driver not respond?
    answer: Check shared ground, the motor supply, and GPIO16-GPIO19 wiring. The ESP32 commands the driver but does
      not power the motors directly.
  - question: Why does the robot reset when it starts moving?
    answer: Motor startup current can pull down weak supplies. Use a separate motor supply with common ground and
      test with the wheels lifted before floor runs.
