    "story": "ESP32 WiFi Robot Controller turns the ESP32 into a real object that senses something, decides what it means, and reacts in the physical world.\n\nThe important lesson is not only the finished Wi-Fi robot controller. You learn how to separate input, decision logic, and output so a project stays debuggable instead of becoming a pile of wires and guesses.",
