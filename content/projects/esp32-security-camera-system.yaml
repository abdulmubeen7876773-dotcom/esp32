  what_you_build: A local ESP32-CAM snapshot page that serves a live captured JPEG to a browser on the same Wi-Fi
    network.
  story: The ESP32-CAM is a tiny board that can capture real images, but the Golden version avoids pretending it
    is a professional security product. You build a compact local-network camera demo with the real AI-Thinker pin
    map, stable 5 V power, and clear privacy limits.
  eli12: The camera takes a picture, the ESP32-CAM turns it into JPEG data, and a local web page shows that picture
    in your browser. It only works on your own Wi-Fi network in this lesson, so you can learn the camera path without
    sending images to a cloud service.
  parent_safety: Use a stable 5 V low-voltage supply and unplug power before rewiring or changing the programming
    jumper. Use the camera only with consent, never in private spaces, and do not expose the web server to the public
    internet.
