  wiring:
    illustration_alt: AI-Thinker ESP32-CAM powered from stable 5 V and GND, programmed through an FTDI adapter,
      using its onboard OV2640 camera pins.
    summary: The camera pins are fixed by the AI-Thinker ESP32-CAM board. The external wiring is stable 5 V, GND,
      and the FTDI adapter used for upload.
    steps:
    - Unplug 5 V power and the FTDI adapter before changing wiring.
    - Connect FTDI GND to ESP32-CAM GND.
    - Connect FTDI 5 V or a separate stable 5 V supply to ESP32-CAM 5V.
    - Connect FTDI TX to ESP32-CAM U0R and FTDI RX to U0T for programming.
    - Pull GPIO0 to GND only while uploading, then remove it and reset the board.
    - Open the printed local IP address from a browser on the same Wi-Fi network.
  gpio_map:
  - signal: PWDN
    esp32_pin: GPIO32
    direction: Camera control
    notes: AI-Thinker power-down pin.
  - signal: XCLK
    esp32_pin: GPIO0
    direction: Camera clock
    notes: Also a boot strap pin; do not add extra loads.
  - signal: SIOD/SIOC
    esp32_pin: GPIO26/GPIO27
    direction: Camera I2C
    notes: OV2640 control bus.
  - signal: D0-D7
    esp32_pin: GPIO5/18/19/21/36/39/34/35
    direction: Camera data
    notes: Fixed AI-Thinker parallel camera bus.
  - signal: VSYNC/HREF/PCLK
    esp32_pin: GPIO25/GPIO23/GPIO22
    direction: Camera sync
    notes: Fixed AI-Thinker sync pins.
  circuit_explanation: The OV2640 camera is already wired to fixed ESP32 pins on the AI-Thinker module; the sketch
    must match that map exactly.
  engineering_explanation: Camera and Wi-Fi peaks can brown out weak supplies, so the demo uses QVGA, one frame
    buffer, and a stable 5 V source. It serves snapshots locally and does not implement motion capture, alerts,
    facial identification, or evidence storage.
  libraries:
  - name: Arduino ESP32 camera support
    note: Provides esp_camera.h for ESP32-CAM boards.
  code:
    filename: esp32-cam-local-network-demo.ino
    content: "// ESP32-CAM Local Network Camera Demo\n// Local classroom demo only. Do not expose this server to\
      \ the public internet.\n#include \"esp_camera.h\"\n#include <WiFi.h>\n#include <WebServer.h>\n\n#define PWDN_GPIO_NUM\
      \     32\n#define RESET_GPIO_NUM    -1\n#define XCLK_GPIO_NUM      0\n#define SIOD_GPIO_NUM     26\n#define\
      \ SIOC_GPIO_NUM     27\n#define Y9_GPIO_NUM       35\n#define Y8_GPIO_NUM       34\n#define Y7_GPIO_NUM  \
      \     39\n#define Y6_GPIO_NUM       36\n#define Y5_GPIO_NUM       21\n#define Y4_GPIO_NUM       19\n#define\
      \ Y3_GPIO_NUM       18\n#define Y2_GPIO_NUM        5\n#define VSYNC_GPIO_NUM    25\n#define HREF_GPIO_NUM\
      \     23\n#define PCLK_GPIO_NUM     22\n\nconst char* WIFI_SSID = \"YOUR_WIFI_NAME\";\nconst char* WIFI_PASSWORD\
      \ = \"YOUR_WIFI_PASSWORD\";\n\nWebServer server(80);\n\nvoid startCamera() {\n  camera_config_t config = {};\n\
      \  config.ledc_channel = LEDC_CHANNEL_0;\n  config.ledc_timer = LEDC_TIMER_0;\n  config.pin_d0 = Y2_GPIO_NUM;\n\
      \  config.pin_d1 = Y3_GPIO_NUM;\n  config.pin_d2 = Y4_GPIO_NUM;\n  config.pin_d3 = Y5_GPIO_NUM;\n  config.pin_d4\
      \ = Y6_GPIO_NUM;\n  config.pin_d5 = Y7_GPIO_NUM;\n  config.pin_d6 = Y8_GPIO_NUM;\n  config.pin_d7 = Y9_GPIO_NUM;\n\
      \  config.pin_xclk = XCLK_GPIO_NUM;\n  config.pin_pclk = PCLK_GPIO_NUM;\n  config.pin_vsync = VSYNC_GPIO_NUM;\n\
      \  config.pin_href = HREF_GPIO_NUM;\n  config.pin_sscb_sda = SIOD_GPIO_NUM;\n  config.pin_sscb_scl = SIOC_GPIO_NUM;\n\
      \  config.pin_pwdn = PWDN_GPIO_NUM;\n  config.pin_reset = RESET_GPIO_NUM;\n  config.xclk_freq_hz = 20000000;\n\
      \  config.pixel_format = PIXFORMAT_JPEG;\n  config.frame_size = FRAMESIZE_QVGA;\n  config.jpeg_quality = 12;\n\
      \  config.fb_count = 1;\n\n  if (esp_camera_init(&config) != ESP_OK) {\n    Serial.println(\"Camera init failed.\
      \ Check AI-Thinker ESP32-CAM pin mapping and 5 V supply.\");\n    while (true) delay(100);\n  }\n}\n\nvoid\
      \ connectWiFi() {\n  WiFi.mode(WIFI_STA);\n  WiFi.begin(WIFI_SSID, WIFI_PASSWORD);\n  while (WiFi.status()\
      \ != WL_CONNECTED) {\n    delay(500);\n    Serial.print(\".\");\n  }\n  Serial.println();\n  Serial.print(\"\
      Open this local URL from the same Wi-Fi network: http://\");\n  Serial.println(WiFi.localIP());\n}\n\nvoid\
      \ handleRoot() {\n  server.send(200, \"text/html\",\n    \"<!doctype html><html><body>\"\n    \"<h1>ESP32-CAM\
      \ Local Network Camera Demo</h1>\"\n    \"<p>Local educational snapshot only. Use with consent.</p>\"\n  \
      \  \"<img src='/capture' style='max-width:100%;height:auto'>\"\n    \"<p><a href='/capture'>Refresh snapshot</a></p>\"\
      \n    \"</body></html>\");\n}\n\nvoid handleCapture() {\n  camera_fb_t *fb = esp_camera_fb_get();\n  if (!fb)\
      \ {\n    server.send(503, \"text/plain\", \"Camera capture failed\");\n    return;\n  }\n  server.send_P(200,\
      \ \"image/jpeg\", (const char*)fb->buf, fb->len);\n  esp_camera_fb_return(fb);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  startCamera();\n  connectWiFi();\n  server.on(\"/\", handleRoot);\n  server.on(\"/capture\", handleCapture);\n\
      \  server.begin();\n}\n\nvoid loop() {\n  if (WiFi.status() != WL_CONNECTED) connectWiFi();\n  server.handleClient();\n\
      }\n"
  code_explanation: The sketch initializes the AI-Thinker pin map, connects to Wi-Fi with placeholder credentials,
    serves a small local HTML page, and captures a JPEG when /capture is requested.
  expected_output: Serial Monitor prints a local URL such as http://192.168.x.x. Opening that address from the same
    Wi-Fi network shows a compact page with a refreshed camera snapshot.
  common_mistakes:
  - text: Using the wrong ESP32-CAM pin map.
  - text: Powering the camera from a weak 3.3 V source.
  - text: Leaving GPIO0 tied to GND after upload.
  - text: Port-forwarding the camera to the public internet.
  troubleshooting:
  - problem: Camera init failed
    fix: Check that the board is AI-Thinker ESP32-CAM and that the code uses the matching pin map.
  - problem: Board resets when Wi-Fi starts
    fix: Use a stronger stable 5 V supply and short power wires.
  - problem: Browser cannot open the page
    fix: Confirm the phone or computer is on the same local network as the ESP32-CAM.
  testing_checklist:
  - Verify 5 V stability.
  - Upload with GPIO0 grounded, then remove it.
  - Confirm local URL only.
  - Get consent before pointing the camera at people.
  engineer_tips:
  - Start with QVGA.
  - Keep the antenna clear.
  - Treat privacy as part of the circuit design.
  upgrade_ideas:
  - Add local password protection.
  - Add a physical privacy cover.
  - Add an on-device LED indicator when the page is being viewed.
