slug: esp32-security-camera-system
title: ESP32 Security Camera System
category: Security Projects
description: Transform the ESP32-CAM into a fully featured security camera that detects motion using a
  PIR sensor, records JPEG snapshots to an SD card, streams live MJPEG video to a browser, and sends instant
  Telegram photo alerts when intrusion is detected.
meta_description: Build an ESP32-CAM security camera with PIR motion detection, SD card recording, live
  MJPEG streaming, and Telegram photo alerts when movement is detected.
source_base: esp32-security-camera-system-legacy-import
sensor: PIR OUT
output: SD card
featured: false
date_published: '2026-06-14'
date_modified: '2026-06-27'
quality_status: legacy_import
status: needs_polish
import_tier: 4
import_source: batch-php
hardware:
  sensor_pin: GPIO 13
  output_pin: Onboard (SPI GPIO 2/14/15)
  sensor_name: PIR OUT
  output_name: SD card
  wiring:
  - component: PIR OUT
    pin: GPIO 13
  - component: PIR VCC
    pin: 3.3 V or 5 V
  - component: PIR GND
