  what_you_build: A web-controlled four-channel low-voltage DC switching simulator with fail-safe OFF startup and
    a master-off control.
  story: A smart power strip sounds like a mains project, but this safe Golden version teaches the control pattern
    without touching dangerous wiring. You build a low-voltage simulator that behaves like four controllable outlets
    while switching only DC demo loads.
  eli12: Each GPIO pin tells a MOSFET gate to allow or block current through one small DC load. The ESP32 web page
    flips those gates, and the code starts with everything OFF so a reset does not surprise you.
  parent_safety: This project is low-voltage DC only. Do not modify a power strip, wall outlet, extension cord,
    appliance cord, or mains wiring. Unplug USB and the load supply before rewiring, share grounds, and use flyback
    diodes for coils.
