slug: esp32-smart-power-strip
title: ESP32 Smart Power Strip
category: Home Automation
description: Convert a standard power strip into a smart IoT device using four relay channels controlled
  by an ESP32 web interface. Monitor current draw per socket with ACS712 sensors, schedule outlets on
  and off, and integrate with Home Assistant via MQTT.
meta_description: Build an ESP32 smart power strip controlling four mains sockets via relays. From a web
  toggle panel to ACS712 current monitoring, scheduling, and Home Assistant integration.
