  circuit_explanation: Each MOSFET acts as a low-side switch for one DC load. The ESP32 drives only the gate signal;
    the load current comes from the separate low-voltage supply.
  engineering_explanation: The selected GPIOs avoid common ESP32 boot-strap pins used in the previous staged relay
    design. The sketch drives all outputs LOW before Wi-Fi starts and includes a master-off route for a fail-safe
    default.
  libraries:
  - name: Arduino ESP32 WiFi and WebServer
    note: Built into the Arduino ESP32 core.
  code:
    filename: esp32-low-voltage-power-strip-simulator.ino
    content: "// ESP32 low-voltage smart power strip simulator\n// Switch only low-voltage DC loads. Do not connect\
      \ this circuit to mains power.\n#include <WiFi.h>\n#include <WebServer.h>\n\nconst char* WIFI_SSID = \"YOUR_WIFI_NAME\"\
      ;\nconst char* WIFI_PASSWORD = \"YOUR_WIFI_PASSWORD\";\n\nconst int CHANNEL_PINS[4] = {25, 26, 27, 33};\n\
      bool channelOn[4] = {false, false, false, false};\n\nWebServer server(80);\n\nvoid applyOutputs() {\n  for\
      \ (int i = 0; i < 4; i++) {\n    digitalWrite(CHANNEL_PINS[i], channelOn[i] ? HIGH : LOW);\n  }\n}\n\nvoid\
      \ allOff() {\n  for (int i = 0; i < 4; i++) channelOn[i] = false;\n  applyOutputs();\n}\n\nvoid servePanel()\
      \ {\n  String html = \"<!doctype html><html><body><h1>Low-Voltage Smart Power Strip Simulator</h1>\";\n  html\
      \ += \"<p>DC demo loads only - no mains wiring.</p><p><a href='/alloff'>Master OFF</a></p>\";\n  for (int\
      \ i = 0; i < 4; i++) {\n    html += \"<p>Channel \" + String(i + 1) + \": \";\n    html += channelOn[i] ?\
      \ \"ON\" : \"OFF\";\n    html += \" <a href='/toggle?ch=\" + String(i) + \"'>Toggle</a></p>\";\n  }\n  html\
      \ += \"</body></html>\";\n  server.send(200, \"text/html\", html);\n}\n\nvoid handleToggle() {\n  int ch =\
      \ server.arg(\"ch\").toInt();\n  if (ch >= 0 && ch < 4) {\n    channelOn[ch] = !channelOn[ch];\n    applyOutputs();\n\
      \  }\n  server.sendHeader(\"Location\", \"/\");\n  server.send(302, \"text/plain\", \"\");\n}\n\nvoid handleAllOff()\
      \ {\n  allOff();\n  server.sendHeader(\"Location\", \"/\");\n  server.send(302, \"text/plain\", \"\");\n}\n\
      \nvoid setup() {\n  Serial.begin(115200);\n\n  for (int i = 0; i < 4; i++) {\n    pinMode(CHANNEL_PINS[i],\
      \ OUTPUT);\n    digitalWrite(CHANNEL_PINS[i], LOW);\n  }\n  allOff();\n\n  WiFi.mode(WIFI_STA);\n  WiFi.begin(WIFI_SSID,\
      \ WIFI_PASSWORD);\n  while (WiFi.status() != WL_CONNECTED) delay(500);\n\n  server.on(\"/\", servePanel);\n\
      \  server.on(\"/toggle\", handleToggle);\n  server.on(\"/alloff\", handleAllOff);\n  server.begin();\n\n \
      \ Serial.print(\"Open local control page: http://\");\n  Serial.println(WiFi.localIP());\n}\n\nvoid loop()\
      \ {\n  server.handleClient();\n}\n"
  code_explanation: The sketch configures GPIO25/GPIO26/GPIO27/GPIO33 as outputs, immediately turns every channel
    OFF, then starts a local web panel with per-channel toggles and a master-off route.
  expected_output: After reset all channels are OFF. Serial Monitor prints the local web address; the page shows
    four low-voltage channels and a Master OFF link. No channel turns on until a user toggles it.
  common_mistakes:
  - text: Connecting the project to mains wiring.
  - text: Using relay modules and boot pins from the old staged version.
  - text: Forgetting the shared ground between ESP32 and the DC load supply.
  - text: Testing a motor or solenoid without a flyback diode.
  troubleshooting:
  - problem: A channel turns on during reset
    fix: Confirm the sketch uses GPIO25/GPIO26/GPIO27/GPIO33 and that all outputs are driven LOW before Wi-Fi starts.
  - problem: Load does not switch
    fix: Check the shared ground, MOSFET orientation, gate wiring, and load supply voltage.
  - problem: ESP32 resets when a load switches
    fix: Separate the load supply from USB power, add flyback diodes for coils, and keep load current out of the
      ESP32 board.
  testing_checklist:
  - Power with no loads first.
  - Confirm all channels start OFF.
  - Test one DC load at a time.
  - Use flyback diodes before coil testing.
  engineer_tips:
  - Keep mains out of the enclosure.
  - Use logic-level MOSFETs.
  - Name channels by load voltage, not household socket labels.
  upgrade_ideas:
  - Add per-channel low-voltage current sensing.
  - Add MQTT control for the same DC simulator.
  - Add saved schedules that still default OFF after firmware upload.
