  faqs:
  - question: Can I modify a real power strip?
    answer: No. This tutorial is only a low-voltage DC simulator.
  - question: Why use MOSFETs instead of relays?
    answer: MOSFETs keep the project focused on safe DC switching and avoid mains relay claims.
