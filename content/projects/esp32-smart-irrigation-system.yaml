    code: "// ESP32 Irrigation Controller for Drip Irrigation with Cloud Sync\nconst int SENSOR_PIN =\
      \ 34;\nconst int OUTPUT_PIN = 26;\nconst int THRESHOLD = 1812;\nconst int SAMPLE_DELAY_MS = 300;\n\
      \nvoid setup() {\n  Serial.begin(115200);\n  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN,\
      \ INPUT);\n  Serial.println(\"Starting: irrigation controller for drip irrigation with cloud sync\"\
      );\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n  int reading\
      \ = analogRead(SENSOR_PIN);\n  Serial.print(\"Soil Moisture Sensor signal: \");\n  Serial.println(reading);\n\
      \  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n\
      }"
