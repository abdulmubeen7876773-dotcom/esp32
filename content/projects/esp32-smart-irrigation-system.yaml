  wiring:
    illustration_alt: Soil moisture sensor connected to ESP32 — VCC to 3.3 V, GND to GND, signal to GPIO34
    summary: Use a 3-pin soil moisture module. Keep the ESP32 on the breadboard and only the probe in the soil. Match each wire before plugging in USB.
    steps:
      - "Unplug USB. Place the ESP32 and soil moisture module on your breadboard."
      - "Connect VCC on the module to 3.3 V on the ESP32."
      - "Connect GND on the module to GND on the ESP32."
      - "Connect the sensor signal pin to GPIO34 on the ESP32."
      - "Insert only the probe end into a cup of damp soil or a potted plant — not the electronics."
      - "Double-check all three wires, then plug in USB."
  code:
    filename: smart_plant_monitor.ino
    content: |
      #define MOISTURE_PIN 34
      const int DRY_THRESHOLD = 3000;

      void setup() {
        Serial.begin(115200);
        Serial.println("Smart Plant Monitor ready!");
      }

      void loop() {
        int moisture = analogRead(MOISTURE_PIN);

        Serial.print("Soil moisture raw: ");
        Serial.println(moisture);

        if (moisture > DRY_THRESHOLD) {
          Serial.println("Plant is thirsty — time to water!");
        } else {
          Serial.println("Soil looks okay.");
        }

        delay(2000);
      }
  expected_output: |
    Open Serial Monitor at 115200 baud. Every 2 seconds you should see:

    Soil moisture raw: 1850
    Soil looks okay.

    When the soil dries out, the raw number rises and you should see:

    Soil moisture raw: 3200
    Plant is thirsty — time to water!

    Try watering the plant lightly — the raw value should drop within a minute.
  common_mistakes:
    - text: Putting the whole module in water or soil instead of just the probe.
    - text: Signal wire on the wrong GPIO pin compared to your code.
    - text: Using a charge-only USB cable that cannot upload code.
    - text: Expecting instant changes — wait a minute after watering for the reading to settle.
  troubleshooting:
    - problem: Raw value stuck at 0 or 4095
      fix: Check VCC, GND, and signal wiring. Confirm GPIO34 in code matches your wire.
    - problem: No output in Serial Monitor
      fix: Set baud rate to 115200 and select the correct COM port for your ESP32.
    - problem: Always says thirsty or always says okay
      fix: Change DRY_THRESHOLD in code. Test with dry soil and wet soil to find a value that works for your sensor.
  upgrade_ideas:
