    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Garden Bed: ESP32 watches Soil Moisture Sensor signal and activates Water\
      \ Pump control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n \
      \       <li>Soil Moisture Sensor signal connects to GPIO34 (ADC input)</li><li>Threshold is set\
      \ to 1605 in firmware (adjust after calibration)</li><li>Water Pump control is driven on GPIO26\
      \ when the condition is met</li><li>The main loop samples every 300 ms while powered</li>\n    \
      \  </ul>\n      </section>"
