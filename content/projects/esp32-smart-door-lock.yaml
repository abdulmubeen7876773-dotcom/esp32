  faqs:
  - question: Why does my RFID reader or keypad input reading look wrong?
    answer: Check the input power, ground, and signal wiring before changing access logic. Keypads and RFID readers
      fail differently, so test the input alone first.
  - question: Why does servo or relay lock not respond?
    answer: Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the
      output module uses active HIGH or active LOW logic.
  - question: Can this protect a real door?
    answer: No. Treat it as a low-voltage classroom prototype. Real locks need mechanical fail-safe planning, secure
      installation, and adult review.
