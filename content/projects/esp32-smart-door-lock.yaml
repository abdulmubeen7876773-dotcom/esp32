levels:
  beginner:
    level: beginner
    overview_html: <p>In this beginner build you will wire a 4x4 matrix keypad and a servo motor to an
      ESP32 to create a PIN-code door lock. Entering the correct four-digit code rotates the servo to
      the unlock position and lights a green LED. A wrong PIN lights a red LED and activates a buzzer.
      The project teaches matrix keypad scanning, servo PWM control, and basic string comparison without
      any cloud connectivity.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× 4x4 matrix keypad membrane — 16-key, 8-pin ribbon cable
    - 1× SG90 servo motor — 180-degree rotation, 5 V
    - 1× Green LED 5 mm — Unlock indicator
    - 1× Red LED 5 mm — Wrong PIN indicator
    - 1× Active buzzer 5 V — Error alert
    - 2× 220 ohm resistor — Current limiting for LEDs
    - 1× Breadboard and jumper wires
    wiring:
    - - Keypad rows R1-R4
      - GPIO 13,12,14,27
      - Row pins driven LOW during scan
    - - Keypad cols C1-C4
      - GPIO 26,25,33,32
      - Column pins with pull-up
    - - Servo signal wire
      - GPIO 18
      - PWM; yellow wire on servo
    - - Servo power
      - Vin (5 V)
      - Servo draws up to 250 mA
    - - Green LED anode
      - GPIO 4
      - Through 220 ohm resistor
    - - Red LED anode
      - GPIO 2
      - Through 220 ohm resistor
    - - Buzzer +
      - GPIO 15
      - Active buzzer; drive HIGH to sound
    how:
    - 'Matrix Keypad Scanning: The Keypad library drives each row pin LOW in turn and reads the four column
      pins. When a key is pressed, the row and column intersection identifies which key was pressed.'
    - 'PIN Accumulation: Each digit is appended to a String variable. Pressing # submits the PIN for comparison.
      Pressing * clears the buffer so the user can retype from scratch.'
    - 'Servo Lock Control: The servo sits at 0 degrees in the locked position. A correct PIN rotates it
      to 90 degrees to retract the latch. After 3 seconds it returns to 0 degrees and locks automatically.'
    - 'LED and Buzzer Feedback: A correct PIN lights the green LED for 3 seconds. A wrong PIN lights the
      red LED and activates the buzzer for 1 second, providing clear physical feedback without any display.'
    apps:
    - Home office door lock with PIN code entry
    - Cabinet lock for storing electronics components
    - Safe box release mechanism for workshops
    - STEM demonstration of electromechanical security
    troubleshooting:
    - - Keypad registers phantom key presses
      - Check that all 8 ribbon cable wires are fully seated. The Keypad library enables internal pull-ups
        on column pins automatically; verify no external resistors are conflicting.
    - - Servo jitters or does not hold position
      - Power the servo from the Vin 5 V pin, not 3.3 V. Add a 10 uF capacitor between servo power and
        GND to absorb inrush current spikes.
    - - PIN comparison always fails
      - 'Print the entered String to Serial Monitor and verify the characters. Check that the # key is
        mapped correctly in the keys[][] array definition.'
    - - Green LED does not light on correct PIN
      - Check LED polarity (flat side = cathode = GND). Verify the 220 ohm resistor is on the anode side
        between GPIO 4 and the LED.
    upgrades:
    - Store the PIN in NVS flash so it survives power loss
    - Add an OLED display to show entry prompts and remaining attempts
    - Add a reed switch to detect if the door is open after unlocking
    - Add a second PIN slot for a family member using a different code
    code: "// ESP32 Smart Door Lock - Beginner\n// 4x4 Keypad + SG90 servo + LED feedback\n#include <Keypad.h>\n\
      #include <ESP32Servo.h>\n\nconst char* CORRECT_PIN = \"1234\";\nconst byte ROWS=4, COLS=4;\nchar\
      \ keys[4][4]={{\"1\",\"2\",\"3\",\"A\"},{\"4\",\"5\",\"6\",\"B\"},\n                  {\"7\",\"\
      8\",\"9\",\"C\"},{\"*\",\"0\",\"#\",\"D\"}};\nbyte rowPins[4]={13,12,14,27};\nbyte colPins[4]={26,25,33,32};\n\
      Keypad kpad=Keypad(makeKeymap(keys),rowPins,colPins,ROWS,COLS);\n\nServo lockServo;\nconst int LED_G=4,\
      \ LED_R=2, BUZ=15, SERVO_PIN=18;\nString entered=\"\";\n\nvoid unlock(){\n  lockServo.write(90);\n\
      \  digitalWrite(LED_G,HIGH);\n  Serial.println(\"UNLOCKED\");\n  delay(3000);\n  lockServo.write(0);\n\
      \  digitalWrite(LED_G,LOW);\n}\n\nvoid deny(){\n  digitalWrite(LED_R,HIGH);\n  digitalWrite(BUZ,HIGH);\n\
      \  delay(1000);\n  digitalWrite(LED_R,LOW);\n  digitalWrite(BUZ,LOW);\n}\n\nvoid setup(){\n  Serial.begin(115200);\n\
      \  pinMode(LED_G,OUTPUT);\n  pinMode(LED_R,OUTPUT);\n  pinMode(BUZ,OUTPUT);\n  lockServo.attach(SERVO_PIN);\n\
      \  lockServo.write(0);\n}\n\nvoid loop(){\n  char k=kpad.getKey();\n  if(!k) return;\n  if(k==\"\
      #\"){\n    if(entered==CORRECT_PIN) unlock();\n    else deny();\n    entered=\"\";\n  } else if(k==\"\
      *\"){\n    entered=\"\";\n  } else {\n    entered+=k;\n    Serial.print(\"*\");\n  }\n}"
    code_filename: esp32-smart-door-lock-beginner.ino
  intermediate:
    level: intermediate
    overview_html: <p>The intermediate build supports up to ten user PINs stored in ESP32 NVS flash, an
      OLED display for prompts and unlock history, a tamper lockout after three consecutive wrong attempts,
      and a local web page to add or delete PINs. All access events are timestamped using NTP and logged
      to Serial for a simple audit trail.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× 4x4 matrix keypad
    - 1× SG90 servo motor
    - 1× SSD1306 OLED 128x64 I2C — Shows prompts and last event
    - 1× Active buzzer — Tamper alert
    - 1× Green and red LED
    - 1× Wi-Fi router or access point — For NTP and web admin
    wiring:
    - - Keypad rows and cols
      - Same as beginner
      - ''
    - - Servo signal
      - GPIO 18
      - ''
    - - OLED SDA
      - GPIO 21
      - ''
    - - OLED SCL
      - GPIO 22
      - ''
    - - Green LED
      - GPIO 4
      - 220 ohm resistor
    - - Red LED
      - GPIO 2
      - 220 ohm resistor
    - - Buzzer
      - GPIO 15
      - ''
    how:
    - 'NVS Multi-PIN Storage: PINs are stored as indexed keys (0, 1, 2...) in an NVS namespace "pins".
      The web admin page provides POST endpoints to add or delete PINs, updating a count key that controls
      the search loop.'
    - 'NTP Timestamp Logging: configTime() syncs the ESP32 clock to pool.ntp.org over Wi-Fi. Each access
      event calls ctime() to format a human-readable timestamp that appears on the OLED and Serial log.'
    - 'Tamper Lockout: After three wrong PINs the lockedOut flag is set and lockEnd is recorded 30 seconds
      ahead. The main loop skips keypad input until millis() passes lockEnd, then resets the wrong-count
      counter.'
    - 'Web Admin Interface: WebServer on port 80 serves a minimal HTML form. Submitting a PIN to /add
      appends it to NVS. Submitting to /del searches NVS and removes the matching entry. The device IP
      is shown on the OLED at boot.'
    apps:
    - Rental property with per-guest PIN code management
    - Small office shared by multiple staff members
    - Home lab cabinet with an audit log of who accessed it
    - School storeroom with teacher-controlled PIN access
    troubleshooting:
    - - NVS PIN count resets unexpectedly
      - Confirm that prefs.begin() and prefs.end() are called in matching pairs everywhere PINs are read
        or written. Use the same namespace string "pins" in all calls.
    - - Web admin page fails to load
      - Verify the ESP32 IP from the OLED and that the browser is on the same Wi-Fi subnet. Ensure WiFi.status()==WL_CONNECTED
        before starting the server.
    - - NTP time shows 1970 epoch
      - 'Wait 5-10 seconds after Wi-Fi connects for NTP sync. Add a check: while(time(nullptr)<1000000000UL)
        delay(500); before logging events.'
    upgrades:
    - Add a DS3231 RTC for timekeeping when Wi-Fi is unavailable
    - Send a Telegram message on each unlock or lockout event
    - Add a door contact sensor and alert if the door stays open over 30 seconds
    - Implement HTTPS for the web admin page using a self-signed certificate
    code: "// ESP32 Smart Door Lock - Intermediate\n// Multi-PIN NVS + OLED + tamper lockout + web admin\n\
      #include <Keypad.h>\n#include <ESP32Servo.h>\n#include <Preferences.h>\n#include <Wire.h>\n#include\
      \ <Adafruit_SSD1306.h>\n#include <WiFi.h>\n#include <WebServer.h>\n#include <time.h>\n\nconst char*\
      \ SSID=\"YourSSID\";\nconst char* PASS=\"YourPassword\";\n\nPreferences prefs;\nAdafruit_SSD1306\
      \ oled(128,64,&Wire,-1);\nWebServer server(80);\nServo lockServo;\n\nconst byte ROWS=4,COLS=4;\n\
      char keys[4][4]={{\"1\",\"2\",\"3\",\"A\"},{\"4\",\"5\",\"6\",\"B\"},\n                  {\"7\"\
      ,\"8\",\"9\",\"C\"},{\"*\",\"0\",\"#\",\"D\"}};\nbyte rp[4]={13,12,14,27}, cp[4]={26,25,33,32};\n\
      Keypad kpad=Keypad(makeKeymap(keys),rp,cp,ROWS,COLS);\n\nString entered=\"\";\nint wrongCount=0;\n\
      bool lockedOut=false;\nunsigned long lockEnd=0;\n\nbool checkPIN(const String &pin){\n  prefs.begin(\"\
      pins\",true);\n  int n=prefs.getInt(\"count\",0);\n  for(int i=0;i<n;i++){\n    if(prefs.getString(String(i).c_str(),\"\
      \")==pin){\n      prefs.end(); return true;\n    }\n  }\n  prefs.end(); return false;\n}\n\nvoid\
      \ logEvent(const String &msg){\n  time_t now=time(nullptr);\n  String ts=ctime(&now); ts.trim();\n\
      \  oled.clearDisplay(); oled.setCursor(0,0);\n  oled.println(msg); oled.println(ts); oled.display();\n\
      \  Serial.println(msg+\" \"+ts);\n}\n\nvoid setup(){\n  Serial.begin(115200);\n  Wire.begin(21,22);\n\
      \  oled.begin(SSD1306_SWITCHCAPVCC,0x3C);\n  oled.setTextSize(1); oled.setTextColor(WHITE);\n  lockServo.attach(18);\
      \ lockServo.write(0);\n  pinMode(4,OUTPUT);pinMode(2,OUTPUT);pinMode(15,OUTPUT);\n  WiFi.begin(SSID,PASS);\n\
      \  while(WiFi.status()!=WL_CONNECTED) delay(500);\n  configTime(0,0,\"pool.ntp.org\");\n  server.on(\"\
      /\",[](){\n    server.send(200,\"text/html\",\n      \"<h2>Lock Admin</h2>\"\n      \"<form method=POST\
      \ action=/add><input name=pin><button>Add</button></form>\"\n      \"<form method=POST action=/del><input\
      \ name=pin><button>Del</button></form>\");\n  });\n  server.begin();\n  oled.clearDisplay(); oled.setCursor(0,0);\n\
      \  oled.print(\"IP: \"); oled.println(WiFi.localIP()); oled.display();\n}\n\nvoid loop(){\n  server.handleClient();\n\
      \  if(lockedOut){\n    if(millis()<lockEnd) return;\n    lockedOut=false; wrongCount=0;\n  }\n \
      \ char k=kpad.getKey();\n  if(!k) return;\n  if(k==\"#\"){\n    if(checkPIN(entered)){\n      wrongCount=0;\n\
      \      logEvent(\"UNLOCKED\");\n      digitalWrite(4,HIGH); lockServo.write(90);\n      delay(3000);\
      \ lockServo.write(0); digitalWrite(4,LOW);\n    } else {\n      wrongCount++;\n      logEvent(\"\
      DENIED #\"+String(wrongCount));\n      digitalWrite(2,HIGH);digitalWrite(15,HIGH);\n      delay(800);\
      \ digitalWrite(2,LOW);digitalWrite(15,LOW);\n      if(wrongCount>=3){ lockedOut=true; lockEnd=millis()+30000;\
      \ }\n    }\n    entered=\"\";\n  } else if(k==\"*\"){ entered=\"\"; }\n  else { entered+=k; }\n}"
    code_filename: esp32-smart-door-lock-intermediate.ino
  advanced:
    level: advanced
    overview_html: <p>The advanced build adds an MFRC522 RFID reader alongside the keypad, supporting
      both card and PIN authentication. Access schedules restrict which cards are active during specific
      hours. All events are published to an MQTT broker for integration with Home Assistant or Node-RED.
      Remote lock and unlock commands are received on a dedicated MQTT topic, enabling app-based door
      control from anywhere on the local network.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× MFRC522 RFID reader module — SPI interface, 3.3 V logic only
    - 1× 4x4 matrix keypad
    - 1× MG996R servo motor — 11 kg/cm for heavier latches
    - 2× MIFARE Classic 1K RFID cards — 13.56 MHz, fixed 4-byte UID
    - 1× SSD1306 OLED 128x64
    - 1× Mosquitto MQTT broker — On Raspberry Pi or local server
    wiring:
    - - MFRC522 SDA/CS
      - GPIO 5
      - SPI chip select
    - - MFRC522 SCK
      - GPIO 18
      - SPI clock
    - - MFRC522 MOSI
      - GPIO 23
      - SPI data out
    - - MFRC522 MISO
      - GPIO 19
      - SPI data in
    - - MFRC522 RST
      - GPIO 27
      - Reset pin
    - - MFRC522 3.3 V
      - 3V3 only
      - Never connect to 5 V
    - - Keypad + servo + OLED
      - Same as intermediate
      - GPIOs 18/19/23 shared with RFID SPI
    how:
    - 'RFID UID Reading: The MFRC522 communicates over SPI. PICC_IsNewCardPresent() detects a card in
      range and PICC_ReadCardSerial() fills rfid.uid.uidByte with the 4-7 byte unique identifier. The
      UID bytes are hex-formatted into a String for NVS lookup.'
    - 'Allowed Card Registry: Authorised card UIDs are stored in NVS under namespace "rfid". cardAllowed()
      iterates through stored UIDs and returns true on a match. UIDs are added via a web endpoint or a
      registration mode triggered by a physical button.'
    - 'MQTT Event Publishing: Every access attempt publishes a JSON payload to door/events containing
      the event type (RFID_UNLOCK, RFID_DENY, REMOTE_UNLOCK), credential ID, and Unix timestamp. Home
      Assistant or Node-RED can subscribe to trigger automations.'
    - 'Remote Lock Commands: The ESP32 subscribes to door/commands. Receiving "UNLOCK" sets remoteCmd
      and remoteUnlock flags. The main loop calls actuateServo(true) and publishes a REMOTE_UNLOCK event
      for the audit log.'
    apps:
    - Smart home integration with Home Assistant MQTT
    - Airbnb property with per-stay RFID card provisioning
    - Office server room with employee badge access and logging
    - School lab with time-restricted student card schedules
    troubleshooting:
    - - RFID reader detects no card
      - 'Confirm 3.3 V supply (never 5 V). Verify SPI wiring: SCK=18, MOSI=23, MISO=19, SS=5, RST=27.
        Run the MFRC522 DumpInfo example to confirm the reader initialises.'
    - - MQTT connection drops repeatedly
      - Call mqtt.setKeepAlive(60) and ensure mqtt.loop() runs every loop iteration. Add a 30-second heartbeat
        publish to prevent broker-side idle disconnection.
    - - Same card returns a different UID each tap
      - Some cards use UID randomisation. Use MIFARE Classic 1K cards with a fixed 4-byte UID for reliable
        registration.
    upgrades:
    - Add an AS608 fingerprint sensor as a third authentication method
    - Integrate with Home Assistant via MQTT auto-discovery
    - Send a photo via Telegram on each access attempt using an ESP32-CAM
    - Implement time-of-day schedules to restrict certain cards to business hours only
    code: "// ESP32 Smart Door Lock - Advanced (RFID + MQTT + schedules)\n#include <SPI.h>\n#include <MFRC522.h>\n\
      #include <PubSubClient.h>\n#include <WiFi.h>\n#include <ArduinoJson.h>\n#include <Preferences.h>\n\
      #include <time.h>\n\nMFRC522 rfid(5, 27); // SS=5, RST=27\n\nconst char* SSID=\"YourSSID\", *PASS=\"\
      YourPass\";\nconst char* MQTT_HOST=\"192.168.1.100\";\nconst char* TOPIC_EVT=\"door/events\";\n\
      const char* TOPIC_CMD=\"door/commands\";\n\nWiFiClient wifiClient;\nPubSubClient mqtt(wifiClient);\n\
      Preferences prefs;\nbool remoteCmd=false;\nbool remoteUnlock=false;\n\nvoid publishEvent(const char*\
      \ type, const char* id){\n  StaticJsonDocument<128> doc;\n  doc[\"type\"]=type; doc[\"id\"]=id;\
      \ doc[\"ts\"]=(long)time(nullptr);\n  char buf[128]; serializeJson(doc,buf);\n  mqtt.publish(TOPIC_EVT,buf);\n\
      }\n\nvoid mqttCallback(char* topic, byte* payload, unsigned int len){\n  String msg((char*)payload,len);\n\
      \  remoteCmd=true;\n  remoteUnlock=(msg==\"UNLOCK\");\n}\n\nbool cardAllowed(const String &uid){\n\
      \  prefs.begin(\"rfid\",true);\n  int n=prefs.getInt(\"count\",0);\n  for(int i=0;i<n;i++){\n  \
      \  if(prefs.getString(String(i).c_str(),\"\")==uid){\n      prefs.end(); return true;\n    }\n \
      \ }\n  prefs.end(); return false;\n}\n\nvoid actuateServo(bool open){\n  // servo.write(open ? 90\
      \ : 0);\n  Serial.println(open ? \"UNLOCK\" : \"LOCK\");\n}\n\nvoid setup(){\n  Serial.begin(115200);\n\
      \  SPI.begin(); rfid.PCD_Init();\n  WiFi.begin(SSID,PASS);\n  while(WiFi.status()!=WL_CONNECTED)\
      \ delay(500);\n  configTime(0,0,\"pool.ntp.org\");\n  mqtt.setServer(MQTT_HOST,1883);\n  mqtt.setCallback(mqttCallback);\n\
      }\n\nvoid loop(){\n  if(!mqtt.connected()){\n    mqtt.connect(\"ESP32DoorLock\");\n    mqtt.subscribe(TOPIC_CMD);\n\
      \  }\n  mqtt.loop();\n\n  if(remoteCmd){\n    actuateServo(remoteUnlock);\n    publishEvent(remoteUnlock?\"\
      REMOTE_UNLOCK\":\"REMOTE_LOCK\",\"app\");\n    remoteCmd=false;\n  }\n\n  if(rfid.PICC_IsNewCardPresent()\
      \ && rfid.PICC_ReadCardSerial()){\n    String uid=\"\";\n    for(byte i=0;i<rfid.uid.size;i++) uid+=String(rfid.uid.uidByte[i],HEX);\n\
      \    rfid.PICC_HaltA();\n    if(cardAllowed(uid)){\n      actuateServo(true);\n      publishEvent(\"\
      RFID_UNLOCK\",uid.c_str());\n      delay(3000);\n      actuateServo(false);\n    } else {\n    \
      \  publishEvent(\"RFID_DENY\",uid.c_str());\n    }\n  }\n}"
    code_filename: esp32-smart-door-lock-advanced.ino
