  wiring:
    illustration_alt: ESP32 Smart Door Lock wiring diagram
    summary: Wire the RFID reader or keypad input first, verify readings, then connect the servo or relay lock.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the RFID reader or keypad input power pins to the correct 3.3 V or 5 V rail according to its module
      label.
    - Connect the RFID reader or keypad input signal line to GPIO5/GPIO22.
    - Connect the servo or relay lock control input to GPIO26 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: RFID reader or keypad input
    esp32_pin: GPIO5/GPIO22
    direction: Input
    notes: Read before controlling output
  - signal: servo or relay lock
    esp32_pin: GPIO26
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: smart-door-lock.ino
    content: "#include <SPI.h>\n#include <MFRC522.h>\n#include <ESP32Servo.h>\n\n#define SS_PIN 5\n#define RST_PIN\
      \ 22\n#define SERVO_PIN 26\n\nMFRC522 rfid(SS_PIN, RST_PIN);\nServo lockServo;\nbyte allowedUid[] = {0xDE,\
      \ 0xAD, 0xBE, 0xEF};\n\nbool allowedCard() {\n  if (rfid.uid.size != sizeof(allowedUid)) return false;\n \
      \ for (byte i = 0; i < rfid.uid.size; i++) {\n    if (rfid.uid.uidByte[i] != allowedUid[i]) return false;\n\
      \  }\n  return true;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  SPI.begin();\n  rfid.PCD_Init();\n \
      \ lockServo.attach(SERVO_PIN);\n  lockServo.write(0);\n  Serial.println(\"Door lock ready\");\n}\n\nvoid loop()\
      \ {\n  if (!rfid.PICC_IsNewCardPresent() || !rfid.PICC_ReadCardSerial()) return;\n  if (allowedCard()) {\n\
      \    Serial.println(\"Unlocked for 5 seconds\");\n    lockServo.write(90);\n    delay(5000);\n    lockServo.write(0);\n\
      \  } else {\n    Serial.println(\"Unknown card\");\n  }\n  rfid.PICC_HaltA();\n}\n"
  expected_output: Serial Monitor should show a changing reading. When the RFID reader or keypad input reaches the
    test condition, the status LED and servo or relay lock should switch state. If the reading changes but the output
    does not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: RFID reader or keypad input never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: servo or relay lock does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
