  faqs:
  - question: Why does my DHT22 or BME280 temperature sensor reading look wrong?
    answer: Check sensor power, ground, DATA on GPIO4, and whether the sensor is near heat from the ESP32, relay,
      or fan.
  - question: Why does relay module or low-voltage fan driver not respond?
    answer: Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the
      output module uses active HIGH or active LOW logic.
  - question: Can I connect this to household HVAC wiring?
    answer: No. This tutorial is for a low-voltage fan or indicator prototype only. Do not connect mains or HVAC
      wiring to the breadboard circuit.
