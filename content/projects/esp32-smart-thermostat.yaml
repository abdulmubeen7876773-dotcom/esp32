  story: 'ESP32 Smart Thermostat turns the ESP32 into a real object that senses something, decides what it means,
    and reacts in the physical world.


    The important lesson is not only the finished thermostat controller. You learn how to separate input, decision
    logic, and output so a project stays debuggable instead of becoming a pile of wires and guesses.'
  eli12: Think of the ESP32 as the brain. The DHT22 or BME280 temperature sensor is how it notices the world. The
    relay module or low-voltage fan driver is how it answers back. The code is the rule book that tells the brain
    what to do when the numbers change.
  parent_safety: This tutorial is designed for low-voltage learning on USB or a regulated low-voltage supply. Unplug
    the ESP32 before changing wires. Keep motors, pumps, door hardware, and relay loads separate from the USB programming
    circuit. Do not use mains voltage on a breadboard.
  learning_objectives:
  - Wire and test the DHT22 or BME280 temperature sensor before connecting the rest of the circuit.
  - Map each signal to a named ESP32 GPIO and keep the code constants readable.
  - Control relay module or low-voltage fan driver using a clear threshold or command instead of hidden magic numbers.
  - Use Serial Monitor as an engineering tool, not only as a success message.
  - Identify power, wiring, and timing faults using a repeatable test checklist.
  circuit_explanation: The sensor side is a low-current digital input. The relay side is an isolated switch input
    controlled by GPIO26. The ESP32 does not power the load directly; it only commands the relay module. Shared
    ground lets the relay input understand the ESP32 signal.
  engineering_explanation: A thermostat should avoid rapid on-off switching near the setpoint. This is called hysteresis.
    Instead of turning the fan on at exactly 27 C and off at 27 C, the code turns it on above 27 C and off below
    25.5 C so the relay does not chatter.
  code_explanation: 'The code keeps the fan state in a Boolean variable. Two thresholds create hysteresis: one threshold
    turns the output on, and a lower threshold turns it off. This protects the relay and makes the system feel calm.'
  testing_checklist:
  - ESP32 appears on the correct port and accepts a basic blink upload.
  - Ground is shared between every module that exchanges signals with the ESP32.
  - Each GPIO in the code matches the wire connected on the breadboard.
  - Serial Monitor prints startup text at 115200 baud.
  - The DHT22 or BME280 temperature sensor value changes when you create a real test condition.
  - The relay module or low-voltage fan driver changes only when the expected condition is reached.
  - The circuit still behaves correctly after power is removed and restored.
