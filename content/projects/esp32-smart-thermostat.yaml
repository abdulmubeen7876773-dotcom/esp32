  code:
    filename: smart-thermostat.ino
    content: "#include \"DHT.h\"\n\n#define DHTPIN 4\n#define DHTTYPE DHT22\n#define RELAY_PIN 26\n\nconst float\
      \ FAN_ON_C = 27.0;\nconst float FAN_OFF_C = 25.5;\nbool fanOn = false;\nDHT dht(DHTPIN, DHTTYPE);\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, LOW);\n  dht.begin();\n\
      \  Serial.println(\"Smart thermostat ready\");\n}\n\nvoid loop() {\n  float tempC = dht.readTemperature();\n\
      \  if (isnan(tempC)) {\n    Serial.println(\"Temperature read failed\");\n    delay(2000);\n    return;\n\
      \  }\n\n  if (!fanOn && tempC >= FAN_ON_C) fanOn = true;\n  if (fanOn && tempC <= FAN_OFF_C) fanOn = false;\n\
      \n  digitalWrite(RELAY_PIN, fanOn ? HIGH : LOW);\n  Serial.print(\"Temp C: \"); Serial.print(tempC, 1);\n\
      \  Serial.print(\" | Fan: \"); Serial.println(fanOn ? \"ON\" : \"OFF\");\n  delay(2000);\n}\n"
  expected_output: 'Below the lower threshold, Serial Monitor prints Fan: OFF. Warm the sensor above the ON threshold
    and the relay LED should switch on. Let the sensor cool below the OFF threshold and the relay turns off.'
  common_mistakes:
  - text: Driving a fan motor directly from an ESP32 GPIO.
  - text: Using mains voltage on a breadboard.
  - text: Forgetting hysteresis and making the relay chatter.
  - text: Using a relay module that needs more current than the USB port can provide.
  troubleshooting:
  - problem: Relay LED never turns on
    fix: Check GPIO26, relay VCC requirement, and active HIGH versus active LOW logic.
  - problem: Temperature never changes
    fix: Wait between reads and confirm the DHT22 data pin matches GPIO4.
  - problem: ESP32 resets when relay switches
    fix: Use a separate supply for the load and keep relay power wiring short.
  - problem: Fan logic feels backwards
    fix: Invert the digitalWrite state if your relay module is active LOW.
