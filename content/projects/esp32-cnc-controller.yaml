levels:
  beginner:
    level: beginner
    overview_html: <p>A low-voltage single-axis motion demo where ESP32 GPIO14/GPIO27/GPIO26 control an A4988 driver connected
      to a stepper motor. This is not a certified CNC controller. Do not connect a spindle or real machine. Moving parts can
      pinch and drivers can become hot.</p>
    components:
    - ESP32 DevKit board
    - A4988 stepper driver module
    - NEMA 17 stepper motor
    - 12 V motor supply
    - 100 uF electrolytic capacitor
    wiring:
    - - A4988 STEP
      - GPIO14
      - One pulse per microstep/full step.
    - - A4988 DIR
      - GPIO27
      - Direction signal.
    - - A4988 ENABLE
      - GPIO26
      - LOW enables driver; HIGH disables.
    key_concepts:
    - The ESP32 sends logic-level signals to the A4988. Motor current comes from VMOT, not from ESP32 pins.
    - The demo uses bounded step counts and simple timing. Real CNC needs limit switches, emergency stop, acceleration planning,
      shielding, grounding, and enclosure design.
    applications: &id003
    - Stepper motor lesson
    - Motion-control prototype
    - CNC safety discussion
    troubleshooting:
    - - Motor vibrates but does not turn
      - Check coil pairs and reduce speed by increasing step delay.
    - - A4988 overheats
      - Disable power and lower the current limit.
    - - No motion
      - Check ENABLE polarity, common ground, and VMOT supply.
    improvements: &id002
    - Add limit switch inputs.
    - Add acceleration ramping.
    - Add a second axis only after single-axis safety is proven.
    code: "// ESP32 Low-Voltage CNC Motion Controller Demo\n// Single-axis STEP/DIR output for an A4988 driver. Not a complete\
      \ CNC controller.\nconst int STEP_PIN = 14;\nconst int DIR_PIN = 27;\nconst int EN_PIN = 26;\nlong stepDelayUs = 1000;\n\
      \nvoid stepMotor(long steps, bool forward) {\n  if (steps <= 0 || steps > 5000) {\n    Serial.println(\"Step count must\
      \ be 1..5000 for this demo.\");\n    return;\n  }\n  digitalWrite(EN_PIN, LOW);\n  digitalWrite(DIR_PIN, forward ? HIGH\
      \ : LOW);\n  for (long i = 0; i < steps; i++) {\n    digitalWrite(STEP_PIN, HIGH);\n    delayMicroseconds(stepDelayUs);\n\
      \    digitalWrite(STEP_PIN, LOW);\n    delayMicroseconds(stepDelayUs);\n  }\n  digitalWrite(EN_PIN, HIGH);\n}\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(STEP_PIN, OUTPUT);\n  pinMode(DIR_PIN, OUTPUT);\n  pinMode(EN_PIN, OUTPUT);\n\
      \  digitalWrite(EN_PIN, HIGH);\n  Serial.println(\"Low-voltage stepper motion demo ready.\");\n  Serial.println(\"Commands:\
      \ F<steps>, B<steps>, S<delay_us 500..5000>\");\n}\n\nvoid loop() {\n  if (!Serial.available()) return;\n  char cmd\
      \ = Serial.read();\n  long val = Serial.parseInt();\n  if (cmd == 'F') stepMotor(val, true);\n  else if (cmd == 'B')\
      \ stepMotor(val, false);\n  else if (cmd == 'S' && val >= 500 && val <= 5000) {\n    stepDelayUs = val;\n    Serial.printf(\"\
      Step delay set to %ld us\\n\", stepDelayUs);\n  }\n}\n"
    code_filename: esp32-cnc-controller-beginner.ino
