  what_you_build: A low-voltage single-axis motion demo where ESP32 GPIO14/GPIO27/GPIO26 control an A4988 driver connected
    to a stepper motor.
  story: 'Real CNC machines need serious safety systems. This project limits the scope to STEP/DIR learning with one bench
    motor and no spindle. The Golden version keeps the implementation narrow and testable: code constants, wiring, GPIO notes,
    expected output, limitations, and troubleshooting all describe the same educational prototype.'
  eli12: The ESP32 does not push the motor directly. It sends tiny step and direction messages to a driver board, and the
    driver powers the motor. The ESP32 reads a signal, checks it against a simple rule, and prints or changes an output so
    you can see what happened.
  parent_safety: This is not a certified CNC controller. Do not connect a spindle or real machine. Moving parts can pinch
    and drivers can become hot. Unplug USB and external power before rewiring. Stop if hardware becomes hot, uncomfortable,
    unstable, or unclear.
