    filename: esp32-cnc-controller.ino
    content: "// ESP32 Low-Voltage CNC Motion Controller Demo\n// Single-axis STEP/DIR output for an A4988 driver. Not a complete\
      \ CNC controller.\nconst int STEP_PIN = 14;\nconst int DIR_PIN = 27;\nconst int EN_PIN = 26;\nlong stepDelayUs = 1000;\n\
      \nvoid stepMotor(long steps, bool forward) {\n  if (steps <= 0 || steps > 5000) {\n    Serial.println(\"Step count must\
      \ be 1..5000 for this demo.\");\n    return;\n  }\n  digitalWrite(EN_PIN, LOW);\n  digitalWrite(DIR_PIN, forward ? HIGH\
      \ : LOW);\n  for (long i = 0; i < steps; i++) {\n    digitalWrite(STEP_PIN, HIGH);\n    delayMicroseconds(stepDelayUs);\n\
      \    digitalWrite(STEP_PIN, LOW);\n    delayMicroseconds(stepDelayUs);\n  }\n  digitalWrite(EN_PIN, HIGH);\n}\n\nvoid\
      \ setup() {\n  Serial.begin(115200);\n  pinMode(STEP_PIN, OUTPUT);\n  pinMode(DIR_PIN, OUTPUT);\n  pinMode(EN_PIN, OUTPUT);\n\
      \  digitalWrite(EN_PIN, HIGH);\n  Serial.println(\"Low-voltage stepper motion demo ready.\");\n  Serial.println(\"Commands:\
      \ F<steps>, B<steps>, S<delay_us 500..5000>\");\n}\n\nvoid loop() {\n  if (!Serial.available()) return;\n  char cmd\
      \ = Serial.read();\n  long val = Serial.parseInt();\n  if (cmd == 'F') stepMotor(val, true);\n  else if (cmd == 'B')\
      \ stepMotor(val, false);\n  else if (cmd == 'S' && val >= 500 && val <= 5000) {\n    stepDelayUs = val;\n    Serial.printf(\"\
      Step delay set to %ld us\\n\", stepDelayUs);\n  }\n}\n"
  code_explanation: Serial commands F and B move bounded step counts. S changes step delay within a safe range. ENABLE is
    disabled after each move.
  expected_output: Serial Monitor accepts F200, B200, and S1000 style commands. The motor moves one direction, reverses, and
    then disables between moves.
  common_mistakes:
  - text: Driving motor coils from ESP32 pins.
  - text: Running without setting A4988 current limit.
  - text: Forgetting common ground.
  - text: Calling this GRBL or production CNC.
  troubleshooting:
  - problem: Motor vibrates but does not turn
    fix: Check coil pairs and reduce speed by increasing step delay.
  - problem: A4988 overheats
    fix: Disable power and lower the current limit.
  - problem: No motion
    fix: Check ENABLE polarity, common ground, and VMOT supply.
  testing_checklist:
  - Verify logic wiring with motor supply off.
  - Set A4988 current limit.
  - Run F200 and B200 with an unloaded motor.
  - Confirm driver disables after motion.
  engineer_tips:
  - Use current-limited supplies.
  - Keep fingers away from moving shafts.
  - Add limit switches before multi-axis experiments.
