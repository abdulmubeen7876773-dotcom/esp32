slug: esp32-fire-alarm-system
title: ESP32 Fire Alarm System
category: Smart City
description: Combine an MQ-2 smoke sensor and DHT22 temperature sensor with the ESP32 to build a fire
  alarm that sounds locally, displays alerts on an OLED, and publishes MQTT notifications to a smart-home
  hub.
meta_description: Build an ESP32 fire alarm with MQ-2 smoke sensor and DHT22 temperature sensor. Covers
  local buzzer alerts, OLED display, and MQTT smart-home integration.
