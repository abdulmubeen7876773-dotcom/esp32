  wiring:
    illustration_alt: ESP32 Fire Alarm System wiring diagram
    summary: MQ-2 AOUT goes to GPIO34 through a 10 kOhm / 20 kOhm divider. LEDs use GPIO25 and GPIO26; buzzer uses GPIO27.
    steps:
    - Unplug USB before changing sensor, LED, or buzzer wiring.
    - Power MQ-2 VCC from 5 V/VIN and connect MQ-2 GND to ESP32 GND.
    - Route MQ-2 AOUT through the 10 kOhm / 20 kOhm divider and connect the divided node to GPIO34.
    - Connect red LED through a resistor to GPIO25 and green LED through a resistor to GPIO26.
    - Connect the buzzer module signal to GPIO27 and its ground to GND.
    - Reconnect USB, wait for sensor warmup, and watch Serial Monitor.
  gpio_map:
  - signal: MQ-2 AOUT divided
    esp32_pin: GPIO34
    direction: Input
    notes: ADC1 input-only pin; do not drive it as output.
  - signal: Red LED
    esp32_pin: GPIO25
    direction: Output
    notes: Alert indicator.
  - signal: Green LED
    esp32_pin: GPIO26
    direction: Output
    notes: Normal indicator.
  - signal: Buzzer
    esp32_pin: GPIO27
    direction: Output
    notes: Local alert output.
  circuit_explanation: The ESP32 reads the MQ-2 analog voltage after the divider. The code compares the 12-bit ADC value to
    SMOKE_THRESHOLD and switches the LEDs and buzzer.
  engineering_explanation: The threshold is a learning value, not a calibrated smoke limit. MQ sensors need warmup and can
    react to many gases, so false positives and missed conditions are possible.
  libraries:
  - name: Arduino ESP32 core
    note: No extra libraries required.
  code:
    filename: esp32-fire-alarm-system.ino
    content: "// ESP32 Smoke Sensor Alarm Demo - educational low-voltage prototype\nconst int MQ2_AOUT = 34;   // ADC1 input\
      \ through voltage divider\nconst int LED_R = 25;\nconst int LED_G = 26;\nconst int BUZZER = 27;\nconst int SMOKE_THRESHOLD\
      \ = 1800; // tune from clean-air Serial Monitor readings\n\nvoid setup() {\n  Serial.begin(115200);\n  analogReadResolution(12);\n\
      \  pinMode(LED_R, OUTPUT);\n  pinMode(LED_G, OUTPUT);\n  pinMode(BUZZER, OUTPUT);\n  digitalWrite(LED_G, HIGH);\n  Serial.println(\"\
      Educational smoke/gas sensor demo. Not a certified fire alarm.\");\n  Serial.println(\"MQ-2 warmup: wait at least 30\
      \ seconds before judging readings.\");\n  delay(30000);\n}\n\nvoid loop() {\n  int raw = analogRead(MQ2_AOUT);\n  bool\
      \ alert = raw > SMOKE_THRESHOLD;\n  Serial.printf(\"MQ2 raw=%d alert=%s\\n\", raw, alert ? \"YES\" : \"no\");\n  digitalWrite(LED_R,\
      \ alert ? HIGH : LOW);\n  digitalWrite(LED_G, alert ? LOW : HIGH);\n  digitalWrite(BUZZER, alert ? HIGH : LOW);\n  delay(1000);\n\
      }\n"
  code_explanation: MQ2_AOUT is GPIO34. The sketch waits for warmup, reads the ADC value, compares it with 1800, and drives
    GPIO25, GPIO26, and GPIO27.
  expected_output: Serial Monitor prints MQ2 raw values once per second. Values over 1800 turn the red LED and buzzer on while
    the green LED turns off.
  common_mistakes:
  - text: Calling the prototype a certified fire alarm.
  - text: Connecting MQ-2 AOUT directly to ESP32 when the module output can exceed 3.3 V.
  - text: Testing with open flame.
  - text: Skipping warmup before judging readings.
  troubleshooting:
  - problem: Reading is stuck near 0
    fix: Check MQ-2 power, common ground, and the divided AOUT node to GPIO34.
  - problem: Buzzer is always on
    fix: Raise the threshold after recording clean-air readings.
  - problem: Board resets
    fix: Use a stable USB supply and avoid powering high-current buzzers from GPIO.
  testing_checklist:
  - Power the sensor and wait at least 30 seconds.
  - Record clean-air readings.
  - Change the threshold and confirm outputs follow the printed value.
  - Power-cycle and confirm the normal green state returns.
  engineer_tips:
  - Label this as a smoke/gas sensor demo.
  - Keep the divider close to GPIO34.
  - Never install this as a real alarm.
  upgrade_ideas:
  - Add OLED raw reading display.
