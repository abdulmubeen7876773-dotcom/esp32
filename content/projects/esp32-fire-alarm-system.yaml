project:
  icon: FIRE
  mission_title: Build a Smoke Sensor Alert Demo
  difficulty: Intermediate
  age: Ages 13+
  recommended_age: Ages 13+
  estimated_time: 75-90 min
  budget: Under 25 USD
  adult_supervision: Adult supervision required for sensor warmup, buzzer noise, and any smoke/gas test source.
  classroom_use: Use as a sensor-threshold and safety-boundary discussion, not as a life-safety demonstration.
  parent_prompt: Ask what makes this different from a certified smoke detector.
  screen_free_activity: 'Draw the alert decision tree: clean air, rising reading, alert output, reset.'
  skills_practiced:
  - ADC1 analog input
  - Voltage divider protection
  - Threshold tuning
  - Safety limits
  learning_outcomes: &id001
  - Read MQ-2 analog output on ADC1 GPIO34.
  - Use LEDs and buzzer as local outputs.
  - Explain why the prototype is not a certified fire alarm.
  - Tune a threshold from Serial Monitor readings.
  mini_experiments:
  - Record clean-air readings after warmup.
  - Change SMOKE_THRESHOLD and observe when the alert starts.
  - Cover and uncover the sensor area without using flame.
  next_challenge: Add an OLED that shows raw sensor readings before adding any network notification.
  what_you_build: A low-voltage educational smoke/gas sensor demo using MQ-2 AOUT on GPIO34 through a divider, red/green LEDs,
    and a buzzer.
  story: 'Fire-alarm wording can be dangerous if it sounds like building-compliance hardware. This project is intentionally
    a bench demo for learning sensor thresholds and local alerts. This Golden version keeps the promise narrow: the parts
    list, code constants, GPIO table, expected output, safety notes, and troubleshooting all describe the same low-voltage
    educational build.'
  eli12: 'The MQ-2 module gives the ESP32 a number that tends to rise when the sensor reacts to smoke or gas around it. The
    ESP32 is the decision maker: it reads one signal, compares it with simple rules, then changes an output you can see or
    hear.'
  parent_safety: This is not a certified fire alarm, smoke detector, or life-safety system. Do not test with open flame. Unplug
    USB and any external supply before rewiring. Keep the build low-voltage on the bench and do not treat it as certified
    equipment.
