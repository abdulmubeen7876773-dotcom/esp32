      \ = 16000;\n  config.bits_per_sample = I2S_BITS_PER_SAMPLE_32BIT;\n  config.channel_format = I2S_CHANNEL_FMT_ONLY_LEFT;\n\
      \  config.communication_format = I2S_COMM_FORMAT_STAND_I2S;\n  config.intr_alloc_flags = ESP_INTR_FLAG_LEVEL1;\n  config.dma_buf_count\
      \ = 4;\n  config.dma_buf_len = 256;\n  i2s_pin_config_t pins = {I2S_BCLK, I2S_LRCLK, I2S_DATA, I2S_PIN_NO_CHANGE};\n\
      \  i2s_driver_install(I2S_NUM_0, &config, 0, nullptr);\n  i2s_set_pin(I2S_NUM_0, &pins);\n}\n\nuint32_t wheel(byte pos)\
      \ {\n  pos = 255 - pos;\n  if (pos < 85) return strip.Color(255 - pos * 3, 0, pos * 3);\n  if (pos < 170) {\n    pos\
      \ -= 85;\n    return strip.Color(0, pos * 3, 255 - pos * 3);\n  }\n  pos -= 170;\n  return strip.Color(pos * 3, 255\
      \ - pos * 3, 0);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  setupI2S();\n  strip.begin();\n  strip.setBrightness(BRIGHTNESS_CAP);\n\
      \  strip.clear();\n  strip.show();\n  Serial.println(\"Amplitude visualizer ready. External 5 V LED power required.\"\
      );\n}\n\nvoid loop() {\n  size_t bytesRead = 0;\n  i2s_read(I2S_NUM_0, samples, sizeof(samples), &bytesRead, portMAX_DELAY);\n\
      \  int count = bytesRead / sizeof(samples[0]);\n  if (count <= 0) return;\n\n  double sumSquares = 0;\n  for (int i\
      \ = 0; i < count; i++) {\n    int32_t s = samples[i] >> 14;\n    sumSquares += (double)s * (double)s;\n  }\n  float\
      \ rms = sqrt(sumSquares / count);\n  int lit = constrain(map((int)rms, 100, 6000, 0, LED_COUNT), 0, LED_COUNT);\n\n\
      \  strip.clear();\n  for (int i = 0; i < lit; i++) {\n    strip.setPixelColor(i, wheel(map(i, 0, LED_COUNT - 1, 100,\
      \ 0)));\n  }\n  strip.show();\n  Serial.println(rms);\n}\n"
  code_explanation: I2S reads 256 samples, computes RMS amplitude, maps it to lit LED count, and writes a capped-brightness
    NeoPixel bar.
  expected_output: Claps or music increase the number of lit LEDs. Silence settles toward a low or blank state.
  common_mistakes:
  - text: Claiming FFT or spectrum analysis.
  - text: Powering the strip from ESP32 3.3 V.
  - text: Forgetting common ground.
  - text: Skipping the data resistor or bulk capacitor.
  troubleshooting:
  - problem: No sound response
    fix: Check I2S pin mapping and INMP441 L/R wiring.
  - problem: LED flicker
    fix: Check common ground, data resistor, and external supply.
  - problem: LEDs too bright or supply hot
    fix: Lower BRIGHTNESS_CAP and reduce LED count.
  testing_checklist:
  - Test strip with brightness cap before audio.
  - Clap near the mic and observe response.
  - Check silence does not flicker randomly.
  engineer_tips:
  - Start with fewer LEDs.
  - Keep audio and LED power wires tidy.
  - Use RMS values only as relative volume.
