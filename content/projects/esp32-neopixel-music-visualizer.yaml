  faqs:
  - question: Is this a spectrum analyzer?
    answer: No. It reacts to amplitude/volume only.
  - question: Why external LED power?
    answer: WS2812B strips can draw more current than the ESP32 regulator can supply.
  - question: Is the microphone decibel accurate?
    answer: No. The values are relative for visual effects.
