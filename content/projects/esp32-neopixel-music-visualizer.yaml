levels:
  beginner:
    level: beginner
    overview_html: <p>An amplitude-reactive LED strip that responds to volume using I2S microphone samples. Use an external
      regulated 5 V supply for the strip, common ground, a data resistor, a bulk capacitor, and a brightness cap.</p>
    components:
    - ESP32 DevKit board
    - INMP441 I2S digital microphone
    - WS2812B LED strip, 8-30 LEDs
    - External regulated 5 V power supply
    - 330 ohm data resistor
    - 1000 uF electrolytic capacitor
    wiring:
    - - INMP441 BCLK
      - GPIO14
      - Digital microphone bit clock.
    - - INMP441 LRCLK
      - GPIO15
      - Boot strap pin; keep wiring passive.
    - - INMP441 SD
      - GPIO32
      - I2S data input.
    - - WS2812B DATA
      - GPIO5
      - Use series resistor.
    - - LED strip power
      - External 5 V / GND
      - Common ground with ESP32.
    key_concepts:
    - I2S carries digital audio samples from the mic. GPIO5 sends timed LED data while the strip is powered from its own 5
      V supply.
    - The sketch calculates RMS-like amplitude, not frequency bands. BRIGHTNESS_CAP limits current draw and is part of the
      safety design.
    applications: &id003
    - Volume-reactive desk light
    - RMS amplitude lesson
    - LED power budgeting demo
    troubleshooting:
    - - No sound response
      - Check I2S pin mapping and INMP441 L/R wiring.
    - - LED flicker
      - Check common ground, data resistor, and external supply.
    - - LEDs too bright or supply hot
      - Lower BRIGHTNESS_CAP and reduce LED count.
    improvements: &id002
    - Add decay smoothing.
    - Add color themes.
    - Add a documented approximate 3-band filter.
    code: "// ESP32 amplitude-reactive NeoPixel visualizer with INMP441 I2S microphone\n// This is volume/RMS reactive, not\
      \ FFT or spectrum analysis.\n#include <Adafruit_NeoPixel.h>\n#include \"driver/i2s.h\"\n\nconst int I2S_BCLK = 14;\n\
      const int I2S_LRCLK = 15;\nconst int I2S_DATA = 32;\nconst int LED_PIN = 5;\nconst int LED_COUNT = 30;\nconst int BRIGHTNESS_CAP\
      \ = 80;\n\nAdafruit_NeoPixel strip(LED_COUNT, LED_PIN, NEO_GRB + NEO_KHZ800);\nint32_t samples[256];\n\nvoid setupI2S()\
      \ {\n  i2s_config_t config = {};\n  config.mode = (i2s_mode_t)(I2S_MODE_MASTER | I2S_MODE_RX);\n  config.sample_rate\
      \ = 16000;\n  config.bits_per_sample = I2S_BITS_PER_SAMPLE_32BIT;\n  config.channel_format = I2S_CHANNEL_FMT_ONLY_LEFT;\n\
      \  config.communication_format = I2S_COMM_FORMAT_STAND_I2S;\n  config.intr_alloc_flags = ESP_INTR_FLAG_LEVEL1;\n  config.dma_buf_count\
      \ = 4;\n  config.dma_buf_len = 256;\n  i2s_pin_config_t pins = {I2S_BCLK, I2S_LRCLK, I2S_DATA, I2S_PIN_NO_CHANGE};\n\
      \  i2s_driver_install(I2S_NUM_0, &config, 0, nullptr);\n  i2s_set_pin(I2S_NUM_0, &pins);\n}\n\nuint32_t wheel(byte pos)\
      \ {\n  pos = 255 - pos;\n  if (pos < 85) return strip.Color(255 - pos * 3, 0, pos * 3);\n  if (pos < 170) {\n    pos\
      \ -= 85;\n    return strip.Color(0, pos * 3, 255 - pos * 3);\n  }\n  pos -= 170;\n  return strip.Color(pos * 3, 255\
      \ - pos * 3, 0);\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  setupI2S();\n  strip.begin();\n  strip.setBrightness(BRIGHTNESS_CAP);\n\
      \  strip.clear();\n  strip.show();\n  Serial.println(\"Amplitude visualizer ready. External 5 V LED power required.\"\
      );\n}\n\nvoid loop() {\n  size_t bytesRead = 0;\n  i2s_read(I2S_NUM_0, samples, sizeof(samples), &bytesRead, portMAX_DELAY);\n\
      \  int count = bytesRead / sizeof(samples[0]);\n  if (count <= 0) return;\n\n  double sumSquares = 0;\n  for (int i\
      \ = 0; i < count; i++) {\n    int32_t s = samples[i] >> 14;\n    sumSquares += (double)s * (double)s;\n  }\n  float\
      \ rms = sqrt(sumSquares / count);\n  int lit = constrain(map((int)rms, 100, 6000, 0, LED_COUNT), 0, LED_COUNT);\n\n\
      \  strip.clear();\n  for (int i = 0; i < lit; i++) {\n    strip.setPixelColor(i, wheel(map(i, 0, LED_COUNT - 1, 100,\
      \ 0)));\n  }\n  strip.show();\n  Serial.println(rms);\n}\n"
    code_filename: esp32-neopixel-music-visualizer-beginner.ino
