  wiring:
    illustration_alt: ESP32 Motion Security Alert wiring diagram
    summary: Wire the PIR motion sensor first, verify readings, then connect the buzzer or alert LED.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the PIR motion sensor power pins to the correct 3.3 V or 5 V rail according to its module label.
    - Connect the PIR motion sensor signal line to GPIO27.
    - Connect the buzzer or alert LED control input to GPIO25 and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
  gpio_map:
  - signal: PIR motion sensor
    esp32_pin: GPIO27
    direction: Input
    notes: Read before controlling output
  - signal: buzzer or alert LED
    esp32_pin: GPIO25
    direction: Output
    notes: Drive through a module or driver
  - signal: Status LED
    esp32_pin: GPIO2
    direction: Output
    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: motion-security-alert.ino
    content: "const int PIR_PIN = 27;\nconst int BUZZER_PIN = 25;\nconst int LED_PIN = 2;\n\nunsigned long lastMotion\
      \ = 0;\nconst unsigned long ALERT_TIME_MS = 10000;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(PIR_PIN,\
      \ INPUT);\n  pinMode(BUZZER_PIN, OUTPUT);\n  pinMode(LED_PIN, OUTPUT);\n  Serial.println(\"Motion alert warming\
      \ up for 30 seconds\");\n  delay(30000);\n}\n\nvoid loop() {\n  if (digitalRead(PIR_PIN) == HIGH) {\n    lastMotion\
      \ = millis();\n    Serial.println(\"Motion detected\");\n  }\n  bool alert = millis() - lastMotion < ALERT_TIME_MS;\n\
      \  digitalWrite(LED_PIN, alert ? HIGH : LOW);\n  digitalWrite(BUZZER_PIN, alert ? HIGH : LOW);\n  delay(100);\n\
      }\n"
  expected_output: Serial Monitor should show a changing reading. When the PIR motion sensor reaches the test condition,
    the status LED and buzzer or alert LED should switch state. If the reading changes but the output does not,
    debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: PIR motion sensor never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: buzzer or alert LED does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
