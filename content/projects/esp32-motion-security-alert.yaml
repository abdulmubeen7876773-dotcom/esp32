    code: "// ESP32 Motion Security Alert for Gate Entry\nconst int SENSOR_PIN = 33;\nconst int OUTPUT_PIN\
      \ = 25;\nconst int THRESHOLD = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: motion\
      \ security alert for gate entry\");\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n\
      }\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"Pir Motion Sensor\
      \ signal: \");\n  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN,\
      \ active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
