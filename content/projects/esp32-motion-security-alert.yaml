  faqs:
  - question: Why does my PIR motion sensor reading look wrong?
    answer: PIR modules need a short settling time and a clear view of warm moving objects. Check GPIO27 wiring and
      avoid pointing the sensor at heat sources.
  - question: Why does buzzer or alert LED not respond?
    answer: Check the ground connection first. Then confirm the output pin, power supply capacity, and whether the
      output module uses active HIGH or active LOW logic.
  - question: Is this a complete security system?
    answer: No. It is an educational motion alert node, not a certified alarm or crime-prevention system. Test it
      locally and do not rely on it for safety.
