  circuit_explanation: GPIO35 reads the current-sensor signal. GPIO19 changes state when the reading exceeds THRESHOLD.
  engineering_explanation: The sketch threshold is 1813 ADC counts from the imported source and must be calibrated. ADC1 is
    used so later Wi-Fi logging avoids ADC2 conflicts.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-machine-monitoring-node.ino
    content: "// ESP32 Machine Monitoring Node for Plant Floor with Cloud Sync\nconst int SENSOR_PIN = 35;\nconst int OUTPUT_PIN\
      \ = 19;\nconst int THRESHOLD = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: machine monitoring node\
      \ for plant floor with cloud sync\");\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop()\
      \ {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"Current Sensor signal: \");\n  Serial.println(reading);\n\
      \  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n\
      }"
  code_explanation: SENSOR_PIN is GPIO35 and OUTPUT_PIN is GPIO19. loop() reads analog current, compares it with THRESHOLD,
    switches the relay signal, and prints the reading.
  expected_output: Serial Monitor prints current-sensor ADC readings about every 300 ms. Readings above 1813 turn GPIO19 on;
    readings at or below 1813 turn it off.
  common_mistakes:
  - text: Trying to use GPIO35 as an output.
  - text: Assuming 1813 is calibrated for every sensor.
  - text: Connecting unsafe relay loads to a breadboard.
  troubleshooting:
  - problem: Relay chatters
    fix: Calibrate with real readings and add hysteresis before using the output.
  - problem: Reading is always 0 or 4095
    fix: Check sensor power, signal range, and GPIO35 wiring.
  - problem: Relay never switches
    fix: Confirm relay IN is on GPIO19 and the module has its required supply.
  testing_checklist:
  - Upload the sketch with only the documented circuit attached.
  - Open Serial Monitor and confirm the expected messages.
  - Move or trigger the input and watch the output change.
  - Power-cycle the project and confirm it starts safely.
  engineer_tips:
  - Change one variable at a time.
  - Keep wires short and labeled while testing.
  - Record any calibrated threshold before installing the project.
  upgrade_ideas:
