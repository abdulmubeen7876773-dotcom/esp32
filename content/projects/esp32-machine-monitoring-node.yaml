    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Conveyor Belt: ESP32 watches Current Sensor signal and activates Relay Output\
      \ control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n      \
      \  <li>Current Sensor signal connects to GPIO35 (ADC input)</li><li>Threshold is set to 1606 in\
      \ firmware (adjust after calibration)</li><li>Relay Output control is driven on GPIO19 when the\
      \ condition is met</li><li>The main loop samples every 300 ms while powered</li>\n      </ul>\n\
      \      </section>"
