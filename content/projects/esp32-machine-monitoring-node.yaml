  faqs:
  - question: Why use GPIO35?
    answer: GPIO35 is ADC1 input-only, which is appropriate for analog monitoring.
  - question: Can this switch mains equipment?
    answer: Only with proper relay ratings, enclosure, strain relief, fusing, and qualified supervision.
  - question: Is 1813 universal?
    answer: No. It is a starter threshold that must be calibrated.
