  estimated_time: 90-120 min
  budget: Under 25 USD
  what_you_build: A bench-safe monitor that reads an analog current-sensor signal on ADC1 GPIO35 and drives a low-voltage
    relay module input from GPIO19.
  story: Industrial monitoring starts by measuring one signal and proving one output. GPIO35 is input-only and belongs to
    ADC1, while GPIO19 controls the relay module input; the ESP32 pin never powers the relay coil or machine load. The component
    list, wiring table, GPIO map, code constants, expected output, troubleshooting, and FAQ now describe the same bench build
    so a learner can verify each step instead of guessing.
  eli12: The sensor makes a number that changes when current changes. If the number is higher than the threshold, GPIO19 tells
    the relay module input to switch. Prove the local wiring and code first, then add displays, logging, or Wi-Fi after the
    simple version behaves exactly as expected.
  parent_safety: Use only low-voltage demo loads unless a qualified adult handles the relay side; never place mains or machine
    wiring on a breadboard. Unplug USB and any external supply before rewiring, keep the build low-voltage on the bench, and
    stop immediately if a module becomes hot or behaves unexpectedly.
  learning_objectives:
  - Wire the exact GPIO pins used by the sketch.
  - Run the starter code and compare output with the wiring table.
  - Explain the main sensor or input signal in plain language.
  - Troubleshoot one wiring mistake using Serial Monitor evidence.
