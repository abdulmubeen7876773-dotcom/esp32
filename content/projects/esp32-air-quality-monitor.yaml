    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Climate Node: ESP32 watches Mq135 Gas Sensor signal and activates Fan Relay\
      \ control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n      \
      \  <li>Mq135 Gas Sensor signal connects to GPIO34 (ADC input)</li><li>Threshold is set to 1606 in\
