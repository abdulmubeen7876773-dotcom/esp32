  what_you_build: An ESP32 monitor that reads an MQ135 gas sensor, prints live raw values, and drives an alert output
    or fan relay when air quality crosses a tested threshold.
  story: 'ESP32 Air Quality Monitor solves a real beginner problem: turning an ESP32 reading into a useful physical
    or networked result. Build this to learn slow analog sensors, warm-up behavior, threshold tuning, and why gas
    sensor projects need calibration before automation.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code,
    then test the output under real conditions.'
  eli12: The MQ135 behaves like a smoke-sensitive nose that needs time to wake up. The ESP32 watches how the reading
    changes, then reacts only after you decide what counts as normal for your room.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug
    power before rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32
    unless a proper driver, enclosure, and adult supervision are used.
  learning_objectives:
  - Read a gas sensor as an analog input.
  - Create a fresh-air baseline before choosing an alert threshold.
  - Drive a relay or fan control signal safely from an ESP32 GPIO.
  - Understand why gas sensors need warm-up and calibration.
  - Separate trend monitoring from precise air-quality measurement.
