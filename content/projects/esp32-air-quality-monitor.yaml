    illustration_alt: ESP32 Air Quality Monitor wiring diagram
    summary: Wire the input hardware first, confirm readings in Serial Monitor, then connect the output hardware.
      The MQ135 module changes its analog output as gas concentration changes near the heated sensing element.
    steps:
