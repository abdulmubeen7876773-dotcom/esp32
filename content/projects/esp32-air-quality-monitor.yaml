  circuit_explanation: The MQ135 module changes its analog output as gas concentration changes near the heated sensing
    element. The ESP32 reads that voltage on an ADC pin. The relay or fan input is controlled from a GPIO pin, but
    the fan power must come from a suitable external supply or relay module, not directly from the ESP32 pin.
  engineering_explanation: Low-cost MQ gas modules are useful for trend detection, not laboratory-grade air measurement.
    They need warm-up time, stable power, fresh-air baseline readings, and threshold testing in the actual room.
    Treat the raw number as a relative indicator unless you have calibrated equipment and a known sensor curve.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-air-quality-monitor.ino
    content: "// ESP32 Air Quality Monitor for Indoor Air\nconst int SENSOR_PIN = 34;\nconst int OUTPUT_PIN = 26;\n\
      const int THRESHOLD = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: air quality monitor\
      \ for indoor air\");\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n\
      \  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"Mq135 Gas Sensor signal: \");\n  Serial.println(reading);\n\
      \  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n\
      }"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output
    pins in setup(), then repeats the measurement and decision logic in loop(). The loop prints the live reading
    first, compares it with a threshold, then changes the output. Printing before controlling the output makes debugging
    much easier because you can see what the ESP32 believes is happening.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when
    the tested condition for esp32 air quality monitor is reached.
  common_mistakes:
  - text: Expecting accurate ppm values from an uncalibrated MQ135 module.
  - text: Powering a fan or relay coil directly from an ESP32 GPIO.
  - text: Testing the sensor immediately after power-up before the heater stabilizes.
  - text: Forgetting common ground between ESP32 and the relay module.
  - text: Using GPIO34 as an output; it is input-only.
  troubleshooting:
  - problem: Sensor value never changes
    fix: Wait several minutes for warm-up, confirm VCC/GND, and print raw analog values before threshold logic.
  - problem: Relay chatters on and off
    fix: Add hysteresis or require several bad readings before turning the fan on.
  - problem: ESP32 resets when the fan starts
    fix: Use a separate power supply for the fan and relay module, and add proper flyback protection if using an
      inductive load.
  - problem: Values are high all the time
    fix: Move the sensor away from solder fumes, cleaners, smoke, or direct airflow and create a new baseline.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use the raw ADC number until you have a real calibration method.
  - Keep the sensor away from the ESP32 regulator heat.
  - Add hysteresis so the fan does not rapidly toggle near the threshold.
  - Never connect mains-powered fans directly on a breadboard.
  - Log baseline values at different times of day before deciding thresholds.
  performance_tips:
  - Sample slowly because MQ sensors respond slowly.
  - Use moving averages for smoother decisions.
  - Turn Wi-Fi publishing into a timed task instead of blocking sensor reads.
  - Use local threshold control if the network is unavailable.
