  faqs:
  - question: Does the MQ135 sensor need warm-up time?
    answer: Yes. The project troubleshooting already expects the raw value to settle after power-up, so wait several
      minutes before judging thresholds or turning the relay/fan logic on.
  - question: Can this monitor identify every harmful gas?
    answer: No. This build uses a simple MQ135 analog threshold, so treat it as an educational air-quality indicator,
      not as a certified safety monitor or gas detector.
  - question: Where should I place the sensor while testing?
    answer: Keep it away from solder fumes, cleaners, smoke, and direct fan airflow while you create a baseline.
      Those conditions can make the reading look high all the time.
