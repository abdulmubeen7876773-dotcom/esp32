    - Connect Mq135 Gas Sensor signal to GPIO34.
    - Connect Fan Relay control to GPIO26.
    - Connect VCC to 3.3V/5V.
    - Connect GND to GND.
    - Reconnect USB, upload the sketch, and open Serial Monitor at 115200 baud unless the code says otherwise.
