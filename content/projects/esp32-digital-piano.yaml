format: golden
project:
  icon: NOTE
  mission_title: Build a Touch-Key Digital Piano
  difficulty: Beginner
  age: Ages 10+
  recommended_age: Ages 10+
  estimated_time: 60-75 min
  budget: Under 20 USD
  adult_supervision: Adult help is useful when cutting copper tape and checking touch-pad wires.
  classroom_use: Good for showing input mapping, frequency, and PWM sound in one short lab.
  parent_prompt: Ask which code number changes pitch and which wire makes sound.
  screen_free_activity: Write a one-octave melody on paper using C4 to C5 note names.
  skills_practiced:
  - Capacitive touch input
  - LEDC PWM sound
  - Array mapping
  - One-output safety
  learning_outcomes: &id001
  - Map eight ESP32 touch pins to notes.
  - Generate safe square-wave tones on a passive piezo.
  - Explain why a speaker needs an amplifier or driver.
  - Change pitch or melody values in code.
  mini_experiments:
  - Change one frequency and listen to the pitch shift.
  - Slow the loop delay and notice touch response.
  - Reorder the NOTES array to make a new scale.
  next_challenge: Add a small amplifier module before trying a real speaker.
  what_you_build: A one-octave touch piano using ESP32 capacitive touch pads and a passive piezo buzzer on GPIO25.
  story: 'This project turns GPIO behavior into something musical. Touch pads become keys, code maps keys to frequencies,
    and a passive piezo plays one note at a time. This Golden version keeps the promise narrow: the parts list, code constants,
    GPIO table, expected output, safety notes, and troubleshooting all describe the same low-voltage educational build.'
  eli12: 'Each copper pad is a key. When your finger touches it, the ESP32 touch reading drops and the code plays the matching
    note frequency. The ESP32 is the decision maker: it reads one signal, compares it with simple rules, then changes an output
    you can see or hear.'
  parent_safety: Use a passive piezo buzzer or a proper amplifier module. Do not connect a bare speaker directly to an ESP32
    GPIO. Unplug USB and any external supply before rewiring. Keep the build low-voltage on the bench and do not treat it
    as certified equipment.
