  faqs:
  - question: Is this full polyphony?
    answer: No. The beginner sketch plays one touched key at a time.
  - question: Can I use a speaker?
    answer: Use an amplifier or driver, not a speaker directly on a GPIO pin.
  - question: Why are some touch pins boot-sensitive?
    answer: Several ESP32 touch pins also affect boot, so do not force them HIGH or LOW with extra hardware.
