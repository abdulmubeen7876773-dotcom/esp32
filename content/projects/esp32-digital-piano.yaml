slug: esp32-digital-piano
title: ESP32 Digital Piano
category: Education
description: Turn the ESP32 into a musical instrument using its built-in capacitive touch sensor pins as piano keys. Generate
  tones through a buzzer, then upgrade to I2S audio with a DAC for high-quality sine-wave sound, and finally add polyphony
  and MIDI output for a full synthesiser experience.
meta_description: Build an ESP32 digital piano with capacitive touch keys, I2S audio output, and MIDI over USB. From a simple
  buzzer piano to a full polyphonic synthesiser with waveform selection.
source_base: esp32-digital-piano-legacy-import
sensor: Touch keys C4-D4-E4-F4
output: Passive piezo
