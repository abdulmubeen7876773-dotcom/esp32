  wiring:
    illustration_alt: ESP32 Digital Piano wiring diagram
    summary: Eight copper pads connect to touch GPIOs 4, 15, 13, 12, 14, 27, 33, and 32. The passive piezo connects to GPIO25
      and GND.
    steps:
    - Unplug USB before moving touch-pad or buzzer wires.
    - Connect copper pads C4, D4, E4, F4 to GPIO4, GPIO15, GPIO13, and GPIO12.
    - Connect copper pads G4, A4, B4, C5 to GPIO14, GPIO27, GPIO33, and GPIO32.
    - Connect passive piezo positive to GPIO25 and negative to GND.
    - Keep touch pads from touching each other.
    - Reconnect USB and open Serial Monitor.
  gpio_map:
  - signal: Touch keys C4-D4-E4-F4
    esp32_pin: GPIO4 / GPIO15 / GPIO13 / GPIO12
    direction: Input
    notes: Capacitive touch inputs; avoid external pulls that affect boot.
  - signal: Touch keys G4-A4-B4-C5
    esp32_pin: GPIO14 / GPIO27 / GPIO33 / GPIO32
    direction: Input
    notes: Capacitive touch inputs.
  - signal: Passive piezo
    esp32_pin: GPIO25
    direction: PWM Output
    notes: LEDC square-wave output.
  circuit_explanation: The touch pads act as capacitive inputs. GPIO25 outputs a PWM square wave to a passive piezo when a
    touched key is detected.
  engineering_explanation: Some touch GPIOs are also boot-sensitive pins, so the pads must not be tied to fixed voltage rails.
    The code plays the first touched key only.
  libraries:
  - name: Arduino ESP32 core
    note: Uses built-in touchRead and LEDC functions.
  code:
    filename: esp32-digital-piano.ino
    content: "// ESP32 Digital Piano - capacitive touch keys and passive piezo\nconst int NOTES[8] = {262, 294, 330, 349,\
      \ 392, 440, 494, 523};\nconst char* NAMES[8] = {\"C4\", \"D4\", \"E4\", \"F4\", \"G4\", \"A4\", \"B4\", \"C5\"};\nconst\
      \ int TOUCH_PINS[8] = {4, 15, 13, 12, 14, 27, 33, 32};\nconst int BUZZER_PIN = 25;\nconst int TOUCH_THRESHOLD = 40;\n\
      const int BUZZER_CHANNEL = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n  ledcSetup(BUZZER_CHANNEL, 262, 8);\n  ledcAttachPin(BUZZER_PIN,\
      \ BUZZER_CHANNEL);\n  ledcWrite(BUZZER_CHANNEL, 0);\n  Serial.println(\"Touch one copper pad to play one note.\");\n\
      }\n\nvoid loop() {\n  int played = -1;\n  for (int i = 0; i < 8; i++) {\n    if (touchRead(TOUCH_PINS[i]) < TOUCH_THRESHOLD)\
      \ {\n      played = i;\n      break;\n    }\n  }\n  if (played >= 0) {\n    ledcChangeFrequency(BUZZER_CHANNEL, NOTES[played],\
      \ 8);\n    ledcWrite(BUZZER_CHANNEL, 128);\n    Serial.printf(\"Playing: %s (%d Hz)\\n\", NAMES[played], NOTES[played]);\n\
      \  } else {\n    ledcWrite(BUZZER_CHANNEL, 0);\n  }\n  delay(10);\n}\n"
  code_explanation: TOUCH_PINS maps each copper pad to a note in NOTES. When touchRead drops below 40, LEDC changes GPIO25
    to that note frequency.
  expected_output: Serial Monitor prints the note name and frequency when a pad is touched. The passive piezo plays one square-wave
    note and becomes silent when no pad is touched.
  common_mistakes:
  - text: Using an active buzzer, which cannot play different pitches well.
  - text: Connecting a speaker directly to GPIO25.
  - text: Letting copper pads touch each other.
  - text: Adding pull resistors to touch pins.
  troubleshooting:
  - problem: No note plays
    fix: Check GPIO25 piezo wiring and confirm Serial Monitor prints a key name.
  - problem: Wrong note plays
    fix: Check the copper pad wire order against TOUCH_PINS.
  - problem: Notes trigger by themselves
    fix: Increase TOUCH_THRESHOLD only after observing touchRead values.
  testing_checklist:
  - Touch each pad one at a time.
  - Confirm the printed note order C4 through C5.
  - Change one frequency and upload again.
  - Power-cycle and verify no key is stuck on.
  engineer_tips:
  - Keep pad wires short.
  - Use a passive piezo for direct GPIO demos.
  - Move to an amplifier for louder audio.
  upgrade_ideas:
  - Add a melody playback button.
  - Add octave shift values.
  - Add an I2S DAC and amplifier for better sound.
