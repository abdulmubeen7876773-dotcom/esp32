slug: esp32-soil-ph-monitor
title: ESP32 Soil pH Monitor
category: Agriculture
description: Connect an analog pH sensor probe to the ESP32 to continuously monitor soil acidity. Display
  readings on an OLED, log data to an SD card, and publish MQTT alerts when pH drifts outside the optimal
  range for your crops.
meta_description: Build an ESP32 soil pH monitor using an analog pH sensor probe. From basic pH reading
  to OLED display with automatic lime or fertiliser dosing recommendations via MQTT.
source_base: esp32-soil-ph-monitor-legacy-import
sensor: pH module AOUT
output: Red LED anode
featured: false
