  wiring:
    illustration_alt: ESP32 DevKit GPIO34 connected to the analog output of a pH conditioning board, with 3.3 V-compatible
      output and common ground.
    summary: The pH probe connects to its interface board. Only the conditioned AOUT signal goes to ESP32 ADC1 GPIO34,
      and the interface output must stay within 0-3.3 V.
    steps:
    - Unplug USB before wiring the pH interface board.
    - Connect the pH probe to the conditioning/interface board, not directly to the ESP32.
    - Connect interface GND to ESP32 GND.
    - Power the interface only as its datasheet allows, and confirm AOUT cannot exceed 3.3 V at the ESP32 pin.
    - Connect interface AOUT to GPIO34.
    - Calibrate with pH 7 and pH 4 buffers before measuring a soil-water slurry.
  gpio_map:
  - signal: pH interface AOUT
    esp32_pin: GPIO34
    direction: ADC1 input
    notes: Conditioned analog output only; must be 0-3.3 V.
  circuit_explanation: The glass pH probe is high impedance and must feed a conditioning board. The ESP32 reads
    only the board's conditioned voltage on ADC1 GPIO34.
  engineering_explanation: Two-point calibration sets the line between pH 7 and pH 4 buffer ADC values. Readings
    drift with probe condition, temperature, contamination, slurry preparation, and stabilization time, so the output
    is an estimated educational value.
  libraries:
  - name: Arduino ESP32 core
    note: No external library is required for the basic ADC sketch.
  code:
    filename: esp32-soil-ph-monitor.ino
    content: "// ESP32 educational soil pH monitor\n// Uses a pH interface board on ADC1 GPIO34. Calibrate before\
      \ reading soil slurry samples.\nconst int PH_PIN = 34;\n\nconst bool CALIBRATION_RECORDED = false; // Set\
      \ true only after recording your own pH 7 and pH 4 ADC values.\nconst float PH7_ADC = 2048.0;            //\
      \ Replace with stabilized ADC average in pH 7 buffer.\nconst float PH4_ADC = 1530.0;            // Replace\
      \ with stabilized ADC average in pH 4 buffer.\n\nfloat averageAdc() {\n  long sum = 0;\n  for (int i = 0;\
      \ i < 30; i++) {\n    sum += analogRead(PH_PIN);\n    delay(20);\n  }\n  return sum / 30.0;\n}\n\nfloat estimatedPh(float\
      \ raw) {\n  float slope = (7.0 - 4.0) / (PH7_ADC - PH4_ADC);\n  return 7.0 + slope * (raw - PH7_ADC);\n}\n\
      \nvoid setup() {\n  Serial.begin(115200);\n  analogReadResolution(12);\n  analogSetPinAttenuation(PH_PIN,\
      \ ADC_11db);\n  Serial.println(\"Educational soil pH monitor - calibrated estimates only.\");\n}\n\nvoid loop()\
      \ {\n  if (!CALIBRATION_RECORDED) {\n    Serial.println(\"Calibration required: record stable pH 7 and pH\
      \ 4 buffer ADC values, update constants, then set CALIBRATION_RECORDED true.\");\n    delay(2000);\n    return;\n\
      \  }\n\n  float raw = averageAdc();\n  float voltage = raw * 3.3 / 4095.0;\n  float ph = estimatedPh(raw);\n\
      \n  Serial.printf(\"Estimated calibrated pH: %.2f | ADC: %.0f | Interface voltage: %.2f V\\n\", ph, raw, voltage);\n\
      \  delay(5000);\n}\n"
  code_explanation: The sketch refuses to calculate pH until the user records real pH 7 and pH 4 ADC averages, updates
    the constants, and sets CALIBRATION_RECORDED true.
  expected_output: Before calibration, Serial Monitor repeatedly prints the calibration-required message. After
    valid constants are entered, it prints Estimated calibrated pH, ADC average, and interface voltage for the slurry
    sample.
  common_mistakes:
  - text: Connecting a bare pH probe directly to GPIO34.
  - text: Skipping pH 7 and pH 4 calibration.
  - text: Letting the interface output exceed 3.3 V at the ESP32 ADC pin.
  - text: Treating the estimate as lab-grade or agricultural advice.
  troubleshooting:
  - problem: Code only prints calibration required
    fix: Record stabilized pH 7 and pH 4 ADC values, update constants, and set CALIBRATION_RECORDED true.
  - problem: Readings drift
    fix: Rinse the probe, wait for stabilization, check probe storage, and repeat calibration if needed.
  - problem: ADC values are stuck or saturated
    fix: Confirm AOUT is wired to GPIO34, grounds are common, and the interface output stays within 0-3.3 V.
  testing_checklist:
  - Verify interface output range.
  - Record pH 7 buffer ADC.
  - Record pH 4 buffer ADC.
  - Measure only a soil-water slurry after stabilization.
  engineer_tips:
  - Use ADC1, not ADC2, when Wi-Fi may be added later.
  - Let readings stabilize.
  - Store and clean the probe according to its datasheet.
  upgrade_ideas:
  - Add an OLED that shows the calibration-required state.
  - Store calibration constants in NVS.
  - Add a temperature sensor and document compensation limits.
