  what_you_build: An educational soil pH estimator that reads a conditioned pH interface output on GPIO34 after
    mandatory two-point calibration.
  story: Soil pH sounds like one number, but the measurement depends on calibration, probe care, temperature, slurry
    preparation, and patience. This Golden project teaches the engineering workflow without pretending to be a lab
    instrument or agricultural decision system.
  eli12: A pH probe makes a tiny chemical voltage that needs a special interface board before the ESP32 can read
    it. You first teach the code what pH 7 and pH 4 look like, then it estimates a soil-water slurry reading from
    the ADC number.
  parent_safety: Use low-voltage 3.3 V ESP32 wiring and unplug USB before rewiring. Do not connect a bare pH probe
    directly to GPIO34. Keep calibration liquids away from eyes and mouths, rinse the probe gently, and do not use
    readings to decide fertilizer or crop treatment.
