  wiring:
    illustration_alt: ESP32 OLED Weather Clock wiring diagram
    summary: Wire the NTP time and optional BME280 sensor first, verify readings, then connect the SSD1306 OLED
      display.
    steps:
    - Unplug USB before placing modules on the breadboard.
    - Connect the NTP time and optional BME280 sensor power pins to the correct 3.3 V or 5 V rail according to its
      module label.
    - Connect the NTP time and optional BME280 sensor signal line to GPIO21/GPIO22.
    - Connect the SSD1306 OLED display control input to I2C OLED and share ground with the ESP32.
    - Power the ESP32 from USB and test the input reading before enabling the output.
