    notes: Optional debug indicator
  - signal: Serial Monitor
    esp32_pin: USB
    direction: Debug
    notes: 115200 baud
  code:
    filename: oled-weather-clock.ino
    content: "#include <WiFi.h>\n#include <Wire.h>\n#include <Adafruit_GFX.h>\n#include <Adafruit_SSD1306.h>\n#include\
      \ <time.h>\n\nconst char* ssid = \"YOUR_WIFI\";\nconst char* password = \"YOUR_PASSWORD\";\nAdafruit_SSD1306\
      \ display(128, 64, &Wire, -1);\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n  display.begin(SSD1306_SWITCHCAPVCC,\
      \ 0x3C);\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  WiFi.begin(ssid, password);\n\
      \  while (WiFi.status() != WL_CONNECTED) delay(300);\n  configTime(0, 0, \"pool.ntp.org\");\n}\n\nvoid loop()\
      \ {\n  struct tm timeinfo;\n  if (!getLocalTime(&timeinfo)) return;\n  display.clearDisplay();\n  display.setTextSize(2);\n\
      \  display.setCursor(0, 0);\n  display.printf(\"%02d:%02d\", timeinfo.tm_hour, timeinfo.tm_min);\n  display.setTextSize(1);\n\
      \  display.setCursor(0, 32);\n  display.println(\"ESP32 Weather Clock\");\n  display.println(WiFi.localIP());\n\
      \  display.display();\n  delay(1000);\n}\n"
  expected_output: Serial Monitor should show a changing reading. When the NTP time and optional BME280 sensor reaches
    the test condition, the status LED and SSD1306 OLED display should switch state. If the reading changes but
    the output does not, debug the output wiring separately.
  common_mistakes:
  - text: Testing input and output for the first time together.
  - text: Using a GPIO pin that does not match the code constant.
  - text: Expecting an ESP32 GPIO to power a motor, pump, or lock directly.
  - text: Forgetting the shared ground between modules.
  troubleshooting:
  - problem: NTP time and optional BME280 sensor never changes
    fix: Check power, ground, signal pin, and whether the sensor is analog or digital.
  - problem: SSD1306 OLED display does not switch
    fix: Test the output module with a simple blink-style sketch before using the full project.
  - problem: ESP32 resets under load
    fix: Use a separate supply for motors, pumps, or locks and keep only control signals connected to ESP32.
  - problem: Behavior is reversed
    fix: Your module may be active LOW; invert the output logic after confirming with Serial Monitor.
