  faqs:
  - question: Why does my NTP time and optional BME280 sensor reading look wrong?
    answer: Confirm Wi-Fi is connected before trusting NTP time, then check the optional BME280 I2C wiring on GPIO21
      and GPIO22.
  - question: Why does SSD1306 OLED display not respond?
    answer: Check OLED power, ground, SDA on GPIO21, SCL on GPIO22, and the display I2C address before replacing
      the screen.
  - question: Will the clock keep time without Wi-Fi?
    answer: The NTP version needs Wi-Fi to set time after boot. Add a real-time clock module only if you want local
      timekeeping without network access.
