levels:
  beginner:
    level: beginner
    overview_html: <p>In this beginner project you will connect the ESP32 to Wi-Fi, synchronise its internal
      clock with an NTP server, and display the current time and date on a 128x64 SSD1306 OLED screen.
      The display updates every second showing hours, minutes, seconds, day of the week, and full date.
      No external RTC module is needed because NTP keeps the ESP32 clock accurate for the life of the
      Wi-Fi session.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× SSD1306 OLED 128x64 I2C — 0.96 inch; I2C address 0x3C
    - 1× Wi-Fi router or hotspot — 2.4 GHz band
    - 1× Breadboard and jumper wires
    wiring:
    - - OLED SDA
      - GPIO 21
      - I2C data
    - - OLED SCL
      - GPIO 22
      - I2C clock
    - - OLED VCC
      - 3V3
      - ''
    - - OLED GND
      - GND
      - ''
    how:
    - 'NTP Time Synchronisation: configTime() sets the ESP32 SNTP client with the UTC offset, daylight
      saving offset, and NTP server address. The ESP32 sends a UDP request to pool.ntp.org which responds
      with a UTC timestamp accurate to within 50 ms over the internet.'
    - 'getLocalTime() Struct Population: getLocalTime() populates a tm struct with local time fields:
      tm_hour, tm_min, tm_sec, tm_mday, tm_mon (0-indexed), tm_year (years since 1900), and tm_wday (0=Sunday).
      Adding offsets converts these to the correct local display values.'
    - 'Two-Size OLED Layout: setTextSize(2) doubles the character size to 12x16 pixels for the time, making
      it readable at a glance. setTextSize(1) uses 6x8 pixel characters for the day, date, and week number
      below.'
    - 'Week Number: strftime() with the %V format code computes the ISO 8601 week number (1-53). This
      is useful for planning calendars and is not available directly from the tm struct fields.'
    apps:
    - Desktop clock for maker desk or workshop
    - Time display for photography or video recording setups
    - Office clock showing day and week number for scheduling
    - Classroom clock with large readable time display
    troubleshooting:
    - - OLED stays blank after startup
      - 'Check I2C address: run an I2C scanner sketch and confirm the OLED responds at 0x3C. Some OLED
        modules use 0x3D. Change the address in oled.begin() accordingly.'
    - - Time shows 1970 or does not update
      - The NTP sync is asynchronous. Wait at least 5 seconds after configTime() before calling getLocalTime().
        Add a while(!getLocalTime(&ti)) loop with a 500 ms delay.
    - - Time is off by several hours
      - Adjust the GMT_OFFSET constant. For UTC+5 use 5*3600=18000. For UTC-5 use -5*3600=-18000. Set
        DST_OFFSET=3600 if daylight saving is currently active.
    - - Display flickers every second
      - Call oled.clearDisplay() before drawing and oled.display() after. Do not call display() more than
        once per loop iteration. The flicker is from clearing the full screen buffer; use partial updates
        to reduce it.
    upgrades:
    - Add a battery and RTC module (DS3231) to maintain time without Wi-Fi
    - 'Add a brightness control: dim the OLED at night using a photoresistor'
    - Add a second time zone on the lower part of the display for remote teams
    - Add alarms stored in NVS that flash the OLED and sound a buzzer
    code: "// ESP32 OLED Weather Clock - Beginner\n// NTP time on SSD1306 OLED\n#include <Wire.h>\n#include\
      \ <Adafruit_SSD1306.h>\n#include <WiFi.h>\n#include <time.h>\n\nconst char* SSID=\"YourSSID\";\n\
      const char* PASS=\"YourPassword\";\nconst char* NTP=\"pool.ntp.org\";\nconst long  GMT_OFFSET=0;\
      \     // seconds east of UTC; adjust for your zone\nconst int   DST_OFFSET=0;     // daylight saving\
      \ offset in seconds\n\nAdafruit_SSD1306 oled(128,64,&Wire,-1);\n\nconst char* DAYS[]={\"Sunday\"\
      ,\"Monday\",\"Tuesday\",\"Wednesday\",\"Thursday\",\"Friday\",\"Saturday\"};\nconst char* MONTHS[]={\"\
      Jan\",\"Feb\",\"Mar\",\"Apr\",\"May\",\"Jun\",\n                       \"Jul\",\"Aug\",\"Sep\",\"\
      Oct\",\"Nov\",\"Dec\"};\n\nvoid setup(){\n  Serial.begin(115200);\n  Wire.begin(21,22);\n  oled.begin(SSD1306_SWITCHCAPVCC,0x3C);\n\
      \  oled.setTextColor(WHITE);\n\n  oled.clearDisplay(); oled.setTextSize(1);\n  oled.setCursor(0,0);\
      \ oled.println(\"Connecting WiFi...\");\n  oled.display();\n\n  WiFi.begin(SSID,PASS);\n  while(WiFi.status()!=WL_CONNECTED)\
      \ delay(500);\n  configTime(GMT_OFFSET,DST_OFFSET,NTP);\n\n  // Wait for NTP sync\n  struct tm ti;\n\
      \  while(!getLocalTime(&ti)) delay(500);\n  oled.clearDisplay(); oled.setCursor(0,0);\n  oled.println(\"\
      NTP synced!\");\n  oled.display(); delay(1000);\n}\n\nvoid loop(){\n  struct tm ti;\n  if(!getLocalTime(&ti))\
      \ return;\n\n  oled.clearDisplay();\n\n  // Large time display\n  oled.setTextSize(2);\n  oled.setCursor(10,5);\n\
      \  oled.printf(\"%02d:%02d:%02d\",ti.tm_hour,ti.tm_min,ti.tm_sec);\n\n  // Day and date\n  oled.setTextSize(1);\n\
      \  oled.setCursor(0,35);\n  oled.println(DAYS[ti.tm_wday]);\n  oled.setCursor(0,46);\n  oled.printf(\"\
      %d %s %d\",ti.tm_mday,MONTHS[ti.tm_mon],ti.tm_year+1900);\n\n  // Week number\n  oled.setCursor(0,57);\n\
      \  char week[12]; strftime(week,12,\"Week %V\",&ti);\n  oled.print(week);\n\n  oled.display();\n\
      \  delay(1000);\n}"
    code_filename: esp32-oled-weather-clock-beginner.ino
  intermediate:
    level: intermediate
    overview_html: '<p>The intermediate build adds real-time weather data from the OpenWeatherMap free
      API. The OLED cycles through two pages every 5 seconds: a clock page with time and date, and a weather
      page showing temperature, humidity, weather description, wind speed, and a sunrise/sunset indicator.
      A button lets you manually switch between pages. Data refreshes every 10 minutes to stay within
      the free API rate limit.</p>'
    components:
    - 1× ESP32 DevKit V1
    - 1× SSD1306 OLED 128x64 I2C
    - 1× Tactile push button — Manual page switch
    - 1× Wi-Fi router — Internet access required
    - 1× OpenWeatherMap API key — Free account at openweathermap.org
    - 1× Breadboard and wires
    wiring:
    - - OLED SDA/SCL
      - GPIO 21/22
      - ''
    - - Page button
      - GPIO 0
      - Internal pull-up; active LOW
    how:
    - 'OpenWeatherMap HTTP Request: HTTPClient fetches the /data/2.5/weather endpoint with the city name,
      country code, metric units, and API key. The response is a JSON object with nested fields for temperature,
      humidity, wind, description, and Unix timestamps for sunrise and sunset.'
    - 'ArduinoJson Parsing: StaticJsonDocument<1024> allocates a fixed-size parse buffer on the stack.
      deserializeJson() parses the HTTP response and populates the document. Individual values are accessed
      with array-style notation: doc["main"]["temp"].'
    - 'Dual-Page Auto-Cycle: The page variable toggles every 5 seconds using XOR (page^=1). A button press
      also toggles immediately. The showClock() and showWeather() functions each call oled.clearDisplay()
      and oled.display() to render their content atomically.'
    - 'Rate-Limited API Refresh: Weather data refreshes every 10 minutes (600,000 ms). The OpenWeatherMap
      free tier allows 60 calls per minute, so 10-minute intervals use just 144 calls per day, well within
      the 1000-call daily limit.'
    apps:
    - Smart home dashboard showing indoor time and outdoor weather
    - Desk accessory for remote workers checking local weather before commuting
    - Reception area display combining a clock and weather conditions
    - Weather station companion device for indoor OLED display
    troubleshooting:
    - - fetchWeather() always returns HTTP 401
      - A 401 error means the API key is invalid or not yet activated. New API keys take up to 2 hours
        to activate on OpenWeatherMap. Check the key in your account dashboard.
    - - Temperature reads 0 after a successful fetch
      - The city name or country code is incorrect, returning a valid HTTP 200 with an empty JSON body.
        Verify by printing the raw HTTP response to Serial and checking the city name spelling.
    - - OLED flickers on page auto-cycle
      - Move the auto-cycle timer outside the 1-second delay loop. The page changes mid-draw if the timer
        triggers during rendering. Check the lastSwitch comparison independently of the 1-second delay.
    upgrades:
    - Add a BME280 sensor to show both indoor and outdoor temperature side by side
    - Display a weather icon using bitmap_t arrays for sun, cloud, and rain symbols
    - Add a buzzer that chimes on the hour
    - Store the weather city name in NVS and allow changing it via a web config page
    code: "// ESP32 OLED Weather Clock - Intermediate (OpenWeatherMap + auto-page)\n#include <Wire.h>\n\
      #include <Adafruit_SSD1306.h>\n#include <WiFi.h>\n#include <HTTPClient.h>\n#include <ArduinoJson.h>\n\
      #include <time.h>\n\nconst char* SSID=\"YourSSID\", *PASS=\"YourPass\";\nconst char* OWM_KEY=\"\
      YourOpenWeatherMapKey\";\nconst char* CITY=\"London\";\nconst char* COUNTRY=\"GB\";\nconst long\
      \  GMT_OFFSET=0, DST_OFFSET=0;\n\nAdafruit_SSD1306 oled(128,64,&Wire,-1);\n\nfloat   temp_c=0, humidity=0,\
      \ wind_ms=0;\nString  description=\"--\";\nlong    sunrise=0, sunset=0;\nunsigned long lastWeather=0;\n\
      int page=0;\n\nvoid fetchWeather(){\n  HTTPClient http;\n  String url=\"http://api.openweathermap.org/data/2.5/weather?q=\"\
      ;\n  url+=CITY; url+=\",\"; url+=COUNTRY;\n  url+=\"&units=metric&appid=\"; url+=OWM_KEY;\n  http.begin(url);\n\
      \  if(http.GET()==200){\n    StaticJsonDocument<1024> doc;\n    deserializeJson(doc,http.getString());\n\
      \    temp_c    = doc[\"main\"][\"temp\"];\n    humidity  = doc[\"main\"][\"humidity\"];\n    wind_ms\
      \   = doc[\"wind\"][\"speed\"];\n    description=doc[\"weather\"][0][\"description\"].as<String>();\n\
      \    sunrise   = doc[\"sys\"][\"sunrise\"];\n    sunset    = doc[\"sys\"][\"sunset\"];\n  }\n  http.end();\n\
      }\n\nvoid showClock(){\n  struct tm ti; getLocalTime(&ti);\n  oled.clearDisplay();\n  oled.setTextSize(2);\
      \ oled.setCursor(8,5);\n  oled.printf(\"%02d:%02d:%02d\",ti.tm_hour,ti.tm_min,ti.tm_sec);\n  oled.setTextSize(1);\
      \ oled.setCursor(0,35);\n  char buf[32]; strftime(buf,32,\"%A %d %b %Y\",&ti);\n  oled.println(buf);\n\
      \  oled.display();\n}\n\nvoid showWeather(){\n  oled.clearDisplay(); oled.setTextSize(1);\n  oled.setCursor(0,0);\
      \  oled.printf(\"%.1f C  Hum:%.0f%%n\",temp_c,humidity);\n  oled.setCursor(0,10); oled.printf(\"\
      Wind: %.1f m/sn\",wind_ms);\n  oled.setCursor(0,20); oled.println(description.substring(0,20));\n\
      \n  // Sunrise/sunset icons using ASCII blocks\n  oled.setCursor(0,35);\n  time_t sr=sunrise, ss=sunset;\n\
      \  struct tm *sr_tm=localtime(&sr), *ss_tm=localtime(&ss);\n  oled.printf(\"Rise %02d:%02d  Set\
      \ %02d:%02d\",\n    sr_tm->tm_hour,sr_tm->tm_min,\n    ss_tm->tm_hour,ss_tm->tm_min);\n\n  oled.setCursor(0,50);\n\
      \  oled.print(CITY);\n  oled.display();\n}\n\nvoid setup(){\n  Serial.begin(115200);\n  Wire.begin(21,22);\n\
      \  oled.begin(SSD1306_SWITCHCAPVCC,0x3C);\n  oled.setTextColor(WHITE);\n  pinMode(0,INPUT_PULLUP);\n\
      \  WiFi.begin(SSID,PASS);\n  while(WiFi.status()!=WL_CONNECTED) delay(500);\n  configTime(GMT_OFFSET,DST_OFFSET,\"\
      pool.ntp.org\");\n  struct tm ti; while(!getLocalTime(&ti)) delay(500);\n  fetchWeather(); lastWeather=millis();\n\
      }\n\nvoid loop(){\n  if(digitalRead(0)==LOW){ page^=1; delay(200); }\n  if(millis()-lastWeather>600000){\
      \ fetchWeather(); lastWeather=millis(); }\n\n  // Auto-cycle every 5 seconds\n  static unsigned\
      \ long lastSwitch=0;\n  if(millis()-lastSwitch>5000){ page^=1; lastSwitch=millis(); }\n\n  if(page==0)\
      \ showClock(); else showWeather();\n  delay(1000);\n}"
    code_filename: esp32-oled-weather-clock-intermediate.ino
  advanced:
    level: advanced
    overview_html: <p>The advanced build adds a three-page OLED dashboard (clock, current weather, forecast
      summary), a local web server serving a full 7-day forecast page with a JavaScript temperature chart,
      an MQTT sync channel so multiple ESP32 clocks in the same building share one weather fetch, and
      a Wi-Fi Manager captive portal so you can change Wi-Fi credentials without reflashing.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× SSD1306 OLED 128x64 I2C
    - 1× Tactile push button — Page cycle
    - 1× Wi-Fi router with internet
    - 1× OpenWeatherMap account — Free API key
    - 1× MQTT broker (optional) — For multi-device sync
    wiring:
    - - OLED SDA/SCL
      - GPIO 21/22
      - ''
    - - Page button
      - GPIO 0
      - Internal pull-up
    how:
    - 'WiFiManager Captive Portal: WiFiManager creates a temporary access point named "ESP32-WeatherClock"
      if no saved credentials are found. A captive portal web page lets you enter the home Wi-Fi SSID
      and password from any smartphone without touching the code. Credentials are saved to NVS automatically.'
    - 'Three-Page OLED Cycle: Page 0 shows the NTP clock. Page 1 shows current weather from OpenWeatherMap.
      Page 2 shows the web forecast URL. Pages cycle every 5 seconds or on button press. The (page+1)%3
      modulo arithmetic wraps from page 2 back to page 0.'
    - 'MQTT Weather Sharing: After each API fetch, the current weather JSON is published to weather/shared
      on the MQTT broker. A second ESP32 clock in the same building can subscribe to this topic and skip
      its own API fetch, reducing API call count and ensuring display consistency.'
    - '7-Day Forecast Web Page: The /forecast endpoint parses the stored forecast JSON and renders a JavaScript
      canvas line chart of the next 7 temperature points. The chart is served as an inline HTML page accessible
      from any browser on the local network using the IP shown on the OLED page 2.'
    apps:
    - Smart home dashboard clock synced across multiple rooms
    - Office lobby display with live weather and 7-day forecast
    - Weather station OLED companion showing NTP-accurate time
    - IoT demonstration combining Wi-Fi, REST API, MQTT, and web server
    troubleshooting:
    - - WiFiManager portal does not appear after reset
      - Hold the page button while powering on to force portal mode, or call wm.resetSettings() once in
        setup() to clear saved credentials and trigger the portal on every boot during development.
    - - Forecast page shows an empty chart
      - The /data/2.5/forecast endpoint requires a valid city name and API key. Print forecastJson to
        Serial after fetching to confirm the response is not an error message.
    - - MQTT and web server conflict under load
      - Move the MQTT loop and weather fetch to a FreeRTOS task on core 0. Run the web server on core
        1. This prevents a heavy API response from blocking MQTT keep-alive packets.
    upgrades:
    - Add a BME280 sensor and publish indoor temperature to the same MQTT topic
    - Use the OpenWeatherMap One Call 3.0 API for hourly precipitation probability
    - Add a second OLED for a room-by-room indoor vs outdoor temperature comparison
    - Implement deep sleep between display updates for battery-powered operation
    code: "// ESP32 OLED Weather Clock - Advanced (3-page + web forecast + WiFiManager + MQTT)\n#include\
      \ <Wire.h>\n#include <Adafruit_SSD1306.h>\n#include <WiFiManager.h>\n#include <HTTPClient.h>\n#include\
      \ <ArduinoJson.h>\n#include <PubSubClient.h>\n#include <WebServer.h>\n#include <time.h>\n\nAdafruit_SSD1306\
      \ oled(128,64,&Wire,-1);\nWiFiClient wifiClient;\nPubSubClient mqtt(wifiClient);\nWebServer server(80);\n\
      \nconst char* OWM_KEY=\"YourKey\";\nconst char* CITY=\"London,GB\";\nconst char* MQTT_HOST=\"192.168.1.100\"\
      ;\nconst char* MQTT_TOPIC=\"weather/shared\";\n\nfloat temp=0,feels=0,humidity=0,wind=0;\nString\
      \ desc=\"--\";\nString forecastJson=\"{}\";\nint page=0;\nunsigned long lastFetch=0;\n\nvoid fetchAll(){\n\
      \  HTTPClient http;\n  // Current weather\n  http.begin(String(\"http://api.openweathermap.org/data/2.5/weather?q=\"\
      )+CITY+\"&units=metric&appid=\"+OWM_KEY);\n  if(http.GET()==200){\n    StaticJsonDocument<1024>\
      \ doc;\n    deserializeJson(doc,http.getString());\n    temp=doc[\"main\"][\"temp\"]; feels=doc[\"\
      main\"][\"feels_like\"];\n    humidity=doc[\"main\"][\"humidity\"]; wind=doc[\"wind\"][\"speed\"\
      ];\n    desc=doc[\"weather\"][0][\"description\"].as<String>();\n    // Share over MQTT\n    char\
      \ buf[256]; serializeJson(doc,buf);\n    mqtt.publish(MQTT_TOPIC,buf);\n  }\n  http.end();\n  //\
      \ 7-day forecast\n  http.begin(String(\"http://api.openweathermap.org/data/2.5/forecast?q=\")+CITY+\"\
      &cnt=7&units=metric&appid=\"+OWM_KEY);\n  if(http.GET()==200) forecastJson=http.getString();\n \
      \ http.end();\n}\n\nvoid serveForecast(){\n  StaticJsonDocument<2048> doc;\n  deserializeJson(doc,forecastJson);\n\
      \  String body=\"<h2>7-Day Forecast</h2><canvas id=c width=600 height=200></canvas>\"\n    \"<script>var\
      \ d=[\";\n  for(auto& item:doc[\"list\"].as<JsonArray>()){\n    body+=String((float)item[\"main\"\
      ][\"temp\"])+\",\";\n  }\n  body+=\"];\"\n    \"var ctx=document.getElementById(\"c\").getContext(\"\
      2d\");\"\n    \"ctx.beginPath();\"\n    \"d.forEach((v,i)=>ctx.lineTo(i*(600/d.length),200-v*3));\"\
      \n    \"ctx.stroke();</script>\";\n  server.send(200,\"text/html\",body);\n}\n\nvoid showPage(){\n\
      \  oled.clearDisplay(); oled.setTextSize(1);\n  if(page==0){\n    // Clock\n    struct tm ti; getLocalTime(&ti);\n\
      \    oled.setTextSize(2); oled.setCursor(8,5);\n    oled.printf(\"%02d:%02d\",ti.tm_hour,ti.tm_min);\n\
      \    oled.setTextSize(1); oled.setCursor(0,36);\n    char buf[24]; strftime(buf,24,\"%a %d %b %Y\"\
      ,&ti); oled.println(buf);\n  } else if(page==1){\n    // Current weather\n    oled.printf(\"%.1fC\
      \ (feels %.1fC)n\",temp,feels);\n    oled.printf(\"Hum:%.0f%% Wind:%.1fm/sn\",humidity,wind);\n\
      \    oled.println(desc.substring(0,21));\n  } else {\n    // Forecast hint\n    oled.println(\"\
      Forecast at:\");\n    oled.println(WiFi.localIP().toString());\n    oled.println(\"/forecast\");\n\
      \  }\n  oled.display();\n}\n\nvoid setup(){\n  Serial.begin(115200);\n  Wire.begin(21,22);\n  oled.begin(SSD1306_SWITCHCAPVCC,0x3C);\n\
      \  oled.setTextColor(WHITE);\n  oled.clearDisplay(); oled.setCursor(0,0);\n  oled.println(\"Starting...\"\
      ); oled.display();\n\n  WiFiManager wm;\n  wm.autoConnect(\"ESP32-WeatherClock\");\n\n  configTime(0,0,\"\
      pool.ntp.org\");\n  struct tm ti; while(!getLocalTime(&ti)) delay(500);\n\n  mqtt.setServer(MQTT_HOST,1883);\n\
      \  server.on(\"/forecast\",serveForecast);\n  server.begin();\n\n  fetchAll(); lastFetch=millis();\n\
      \  pinMode(0,INPUT_PULLUP);\n}\n\nvoid loop(){\n  server.handleClient();\n  if(!mqtt.connected())\
      \ mqtt.connect(\"ESP32Clock\");\n  mqtt.loop();\n  if(digitalRead(0)==LOW){ page=(page+1)%3; delay(200);\
      \ }\n  static unsigned long ls=0;\n  if(millis()-ls>5000){ page=(page+1)%3; ls=millis(); }\n  if(millis()-lastFetch>600000){\
      \ fetchAll(); lastFetch=millis(); }\n  showPage();\n  delay(1000);\n}"
