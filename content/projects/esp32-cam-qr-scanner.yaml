slug: esp32-cam-qr-scanner
title: ESP32-CAM QR Code Scanner
category: ESP32-CAM
description: Use the ESP32-CAM camera and the Quirc QR decoding library to scan and decode QR codes in
  real time, displaying results on a web page, logging them to an SD card, and publishing them as MQTT
  access-control events.
meta_description: Build an ESP32-CAM QR code scanner that decodes QR codes in real time. From Serial output
  to web display, SD logging, and MQTT-based access control.
