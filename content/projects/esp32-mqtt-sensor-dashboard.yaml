  faqs:
  - question: What happens if the MQTT broker is offline?
    answer: The ESP32 can still read the DHT22, but publishing fails until Wi-Fi and the broker connection recover.
      Use Serial Monitor to separate sensor faults from broker faults.
  - question: Are readings stored while the ESP32 is disconnected?
    answer: No. This tutorial publishes live readings and does not add offline storage, so missed messages are not
      replayed after reconnect.
  - question: Why does the dashboard stop updating?
    answer: Check that the ESP32, broker, and dashboard all use the same topic name. Then confirm the DHT22 has its
      10 kOhm pull-up and is not returning NAN.
