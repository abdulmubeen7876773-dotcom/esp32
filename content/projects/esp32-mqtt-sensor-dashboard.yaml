    esp32_pin: GND
    direction: Ground
    notes: Match this wire to the code constant.
  circuit_explanation: The DHT22 data pin uses a pull-up resistor so the signal idles HIGH. The ESP32 reads the
    sensor locally, then uses Wi-Fi to publish the value to the broker. The hardware circuit is simple; the engineering
    challenge is reliable network behavior.
  engineering_explanation: MQTT separates devices from dashboards. The ESP32 publishes temperature, humidity, and
    availability messages to named topics such as esp32engine/sensors/room1/temperature. A dashboard subscribes
    to those topics on the same broker. A reliable node reconnects after Wi-Fi loss, publishes at a reasonable interval,
    and keeps topic names consistent.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-mqtt-sensor-dashboard.ino
    content: "/*\n * ESP32 MQTT Sensor Dashboard — Beginner\n * Publishes DHT22 temp & humidity to MQTT every 30\
      \ seconds.\n * View live data in Node-RED, MQTT Explorer, or any subscriber.\n *\n * Setup:\n *   1) Install\
      \ Mosquitto broker on your network\n *   2) Install Node-RED + node-red-dashboard\n *   3) Import the Node-RED\
      \ flow from the project page\n *   4) Update SSID, PASSWORD, BROKER below\n *\n * Library: DHT (Adafruit),\
      \ PubSubClient (Nick O'Leary)\n */\n#include <WiFi.h>\n#include <PubSubClient.h>\n#include <DHT.h>\n\nconst\
      \ char* SSID     = \"YOUR_WIFI_SSID\";\nconst char* PASSWORD = \"YOUR_WIFI_PASSWORD\";\nconst char* BROKER\
      \   = \"192.168.1.100\";   // Your broker IP\nconst int   PORT     = 1883;\n\n#define DHT_PIN  4\n#define\
      \ DHT_TYPE DHT22\n\n// MQTT Topics (change \"room1\" to identify this sensor's location)\nconst char* TOPIC_TEMP\
      \ = \"esp32engine/sensors/room1/temperature\";\nconst char* TOPIC_HUM  = \"esp32engine/sensors/room1/humidity\"\
      ;\nconst char* TOPIC_AVAIL= \"esp32engine/sensors/room1/availability\";\n\nDHT dht(DHT_PIN, DHT_TYPE);\nWiFiClient\
      \ net;\nPubSubClient mqtt(net);\n\nvoid connectMQTT() {\n  while (!mqtt.connected()) {\n    Serial.print(\"\
      Connecting MQTT... \");\n    // Last Will: publish \"offline\" if we disconnect unexpectedly\n    if (mqtt.connect(\"\
      esp32-room1\", \"\", \"\", TOPIC_AVAIL, 0, true, \"offline\")) {\n      mqtt.publish(TOPIC_AVAIL, \"online\"\
      , true);\n      Serial.println(\"connected\");\n    } else {\n      Serial.printf(\"failed rc=%d — retry in\
      \ 5sn\", mqtt.state());\n      delay(5000);\n    }\n  }\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  dht.begin();\n\
      \  WiFi.begin(SSID, PASSWORD);\n  Serial.print(\"Connecting Wi-Fi\");\n  while (WiFi.status() != WL_CONNECTED)\
      \ { delay(400); Serial.print(\".\"); }\n  Serial.printf(\"nConnected: %sn\", WiFi.localIP().toString().c_str());\n\
      \  mqtt.setServer(BROKER, PORT);\n  connectMQTT();\n}\n\nvoid loop() {\n  if (!mqtt.connected()) connectMQTT();\n\
      \  mqtt.loop();\n\n  static unsigned long last = 0;\n  if (millis() - last >= 30000) {\n    last = millis();\n\
      \    float h = dht.readHumidity();\n    float t = dht.readTemperature();\n    if (!isnan(h) && !isnan(t))\
      \ {\n      mqtt.publish(TOPIC_TEMP, String(t, 2).c_str(), true);\n      mqtt.publish(TOPIC_HUM,  String(h,\
      \ 2).c_str(), true);\n      Serial.printf(\"Published: temp=%.2f  hum=%.2fn\", t, h);\n    }\n  }\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output
    pins in setup(), then repeats the measurement and decision logic in loop(). After Wi-Fi and MQTT connect, the
    ESP32 reads the sensor at a controlled interval and publishes values to a topic. The important habit is to keep
    publishing rate reasonable and print connection state while debugging.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when
    the tested condition for esp32 mqtt sensor dashboard is reached.
  common_mistakes:
  - text: Publishing every loop cycle and flooding the broker.
  - text: Hardcoding wrong Wi-Fi credentials and not printing connection status.
  - text: Forgetting the DHT22 pull-up resistor.
  - text: Using inconsistent MQTT topic names.
  - text: Ignoring reconnect logic after Wi-Fi drops.
  troubleshooting:
  - problem: MQTT messages never appear
    fix: Check broker IP, port 1883, topic name, and whether the ESP32 is on the same network.
  - problem: Wi-Fi connects but MQTT fails
    fix: Confirm broker firewall settings and test with a desktop MQTT client.
  - problem: Sensor reads NAN
    fix: Check DHT22 wiring, pull-up resistor, and library selection.
  - problem: Dashboard values freeze
    fix: Add reconnect logic and publish a heartbeat or timestamp.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use readable topics such as esp32/room1/temperature.
  - Publish JSON only when you need grouped values.
  - Keep sensor publishing interval slower than the sensor response time.
  - Never put real passwords in public screenshots or repositories.
  - Add Last Will and Testament for production MQTT nodes.
  performance_tips:
  - Publish every 5-30 seconds instead of every loop.
  - Reuse the MQTT client connection.
  - Avoid long blocking delays in reconnect code.
  - Use retained messages only for state values that should be remembered.
