  wiring:
    illustration_alt: ESP32 MQTT Sensor Dashboard wiring diagram
    summary: Wire the input hardware first, confirm readings in Serial Monitor, then connect the output hardware.
      The DHT22 data pin uses a pull-up resistor so the signal idles HIGH.
    steps:
    - Unplug USB before changing wires.
    - Connect DHT22 VCC to 3.3 V.
    - Connect DHT22 DATA to GPIO 4 (10 kΩ pull-up to 3.3 V).
    - Connect DHT22 GND to GND.
    - Reconnect USB, upload the sketch, and open Serial Monitor at 115200 baud unless the code says otherwise.
