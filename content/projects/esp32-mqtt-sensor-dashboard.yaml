project:
  icon: MQTT
  mission_title: Build an MQTT Sensor Dashboard
  difficulty: Intermediate
  age: Ages 12+
  estimated_time: 90-120 min
  budget: Under 25 USD
  what_you_build: An ESP32 sensor node that publishes DHT22 temperature and humidity readings to clear MQTT topics
    so a local dashboard can subscribe and display live data.
  story: 'ESP32 MQTT Sensor Dashboard solves a real beginner problem: turning an ESP32 reading into a useful physical
    or networked result. Build this after basic sensor missions when you are ready to learn the publish/subscribe
    pattern used in real IoT systems.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code,
    then test the output under real conditions.'
  eli12: MQTT is like a notice board. The ESP32 posts sensor readings to a topic, and any dashboard that subscribes
    to that topic can read the latest message.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug
    power before rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32
    unless a proper driver, enclosure, and adult supervision are used.
  learning_objectives:
  - Wire and read a DHT22 sensor.
  - Connect ESP32 to Wi-Fi safely in Arduino code.
  - Publish readings to an MQTT topic.
  - Understand broker, publisher, subscriber, and topic names.
  - Design topic names that scale beyond one sensor.
