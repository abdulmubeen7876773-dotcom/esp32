  wiring:
    illustration_alt: ESP32 IoT Weather Station wiring diagram
    summary: Wire the BME280 environmental sensor first, verify readings, then connect the Serial Monitor and optional
      OLED display.
    steps:
    - Unplug USB before wiring the breadboard.
    - Connect BME280 VCC to 3.3 V and GND to GND.
    - Connect BME280 SDA to GPIO21 and SCL to GPIO22.
    - If using OLED, connect its SDA and SCL to the same GPIO21/GPIO22 I2C bus.
    - Reconnect USB and open Serial Monitor at 115200 baud.
  gpio_map:
  - signal: BME280 SDA
    esp32_pin: GPIO21
    direction: I2C data
    notes: Shared I2C bus
  - signal: BME280 SCL
    esp32_pin: GPIO22
    direction: I2C clock
    notes: Shared I2C bus
  - signal: OLED SDA
    esp32_pin: GPIO21
    direction: I2C data
    notes: Optional display
  - signal: OLED SCL
    esp32_pin: GPIO22
    direction: I2C clock
    notes: Optional display
  code:
    filename: iot-weather-station.ino
    content: "#include <Wire.h>\n#include <Adafruit_BME280.h>\n\nAdafruit_BME280 bme;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  if (!bme.begin(0x76)) {\n    Serial.println(\"BME280 not found. Try address 0x77 and check wiring.\");\n\
      \    while (true) delay(10);\n  }\n  Serial.println(\"ESP32 weather station ready\");\n}\n\nvoid loop() {\n\
      \  float tempC = bme.readTemperature();\n  float humidity = bme.readHumidity();\n  float pressure = bme.readPressure()\
      \ / 100.0F;\n\n  Serial.print(\"Temp C: \"); Serial.print(tempC, 1);\n  Serial.print(\" | Humidity %: \");\
      \ Serial.print(humidity, 1);\n  Serial.print(\" | Pressure hPa: \"); Serial.println(pressure, 1);\n  delay(2000);\n\
      }\n"
  expected_output: Serial Monitor should show temperature in Celsius, humidity in percent, and pressure in hPa every
    two seconds. Warm the sensor gently with your hand and the temperature should rise slowly; breathe near it and
    humidity should increase.
  common_mistakes:
  - text: Using a BMP280 board and expecting humidity readings.
  - text: Powering the sensor from 5 V when the breakout is not 5 V tolerant.
  - text: Forgetting that BME280 address can be 0x76 or 0x77.
  - text: Placing the sensor directly above the warm ESP32 module.
  troubleshooting:
  - problem: BME280 not found
    fix: Try address 0x77, confirm SDA/SCL, and verify the module is powered from 3.3 V.
  - problem: Humidity reads NAN
    fix: You may have a BMP280 instead of BME280; BMP280 does not measure humidity.
  - problem: Readings jump too much
    fix: Move the sensor away from fingers, USB regulators, and direct breath.
  - problem: OLED goes blank
    fix: Check the OLED I2C address and confirm both devices share ground.
