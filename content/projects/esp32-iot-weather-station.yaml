  story: 'ESP32 IoT Weather Station turns the ESP32 into a real object that senses something, decides what it means,
    and reacts in the physical world.


    The important lesson is not only the finished weather station. You learn how to separate input, decision logic,
    and output so a project stays debuggable instead of becoming a pile of wires and guesses.'
  eli12: Think of the ESP32 as the brain. The BME280 environmental sensor is how it notices the world. The Serial
    Monitor and optional OLED display is how it answers back. The code is the rule book that tells the brain what
    to do when the numbers change.
  parent_safety: This tutorial is designed for low-voltage learning on USB or a regulated low-voltage supply. Unplug
    the ESP32 before changing wires. Keep motors, pumps, door hardware, and relay loads separate from the USB programming
    circuit. Do not use mains voltage on a breadboard.
  learning_objectives:
  - Wire and test the BME280 environmental sensor before connecting the rest of the circuit.
  - Map each signal to a named ESP32 GPIO and keep the code constants readable.
  - Control Serial Monitor and optional OLED display using a clear threshold or command instead of hidden magic
    numbers.
  - Use Serial Monitor as an engineering tool, not only as a success message.
  - Identify power, wiring, and timing faults using a repeatable test checklist.
  circuit_explanation: The BME280 and OLED both use I2C, so they share two signal lines. The ESP32 sends clock pulses
    on SCL and exchanges data on SDA. Pull-up resistors on most modules keep the bus idle HIGH, which is why the
    modules must use 3.3 V logic.
  engineering_explanation: Environmental readings drift when a sensor is heated by a board, touched by fingers,
    or placed in direct airflow. A good weather station separates sensing from heat sources, samples slowly, and
    prints raw values before any smoothing. Pressure is useful because it changes more slowly than temperature and
    can show weather trends.
  code_explanation: The sketch starts the I2C bus through the BME280 library, checks that the sensor answers at
    address 0x76, then reads temperature, humidity, and pressure every two seconds. The address check is important
    because many BME280 boards use 0x76 while some use 0x77.
  testing_checklist:
  - ESP32 appears on the correct port and accepts a basic blink upload.
  - Ground is shared between every module that exchanges signals with the ESP32.
  - Each GPIO in the code matches the wire connected on the breadboard.
  - Serial Monitor prints startup text at 115200 baud.
  - The BME280 environmental sensor value changes when you create a real test condition.
  - The Serial Monitor and optional OLED display changes only when the expected condition is reached.
  - The circuit still behaves correctly after power is removed and restored.
