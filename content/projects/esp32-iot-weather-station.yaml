  faqs:
  - question: Why does my BME280 environmental sensor reading look wrong?
    answer: Most wrong readings come from reversed power, loose breadboard rows, the wrong GPIO number in code,
      or reading the sensor before it has settled.
  - question: Why is the BME280 not found on I2C?
    answer: Check SDA on GPIO21, SCL on GPIO22, 3.3 V power, ground, and whether your breakout uses address 0x76
      or 0x77.
  - question: Why do readings drift when the board is on the desk?
    answer: Heat from the ESP32 or nearby electronics can warm the air around the sensor. Move the BME280 away from
      the ESP32 module for steadier room readings.
