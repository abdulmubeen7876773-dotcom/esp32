project:
  icon: 🌤
  mission_title: Build Your Mini Weather Station
  difficulty: Beginner
  age: Ages 10+
  estimated_time: 45–60 min
  budget: Under $20
  story: 'Your desk needs a weather reporter. Not a phone app — a real sensor you wired yourself.


    In this project you connect a DHT22 to your ESP32 and watch live temperature and humidity numbers
    appear on your screen. That''s the same building block used in classroom weather stations and greenhouse
    monitors.

    '
  eli12: 'The DHT22 feels the air — how warm it is and how damp it feels. Your ESP32 reads those numbers
    and sends them to your laptop through the USB cable, like a tiny weather text message every two seconds.

    '
  parent_safety: 'This project uses 3.3 V USB power only — no mains electricity. Children should have
    an adult nearby for USB connections and breadboard wiring. Unplug before changing wires.

    '
  what_you_build: 'A breadboard circuit with a DHT22 sensor and ESP32. Your code reads temperature (°C)
    and humidity (%) every two seconds and prints them to Serial Monitor.

    '
  components:
  - item: ESP32 DevKit board
    note: Any board with USB port
    link: /components/esp32-devkit.html
    icon: 🖥
  - item: DHT22 sensor module
    note: 3-pin module with built-in pull-up resistor
    link: /components/dht22.html
    icon: 🌡
  - item: Breadboard
    note: Half-size is fine
    icon: 🧩
  - item: Jumper wires
    note: Male-to-male, at least 4
    icon: 🔗
  - item: USB cable
    note: Data-capable, not charge-only
    icon: 🔌
  wiring:
    illustration_alt: DHT22 module connected to ESP32 — VCC to 3.3 V, GND to GND, DATA to GPIO4
    summary: Use a 3-pin DHT22 module. Match each wire before plugging in USB.
    steps:
    - Unplug USB. Place the ESP32 and DHT22 module on your breadboard.
    - Connect VCC on the module to 3.3 V on the ESP32.
    - Connect GND on the module to GND on the ESP32.
    - Connect DATA on the module to GPIO4 on the ESP32.
    - Double-check all three wires, then plug in USB.
  code:
    filename: mini_weather_station.ino
    content: "#include \"DHT.h\"\n\n#define DHTPIN 4\n#define DHTTYPE DHT22\n\nDHT dht(DHTPIN, DHTTYPE);\n\
      \nvoid setup() {\n  Serial.begin(115200);\n  dht.begin();\n  Serial.println(\"Mini Weather Station\
      \ ready!\");\n}\n\nvoid loop() {\n  float temp = dht.readTemperature();\n  float humidity = dht.readHumidity();\n\
      \n  if (isnan(temp) || isnan(humidity)) {\n    Serial.println(\"Read failed — check wiring\");\n\
      \  } else {\n    Serial.print(\"Temperature: \");\n    Serial.print(temp);\n    Serial.print(\"\
      \ C  |  Humidity: \");\n    Serial.print(humidity);\n    Serial.println(\" %\");\n  }\n\n  delay(2000);\n\
      }\n"
  expected_output: 'Open Serial Monitor at 115200 baud. Every 2 seconds you should see:


    Temperature: 24.3 C  |  Humidity: 55 %


    Breathe on the sensor or hold it near a window — the numbers should change.

    '
  common_mistakes:
  - text: Reading faster than every 2 seconds — the DHT22 needs a pause between reads.
  - text: DATA wire on the wrong GPIO pin compared to your code.
  - text: Using a charge-only USB cable that cannot upload code.
  - text: Loose breadboard connections that look connected but are not.
  troubleshooting:
  - problem: Serial shows Read failed
    fix: Check VCC, GND, and DATA wiring. Confirm GPIO4 in code matches your wire.
  - problem: No output in Serial Monitor
    fix: Set baud rate to 115200 and select the correct COM port for your ESP32.
  - problem: Numbers look wrong
    fix: Wait 30 seconds after power-on. Keep the sensor away from your breath for a stable reading.
  upgrade_ideas:
  - Add an OLED display to show readings without a laptop
  - Log readings to SD card every minute
  - Send data to a web dashboard over Wi-Fi (Advanced)
  - Trigger a fan when humidity goes above 70%
