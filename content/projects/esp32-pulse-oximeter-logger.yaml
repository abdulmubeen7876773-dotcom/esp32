  - I2C wiring
  - Optical sensor setup
  - Validity checks
  - Medical-safety wording
  learning_outcomes:
  - Wire MAX30102 SDA to GPIO21 and SCL to GPIO22.
  - Suppress stale readings when no finger is detected.
  - Label BPM and SpO2 as estimated educational values.
  - Explain why the project is not a medical device.
  mini_experiments:
  - Watch IR values change when a finger is placed on the sensor.
  - Compare stable and moving-finger readings.
  - Adjust the finger threshold only after recording idle sensor values.
  next_challenge: Log raw red/IR values to CSV and analyze motion artifacts offline.
  what_you_build: A MAX30102 I2C logger that prints estimated BPM, estimated SpO2, and raw red/IR values while suppressing
    no-finger readings.
  story: 'A pulse oximeter looks simple from the outside, but the electronics are really watching tiny changes in
    reflected red and infrared light. This Golden version keeps the project honest: it is an educational signal
    logger, not a health monitor, diagnosis tool, emergency device, or clinical instrument.'
  eli12: The MAX30102 shines red and infrared light into a fingertip and measures how much light comes back. The
    ESP32 watches the changing numbers and prints estimated values so you can learn about optical sensing. If there
    is no finger, the sketch refuses to show stale estimates.
  parent_safety: This is a 3.3 V USB-powered education project only. Unplug USB before rewiring. Do not use readings
    for diagnosis, treatment, emergency decisions, fitness clearance, or health reassurance. Clean the contact area
    between users and stop if anyone feels uncomfortable.
