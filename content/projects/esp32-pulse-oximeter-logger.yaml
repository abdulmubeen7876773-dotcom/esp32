    code: "// ESP32 Pulse Oximeter Logger - educational raw samples only\n#include <Wire.h>\n#include \"MAX30105.h\"\n\nMAX30105 sensor;\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n  if (!sensor.begin(Wire, I2C_SPEED_STANDARD)) {\n    Serial.println(\"MAX30102 not found. Check SDA/SCL wiring.\");\n    while (true) delay(1000);\n  }\n  sensor.setup();\n  Serial.println(\"Educational raw red/IR logging only - not medical data.\");\n}\n\nvoid loop() {\n  Serial.print(\"Red: \");\n  Serial.print(sensor.getRed());\n  Serial.print(\" IR: \");\n  Serial.println(sensor.getIR());\n  delay(250);\n}"
