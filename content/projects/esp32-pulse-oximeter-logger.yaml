  adult_supervision: Required for shared classroom use and for understanding the medical boundary.
  classroom_use: Use this as an optics and signal-processing lesson, not as a health screening station.
  parent_prompt: Ask why an estimated classroom sensor reading is not the same as a clinical measurement.
  screen_free_activity: Draw how red and infrared light pass through a fingertip and scatter back to the sensor.
