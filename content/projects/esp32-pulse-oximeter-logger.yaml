    code: "// ESP32 Pulse Oximeter Logger for Bedside Monitor\nconst int SENSOR_PIN = 21;\nconst int OUTPUT_PIN\
      \ = 22;\nconst int THRESHOLD = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"Starting: pulse\
      \ oximeter logger for bedside monitor\");\n  Serial.print(\"Threshold: \");\n  Serial.println(THRESHOLD);\n\
      }\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"Max30102 Sensor signal:\
      \ \");\n  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n  digitalWrite(OUTPUT_PIN,\
      \ active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
