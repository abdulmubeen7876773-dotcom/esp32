    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for SpO2 Tracker: ESP32 watches Max30102 Sensor signal and activates Oled Display\
      \ control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n      \
      \  <li>Max30102 Sensor signal connects to GPIO21 (ADC input)</li><li>Threshold is set to 1606 in\
      \ firmware (adjust after calibration)</li><li>Oled Display control is driven on GPIO22 when the\
      \ condition is met</li><li>The main loop samples every 300 ms while powered</li>\n      </ul>\n\
      \      </section>"
