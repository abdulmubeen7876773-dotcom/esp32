    direction: I2C clock
    notes: Default ESP32 I2C SCL in this sketch.
  circuit_explanation: The MAX30102 breakout handles the optical sensor front end and communicates with the ESP32
    over I2C.
  engineering_explanation: The finger threshold is a practical validity gate for this educational setup. Estimated
    BPM and SpO2 are heuristic classroom outputs and are not calibrated clinical measurements.
  libraries:
  - name: SparkFun MAX3010x library
    note: Provides MAX30105/MAX30102 sensor access and heartRate helper.
  code:
    filename: esp32-pulse-oximeter-logger.ino
    content: "// ESP32 MAX30102 educational pulse-wave estimate logger\n// Not a medical device. Not for diagnosis,\
      \ treatment, or emergency use.\n#include <Wire.h>\n#include \"MAX30105.h\"\n#include \"heartRate.h\"\n\nMAX30105\
      \ sensor;\n\nconst long FINGER_IR_THRESHOLD = 50000;\nconst byte RATE_SIZE = 4;\nbyte rates[RATE_SIZE];\n\
      byte rateSpot = 0;\nlong lastBeat = 0;\nfloat estimatedBpm = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  Wire.begin(21, 22);\n\n  if (!sensor.begin(Wire, I2C_SPEED_STANDARD)) {\n    Serial.println(\"MAX30102\
      \ not found. Check SDA GPIO21, SCL GPIO22, 3.3 V, and GND.\");\n    while (true) delay(10);\n  }\n\n  sensor.setup();\n\
      \  sensor.setPulseAmplitudeRed(0x1F);\n  sensor.setPulseAmplitudeIR(0x1F);\n  Serial.println(\"Educational\
      \ MAX30102 logger ready - estimated values only, not medical data.\");\n}\n\nvoid loop() {\n  long irValue\
      \ = sensor.getIR();\n  long redValue = sensor.getRed();\n\n  if (irValue < FINGER_IR_THRESHOLD) {\n    estimatedBpm\
      \ = 0;\n    Serial.println(\"No finger detected - estimated BPM/SpO2 suppressed (educational only).\");\n\
      \    delay(500);\n    return;\n  }\n\n  if (checkForBeat(irValue)) {\n    long now = millis();\n    long delta\
      \ = now - lastBeat;\n    lastBeat = now;\n\n    float bpm = 60.0 / (delta / 1000.0);\n    if (bpm > 40 &&\
      \ bpm < 180) {\n      rates[rateSpot++] = (byte)bpm;\n      rateSpot %= RATE_SIZE;\n      int total = 0;\n\
      \      int count = 0;\n      for (byte i = 0; i < RATE_SIZE; i++) {\n        if (rates[i] > 0) {\n       \
      \   total += rates[i];\n          count++;\n        }\n      }\n      if (count > 0) estimatedBpm = (float)total\
      \ / count;\n    }\n  }\n\n  float ratio = redValue > 0 ? (float)irValue / (float)redValue : 0.0;\n  float\
      \ estimatedSpo2 = constrain(104.0 - 17.0 * ratio, 70.0, 100.0);\n\n  Serial.printf(\"Estimated BPM: ~%.0f\
      \ - educational only | Estimated SpO2: ~%.0f%% - educational only | IR: %ld Red: %ld\\n\",\n             \
      \   estimatedBpm, estimatedSpo2, irValue, redValue);\n  delay(100);\n}\n"
  code_explanation: The sketch initializes I2C on GPIO21/GPIO22, suppresses estimates below the IR finger threshold,
    averages plausible beat intervals, and prints every value as estimated educational data.
  expected_output: With no finger, Serial Monitor reports that estimates are suppressed. With a steady finger, it
    prints lines such as Estimated BPM and Estimated SpO2 along with raw IR and red counts; these are learning values
    only.
  common_mistakes:
  - text: Treating estimated values as medical readings.
  - text: Powering a 3.3 V-only breakout from 5 V.
  - text: Swapping SDA and SCL.
  - text: Showing old readings after the finger is removed.
  troubleshooting:
  - problem: MAX30102 not found
    fix: Check 3.3 V, GND, SDA GPIO21, SCL GPIO22, and library installation.
  - problem: No finger detected all the time
    fix: Check finger placement and record idle IR values before changing the threshold.
  - problem: Estimated BPM jumps around
    fix: Hold still, block bright ambient light, and remember the value is not clinical.
  testing_checklist:
  - Confirm I2C detection.
  - Confirm no-finger suppression.
  - Confirm labels say Estimated.
  - Clean shared sensor surfaces.
  engineer_tips:
  - Keep I2C wires short.
  - Use raw IR/red data for debugging.
  - Never publish health claims from this sketch.
  upgrade_ideas:
