slug: esp32-uv-index-monitor
title: ESP32 UV Index Monitor
category: Environmental
description: Measure ultraviolet radiation intensity with the ESP32 and VEML6075 UVA/UVB sensor. Display
  the real-time WHO UV index and risk level on an OLED, accumulate personal daily UV dose, and alert via
  Telegram when outdoor UV exposure reaches dangerous levels.
meta_description: Build an ESP32 UV index monitor with the VEML6075 sensor. Measure UVA and UVB radiation,
  display the WHO UV risk level, accumulate daily UV dose, and send Telegram sunburn alerts.
