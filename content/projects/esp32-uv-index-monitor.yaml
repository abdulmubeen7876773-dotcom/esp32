    filename: esp32-uv-index-monitor.ino
    content: "// ESP32 VEML6075 estimated UV index monitor\n// Educational estimate only; follow official weather and health\
      \ guidance.\n#include <Wire.h>\n#include <Adafruit_SSD1306.h>\n#include <Adafruit_VEML6075.h>\n\nAdafruit_VEML6075 uv\
      \ = Adafruit_VEML6075();\nAdafruit_SSD1306 oled(128, 64, &Wire, -1);\n\nconst char *uvBand(float estimatedUv) {\n  if\
      \ (estimatedUv < 3.0) return \"Low estimate\";\n  if (estimatedUv < 6.0) return \"Moderate estimate\";\n  if (estimatedUv\
      \ < 8.0) return \"High estimate\";\n  if (estimatedUv < 11.0) return \"Very high estimate\";\n  return \"Extreme estimate\"\
      ;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n  oled.begin(SSD1306_SWITCHCAPVCC, 0x3C);\n\
      \  oled.setTextColor(WHITE);\n\n  if (!uv.begin()) {\n    Serial.println(\"VEML6075 not found. Check 3.3 V, SDA GPIO21,\
      \ and SCL GPIO22.\");\n    while (true) delay(10);\n  }\n  Serial.println(\"Estimated UV Index monitor ready. Educational\
      \ use only.\");\n}\n\nvoid loop() {\n  float uva = uv.readUVA();\n  float uvb = uv.readUVB();\n  float estimatedUv =\
      \ uv.readUVI();\n  const char *band = uvBand(estimatedUv);\n\n  Serial.printf(\"Estimated UV Index: %.1f  Band: %s \
      \ UVA raw: %.1f  UVB raw: %.1f\\n\",\n                estimatedUv, band, uva, uvb);\n\n  oled.clearDisplay();\n  oled.setCursor(0,\
      \ 0);\n  oled.setTextSize(1);\n  oled.println(\"Estimated UV Index\");\n  oled.setTextSize(2);\n  oled.println(estimatedUv,\
      \ 1);\n  oled.setTextSize(1);\n  oled.println(band);\n  oled.println(\"Educational estimate\");\n  oled.display();\n\
      \n  delay(5000);\n}\n"
  code_explanation: The loop reads raw UVA/UVB and estimated UVI, classifies the estimated value into standard UV-index bands,
    and displays the estimate.
  expected_output: Serial and OLED both say Estimated UV Index. Indoor readings may be near zero, especially through glass.
