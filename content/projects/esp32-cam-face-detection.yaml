    content: "// ESP32-CAM local face-detection starter\n// Based on Arduino ESP32 CameraWebServer example. Keep\
      \ access on a trusted local network.\n#include \"esp_camera.h\"\n#include <WiFi.h>\n\n#define PWDN_GPIO_NUM\
      \ 32\n#define RESET_GPIO_NUM -1\n#define XCLK_GPIO_NUM 0\n#define SIOD_GPIO_NUM 26\n#define SIOC_GPIO_NUM\
      \ 27\n#define Y9_GPIO_NUM 35\n#define Y8_GPIO_NUM 34\n#define Y7_GPIO_NUM 39\n#define Y6_GPIO_NUM 36\n#define\
      \ Y5_GPIO_NUM 21\n#define Y4_GPIO_NUM 19\n#define Y3_GPIO_NUM 18\n#define Y2_GPIO_NUM 5\n#define VSYNC_GPIO_NUM\
      \ 25\n#define HREF_GPIO_NUM 23\n#define PCLK_GPIO_NUM 22\n\nconst char *WIFI_SSID = \"YOUR_SSID\";\nconst\
      \ char *WIFI_PASS = \"YOUR_PASSWORD\";\nvoid startCameraServer(); // provided by the Arduino ESP32 CameraWebServer\
      \ example app_httpd.cpp\n\nvoid setup() {\n  Serial.begin(115200);\n  camera_config_t config;\n  config.ledc_channel\
      \ = LEDC_CHANNEL_0;\n  config.ledc_timer = LEDC_TIMER_0;\n  config.pin_d0 = Y2_GPIO_NUM; config.pin_d1 = Y3_GPIO_NUM;\
      \ config.pin_d2 = Y4_GPIO_NUM; config.pin_d3 = Y5_GPIO_NUM;\n  config.pin_d4 = Y6_GPIO_NUM; config.pin_d5\
      \ = Y7_GPIO_NUM; config.pin_d6 = Y8_GPIO_NUM; config.pin_d7 = Y9_GPIO_NUM;\n  config.pin_xclk = XCLK_GPIO_NUM;\
      \ config.pin_pclk = PCLK_GPIO_NUM; config.pin_vsync = VSYNC_GPIO_NUM; config.pin_href = HREF_GPIO_NUM;\n \
      \ config.pin_sscb_sda = SIOD_GPIO_NUM; config.pin_sscb_scl = SIOC_GPIO_NUM;\n  config.pin_pwdn = PWDN_GPIO_NUM;\
      \ config.pin_reset = RESET_GPIO_NUM;\n  config.xclk_freq_hz = 20000000;\n  config.pixel_format = PIXFORMAT_JPEG;\n\
      \  config.frame_size = FRAMESIZE_QVGA;\n  config.jpeg_quality = 12;\n  config.fb_count = 1;\n  if (esp_camera_init(&config)\
      \ != ESP_OK) {\n    Serial.println(\"Camera init failed\");\n    while (true) delay(1000);\n  }\n  WiFi.begin(WIFI_SSID,\
      \ WIFI_PASS);\n  while (WiFi.status() != WL_CONNECTED) delay(300);\n  startCameraServer();\n  Serial.print(\"\
      Open local camera page: http://\");\n  Serial.println(WiFi.localIP());\n}\n\nvoid loop() {\n  delay(1000);\n\
      }\n"
  code_explanation: The sketch initializes the AI-Thinker camera pin map and starts the local CameraWebServer example.
    Face detection support lives in the example server files.
  expected_output: Serial Monitor prints a local IP address. Open it on the same network and test detection only
    with consented or printed face-like targets.
  common_mistakes:
