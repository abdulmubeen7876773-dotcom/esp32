  what_you_build: A local-network ESP32-CAM face detection demo based on the Arduino ESP32 CameraWebServer example
    and the AI-Thinker pin map.
  story: 'Face detection needs careful wording. This project only locates face-like regions; it does not identify
    people or provide security. The Golden version keeps the implementation narrow and testable: code constants,
    wiring, GPIO notes, expected output, limitations, and troubleshooting all describe the same educational prototype.'
  eli12: The camera looks for a pattern shaped like a face. It can say a face-like area is present, but it does
    not know who the person is. The ESP32 reads a signal, checks it against a simple rule, and prints or changes
    an output so you can see what happened.
  parent_safety: Get consent before pointing a camera at people. Do not expose the stream publicly and do not use
    this for identity, security, medical, or emotion claims. Unplug USB and external power before rewiring. Stop
    if hardware becomes hot, uncomfortable, unstable, or unclear.
