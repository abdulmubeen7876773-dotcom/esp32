  troubleshooting:
  - problem: Brownout reset
    fix: Use a stronger 5 V supply and shorter wires.
  - problem: Camera init failed
    fix: Check board profile and ribbon cable.
  - problem: No faces detected
    fix: Lower frame size, improve lighting, and check that face detection is enabled in CameraWebServer.
  testing_checklist:
  - Boot with the IO0 jumper removed.
  - Confirm the local IP appears.
  - Open the page only on the local network.
  - Test lighting and frame-size changes.
  engineer_tips:
  - Keep the camera private by default.
  - Use QVGA for stability.
  - Treat detections as hints, not identity facts.
