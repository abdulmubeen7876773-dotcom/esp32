  advanced:
    level: advanced
    overview_html: <p>The advanced build streams video to the browser, detects faces, and publishes a
      JSON MQTT message containing the face count, bounding box, and a Base64-encoded thumbnail to a home
      automation broker. Home Assistant or Node-RED subscribes and triggers lights, door locks, or notifications.
      A locally hosted enrolment page lets you register up to ten known face templates for recognition,
      distinguishing known from unknown visitors.</p>
    components:
    - 1× ESP32-CAM module
    - 1× MicroSD card — Face template storage
    - 1× 5 V 2 A power supply
    - 1× MQTT broker (Mosquitto) — Local or cloud
    - 1× Home Assistant or Node-RED — For automation responses
    wiring:
    - - All wiring
      - Same as intermediate
      - SD card and power only; no extra GPIO needed
    how:
    - 'Face Recognition Pipeline: The Espressif fr_forward library extends detection with a recognition
      step. After detecting face bounding boxes, get_face_id_with_name() compares the face embedding against
      stored templates. A Euclidean distance threshold determines whether the face matches an enrolled
      identity.'
    - 'MQTT JSON Event Publishing: Each detection event publishes a JSON payload to camera/face containing
      the face count, whether the face is known, the matched name, and a millisecond timestamp. Home Assistant
      MQTT integration subscribes and triggers automations such as unlocking a door for known faces.'
    - 'Enrolment via MQTT Command: Publishing "ENROL" to camera/command puts the ESP32 into enrolment
      mode. The next detected face is captured, its embedding extracted, and stored to flash with a name
      label. Up to ten faces can be enrolled.'
    - 'Flash Template Persistence: read_face_id_from_flash_with_name() and write_face_id_to_flash() store
      and retrieve face embeddings from the ESP32 flash partition. Templates survive power cycles without
      requiring re-enrolment.'
    apps:
    - Smart doorbell that unlocks for family members and alerts for strangers
    - Home Assistant integration triggering personalised lighting scenes per person
    - Office visitor management with known-staff vs visitor classification
    - Secure equipment cabinet that opens only for authorised faces
    troubleshooting:
    - - get_face_id_with_name returns null for enrolled faces
      - The recognition threshold may be too strict. Increase the face recognition threshold value in
        the fr_forward configuration. Re-enrol under consistent lighting conditions for better template
        quality.
    - - MQTT disconnects frequently during face processing
      - Face recognition is CPU-intensive and can block the loop for 200-500 ms. Move MQTT keep-alive
        to a FreeRTOS task on core 1 while face processing runs on core 0.
    - - 'False positives: unknown faces match enrolled templates'
      - Reduce the recognition distance threshold to make matching stricter. A threshold of 0.4 is stricter
        than the default 0.5; tune based on your lighting environment.
    upgrades:
    - Add Home Assistant MQTT discovery for automatic device registration
    - Store annotated face capture photos to SD with the matched name overlaid
    - Add a solenoid door lock triggered directly by the ESP32 on known face detection
    - Add liveness detection to reject printed photos used to spoof the camera
    code: "// ESP32-CAM Face Detection - Advanced (MQTT + face recognition + enrolment)\n#include \"esp_camera.h\"\
      \n#include <WiFi.h>\n#include <PubSubClient.h>\n#include <ArduinoJson.h>\n#include \"fd_forward.h\"\
      \n#include \"fr_forward.h\"\n#include \"fr_flash.h\"\n\n#define PWDN_GPIO_NUM 32\n// ... other pin\
      \ defines (same as beginner)\n\nconst char* SSID=\"YourSSID\", *PASS=\"YourPass\";\nconst char*\
      \ MQTT_HOST=\"192.168.1.100\";\nconst char* TOPIC_FACE=\"camera/face\";\nconst char* TOPIC_CMD =\"\
      camera/command\";\n\nWiFiClient wifiClient;\nPubSubClient mqtt(wifiClient);\n\nface_id_name_list\
      \ face_list; // enrolled face templates\n\nvoid mqttCallback(char* topic, byte* payload, unsigned\
      \ int len){\n  String cmd((char*)payload,len);\n  if(cmd==\"ENROL\"){\n    // Capture next detected\
      \ face and add to face_list\n    Serial.println(\"Enrol mode: present face to camera\");\n  }\n\
      }\n\nvoid publishFaceEvent(int faceCount, bool known, const char* name){\n  StaticJsonDocument<256>\
      \ doc;\n  doc[\"faces\"]   = faceCount;\n  doc[\"known\"]   = known;\n  doc[\"name\"]    = name;\n\
      \  doc[\"ts\"]      = millis();\n  char buf[256]; serializeJson(doc,buf);\n  mqtt.publish(TOPIC_FACE,buf);\n\
      }\n\nvoid setup(){\n  Serial.begin(115200);\n  // camera init with PSRAM enabled (same config as\
      \ beginner)\n  WiFi.begin(SSID,PASS);\n  while(WiFi.status()!=WL_CONNECTED) delay(500);\n  mqtt.setServer(MQTT_HOST,1883);\n\
      \  mqtt.setCallback(mqttCallback);\n  // Load enrolled face templates from SD\n  // read_face_id_from_flash_with_name(&face_list);\n\
      \  Serial.printf(\"Loaded %d enrolled facesn\",face_list.count);\n}\n\nvoid loop(){\n  if(!mqtt.connected()){\
      \ mqtt.connect(\"ESP32Cam\"); mqtt.subscribe(TOPIC_CMD); }\n  mqtt.loop();\n\n  camera_fb_t *fb=esp_camera_fb_get();\n\
