    content: "// ESP32 educational 3-DOF servo arm controller\n// Uses separate 5-6 V servo supply, common ground, and constrained\
      \ incremental motion.\n#include <ESP32Servo.h>\n\nconst int SERVO_BASE_PIN = 13;\nconst int SERVO_SHOULDER_PIN = 16;\n\
      const int SERVO_ELBOW_PIN = 17;\nconst int JOY_BASE_PIN = 34;\nconst int JOY_SHOULDER_PIN = 35;\nconst int JOY_ELBOW_PIN\
      \ = 36;\n\nServo baseServo;\nServo shoulderServo;\nServo elbowServo;\n\nint baseAngle = 90;\nint shoulderAngle = 90;\n\
      int elbowAngle = 90;\nint baseCenter = 2048;\nint shoulderCenter = 2048;\nint elbowCenter = 2048;\n\nconst int BASE_MIN\
      \ = 20;\nconst int BASE_MAX = 160;\nconst int SHOULDER_MIN = 35;\nconst int SHOULDER_MAX = 145;\nconst int ELBOW_MIN\
      \ = 25;\nconst int ELBOW_MAX = 155;\nconst int DEAD_ZONE = 220;\n\nint constrainBase(int a) { return constrain(a, BASE_MIN,\
      \ BASE_MAX); }\nint constrainShoulder(int a) { return constrain(a, SHOULDER_MIN, SHOULDER_MAX); }\nint constrainElbow(int\
      \ a) { return constrain(a, ELBOW_MIN, ELBOW_MAX); }\n\nvoid writeServos() {\n  baseAngle = constrainBase(baseAngle);\n\
      \  shoulderAngle = constrainShoulder(shoulderAngle);\n  elbowAngle = constrainElbow(elbowAngle);\n  baseServo.write(baseAngle);\n\
      \  shoulderServo.write(shoulderAngle);\n  elbowServo.write(elbowAngle);\n}\n\nint axisStep(int raw, int center) {\n\
      \  if (raw < 20 || raw > 4075) return 0; // hold last safe position if disconnected or stuck\n  int delta = raw - center;\n\
      \  if (abs(delta) < DEAD_ZONE) return 0;\n  return delta > 0 ? 1 : -1;\n}\n\nint readAverage(int pin) {\n  long sum\
      \ = 0;\n  for (int i = 0; i < 16; i++) sum += analogRead(pin);\n  return sum / 16;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  analogReadResolution(12);\n  baseServo.attach(SERVO_BASE_PIN, 500, 2500);\n  shoulderServo.attach(SERVO_SHOULDER_PIN,\
      \ 500, 2500);\n  elbowServo.attach(SERVO_ELBOW_PIN, 500, 2500);\n\n  baseCenter = readAverage(JOY_BASE_PIN);\n  shoulderCenter\
      \ = readAverage(JOY_SHOULDER_PIN);\n  elbowCenter = readAverage(JOY_ELBOW_PIN);\n\n  for (int a = 60; a <= 90; a++)\
      \ {\n    baseAngle = constrainBase(a);\n    shoulderAngle = constrainShoulder(a);\n    elbowAngle = constrainElbow(a);\n\
      \    writeServos();\n    delay(20);\n  }\n  Serial.println(\"Servo arm ready. Keep fingers clear of pinch points.\"\
      );\n}\n\nvoid loop() {\n  baseAngle = constrainBase(baseAngle + axisStep(analogRead(JOY_BASE_PIN), baseCenter));\n \
      \ shoulderAngle = constrainShoulder(shoulderAngle + axisStep(analogRead(JOY_SHOULDER_PIN), shoulderCenter));\n  elbowAngle\
      \ = constrainElbow(elbowAngle + axisStep(analogRead(JOY_ELBOW_PIN), elbowCenter));\n  writeServos();\n  Serial.printf(\"\
      Base %d Shoulder %d Elbow %d\\n\", baseAngle, shoulderAngle, elbowAngle);\n  delay(20);\n}\n"
  code_explanation: The code calibrates joystick centers, checks implausible ADC extremes, constrains each joint, and writes
    incremental servo angles.
  expected_output: Moving each joystick axis changes one joint smoothly inside its limits. Reset returns the arm gradually
    toward home.
  common_mistakes:
  - text: Powering servos from ESP32 5 V/3.3 V pins.
  - text: Using boot-sensitive pins for servo outputs.
  - text: Writing unconstrained angles.
  - text: Calling this an industrial robot or certified emergency stop system.
  troubleshooting:
  - problem: Servo jitter
    fix: Check separate supply, common ground, and bulk capacitor.
  - problem: Arm moves unexpectedly
    fix: Increase dead zone and recalibrate joystick center.
  - problem: One joint binds
    fix: Tighten that joint's min/max constraints before testing again.
  testing_checklist:
  - Test each servo alone.
  - Verify no joint binds at min/max limits.
  - Keep fingers clear during first powered motion.
  engineer_tips:
  - Start with horns disconnected.
  - Label each servo cable.
  - Use conservative angle ranges first.
