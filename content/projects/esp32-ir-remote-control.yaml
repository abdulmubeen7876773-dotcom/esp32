      \  IrReceiver.begin(IR_RECV_PIN, ENABLE_LED_FEEDBACK);\n  IrSender.begin(IR_SEND_PIN);\n  Serial.println(\"IR demo ready.\
      \ Point a safe consumer remote at the receiver.\");\n}\n\nvoid loop() {\n  if (!IrReceiver.decode()) return;\n\n  Serial.println(\"\
