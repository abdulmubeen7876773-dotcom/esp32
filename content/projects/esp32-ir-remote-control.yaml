slug: esp32-ir-remote-control
title: ESP32 IR Remote Control
category: Home Automation
description: Use the ESP32 with IRremote library to decode infrared signals from any remote control, store
  the codes, and replay them to control TVs, air conditioners, and other IR-controlled devices — all from
  a web-based universal remote dashboard.
meta_description: Build an ESP32 IR remote control system using a TSOP38238 IR receiver and IR LED transmitter.
  Decode any remote, clone button codes, and build a web-based universal remote.
