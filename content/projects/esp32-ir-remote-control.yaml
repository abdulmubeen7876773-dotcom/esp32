      \ 0x\");\n  Serial.println(IrReceiver.decodedIRData.command, HEX);\n\n  if (IrReceiver.decodedIRData.protocol == NEC)\
      \ {\n    learnedProtocol = NEC;\n    learnedAddress = IrReceiver.decodedIRData.address;\n    learnedCommand = IrReceiver.decodedIRData.command;\n\
      \    hasLearnedCode = true;\n    Serial.println(\"Stored NEC code. Send it back by opening Serial Monitor and typing\
      \ s.\");\n  } else {\n    Serial.println(\"This sketch retransmits NEC only. Use raw examples for other protocols.\"\
      );\n  }\n\n  IrReceiver.resume();\n\n  if (Serial.available()) {\n    char c = Serial.read();\n    if ((c == 's' ||\
      \ c == 'S') && hasLearnedCode && learnedProtocol == NEC) {\n      IrSender.sendNEC(learnedAddress, learnedCommand, 2);\n\
      \      Serial.println(\"Sent learned NEC command.\");\n    }\n  }\n}\n"
  code_explanation: The sketch decodes any received IR signal, stores NEC address/command values, and sends the learned NEC
    command when the user types s.
  expected_output: Serial Monitor shows protocol, address, and command. NEC codes can be retransmitted after learning.
