  wiring:
    illustration_alt: Build an ESP32 IR Learning Remote Demo wiring diagram
    summary: TSOP38238 OUT goes to GPIO15. GPIO4 drives a transistor stage for the IR LED transmitter.
    steps:
    - Unplug USB before wiring.
    - Connect TSOP38238 VCC to 3.3 V, GND to GND, and OUT to GPIO15.
    - Connect GPIO4 through a base resistor to the 2N2222 base.
    - Wire the IR LED and current-limiting resistor through the transistor driver.
    - Keep receiver and transmitter aimed at safe consumer devices.
    - Upload the sketch and open Serial Monitor.
  gpio_map:
  - signal: TSOP38238 OUT
    esp32_pin: GPIO15
    direction: Input
    notes: IR receive data; boot strap pin, avoid external pull conflicts.
  - signal: IR LED driver
    esp32_pin: GPIO4
    direction: Output
    notes: Controls transistor base through resistor.
