levels:
  beginner:
    level: beginner
    overview_html: <p>A safe receive-and-send IR learning demo for consumer-device education. Use IR for safe consumer devices
      only. Do not use it to bypass access-control systems. Drive stronger IR LEDs through a transistor, not directly from
      GPIO.</p>
    components:
    - ESP32 DevKit board
    - TSOP38238 IR receiver
    - 940 nm IR LED
    - 2N2222 NPN transistor
    - Resistors
    - Breadboard and jumper wires
    wiring:
    - - TSOP38238 OUT
      - GPIO15
      - IR receive data; boot strap pin, avoid external pull conflicts.
    - - IR LED driver
      - GPIO4
      - Controls transistor base through resistor.
    key_concepts:
    - The TSOP receiver demodulates 38 kHz IR into digital pulses. The transmitter uses GPIO4 to switch a transistor that
      pulses the IR LED.
    - IR protocols vary. This sketch stores and retransmits NEC commands only; unsupported protocols can still be logged for
      study.
    applications: &id003
    - Consumer remote protocol lesson
    - IR receiver test fixture
    - Line-of-sight communication demo
    troubleshooting:
    - - No receive data
      - Check receiver pinout and aim the remote close to the sensor.
    - - Protocol UNKNOWN
      - The remote may use an unsupported or complex protocol; inspect raw output.
    - - Transmit does not work
      - Check IR LED polarity, transistor wiring, and whether the appliance uses NEC.
    improvements: &id002
    - Store learned NEC codes in Preferences.
    - Add OLED display for the last decoded command.
    - Add a web page after local transmit works.
    code: "// ESP32 IR receive-and-send learning demo\n// Learn codes from your own remote before transmitting.\n#include\
      \ <IRremote.hpp>\n\nconst int IR_RECV_PIN = 15;\nconst int IR_SEND_PIN = 4;\n\nuint16_t learnedAddress = 0;\nuint16_t\
      \ learnedCommand = 0;\ndecode_type_t learnedProtocol = UNKNOWN;\nbool hasLearnedCode = false;\n\nvoid setup() {\n  Serial.begin(115200);\n\
      \  IrReceiver.begin(IR_RECV_PIN, ENABLE_LED_FEEDBACK);\n  IrSender.begin(IR_SEND_PIN);\n  Serial.println(\"IR demo ready.\
      \ Point a safe consumer remote at the receiver.\");\n}\n\nvoid loop() {\n  if (!IrReceiver.decode()) return;\n\n  Serial.println(\"\
      IR signal received\");\n  Serial.print(\"Protocol: \");\n  Serial.println(getProtocolString(IrReceiver.decodedIRData.protocol));\n\
      \  Serial.print(\"Address: 0x\");\n  Serial.println(IrReceiver.decodedIRData.address, HEX);\n  Serial.print(\"Command:\
      \ 0x\");\n  Serial.println(IrReceiver.decodedIRData.command, HEX);\n\n  if (IrReceiver.decodedIRData.protocol == NEC)\
      \ {\n    learnedProtocol = NEC;\n    learnedAddress = IrReceiver.decodedIRData.address;\n    learnedCommand = IrReceiver.decodedIRData.command;\n\
      \    hasLearnedCode = true;\n    Serial.println(\"Stored NEC code. Send it back by opening Serial Monitor and typing\
      \ s.\");\n  } else {\n    Serial.println(\"This sketch retransmits NEC only. Use raw examples for other protocols.\"\
      );\n  }\n\n  IrReceiver.resume();\n\n  if (Serial.available()) {\n    char c = Serial.read();\n    if ((c == 's' ||\
      \ c == 'S') && hasLearnedCode && learnedProtocol == NEC) {\n      IrSender.sendNEC(learnedAddress, learnedCommand, 2);\n\
      \      Serial.println(\"Sent learned NEC command.\");\n    }\n  }\n}\n"
    code_filename: esp32-ir-remote-control-beginner.ino
