levels:
  beginner:
    level: beginner
    overview_html: <p>A two-node point-to-point LoRa DHT22 link using generic SX1276/SX1278 SPI breakouts. Never transmit
      without the correct antenna connected. Use only legal frequencies and power settings for your region.</p>
    components:
    - ESP32 DevKit board
    - Second ESP32 DevKit board
    - Two SX1276/SX1278 LoRa breakouts
    - DHT22 temperature and humidity sensor
    - Two region-appropriate antennas
    - Breadboard and jumper wires
    wiring:
    - - LoRa SCK
      - GPIO18
      - VSPI clock.
    - - LoRa MISO
      - GPIO19
      - Radio to ESP32.
    - - LoRa MOSI
      - GPIO23
      - ESP32 to radio.
    - - LoRa NSS/CS
      - GPIO5
      - Keep stable during boot.
    - - LoRa RST
      - GPIO14
      - Radio reset.
    - - LoRa DIO0
      - GPIO26
      - Packet event line.
    - - DHT22 DATA
      - GPIO4
      - Sender only.
    key_concepts:
    - The radio uses SPI for control and the DHT22 supplies sender readings. The receiver validates comma-separated packets
      before printing.
    - Range depends on legal power, antennas, terrain, obstruction, and frequency. The page intentionally avoids fixed distance
      claims.
    applications: &id003
    - Remote classroom sensor demo
    - Point-to-point telemetry lesson
    - RF packet validation exercise
    troubleshooting:
    - - No packets
      - Check antenna first, then frequency, SPI wiring, and sender/receiver mode.
    - - LoRa init failed
      - Check 3.3 V power, CS/RST/DIO0 pins, and module wiring.
    - - Rejected packets
      - Check packet format and DHT22 sensor values.
    improvements: &id002
    - Add checksum byte.
    - Add ACK/retry.
    - Add battery-voltage field using a safe divider.
    code: "// ESP32 LoRa point-to-point DHT22 sender/receiver\n// Select NODE_MODE_SENDER on one board and NODE_MODE_RECEIVER\
      \ on the second board.\n// Always connect the correct antenna before transmitting.\n#include <SPI.h>\n#include <LoRa.h>\n\
      #include <DHT.h>\n\n#define NODE_MODE_SENDER 1\n\nconst long LORA_FREQUENCY_HZ = 915E6; // Change to a legal frequency\
      \ for your region and module.\nconst int LORA_SCK = 18;\nconst int LORA_MISO = 19;\nconst int LORA_MOSI = 23;\nconst\
      \ int LORA_CS = 5;\nconst int LORA_RST = 14;\nconst int LORA_DIO0 = 26;\nconst int DHT_PIN = 4;\n\nDHT dht(DHT_PIN,\
      \ DHT22);\nuint32_t sequenceNumber = 0;\nuint32_t badPackets = 0;\n\nbool initLoRa() {\n  SPI.begin(LORA_SCK, LORA_MISO,\
      \ LORA_MOSI, LORA_CS);\n  LoRa.setPins(LORA_CS, LORA_RST, LORA_DIO0);\n  if (!LoRa.begin(LORA_FREQUENCY_HZ)) return\
      \ false;\n  LoRa.setTxPower(10); // Conservative starter value; obey local legal limits.\n  return true;\n}\n\nbool\
      \ parsePacket(String packet, int &node, float &tempC, float &humidity, uint32_t &seq) {\n  packet.trim();\n  int a =\
      \ packet.indexOf(',');\n  int b = packet.indexOf(',', a + 1);\n  int c = packet.indexOf(',', b + 1);\n  if (a < 0 ||\
      \ b < 0 || c < 0) return false;\n  node = packet.substring(0, a).toInt();\n  tempC = packet.substring(a + 1, b).toFloat();\n\
      \  humidity = packet.substring(b + 1, c).toFloat();\n  seq = (uint32_t) packet.substring(c + 1).toInt();\n  if (node\
      \ < 1 || node > 99) return false;\n  if (tempC < -40.0 || tempC > 80.0) return false;\n  if (humidity < 0.0 || humidity\
      \ > 100.0) return false;\n  return true;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  dht.begin();\n  if (!initLoRa())\
      \ {\n    Serial.println(\"LoRa init failed. Check SPI wiring, power, frequency, and antenna.\");\n    while (true) delay(10);\n\
      \  }\n  Serial.println(NODE_MODE_SENDER ? \"LoRa sender ready.\" : \"LoRa receiver ready.\");\n}\n\nvoid loop() {\n\
      #if NODE_MODE_SENDER\n  float tempC = dht.readTemperature();\n  float humidity = dht.readHumidity();\n  if (isnan(tempC)\
      \ || isnan(humidity)) {\n    Serial.println(\"DHT22 read failed; packet not sent.\");\n    delay(5000);\n    return;\n\
      \  }\n\n  String packet = \"1,\" + String(tempC, 1) + \",\" + String(humidity, 1) + \",\" + String(sequenceNumber++);\n\
      \  LoRa.beginPacket();\n  LoRa.print(packet);\n  LoRa.endPacket();\n  Serial.print(\"Sent: \");\n  Serial.println(packet);\n\
      \  delay(15000);\n#else\n  int size = LoRa.parsePacket();\n  if (!size) return;\n  String packet = LoRa.readString();\n\
      \  int node = 0;\n  float tempC = 0;\n  float humidity = 0;\n  uint32_t seq = 0;\n  if (!parsePacket(packet, node, tempC,\
      \ humidity, seq)) {\n    badPackets++;\n    Serial.print(\"Rejected malformed packet #\");\n    Serial.println(badPackets);\n\
      \    return;\n  }\n  Serial.printf(\"Node %d seq %lu  temp %.1f C  humidity %.1f %%  RSSI %d dBm\\n\",\n           \
      \     node, (unsigned long)seq, tempC, humidity, LoRa.packetRssi());\n#endif\n}\n"
    code_filename: esp32-lora-remote-sensor-node-beginner.ino
