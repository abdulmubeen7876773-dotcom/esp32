slug: esp32-lora-remote-sensor-node
title: ESP32 LoRa Remote Sensor Node
category: IoT Projects
description: Use LoRa (Long Range) radio with the ESP32 to transmit sensor data over kilometres without
  Wi-Fi or cellular infrastructure. Build a transmitter/receiver pair, scale to a multi-node sensor network,
  and connect to The Things Network for global IoT coverage.
meta_description: Build an ESP32 LoRa sensor node using the SX1276 module. Transmit temperature and humidity
  over kilometres without Wi-Fi, scale to a multi-node network, and join The Things Network.
