  code:
    filename: esp32-gesture-recognition.ino
    content: "// ESP32 APDS-9960 directional gesture demo\n// Detects directional hand swipes; this is not AI gesture recognition.\n\
      #include <Wire.h>\n#include <SparkFun_APDS9960.h>\n\nSparkFun_APDS9960 apds;\n\nconst int INT_PIN = 4;\nconst int LED_UP\
      \ = 25;\nconst int LED_DOWN = 26;\nconst int LED_LEFT = 27;\nconst int LED_RIGHT = 14;\n\nvolatile bool gestureFlag\
      \ = false;\n\nvoid IRAM_ATTR onGesture() {\n  gestureFlag = true;\n}\n\nvoid clearLeds() {\n  digitalWrite(LED_UP, LOW);\n\
      \  digitalWrite(LED_DOWN, LOW);\n  digitalWrite(LED_LEFT, LOW);\n  digitalWrite(LED_RIGHT, LOW);\n}\n\nvoid setup()\
      \ {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n\n  pinMode(INT_PIN, INPUT_PULLUP);\n  pinMode(LED_UP, OUTPUT);\n\
      \  pinMode(LED_DOWN, OUTPUT);\n  pinMode(LED_LEFT, OUTPUT);\n  pinMode(LED_RIGHT, OUTPUT);\n  clearLeds();\n\n  if (!apds.init())\
      \ {\n    Serial.println(\"APDS-9960 not found. Check 3.3 V, SDA GPIO21, and SCL GPIO22.\");\n    while (true) delay(10);\n\
      \  }\n  if (!apds.enableGestureSensor(true)) {\n    Serial.println(\"Gesture sensor did not enable.\");\n    while (true)\
      \ delay(10);\n  }\n\n  attachInterrupt(digitalPinToInterrupt(INT_PIN), onGesture, FALLING);\n  Serial.println(\"APDS-9960\
      \ gesture demo ready. Swipe above the sensor.\");\n}\n\nvoid loop() {\n  if (!gestureFlag) return;\n  gestureFlag =\
      \ false;\n\n  if (!apds.isGestureAvailable()) return;\n  int gesture = apds.readGesture();\n  clearLeds();\n\n  switch\
      \ (gesture) {\n    case DIR_UP:\n      digitalWrite(LED_UP, HIGH);\n      Serial.println(\"UP\");\n      break;\n  \
      \  case DIR_DOWN:\n      digitalWrite(LED_DOWN, HIGH);\n      Serial.println(\"DOWN\");\n      break;\n    case DIR_LEFT:\n\
      \      digitalWrite(LED_LEFT, HIGH);\n      Serial.println(\"LEFT\");\n      break;\n    case DIR_RIGHT:\n      digitalWrite(LED_RIGHT,\
      \ HIGH);\n      Serial.println(\"RIGHT\");\n      break;\n    default:\n      Serial.println(\"Gesture not classified.\"\
      );\n      break;\n  }\n}\n"
  code_explanation: GPIO4 sets a flag on the APDS-9960 interrupt. The main loop reads the gesture and updates GPIO25/GPIO26/GPIO27/GPIO14
    LEDs.
  expected_output: Serial Monitor prints UP, DOWN, LEFT, or RIGHT and exactly one LED lights after a recognized swipe.
  common_mistakes:
  - text: Calling the project AI gesture recognition.
  - text: Powering a 3.3 V-only breakout from 5 V.
  - text: Forgetting LED resistors.
  - text: Mounting the sensor backwards and expecting directions to match.
  troubleshooting:
  - problem: Sensor not found
    fix: Check 3.3 V, ground, SDA GPIO21, SCL GPIO22, and I2C address.
  - problem: Gestures are inconsistent
    fix: Change swipe speed, distance, and lighting; keep the hand centered over the sensor.
  - problem: Direction appears reversed
    fix: Rotate the module or remap directions in code.
  testing_checklist:
  - Run an I2C scan if initialization fails.
  - Test each LED output with a simple blink first.
  - Swipe each direction five times and note misses without claiming accuracy.
  engineer_tips:
  - Keep wires short on I2C.
  - Place the sensor flat and unobstructed.
  - Treat false triggers as part of the lesson.
