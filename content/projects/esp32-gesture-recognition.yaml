levels:
  beginner:
    level: beginner
    overview_html: <p>A local APDS-9960 directional hand-swipe demo with four indicator LEDs. Use 3.3 V APDS-9960 power unless
      your breakout explicitly supports another voltage. Use resistors on LEDs.</p>
    components:
    - ESP32 DevKit board
    - APDS-9960 gesture sensor breakout
    - Four LEDs
    - 220 ohm resistors
    - Breadboard and jumper wires
    wiring:
    - - APDS-9960 SDA
      - GPIO21
      - Shared I2C bus.
    - - APDS-9960 SCL
      - GPIO22
      - Shared I2C bus.
    - - APDS-9960 INT
      - GPIO4
      - Interrupt input with pull-up.
    - - UP LED
      - GPIO25
      - Series resistor required.
    - - DOWN LED
      - GPIO26
      - Series resistor required.
    - - LEFT LED
      - GPIO27
      - Series resistor required.
    - - RIGHT LED
      - GPIO14
      - Avoid using this as a boot strap output.
    key_concepts:
    - The APDS-9960 reports gesture events over I2C and pulls INT low when data is ready. The ESP32 reads the direction and
      lights one LED.
    - Gesture detection depends on hand distance, speed, sensor orientation, and ambient light. The sketch classifies directional
      swipes only.
    applications: &id003
    - Touchless menu prototype
    - Gesture-controlled LED lesson
    - Human-interface sensor demo
    troubleshooting:
    - - Sensor not found
      - Check 3.3 V, ground, SDA GPIO21, SCL GPIO22, and I2C address.
    - - Gestures are inconsistent
      - Change swipe speed, distance, and lighting; keep the hand centered over the sensor.
    - - Direction appears reversed
      - Rotate the module or remap directions in code.
    improvements: &id002
    - Add an OLED that shows the last direction.
    - Count gestures over one minute.
    - Use gestures to control a low-current LED pattern.
    code: "// ESP32 APDS-9960 directional gesture demo\n// Detects directional hand swipes; this is not AI gesture recognition.\n\
      #include <Wire.h>\n#include <SparkFun_APDS9960.h>\n\nSparkFun_APDS9960 apds;\n\nconst int INT_PIN = 4;\nconst int LED_UP\
      \ = 25;\nconst int LED_DOWN = 26;\nconst int LED_LEFT = 27;\nconst int LED_RIGHT = 14;\n\nvolatile bool gestureFlag\
      \ = false;\n\nvoid IRAM_ATTR onGesture() {\n  gestureFlag = true;\n}\n\nvoid clearLeds() {\n  digitalWrite(LED_UP, LOW);\n\
      \  digitalWrite(LED_DOWN, LOW);\n  digitalWrite(LED_LEFT, LOW);\n  digitalWrite(LED_RIGHT, LOW);\n}\n\nvoid setup()\
      \ {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n\n  pinMode(INT_PIN, INPUT_PULLUP);\n  pinMode(LED_UP, OUTPUT);\n\
      \  pinMode(LED_DOWN, OUTPUT);\n  pinMode(LED_LEFT, OUTPUT);\n  pinMode(LED_RIGHT, OUTPUT);\n  clearLeds();\n\n  if (!apds.init())\
      \ {\n    Serial.println(\"APDS-9960 not found. Check 3.3 V, SDA GPIO21, and SCL GPIO22.\");\n    while (true) delay(10);\n\
      \  }\n  if (!apds.enableGestureSensor(true)) {\n    Serial.println(\"Gesture sensor did not enable.\");\n    while (true)\
      \ delay(10);\n  }\n\n  attachInterrupt(digitalPinToInterrupt(INT_PIN), onGesture, FALLING);\n  Serial.println(\"APDS-9960\
      \ gesture demo ready. Swipe above the sensor.\");\n}\n\nvoid loop() {\n  if (!gestureFlag) return;\n  gestureFlag =\
      \ false;\n\n  if (!apds.isGestureAvailable()) return;\n  int gesture = apds.readGesture();\n  clearLeds();\n\n  switch\
      \ (gesture) {\n    case DIR_UP:\n      digitalWrite(LED_UP, HIGH);\n      Serial.println(\"UP\");\n      break;\n  \
      \  case DIR_DOWN:\n      digitalWrite(LED_DOWN, HIGH);\n      Serial.println(\"DOWN\");\n      break;\n    case DIR_LEFT:\n\
      \      digitalWrite(LED_LEFT, HIGH);\n      Serial.println(\"LEFT\");\n      break;\n    case DIR_RIGHT:\n      digitalWrite(LED_RIGHT,\
      \ HIGH);\n      Serial.println(\"RIGHT\");\n      break;\n    default:\n      Serial.println(\"Gesture not classified.\"\
      );\n      break;\n  }\n}\n"
    code_filename: esp32-gesture-recognition-beginner.ino
