    code: "// ESP32 Distance Monitoring System for Signal Logger\nconst int SENSOR_PIN = 5;\nconst int\
      \ OUTPUT_PIN = 18;\nconst int THRESHOLD = 1813;\nconst int SAMPLE_DELAY_MS = 300;\n\nvoid setup()\
      \ {\n  Serial.begin(115200);\n  pinMode(OUTPUT_PIN, OUTPUT);\n  pinMode(SENSOR_PIN, INPUT);\n  Serial.println(\"\
      Starting: distance monitoring system for signal logger\");\n  Serial.print(\"Threshold: \");\n \
      \ Serial.println(THRESHOLD);\n}\n\nvoid loop() {\n  int reading = analogRead(SENSOR_PIN);\n  Serial.print(\"\
      Ultrasonic Sensor signal: \");\n  Serial.println(reading);\n  bool active = reading < THRESHOLD;\n\
      \  digitalWrite(OUTPUT_PIN, active ? HIGH : LOW);\n  delay(SAMPLE_DELAY_MS);\n}"
