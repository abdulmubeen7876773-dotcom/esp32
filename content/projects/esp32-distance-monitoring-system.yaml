  what_you_build: An ESP32 distance monitor that triggers an HC-SR04 from GPIO5, reads ECHO on GPIO18 through a 10 kOhm /
    20 kOhm divider, and sounds a buzzer on GPIO25.
  story: 'Distance projects are useful because the result is immediate: move an object and the ESP32 reacts. This build documents
    the important voltage detail, because the HC-SR04 ECHO line must be divided before it reaches GPIO18. The component list,
    wiring table, GPIO map, code constants, expected output, troubleshooting, and FAQ now describe the same bench build so
    a learner can verify each step instead of guessing.'
  eli12: The HC-SR04 sends a tiny sound pulse and waits for the echo. A short wait means the object is close, so the ESP32
    turns on the buzzer. Prove the local wiring and code first, then add displays, logging, or Wi-Fi after the simple version
    behaves exactly as expected.
  parent_safety: Power the HC-SR04 from 5 V as shown, but reduce ECHO with the documented divider before the ESP32 input.
    Unplug USB and any external supply before rewiring, keep the build low-voltage on the bench, and stop immediately if a
    module becomes hot or behaves unexpectedly.
