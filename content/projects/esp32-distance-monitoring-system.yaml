    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for distance sensing: GPIO5 sends the HC-SR04 trigger pulse, GPIO18 reads ECHO through a voltage divider, and GPIO25 drives the buzzer alert.</p>\n      <ul class=\"overview-list\">\n      \
      \  <li>HC-SR04 TRIG connects to GPIO5 as a digital output</li><li>HC-SR04 ECHO connects to GPIO18 through a 10 kOhm / 20 kOhm divider</li><li>Buzzer + connects to GPIO25</li><li>The sketch measures pulse width and converts it to centimeters</li>\n      </ul>\n\
      \      </section>"
