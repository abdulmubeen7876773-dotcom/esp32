    illustration_alt: ESP32 Distance Monitoring System wiring diagram
    summary: An ESP32 distance monitor that triggers an HC-SR04 from GPIO5, reads ECHO on GPIO18 through a 10 kOhm / 20 kOhm
      divider, and sounds a buzzer on GPIO25.
    steps:
    - Unplug USB before changing the HC-SR04 or divider wiring.
    - Connect HC-SR04 VCC to 5V and GND to GND.
    - Connect HC-SR04 TRIG to GPIO5.
    - Connect HC-SR04 ECHO through the 10 kOhm / 20 kOhm divider, with the divided node going to GPIO18.
    - Connect buzzer signal or positive input to GPIO25 and buzzer ground to GND.
    - Reconnect USB and open Serial Monitor at 115200 baud.
  gpio_map:
  - signal: HC-SR04 TRIG
    esp32_pin: GPIO5
    direction: Output
    notes: Short trigger pulse.
  - signal: HC-SR04 ECHO
    esp32_pin: GPIO18
    direction: Input
    notes: Read through a 10 kOhm / 20 kOhm divider.
  - signal: Buzzer alert
    esp32_pin: GPIO25
    direction: Output
    notes: Turns on below DISTANCE_LIMIT_CM.
  circuit_explanation: GPIO5 creates the trigger pulse. The divided ECHO pulse reaches GPIO18, and GPIO25 drives the alert
    output.
  engineering_explanation: DISTANCE_LIMIT_CM is 20 cm in the sketch. pulseIn() uses a timeout so a missing echo returns -1
    instead of blocking forever.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-distance-monitoring-system.ino
    content: "// ESP32 Distance Monitoring System - HC-SR04\nconst int TRIG_PIN = 5;\nconst int ECHO_PIN = 18;\nconst int\
      \ BUZZER_PIN = 25;\nconst int DISTANCE_LIMIT_CM = 20;\n\nlong readDistanceCm() {\n  digitalWrite(TRIG_PIN, LOW);\n \
      \ delayMicroseconds(2);\n  digitalWrite(TRIG_PIN, HIGH);\n  delayMicroseconds(10);\n  digitalWrite(TRIG_PIN, LOW);\n\
      \  long duration = pulseIn(ECHO_PIN, HIGH, 30000);\n  if (duration == 0) return -1;\n  return duration / 58;\n}\n\n\
      void setup() {\n  Serial.begin(115200);\n  pinMode(TRIG_PIN, OUTPUT);\n  pinMode(ECHO_PIN, INPUT);\n  pinMode(BUZZER_PIN,\
      \ OUTPUT);\n}\n\nvoid loop() {\n  long distanceCm = readDistanceCm();\n  Serial.print(\"Distance cm: \");\n  Serial.println(distanceCm);\n\
      \  digitalWrite(BUZZER_PIN, distanceCm > 0 && distanceCm < DISTANCE_LIMIT_CM ? HIGH : LOW);\n  delay(250);\n}"
  code_explanation: readDistanceCm() sends the trigger pulse, measures ECHO, and converts the timing to centimeters. loop()
    turns the buzzer on only for valid readings below 20 cm.
  expected_output: Serial Monitor prints distance values in centimeters. With no echo it prints -1 and the buzzer stays off.
    When an object moves closer than 20 cm, GPIO25 turns the buzzer on.
  common_mistakes:
  - text: Connecting HC-SR04 ECHO directly to the ESP32 without the divider.
  - text: Swapping TRIG and ECHO pins.
  - text: Forgetting common ground.
  troubleshooting:
  - problem: Distance always reads -1
    fix: Check TRIG on GPIO5, divided ECHO on GPIO18, 5 V sensor power, and common ground.
  - problem: Values jump around
    fix: Aim at a flat surface and shorten jumper wires.
  - problem: Buzzer never turns on
    fix: Move an object under 20 cm and verify buzzer signal is on GPIO25.
  testing_checklist:
  - Upload the sketch with only the documented circuit attached.
  - Open Serial Monitor and confirm the expected messages.
  - Move or trigger the input and watch the output change.
  - Power-cycle the project and confirm it starts safely.
