    overview_html: "<section class=\"content-section\" id=\"overview\">\n      <h2>Project Overview</h2>\n\
      \      <p>Designed for Analog Read: ESP32 watches Ultrasonic Sensor signal and activates Oled Display\
      \ control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n      \
      \  <li>Ultrasonic Sensor signal connects to GPIO5 (ADC input)</li><li>Threshold is set to 1606 in\
      \ firmware (adjust after calibration)</li><li>Oled Display control is driven on GPIO18 when the\
      \ condition is met</li><li>The main loop samples every 300 ms while powered</li>\n      </ul>\n\
      \      </section>"
