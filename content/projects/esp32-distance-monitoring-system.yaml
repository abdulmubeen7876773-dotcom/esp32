  faqs:
  - question: Why is the divider required?
    answer: ESP32 GPIO is 3.3 V logic, while HC-SR04 ECHO can be 5 V.
  - question: Can I change the alert distance?
    answer: Yes. Change DISTANCE_LIMIT_CM and keep the documentation in sync.
  - question: Why does the reading show -1?
    answer: The sketch returns -1 when no echo arrives before the timeout.
