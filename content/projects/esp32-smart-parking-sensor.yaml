  faqs:
  - question: Why does HC-SR04 ECHO need a voltage divider?
    answer: The project wires ECHO through a 10 kOhm and 20 kOhm divider because HC-SR04 ECHO is a 5 V signal and
      ESP32 GPIO inputs are 3.3 V logic.
  - question: Why does the occupied/free state flicker?
    answer: Ultrasonic readings change with angle, distance, and reflections. Average several readings and add a small
      gap between occupied and free thresholds.
  - question: Can one sensor detect every vehicle position?
    answer: No. Low vehicles, angled surfaces, and off-center parking can reflect sound away from the receiver, so
      sensor placement matters.
