  what_you_build: A parking-bay detector that measures distance with an HC-SR04 ultrasonic sensor and uses LEDs
    or a dashboard output to show whether a space is free or occupied.
  story: 'ESP32 Smart Parking Sensor solves a real beginner problem: turning an ESP32 reading into a useful physical
    or networked result. Build this if you want a practical distance-sensing project that teaches timing, voltage
    protection, and threshold decisions.


    The tutorial focuses on the engineering path: prove the input, understand the circuit, write readable code,
    then test the output under real conditions.'
  eli12: The ultrasonic sensor works like a bat calling into a space and listening for the echo. The ESP32 measures
    how long the echo takes to return and decides whether a car is close enough to count as parked.
  parent_safety: This is a low-voltage learning project when powered from USB or a regulated bench supply. Unplug
    power before rewiring. Keep water, motors, relays, lamps, and high-current loads physically away from the ESP32
    unless a proper driver, enclosure, and adult supervision are used.
  learning_objectives:
  - Trigger an HC-SR04 sensor from an ESP32.
  - Protect the ESP32 input from a 5 V echo signal.
  - Convert echo time into distance in centimeters.
  - Choose a parking threshold from measured data.
  - Use LEDs or displays to communicate occupied/free status.
