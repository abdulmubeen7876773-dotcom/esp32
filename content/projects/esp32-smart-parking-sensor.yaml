  circuit_explanation: GPIO5 sends a short trigger pulse. The HC-SR04 sends back an echo pulse whose width represents
    distance. Because many HC-SR04 modules output 5 V on ECHO, the signal must be reduced to 3.3 V before it enters
    the ESP32. LEDs on separate GPIO pins show the bay state.
  engineering_explanation: Ultrasonic parking sensors are time-of-flight systems. They work best when the target
    surface reflects sound back toward the sensor. Angle, height, wind, nearby sensors, and soft surfaces can all
    affect readings, so a reliable parking project uses averaging, timeout handling, and a threshold measured from
    the real bay.
