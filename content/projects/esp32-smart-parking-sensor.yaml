    content: "// ESP32 Smart Parking Sensor - Beginner\n// Single bay HC-SR04 distance + LED status\n\nconst int\
      \ TRIG = 5;\nconst int ECHO = 18;\nconst int LED_FREE = 25;\nconst int LED_OCC  = 26;\nconst float BAY_THRESHOLD_CM\
      \ = 50.0; // Vehicle present if closer than this\n\nlong measureCm() {\n  digitalWrite(TRIG, LOW);\n  delayMicroseconds(2);\n\
      \  digitalWrite(TRIG, HIGH);\n  delayMicroseconds(10);\n  digitalWrite(TRIG, LOW);\n  long duration = pulseIn(ECHO,\
      \ HIGH, 30000); // 30 ms timeout\n  if (duration == 0) return -1; // No echo received\n  return duration *\
      \ 0.034 / 2; // Convert to cm\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(TRIG, OUTPUT);\n  pinMode(ECHO,\
      \ INPUT);\n  pinMode(LED_FREE, OUTPUT);\n  pinMode(LED_OCC,  OUTPUT);\n}\n\nvoid loop() {\n  long dist = measureCm();\n\
      \  bool occupied = (dist > 0 && dist < BAY_THRESHOLD_CM);\n\n  Serial.printf(\"Distance: %ld cm  Bay: %sn\"\
      ,\n    dist, occupied ? \"OCCUPIED\" : \"FREE\");\n\n  digitalWrite(LED_FREE, occupied ? LOW  : HIGH);\n \
      \ digitalWrite(LED_OCC,  occupied ? HIGH : LOW);\n  delay(500);\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output
    pins in setup(), then repeats the measurement and decision logic in loop(). The loop prints the live reading
    first, compares it with a threshold, then changes the output. Printing before controlling the output makes debugging
    much easier because you can see what the ESP32 believes is happening.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when
    the tested condition for esp32 smart parking sensor is reached.
  common_mistakes:
  - text: Connecting HC-SR04 ECHO directly to an ESP32 pin without level shifting.
  - text: Mounting the sensor too high for low vehicles.
  - text: Using one reading instead of averaging several readings.
  - text: Forgetting that angled surfaces can reflect sound away from the receiver.
  - text: Using a threshold copied from another parking bay.
  troubleshooting:
  - problem: Distance reads 0 or -1
    fix: Check TRIG/ECHO wiring, confirm the voltage divider, and make sure the sensor has 5 V power.
  - problem: Occupied/free state flickers
    fix: Average five readings and require the same result twice before changing state.
  - problem: Low vehicles are missed
    fix: Mount the sensor lower or angle it toward the bonnet or bumper area.
  - problem: Adjacent sensors interfere
    fix: Trigger sensors one at a time with a delay between measurements.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Use a voltage divider or level shifter on ECHO.
  - Measure empty-bay distance first, then set the threshold below that value.
  - Use timeout handling so missing echoes do not create false readings.
  - Avoid firing multiple ultrasonic sensors at the same time.
  - Add weather protection for outdoor installations.
  performance_tips:
  - Use median or average filtering for stable distance.
  - Scan multiple bays sequentially.
  - Reduce update rate for dashboards to avoid unnecessary Wi-Fi traffic.
  - Store last known state if a single reading times out.
