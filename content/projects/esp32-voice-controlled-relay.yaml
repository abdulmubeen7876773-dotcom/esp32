    that honestly and keeps relay use low-voltage. This Golden version keeps the promise narrow: the parts list, code constants,
    GPIO table, expected output, safety notes, and troubleshooting all describe the same low-voltage educational build.'
  eli12: 'The microphone sends sound samples to the ESP32. The code looks for a big sound peak; when it sees one, it toggles
    the relay input and LED. The ESP32 is the decision maker: it reads one signal, compares it with simple rules, then changes
    an output you can see or hear.'
  parent_safety: Relay isolation does not make breadboard mains wiring safe. Use a low-voltage LED or demo load only; mains
    work needs a qualified adult or professional and a proper enclosure. Unplug USB and any external supply before rewiring.
    Keep the build low-voltage on the bench and do not treat it as certified equipment.
