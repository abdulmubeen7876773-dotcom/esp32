slug: esp32-voice-controlled-relay
title: ESP32 Voice-Controlled Relay
category: Home Automation
description: Add voice control to any mains appliance using an ESP32 and INMP441 I2S digital microphone. Progress from clap-activated
  relay switching to on-device wake-word detection with ESP-SR and full Google Assistant integration.
meta_description: Build an ESP32 voice-controlled relay using an INMP441 I2S microphone. From clap detection to on-device
  wake-word recognition and Google Assistant integration.
