      \ = ESP_INTR_FLAG_LEVEL1,\n    .dma_buf_count = 4,\n    .dma_buf_len = 256,\n    .use_apll = false\n  };\n  i2s_pin_config_t\
      \ pins = {\n    .bck_io_num = 14,\n    .ws_io_num = 15,\n    .data_out_num = I2S_PIN_NO_CHANGE,\n    .data_in_num =\
      \ 32\n  };\n  i2s_driver_install(I2S_PORT, &cfg, 0, NULL);\n  i2s_set_pin(I2S_PORT, &pins);\n}\n\nint32_t peak(int32_t\
      \ *buf, size_t n) {\n  int32_t mx = 0;\n  for (size_t i = 0; i < n; i++) {\n    int32_t v = abs(buf[i] >> 8);\n    if\
      \ (v > mx) mx = v;\n  }\n  return mx;\n}\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n\
      \  pinMode(LED_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, HIGH); // active LOW relay off\n  digitalWrite(LED_PIN, LOW);\n\
      \  i2sInit();\n  Serial.println(\"Sound-triggered relay demo ready. Use a low-voltage demo load.\");\n}\n\nvoid loop()\
      \ {\n  int32_t samples[256];\n  size_t bytesRead = 0;\n  i2s_read(I2S_PORT, samples, sizeof(samples), &bytesRead, portMAX_DELAY);\n\
      \  int32_t p = peak(samples, bytesRead / sizeof(int32_t));\n  Serial.printf(\"Peak: %d\\n\", p);\n  if (p > CLAP_THRESHOLD)\
      \ {\n    relayState = !relayState;\n    digitalWrite(RELAY_PIN, relayState ? LOW : HIGH);\n    digitalWrite(LED_PIN,\
      \ relayState ? HIGH : LOW);\n    Serial.printf(\"Relay: %s\\n\", relayState ? \"ON\" : \"OFF\");\n    delay(500);\n\
      \  }\n}\n"
  code_explanation: I2S uses GPIO14, GPIO15, and GPIO32. CLAP_THRESHOLD sets the sound peak needed to toggle the active-low
    relay input on GPIO26.
  expected_output: Serial Monitor prints Peak values. A loud clap above 50000 toggles Relay ON or OFF and changes the LED
    state.
  common_mistakes:
  - text: Calling clap detection full speech recognition.
  - text: Putting mains voltage on a breadboard.
  - text: Forgetting active-low relay logic.
  - text: Setting the threshold before measuring room noise.
  troubleshooting:
  - problem: Relay toggles randomly
    fix: Raise CLAP_THRESHOLD after recording normal room peaks.
  - problem: No sound detected
    fix: Check INMP441 power and I2S pins.
  - problem: Relay logic is backwards
    fix: Confirm the module is active LOW and starts with GPIO26 HIGH.
  testing_checklist:
  - Boot with no relay load connected.
  - Record quiet-room peak values.
  - Clap once and confirm one toggle.
  - Test only a low-voltage demo load.
  engineer_tips:
  - Call it sound-triggered unless real speech recognition is added.
  - Keep microphone wires short.
  - Use enclosures and professionals for mains work.
  upgrade_ideas:
  - Add a physical override button.
  - Add a low-voltage LED strip demo load.
  - Move to a real speech-recognition module before claiming commands.
