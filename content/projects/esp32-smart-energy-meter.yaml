  code:
    filename: esp32-smart-energy-meter.ino
    content: "// ESP32 Smart Energy Meter - low-voltage ADC demo\n// Reads voltage sensor on GPIO36 and current sensor on\
      \ GPIO34.\n// This sketch is for isolated low-voltage learning circuits, not direct mains measurement.\n\nconst int\
      \ VOLTAGE_PIN = 36;  // ADC1 input\nconst int CURRENT_PIN = 34;  // ADC1 input\nconst int SAMPLE_DELAY_MS = 500;\n\n\
      void setup() {\n  Serial.begin(115200);\n  pinMode(VOLTAGE_PIN, INPUT);\n  pinMode(CURRENT_PIN, INPUT);\n  Serial.println(\"\
      ESP32 Smart Energy Meter low-voltage demo\");\n}\n\nvoid loop() {\n  int voltageRaw = analogRead(VOLTAGE_PIN);\n  int\
      \ currentRaw = analogRead(CURRENT_PIN);\n  float relativePower = (voltageRaw / 4095.0) * (currentRaw / 4095.0);\n\n\
      \  Serial.print(\"voltageRaw=\");\n  Serial.print(voltageRaw);\n  Serial.print(\" currentRaw=\");\n  Serial.print(currentRaw);\n\
      \  Serial.print(\" relativePower=\");\n  Serial.println(relativePower, 4);\n  delay(SAMPLE_DELAY_MS);\n}\n"
  code_explanation: The sketch reads voltageRaw from GPIO36 and currentRaw from GPIO34, then multiplies scaled ratios for
    relativePower. No GPIO is used as a relay cutoff output.
  expected_output: Serial Monitor prints voltageRaw, currentRaw, and relativePower every 500 ms. The values are for calibration
    practice, not billing or direct mains measurement.
  common_mistakes:
  - text: Connecting AC mains directly to an ESP32 or breadboard.
  - text: Using GPIO39 or another input-only pin as an output.
  - text: Assuming raw ADC counts are calibrated volts or amps.
  troubleshooting:
  - problem: Readings stay at 0
    fix: Check sensor power, ground, and analog outputs on GPIO36/GPIO34.
  - problem: Readings stay near 4095
    fix: Disconnect and confirm the sensor output is within ESP32-safe range.
  - problem: OLED does not show data
    fix: First confirm Serial Monitor readings, then check SDA on GPIO21 and SCL on GPIO22.
  testing_checklist:
  - Upload the sketch with only the documented circuit attached.
  - Open Serial Monitor and confirm the expected messages.
  - Move or trigger the input and watch the output change.
  - Power-cycle the project and confirm it starts safely.
  engineer_tips:
  - Change one variable at a time.
  - Keep wires short and labeled while testing.
  - Record any calibrated threshold before installing the project.
  upgrade_ideas:
  - Add calibrated scaling constants after measuring known references.
  - Display voltage, current, and relative power on the OLED.
  - Publish readings to MQTT only after local calibration is repeatable.
