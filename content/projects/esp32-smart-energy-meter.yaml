  what_you_build: A bench-safe energy meter demo that reads voltage on GPIO36 and current on GPIO34, then prints a relative
    power estimate.
  story: Energy monitoring must be documented carefully because unsafe shortcuts are dangerous. This upgrade removes the staged-source
    mistake that treated GPIO39 as an output and keeps the build on ADC1 input pins. The component list, wiring table, GPIO
    map, code constants, expected output, troubleshooting, and FAQ now describe the same bench build so a learner can verify
    each step instead of guessing.
  eli12: The ESP32 reads one number for voltage and one number for current. Multiplying the scaled readings gives a simple
    power estimate for a safe classroom circuit. Prove the local wiring and code first, then add displays, logging, or Wi-Fi
    after the simple version behaves exactly as expected.
  parent_safety: Do not connect this project directly to AC mains. Use only isolated low-voltage sensor modules or a supervised
    lab source. Unplug USB and any external supply before rewiring, keep the build low-voltage on the bench, and stop immediately
    if a module becomes hot or behaves unexpectedly.
