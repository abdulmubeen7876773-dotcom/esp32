  faqs:
  - question: Can this measure house mains directly?
    answer: No. Do not connect mains to the ESP32 or a breadboard.
  - question: Why use GPIO36 and GPIO34?
    answer: They are ADC1 input-only pins, appropriate for analog readings and Wi-Fi compatibility.
  - question: Why print relative power?
    answer: Exact voltage and current scaling depends on the sensor modules, so the starter code avoids inventing calibration
      values.
