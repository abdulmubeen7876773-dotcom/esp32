  circuit_explanation: GPIO36 and GPIO34 sample analog sensor outputs. The optional OLED is an I2C display, not a relay cutoff.
  engineering_explanation: The sketch reports raw ADC values and relative power until exact sensor modules are calibrated.
    It avoids invented voltage scaling, current limits, and ADC2 Wi-Fi conflicts.
