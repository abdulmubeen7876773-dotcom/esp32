      \      <p>Designed for Current Sense: ESP32 watches Voltage Sensor signal and activates Current\
      \ Sensor control when conditions cross your threshold.</p>\n      <ul class=\"overview-list\">\n\
      \        <li>Voltage Sensor signal connects to GPIO36 (ADC input)</li><li>Threshold is set to 1605\
