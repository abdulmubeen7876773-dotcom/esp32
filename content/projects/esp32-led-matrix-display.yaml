slug: esp32-led-matrix-display
title: ESP32 LED Matrix Display
category: LED Projects
description: Chain MAX7219 8x8 LED matrix modules with the ESP32 to create a scrolling text display. Control
  the message and brightness from a web interface, animate custom patterns, and display live MQTT data
  as a real-time ticker board.
