  wiring:
    illustration_alt: ESP32 LED Matrix Display wiring diagram
    summary: Wire the input hardware first, confirm readings in Serial Monitor, then connect the output hardware. The ESP32
      sends serial data to the MAX7219 through DIN, CLK, and CS.
    steps:
    - Unplug USB before changing wires.
    - Connect MAX7219 DIN (MOSI) to GPIO 23 (SPI MOSI).
    - Connect MAX7219 CS (CS) to GPIO 5 (SPI chip select).
    - Connect MAX7219 CLK to GPIO 18 (SPI clock).
    - Connect MAX7219 VCC to 5 V (Vin) (Matrix LEDs need 5 V for full brightness).
    - Connect MAX7219 GND to GND.
    - Reconnect USB, upload the sketch, and open Serial Monitor at 115200 baud unless the code says otherwise.
  gpio_map:
  - signal: MAX7219 DIN (MOSI)
    esp32_pin: GPIO 23
    direction: Output
    notes: SPI MOSI
  - signal: MAX7219 CS (CS)
    esp32_pin: GPIO 5
    direction: Output
    notes: SPI chip select
  - signal: MAX7219 CLK
    esp32_pin: GPIO 18
    direction: Output
    notes: SPI clock
  - signal: MAX7219 VCC
    esp32_pin: 5 V (Vin)
    direction: Power
    notes: Matrix LEDs need 5 V for full brightness
  - signal: MAX7219 GND
    esp32_pin: GND
    direction: Ground
    notes: Match this wire to the code constant.
  circuit_explanation: The ESP32 sends serial data to the MAX7219 through DIN, CLK, and CS. The MAX7219 multiplexes rows and
    columns inside the matrix and controls LED current. The module usually needs 5 V for full brightness, while the ESP32
    signal pins still provide logic control.
  engineering_explanation: Matrix displays are multiplexed. Only part of the display is driven at any instant, but it refreshes
    fast enough that your eyes see a steady image. Brightness, power supply stability, and wiring length matter more as you
    chain more modules.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-led-matrix-display.ino
    content: "// ESP32 LED Matrix Display - Beginner\n// Single MAX7219 8x8; scrolling text via MD_MAX72XX library\n// Install:\
      \ MD_MAX72XX by MajicDesigns in Library Manager\n// Install: MD_Parola by MajicDesigns in Library Manager\n\n#include\
      \ <MD_Parola.h>\n#include <MD_MAX72xx.h>\n#include <SPI.h>\n\n#define HARDWARE_TYPE MD_MAX72XX::FC16_HW\n#define MAX_DEVICES\
      \   1\n#define CS_PIN        5\n\nMD_Parola display = MD_Parola(HARDWARE_TYPE, CS_PIN, MAX_DEVICES);\n\nconst char*\
      \ message = \"Hello ESP32! \";\nconst uint8_t SCROLL_SPEED = 60; // milliseconds per step (lower = faster)\nconst uint8_t\
      \ BRIGHTNESS   = 5;  // 0 (dim) to 15 (full)\n\nvoid setup() {\n  Serial.begin(115200);\n  display.begin();\n  display.setIntensity(BRIGHTNESS);\n\
      \  display.displayClear();\n  display.displayScroll(message, PA_LEFT, PA_SCROLL_LEFT, SCROLL_SPEED);\n  Serial.println(\"\
      LED matrix display ready.\");\n}\n\nvoid loop() {\n  if (display.displayAnimate()) {\n    // Animation complete — restart\
      \ scroll\n    display.displayReset();\n  }\n}"
  code_explanation: The sketch starts Serial Monitor, defines readable pin constants, configures input and output pins in
    setup(), then repeats the measurement and decision logic in loop(). The display library converts text into matrix patterns
    while the ESP32 sends data through the MAX7219 control pins. Brightness and update speed are intentionally separated from
    the message text.
  expected_output: Serial Monitor should print live readings or status messages. The output should change only when the tested
    condition for esp32 led matrix display is reached.
  common_mistakes:
  - text: Powering several matrix modules from the ESP32 3.3 V pin.
  - text: Mixing up DIN and DOUT when chaining modules.
  - text: Forgetting common ground between ESP32 and matrix power.
  - text: Setting brightness too high on USB power.
  - text: Using the wrong hardware type in the display library.
  troubleshooting:
  - problem: Display stays blank
    fix: Check VCC, GND, DIN, CS, CLK, and confirm the library hardware type matches the module.
  - problem: Text scrolls backwards
    fix: Change the module orientation or hardware type in the library settings.
  - problem: Display flickers
    fix: Use a stronger 5 V supply and shorter wires.
  - problem: Only one module works in a chain
    fix: Check DOUT of one module goes to DIN of the next.
  testing_checklist:
  - Upload a simple Blink sketch first to confirm the board and USB cable work.
  - Wire only power and ground, then confirm the board still boots.
  - Connect the input signal and print raw readings before using thresholds.
  - Trigger the real-world condition slowly and watch Serial Monitor.
  - Connect the output only after the input reading is believable.
  - Power-cycle the project and confirm it starts in a safe state.
  engineer_tips:
  - Start with one module before chaining four or more.
  - Keep brightness low during USB testing.
  - Use a separate 5 V supply for multi-module displays.
  - Mount matrix arrows/orientation consistently.
  - Add a capacitor across 5 V and GND for long chains.
  performance_tips:
  - Update text only when it changes.
  - Avoid blocking delays if the display shares work with sensors.
  - Reduce brightness to save current.
  - Use hardware SPI pins for reliable high-speed updates.
