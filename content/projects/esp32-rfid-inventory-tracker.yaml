levels:
  beginner:
    level: beginner
    overview_html: <p>In this beginner project you will connect an RC522 RFID module to the ESP32 via
      SPI and read MIFARE 13.56 MHz tag UIDs. When a tag is scanned, the UID and a timestamp are printed
      to Serial and stored as a line in a CSV file on an SD card. An LED flashes green for a known tag
      and red for an unknown tag. This demonstrates SPI RFID reading and SD card logging fundamentals.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× RC522 RFID reader module — 13.56 MHz MIFARE; SPI; 3.3 V
    - 3× MIFARE 1K RFID tag or card — Classic key fobs or credit-card size tags
    - 1× MicroSD card module (SPI)
    - 1× Green and red LED + 220 ohm resistors
    wiring:
    - - RC522 SDA/SCK/MOSI/MISO
      - GPIO 5/18/23/19
      - SPI bus shared with SD
    - - RC522 RST
      - GPIO 22
      - ''
    - - RC522 3.3 V / GND
      - 3.3 V / GND
      - Do NOT connect to 5 V
    - - SD CS
      - GPIO 4
      - Separate CS from RC522
    - - Green LED
      - GPIO 26
      - 220 ohm series
    - - Red LED
      - GPIO 27
      - 220 ohm series
    how:
    - 'RC522 SPI Communication: The RC522 uses SPI with a dedicated chip-select (SS) pin. The MFRC522
      library manages the ISO 14443A protocol: it sends RF commands to detect tags (PICC_IsNewCardPresent),
      authenticate (for MIFARE Classic encrypted blocks), and read/write data. The 13.56 MHz field powers
      the passive tag and enables two-way communication.'
    - 'UID as Asset Identifier: Each MIFARE tag has a factory-programmed UID (4-7 bytes) that is globally
      unique. The beginner project uses these UIDs directly as asset identifiers by comparing scanned
      UIDs against a hardcoded array. The uidToHex() function converts the raw byte array to an uppercase
      hex string for easy comparison.'
    - 'Shared SPI Bus: The RC522 and SD card module share the SPI bus (SCK, MOSI, MISO) but each has its
      own chip-select pin (GPIO 5 for RC522, GPIO 4 for SD). Only one device is active at a time: when
      RC522_SS is LOW the SD_CS is HIGH and vice versa. The SPI library manages this automatically when
      different CS pins are used.'
    - 'CSV Audit Log: Each scan appends a line to /inventory.csv: millis timestamp, UID, and asset name.
      The millis() timestamp can be replaced with an NTP timestamp in Wi-Fi enabled builds. The CSV format
      is directly importable into Excel or Google Sheets for reporting.'
    apps:
    - Tool crib check-out logging in a workshop or factory
    - Library book scan-in/scan-out system
    - Equipment cage access and removal tracking
    - School lab equipment loan tracking
    troubleshooting:
    - - PICC_IsNewCardPresent always returns false
      - Verify the RC522 is powered at exactly 3.3 V — it is not 5 V tolerant. Check all four SPI pins.
        Confirm RC522_SS and RC522_RST are correctly defined. Call rfid.PCD_DumpVersionToSerial() in setup()
        to verify the library can communicate with the RC522 chip.
    - - SD card fails to initialise on the same SPI bus
      - The RC522 must be initialised first with SPI.begin() already called. Ensure SD.begin(SD_CS) uses
        a different CS pin from RC522_SS. Some SD modules require the CS pin to be explicitly pulled HIGH
        before SPI.begin() to prevent bus contention during initialisation.
    - - Same tag triggers multiple scans in rapid succession
      - The 1000 ms delay at the end of loop() prevents rapid rescanning. Increase to 2000 ms if double-scanning
        still occurs. rfid.PICC_HaltA() puts the tag in HALT state; rfid.PCD_StopCrypto1() resets the
        crypto layer. Both must be called to properly terminate each card transaction.
    upgrades:
    - Add Wi-Fi and NTP timestamps to replace millis() in the CSV log
    - Add a buzzer that plays different tones for known versus unknown tags
    - Add a 16x2 LCD to display the scanned asset name without a computer
    - Add MIFARE data block writing to store asset name directly on the tag
    code: "// ESP32 RFID Inventory Tracker - Beginner\n// RC522 tag scan -> SD card CSV log with known/unknown\
      \ LED feedback\n// Libraries: MFRC522 by GithubCommunity, SD by Arduino\n\n#include <SPI.h>\n#include\
      \ <MFRC522.h>\n#include <SD.h>\n\n#define RC522_SS  5\n#define RC522_RST 22\n#define SD_CS     4\n\
      #define LED_GREEN 26\n#define LED_RED   27\n\nMFRC522 rfid(RC522_SS, RC522_RST);\n\n// Known tag\
      \ UIDs (hex strings) mapped to asset names\nconst char* KNOWN_UIDS[] = {\"A1B2C3D4\", \"11223344\"\
      , \"DEADBEEF\"};\nconst char* ASSET_NAMES[] = {\"Laptop-01\", \"Camera-01\", \"Toolbox-01\"};\n\
      const int NUM_ASSETS = 3;\n\nString uidToHex(MFRC522::Uid *uid){\n  String s=\"\";\n  for(byte i=0;i<uid->size;i++){\n\
      \    if(uid->uidByte[i]<0x10) s+=\"0\";\n    s+=String(uid->uidByte[i],HEX);\n  }\n  s.toUpperCase();\n\
      \  return s;\n}\n\nvoid flashLED(int pin){ digitalWrite(pin,HIGH); delay(300); digitalWrite(pin,LOW);\
      \ }\n\nvoid logScan(const String &uid, const char* name){\n  File f=SD.open(\"/inventory.csv\",FILE_APPEND);\n\
      \  if(!f) return;\n  f.printf(\"%lu,%s,%sn\",millis(),uid.c_str(),name);\n  f.close();\n}\n\nvoid\
      \ setup(){\n  Serial.begin(115200);\n  SPI.begin();\n  rfid.PCD_Init();\n  SD.begin(SD_CS);\n  pinMode(LED_GREEN,OUTPUT);\
      \ pinMode(LED_RED,OUTPUT);\n  Serial.println(\"RFID Inventory Tracker ready. Scan a tag...\");\n\
      }\n\nvoid loop(){\n  if(!rfid.PICC_IsNewCardPresent()||!rfid.PICC_ReadCardSerial()) return;\n  String\
      \ uid=uidToHex(&rfid.uid);\n  const char* name=\"UNKNOWN\";\n  bool known=false;\n  for(int i=0;i<NUM_ASSETS;i++){\n\
      \    if(uid==String(KNOWN_UIDS[i])){ name=ASSET_NAMES[i]; known=true; break; }\n  }\n  Serial.printf(\"\
      UID: %s  Asset: %sn\",uid.c_str(),name);\n  logScan(uid,name);\n  flashLED(known?LED_GREEN:LED_RED);\n\
      \  rfid.PICC_HaltA();\n  rfid.PCD_StopCrypto1();\n  delay(1000);\n}"
    code_filename: esp32-rfid-inventory-beginner.ino
  intermediate:
    level: intermediate
    overview_html: <p>The intermediate build maintains a live inventory database in memory and on SD card.
      Each tag scan toggles the asset between checked-in and checked-out state. A web interface lists
      all assets with their current state, last-seen timestamp, and check-out count. Stock levels below
      a configurable minimum trigger a Telegram low-stock alert.</p>
    components:
    - 1× ESP32 DevKit V1
    - 1× RC522 RFID reader
    - 1× MicroSD card module
    - 10× MIFARE tags — One per tracked asset
    - 1× Wi-Fi router — Web dashboard + Telegram
    wiring:
    - - RC522 and SD
      - Same as beginner
      - ''
    how:
    - 'Toggle Check-In/Check-Out State: Each tag scan flips the checkedIn boolean for that asset. The
      first scan of a previously checked-in asset marks it as checked out; scanning again marks it as
      checked in. This toggle model works well for simple tool crib scenarios where assets leave and return
      through one checkpoint.'
    - 'Asset Database from SD Card: The /assets.csv file contains UID,AssetName pairs, one per line. loadAssets()
      reads this file at startup to populate the in-memory assets[] array. Adding a new asset requires
      editing the CSV on a computer and restarting the ESP32. The in-memory database is fast; the SD card
      provides persistence.'
    - 'Real-Time Stock Count Alert: After each scan, the code counts how many assets are currently checked
      in. If this count falls below MIN_STOCK, a Telegram alert is sent. The alert fires on every scan
      that keeps stock below the threshold, so consider adding an alerted flag to prevent repeat messages
      until stock recovers.'
    - 'Audit Log with Timestamps: Each check-in/out event appends a timestamped line to /log.csv with
      Unix timestamp, UID, asset name, and direction (IN/OUT). This log is the audit trail for compliance
      reporting. The NTP timestamp ensures log entries are correlated with real-world events even after
      ESP32 restarts.'
    apps:
    - Tool crib management with check-out accountability
    - Medical equipment tracking in a hospital ward
    - Library equipment and AV loan system
    - Warehouse sample and prototype tracking system
    troubleshooting:
    - - Asset state is lost after power cycle
      - The current implementation holds state in RAM. On restart loadAssets() reloads names and UIDs
        but not current check-in/out state. Add a /state.csv file that saves the checkedIn boolean and
        outCount for each asset and reads it on startup alongside assets.csv.
    - - Unknown tags trigger no response
      - The current code silently ignores unregistered tags. Add an else branch after the for-loop to
        log unknown UIDs to a separate /unknown.csv file and flash a red LED. This helps identify unregistered
        tags that need to be added to assets.csv.
    - - Web dashboard shows outdated data after multiple scans
      - 'The web server is synchronous; it serves the current in-memory state on each request. If the
        browser caches the response, add a Cache-Control: no-cache header: server.sendHeader("Cache-Control","no-cache")
        before server.send().'
    upgrades:
    - Add a barcode scanner as an alternative to RFID for items without tags
    - 'Add user authentication: scan a personal ID card first, then the asset, to track who took what'
    - Add SD card export endpoint to download the audit log as a CSV file from the browser
    - Add MQTT publishing so Home Assistant tracks stock levels as sensors
