project:
  icon: PROJ
  mission_title: Build an RFID Inventory Tracker
  difficulty: Intermediate
  age: Ages 13+
  estimated_time: 90-120 min
  budget: Under 30 USD
  what_you_build: An RFID tracker that scans RC522 tags over SPI, logs events to a microSD card, and uses red and green LEDs
    for known or unknown tags.
  story: Inventory systems work because every scan becomes a reliable event. RC522 and SD share the SPI bus, while GPIO5 and
    GPIO4 keep separate chip-select signals so the ESP32 can talk to one module at a time. The component list, wiring table,
    GPIO map, code constants, expected output, troubleshooting, and FAQ now describe the same bench build so a learner can
    verify each step instead of guessing.
  eli12: An RFID tag has a small ID number. The reader asks for that number, the ESP32 checks the known list, writes a line
    to the memory card, and flashes the matching LED. Prove the local wiring and code first, then add displays, logging, or
    Wi-Fi after the simple version behaves exactly as expected.
  parent_safety: Power the RC522 from 3.3 V as shown and do not connect unknown 5 V signals to the ESP32 SPI pins. Unplug
    USB and any external supply before rewiring, keep the build low-voltage on the bench, and stop immediately if a module
    becomes hot or behaves unexpectedly.
  learning_objectives:
  - Wire the exact GPIO pins used by the sketch.
  - Run the starter code and compare output with the wiring table.
  - Explain the main sensor or input signal in plain language.
  - Troubleshoot one wiring mistake using Serial Monitor evidence.
  components:
  - item: ESP32 DevKit board
    note: Controls SPI, LEDs, and logging.
    link: /components/esp32-devkit.html
  - item: RC522 RFID reader module
    note: 13.56 MHz RFID reader powered from 3.3 V.
  - item: MIFARE-compatible RFID cards or tags
    note: Use test tags for the known UID list.
  - item: MicroSD card module
    note: SPI storage with CS on GPIO4.
  - item: Green and red LEDs with series resistors
    note: Known and unknown feedback on GPIO26 and GPIO27.
