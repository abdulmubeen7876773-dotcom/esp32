  faqs:
  - question: Why do RC522 and SD share SPI?
    answer: SPI supports multiple devices when each has its own chip-select pin.
  - question: Can I use my own tag IDs?
    answer: Yes. Read the UID from Serial Monitor and replace the starter values.
  - question: Should RC522 use 5 V?
    answer: No for this tutorial. Wire RC522 power to 3.3 V.
