  advanced:
    level: advanced
    overview_html: '<p>The advanced build stores the inventory database in an SQLite-equivalent structure
      using LittleFS and exposes a full REST API: GET /api/assets returns JSON, POST /api/scan processes
      a tag event, PUT /api/asset/:id updates an asset record. A React single-page dashboard served from
      LittleFS shows real-time stock, scan history charts, and an asset search field. MQTT events broadcast
      each scan to Home Assistant.</p>'
    components:
    - 1× ESP32 DevKit V1 — 4 MB flash for LittleFS
    - 1× RC522 RFID reader
    - 1× MQTT broker
    wiring:
    - - RC522 SPI
      - GPIO 5/18/23/19 + RST GPIO 22
      - ''
    how:
    - 'LittleFS JSON Database: All asset records are stored as a JSON array in /db.json on LittleFS (the
      ESP32 internal flash filesystem). On each scan event, saveDB() rewrites the entire file. For 50
      assets, the JSON is approximately 3 KB and write time is under 50 ms. LittleFS wear levelling distributes
      writes across flash blocks.'
    - 'AsyncWebServer REST API: ESPAsyncWebServer handles concurrent HTTP requests without blocking the
      RFID scan loop. The /api/assets endpoint returns a JSON array of all assets. The /api/add endpoint
      adds a new asset by POST parameters. The React SPA makes fetch() calls to these endpoints and updates
      the UI without full page reloads.'
    - 'Static SPA from LittleFS: A React single-page application minified to index.html, app.js, and app.css
      is uploaded to the /www/ directory on LittleFS using the Arduino LittleFS upload plugin. serveStatic()
      maps HTTP requests to these files. The SPA polls /api/assets every 5 seconds and renders a table
      with stock status and scan count charts.'
    - 'MQTT Home Assistant Integration: Each scan publishes a JSON event to inventory/scan with uid, name,
      checked-in state, and timestamp. A Home Assistant MQTT sensor entity tracks each asset''s state.
      Home Assistant automations can trigger notifications, update dashboard badges, or control room access
      based on specific asset check-out events.'
    apps:
    - Enterprise asset management for IT equipment lifecycle tracking
    - Hospital medical device location and availability monitoring
    - Laboratory sample chain-of-custody RFID tracking
    - Construction site equipment check-out with automated loss alerts
    troubleshooting:
    - - LittleFS fails to mount with begin(true)
      - The true parameter in LittleFS.begin(true) formats LittleFS on first run if not already formatted.
        On subsequent boots it mounts normally. If mounting fails repeatedly, check the flash partition
        scheme includes a LittleFS partition (use "Default 4MB with spiffs" or "Minimal SPIFFS" board
        configuration).
    - - API returns stale data after adding a new asset
      - 'The /api/assets handler reads from the in-memory assets[] array which is always current. If the
        browser shows stale data, the issue is browser caching. Add response headers: res->addHeader("Cache-Control","no-store")
        to all API responses.'
    - - ESP32 crashes after many scan events
      - Repeated JSON serialisation with DynamicJsonDocument allocates heap memory. Monitor free heap
        with Serial.println(ESP.getFreeHeap()). If heap decreases over time, use a StaticJsonDocument
        with a fixed size or pre-allocate the document once globally rather than inside saveDB().
    upgrades:
    - Add HTTPS with a self-signed certificate for secure API access over the network
    - Add a barcode scanner USB HID input as a fallback for items without RFID tags
    - Add a Node-RED dashboard with a Sankey chart showing asset movement patterns over time
    - 'Add role-based access: different tag types grant different permissions (admin vs read-only)'
    code: "// ESP32 RFID Inventory - Advanced (REST API + LittleFS JSON DB + MQTT)\n#include <SPI.h>\n\
      #include <MFRC522.h>\n#include <WiFi.h>\n#include <ESPAsyncWebServer.h>\n#include <AsyncTCP.h>\n\
      #include <PubSubClient.h>\n#include <ArduinoJson.h>\n#include <LittleFS.h>\n#include <time.h>\n\n\
      MFRC522 rfid(5,22);\nAsyncWebServer server(80);\nWiFiClient wc; PubSubClient mqtt(wc);\nconst char*\
      \ SSID=\"YourSSID\", *PASS=\"YourPass\";\nconst char* MQTT_HOST=\"192.168.1.100\";\n\nstruct Asset\
      \ { String uid,name; bool in; time_t last; int outCount; };\nconst int MAX_A=50; Asset assets[MAX_A];\
      \ int aCount=0;\n\nvoid saveDB(){\n  DynamicJsonDocument doc(8192);\n  JsonArray arr=doc.createNestedArray(\"\
      assets\");\n  for(int i=0;i<aCount;i++){\n    JsonObject o=arr.createNestedObject();\n    o[\"uid\"\
      ]=assets[i].uid; o[\"name\"]=assets[i].name;\n    o[\"in\"]=assets[i].in; o[\"last\"]=(long)assets[i].last;\n\
      \    o[\"out\"]=assets[i].outCount;\n  }\n  File f=LittleFS.open(\"/db.json\",\"w\");\n  serializeJson(doc,f);\
      \ f.close();\n}\n\nvoid loadDB(){\n  if(!LittleFS.exists(\"/db.json\")) return;\n  File f=LittleFS.open(\"\
      /db.json\",\"r\");\n  DynamicJsonDocument doc(8192);\n  deserializeJson(doc,f); f.close();\n  JsonArray\
      \ arr=doc[\"assets\"];\n  for(JsonObject o:arr){\n    if(aCount>=MAX_A) break;\n    assets[aCount]={o[\"\
      uid\"].as<String>(),o[\"name\"].as<String>(),\n      o[\"in\"]|true,(time_t)(o[\"last\"]|0),(int)(o[\"\
      out\"]|0)};\n    aCount++;\n  }\n}\n\nString uidStr(MFRC522::Uid *u){\n  String s=\"\";\n  for(byte\
      \ i=0;i<u->size;i++){if(u->uidByte[i]<0x10)s+=\"0\";s+=String(u->uidByte[i],HEX);}\n  s.toUpperCase();\
      \ return s;\n}\n\nvoid mqttEvent(const String &uid, const String &name, bool in){\n  StaticJsonDocument<128>\
      \ doc;\n  doc[\"uid\"]=uid; doc[\"name\"]=name; doc[\"in\"]=in; doc[\"ts\"]=(long)time(nullptr);\n\
      \  char buf[128]; serializeJson(doc,buf);\n  mqtt.publish(\"inventory/scan\",buf);\n}\n\nvoid setup(){\n\
      \  Serial.begin(115200); SPI.begin(); rfid.PCD_Init();\n  LittleFS.begin(true);\n  loadDB();\n \
      \ WiFi.begin(SSID,PASS); while(WiFi.status()!=WL_CONNECTED) delay(500);\n  configTime(0,0,\"pool.ntp.org\"\
      );\n  mqtt.setServer(MQTT_HOST,1883);\n\n  // Serve React SPA from LittleFS /www/index.html\n  server.serveStatic(\"\
      /\",LittleFS,\"/www/\").setDefaultFile(\"index.html\");\n\n  server.on(\"/api/assets\",HTTP_GET,[](AsyncWebServerRequest\
      \ *r){\n    DynamicJsonDocument doc(4096); JsonArray arr=doc.createNestedArray(\"assets\");\n  \
      \  for(int i=0;i<aCount;i++){\n      JsonObject o=arr.createNestedObject();\n      o[\"uid\"]=assets[i].uid;\
      \ o[\"name\"]=assets[i].name;\n      o[\"in\"]=assets[i].in; o[\"out\"]=assets[i].outCount;\n  \
      \  }\n    String out; serializeJson(doc,out);\n    r->send(200,\"application/json\",out);\n  });\n\
      \n  server.on(\"/api/add\",HTTP_POST,[](AsyncWebServerRequest *r){\n    if(!r->hasParam(\"uid\"\
      ,true)||!r->hasParam(\"name\",true)){r->send(400); return;}\n    String uid=r->getParam(\"uid\"\
      ,true)->value();\n    String name=r->getParam(\"name\",true)->value();\n    if(aCount<MAX_A){ assets[aCount++]={uid,name,true,time(nullptr),0};\
      \ saveDB(); }\n    r->send(200,\"text/plain\",\"OK\");\n  });\n\n  server.begin();\n  Serial.printf(\"\
      Inventory API: http://%s/n\",WiFi.localIP().toString().c_str());\n}\n\nvoid loop(){\n  if(!mqtt.connected())\
      \ mqtt.connect(\"RFID\");\n  mqtt.loop();\n  if(!rfid.PICC_IsNewCardPresent()||!rfid.PICC_ReadCardSerial())\
      \ return;\n  String uid=uidStr(&rfid.uid);\n  for(int i=0;i<aCount;i++){\n    if(assets[i].uid==uid){\n\
      \      assets[i].in=!assets[i].in;\n      assets[i].last=time(nullptr);\n      if(!assets[i].in)\
      \ assets[i].outCount++;\n      saveDB();\n      mqttEvent(uid,assets[i].name,assets[i].in);\n  \
      \    Serial.printf(\"%s -> %sn\",assets[i].name.c_str(),assets[i].in?\"IN\":\"OUT\");\n      break;\n\
      \    }\n  }\n  rfid.PICC_HaltA(); rfid.PCD_StopCrypto1();\n  delay(1000);\n}"
