slug: esp32-rfid-inventory-tracker
title: ESP32 RFID Inventory Tracker
category: Industrial Automation
description: Track assets and inventory with the ESP32 and RC522 RFID reader. Scan MIFARE tags to log
  check-in and check-out events, maintain a stock count database on an SD card, and view real-time inventory
  status on a web dashboard — no cloud subscription required.
meta_description: Build an ESP32 RFID inventory tracker using the RC522 module. Scan asset tags, log check-in
  and check-out events to SD card, and monitor stock levels from a live web dashboard.
