  wiring:
    illustration_alt: ESP32 RFID Inventory Tracker wiring diagram
    summary: An RFID tracker that scans RC522 tags over SPI, logs events to a microSD card, and uses red and green LEDs for
      known or unknown tags.
    steps:
    - Unplug USB before changing SPI, LED, or SD wiring.
    - Connect RC522 SDA/SS to GPIO5, SCK to GPIO18, MOSI to GPIO23, MISO to GPIO19, and RST to GPIO22.
    - Connect RC522 3.3 V and GND to the ESP32 3.3 V and GND rails.
    - Connect SD CS to GPIO4 while sharing SCK, MOSI, and MISO with SPI.
    - Connect green LED through its resistor to GPIO26 and red LED through its resistor to GPIO27.
    - Reconnect USB and test one RFID tag before relying on the SD log.
  gpio_map:
  - signal: RC522 SDA/SS
    esp32_pin: GPIO5
    direction: Output
    notes: RC522 chip select.
  - signal: SPI SCK/MOSI/MISO
    esp32_pin: GPIO18 / GPIO23 / GPIO19
    direction: I/O
    notes: Shared SPI bus.
  - signal: RC522 RST
    esp32_pin: GPIO22
    direction: Output
    notes: RFID reset.
  - signal: SD CS
    esp32_pin: GPIO4
    direction: Output
    notes: Separate SD chip select.
  - signal: Green LED / Red LED
    esp32_pin: GPIO26 / GPIO27
    direction: Output
    notes: Scan feedback.
  circuit_explanation: RC522 and SD share SCK, MOSI, and MISO. Separate chip-select pins prevent both modules from answering
    at once.
  engineering_explanation: SPI sharing works only when chip-select wiring and code agree. The RC522 is powered from 3.3 V
    in this tutorial.
  libraries:
  - name: Arduino ESP32 core
    note: Install ESP32 board support in Arduino IDE.
  code:
    filename: esp32-rfid-inventory-tracker.ino
    content: "// ESP32 RFID Inventory Tracker - Beginner\n// RC522 tag scan -> SD card CSV log with known/unknown LED feedback\n\
      // Libraries: MFRC522 by GithubCommunity, SD by Arduino\n\n#include <SPI.h>\n#include <MFRC522.h>\n#include <SD.h>\n\
      \n#define RC522_SS  5\n#define RC522_RST 22\n#define SD_CS     4\n#define LED_GREEN 26\n#define LED_RED   27\n\nMFRC522\
      \ rfid(RC522_SS, RC522_RST);\n\n// Known tag UIDs (hex strings) mapped to asset names\nconst char* KNOWN_UIDS[] = {\"\
      A1B2C3D4\", \"11223344\", \"DEADBEEF\"};\nconst char* ASSET_NAMES[] = {\"Laptop-01\", \"Camera-01\", \"Toolbox-01\"\
      };\nconst int NUM_ASSETS = 3;\n\nString uidToHex(MFRC522::Uid *uid){\n  String s=\"\";\n  for(byte i=0;i<uid->size;i++){\n\
      \    if(uid->uidByte[i]<0x10) s+=\"0\";\n    s+=String(uid->uidByte[i],HEX);\n  }\n  s.toUpperCase();\n  return s;\n\
      }\n\nvoid flashLED(int pin){ digitalWrite(pin,HIGH); delay(300); digitalWrite(pin,LOW); }\n\nvoid logScan(const String\
      \ &uid, const char* name){\n  File f=SD.open(\"/inventory.csv\",FILE_APPEND);\n  if(!f) return;\n  f.printf(\"%lu,%s,%sn\"\
      ,millis(),uid.c_str(),name);\n  f.close();\n}\n\nvoid setup(){\n  Serial.begin(115200);\n  SPI.begin();\n  rfid.PCD_Init();\n\
      \  SD.begin(SD_CS);\n  pinMode(LED_GREEN,OUTPUT); pinMode(LED_RED,OUTPUT);\n  Serial.println(\"RFID Inventory Tracker\
      \ ready. Scan a tag...\");\n}\n\nvoid loop(){\n  if(!rfid.PICC_IsNewCardPresent()||!rfid.PICC_ReadCardSerial()) return;\n\
      \  String uid=uidToHex(&rfid.uid);\n  const char* name=\"UNKNOWN\";\n  bool known=false;\n  for(int i=0;i<NUM_ASSETS;i++){\n\
      \    if(uid==String(KNOWN_UIDS[i])){ name=ASSET_NAMES[i]; known=true; break; }\n  }\n  Serial.printf(\"UID: %s  Asset:\
      \ %sn\",uid.c_str(),name);\n  logScan(uid,name);\n  flashLED(known?LED_GREEN:LED_RED);\n  rfid.PICC_HaltA();\n  rfid.PCD_StopCrypto1();\n\
      \  delay(1000);\n}"
  code_explanation: The sketch defines RC522_SS on GPIO5, RC522_RST on GPIO22, SD_CS on GPIO4, and LEDs on GPIO26/GPIO27.
  expected_output: Serial Monitor reports scans and SD logging status. Known UIDs flash green, unknown UIDs flash red, and
    the SD card receives CSV rows.
  common_mistakes:
  - text: Powering RC522 from 5 V.
  - text: Using the same chip-select pin for RC522 and SD.
  - text: Mixing up MOSI and MISO.
  troubleshooting:
  - problem: RFID tags are not detected
    fix: Check RC522 3.3 V power, SPI wiring, GPIO5 CS, and GPIO22 reset.
  - problem: SD logging fails
    fix: Check SD format, GPIO4 CS, and shared SPI wiring.
  - problem: Known tag shows unknown
    fix: Copy the UID from Serial Monitor into KNOWN_UIDS.
