title: Disclaimer | ESP32 Engine
meta_description: Disclaimer for ESP32 Engine tutorials — educational use, safety, and liability information.
body_html: '<h1>Disclaimer</h1>

  <p>All tutorials on ESP32 Engine are provided for educational and informational purposes only.</p>

  <p>Electronics projects involve risk. Always verify wiring, use appropriate power supplies, and follow
  safety guidelines when working with mains voltage, motors, pumps, relays, or high-current loads.</p>

  <p><strong>Healthcare projects:</strong> Tutorials in the Healthcare category are not medical advice
  and must not be used for diagnosis, treatment, or patient monitoring.</p>

  <p><strong>Battery and power warning:</strong> Li-ion batteries, motors, servos, pumps, LED strips,
  and relay-controlled loads can draw more current than an ESP32 USB port can safely supply. Use
  appropriate power supplies, fuses, isolation, and adult or qualified supervision.</p>

  <p>Code samples are starting points. You are responsible for testing and adapting firmware for your
  exact hardware and use case. See our <a href="/testing-methodology.html">Testing Methodology</a>
  and <a href="/editorial-policy.html">Editorial Policy</a> for how tutorials are prepared.</p>'
