body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">For Teachers</li></ol></nav>
  <h1>Teach ESP32 in Your Classroom</h1>
  <p class="section-sub">Ready-to-use resources aligned with hands-on STEM learning. Free for educators worldwide.</p>
  <div class="resource-grid">
    <div class="resource-card"><h3>📚 Lesson Plans</h3><p>45-minute sessions covering GPIO, sensors, and Wi-Fi basics. Mapped to Beginner and Explorer paths.</p><span class="badge badge-cat">Coming soon</span></div>
    <div class="resource-card"><h3>📝 Worksheets</h3><p>Printable wiring diagrams, pin tables, and quiz sheets for students.</p><span class="badge badge-cat">Coming soon</span></div>
    <div class="resource-card"><h3>🖥 Slides</h3><p>Presentation decks for introducing ESP32, IoT, and project showcases.</p><span class="badge badge-cat">Coming soon</span></div>
    <div class="resource-card"><h3>✏️ Assignments</h3><p>Challenge missions with rubrics — blink patterns, sensor thresholds, team projects.</p><span class="badge badge-cat">Coming soon</span></div>
    <div class="resource-card"><h3>🎯 Learning Outcomes</h3><p>Students will understand circuits, read code, connect sensors, and build confidence in STEM.</p><a class="btn btn-card" href="/projects/esp32-learning-trainer.html">Trainer Project →</a></div>
  </div>
  <p style="margin-top:2rem"><a class="btn btn-primary" href="/contact.html">Request classroom access</a></p>
