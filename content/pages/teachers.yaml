body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">For Teachers</li></ol></nav>
  <section class="premium-page-hero premium-page-hero-classroom">
    <div class="premium-page-copy">
      <p class="section-eyebrow">For teachers</p>
      <h1>Teach ESP32 in Your Classroom</h1>
      <p class="section-sub">Ready-to-use resources aligned with hands-on STEM learning. Free for educators worldwide.</p>
      <div class="premium-actions"><a class="btn btn-primary" href="/guides.html">Browse guided missions</a><a class="btn btn-secondary" href="/projects/esp32-learning-trainer.html">Open trainer project</a></div>
    </div>
    <div class="premium-page-visual" aria-hidden="true"><span></span><span></span><span></span></div>
  </section>
  <section class="premium-grid premium-grid-3">
    <article class="premium-card"><span class="premium-icon">PLAN</span><h3>Lesson Plans</h3><p>45-minute sessions covering GPIO, sensors, displays, and Wi-Fi basics. Mapped to Beginner and Explorer paths.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">WORK</span><h3>Worksheets</h3><p>Printable wiring diagrams, pin tables, debugging prompts, and short reflection questions for students.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">TASK</span><h3>Assignments</h3><p>Challenge missions with rubrics for blink patterns, sensor thresholds, team builds, and project demos.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">OUT</span><h3>Learning Outcomes</h3><p>Students understand circuits, read code, connect sensors, explain data flow, and build confidence in STEM.</p></article>
    <article class="premium-card"><span class="premium-icon">STEM</span><h3>Curriculum Alignment</h3><p>Supports computational thinking, measurement, engineering design, debugging, data literacy, and teamwork.</p></article>
    <article class="premium-card"><span class="premium-icon">DL</span><h3>Downloads</h3><p>Slides, worksheets, and classroom packets will be grouped here as the resource library grows.</p><a class="btn btn-card" href="/downloads.html">View downloads -></a></article>
  </section>
  <section class="premium-band premium-band-dark">
    <p class="section-eyebrow">Classroom roadmap</p>
    <h2>Four sessions to a working embedded project.</h2>
    <div class="premium-timeline">
      <div><strong>01 Setup</strong><p>Install tools, identify pins, upload the first sketch.</p></div>
      <div><strong>02 Sense</strong><p>Read temperature, humidity, distance, or motion.</p></div>
      <div><strong>03 Display</strong><p>Show useful data on Serial Monitor or OLED.</p></div>
      <div><strong>04 Share</strong><p>Demo the build, explain the wiring, and reflect on improvements.</p></div>
    </div>
  </section>
  <section class="premium-faq">
    <h2>Teacher FAQs</h2>
    <details><summary>Can this work in a 45-minute class?</summary><p>Yes. Use pre-bagged components and start with guided missions such as Blink LED or Read Temperature.</p></details>
    <details><summary>Do students need prior electronics knowledge?</summary><p>No. The lessons introduce circuits, GPIO, and sensor readings progressively.</p></details>
    <details><summary>Can students work in teams?</summary><p>Yes. Teams of two or three work well: one wiring lead, one code lead, and one test/documentation lead.</p></details>
  </section>
