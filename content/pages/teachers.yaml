  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">For Teachers</li></ol></nav>
  <section class="premium-page-hero premium-page-hero-classroom">
    <div class="premium-page-copy">
      <p class="section-eyebrow">For teachers</p>
      <h1>Teach ESP32 in Your Classroom</h1>
      <p class="section-sub">Ready-to-use resources aligned with hands-on STEM learning. Free for educators worldwide.</p>
      <div class="premium-actions"><a class="btn btn-primary" href="/guides.html">Browse guided missions</a><a class="btn btn-secondary" href="/projects/esp32-learning-trainer.html">Open trainer project</a></div>
    </div>
    <div class="premium-page-visual" aria-hidden="true"><span></span><span></span><span></span></div>
  </section>
  <section class="premium-grid premium-grid-3">
    <article class="premium-card"><span class="premium-icon">PLAN</span><h3>Lesson Plans</h3><p>45-minute sessions covering GPIO, sensors, displays, and Wi-Fi basics. Mapped to Beginner and Explorer paths.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">WORK</span><h3>Worksheets</h3><p>Printable wiring diagrams, pin tables, debugging prompts, and short reflection questions for students.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">TASK</span><h3>Assignments</h3><p>Challenge missions with rubrics for blink patterns, sensor thresholds, team builds, and project demos.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">OUT</span><h3>Learning Outcomes</h3><p>Students understand circuits, read code, connect sensors, explain data flow, and build confidence in STEM.</p></article>
    <article class="premium-card"><span class="premium-icon">STEM</span><h3>Curriculum Alignment</h3><p>Supports computational thinking, measurement, engineering design, debugging, data literacy, and teamwork.</p></article>
    <article class="premium-card"><span class="premium-icon">DL</span><h3>Downloads</h3><p>Slides, worksheets, and classroom packets will be grouped here as the resource library grows.</p><a class="btn btn-card" href="/downloads.html">View downloads -></a></article>
  </section>
  <section class="premium-band premium-band-dark">
    <p class="section-eyebrow">Classroom roadmap</p>
    <h2>Four sessions to a working embedded project.</h2>
    <div class="premium-timeline">
      <div><strong>01 Setup</strong><p>Install tools, identify pins, upload the first sketch.</p></div>
      <div><strong>02 Sense</strong><p>Read temperature, humidity, distance, or motion.</p></div>
      <div><strong>03 Display</strong><p>Show useful data on Serial Monitor or OLED.</p></div>
      <div><strong>04 Share</strong><p>Demo the build, explain the wiring, and reflect on improvements.</p></div>
    </div>
  </section>
  <section class="premium-grid premium-grid-3">
    <article class="premium-card"><span class="premium-icon">USE</span><h3>How to Use the Academy</h3><p>Use missions as short lab starters. Students read the mission, build the circuit, run the code, then explain one thing they changed or debugged.</p></article>
    <article class="premium-card"><span class="premium-icon">TALK</span><h3>Discussion Questions</h3><p>Ask why the circuit needs ground, what HIGH and LOW mean, what could fail, and how students proved the hardware worked.</p></article>
    <article class="premium-card"><span class="premium-icon">MCQ</span><h3>Mission-Based MCQs</h3><p>Keep MCQs teacher-led: 3 to 5 checks after a lab, focused on wiring, code meaning, safety, and troubleshooting.</p></article>
    <article class="premium-card"><span class="premium-icon">EXAM</span><h3>End-of-Course Assessment</h3><p>Combine a short concept quiz, one wiring interpretation task, one code reading task, and a small improvement proposal.</p></article>
    <article class="premium-card"><span class="premium-icon">LAB</span><h3>Practical Lab Assessment</h3><p>Grade whether the circuit is safe, the code uploads, Serial Monitor output matches expectations, and the student can explain the result.</p></article>
    <article class="premium-card"><span class="premium-icon">RUB</span><h3>Project Rubric</h3><p>Evaluate wiring safety, working behavior, code clarity, debugging notes, teamwork, explanation quality, and final demo confidence.</p></article>
    <article class="premium-card"><span class="premium-icon">PRINT</span><h3>Worksheet Ideas</h3><p>Use pin-label tables, predict-the-output prompts, wiring trace exercises, vocabulary boxes, and reflection questions.</p></article>
    <article class="premium-card"><span class="premium-icon">TEAM</span><h3>Group Activities</h3><p>Assign roles: wiring lead, code lead, test lead, and reporter. Rotate roles every mission so every student practices each skill.</p></article>
    <article class="premium-card"><span class="premium-icon">HOME</span><h3>Homework Ideas</h3><p>Ask students to draw the circuit path, annotate three lines of code, list two mistakes, and propose one real-world use.</p></article>
  </section>
  <section class="premium-band">
    <p class="section-eyebrow">Assessment strategy</p>
    <h2>Keep missions lightweight. Assess in class.</h2>
    <p class="section-sub">Mission pages stay focused on building: mini challenge, engineer tip, and one idea to remember. Deeper checks belong in teacher-led discussion, lab review, worksheets, and project demos.</p>
    <div class="premium-timeline">
      <div><strong>Before lab</strong><p>Ask one prediction question and one safety check.</p></div>
      <div><strong>During lab</strong><p>Observe wiring habits, debugging steps, and teamwork.</p></div>
      <div><strong>After lab</strong><p>Use 3 short MCQs or a one-minute explanation.</p></div>
      <div><strong>Final demo</strong><p>Students present the problem, circuit, code, test result, and improvement idea.</p></div>
    </div>
  </section>
  <section class="premium-grid premium-grid-3">
    <article class="premium-card"><span class="premium-icon">DEMO</span><h3>Final Presentation Checklist</h3><p>Show the working build, identify the GPIO pins, explain the code loop, describe one bug fixed, and name one future improvement.</p></article>
    <article class="premium-card"><span class="premium-icon">SAFE</span><h3>Safety Checklist</h3><p>Confirm USB is unplugged before rewiring, GPIO uses 3.3 V logic, LEDs have resistors, and no power rail is shorted.</p></article>
    <article class="premium-card"><span class="premium-icon">NOTE</span><h3>Teacher Notes</h3><p>Do not grade speed. Reward careful wiring, clear reasoning, useful questions, and honest debugging notes.</p></article>
  </section>
  <section class="premium-faq">
    <h2>Teacher FAQs</h2>
    <details><summary>Can this work in a 45-minute class?</summary><p>Yes. Use pre-bagged components and start with guided missions such as Blink LED or Read Temperature.</p></details>
    <details><summary>Do students need prior electronics knowledge?</summary><p>No. The lessons introduce circuits, GPIO, and sensor readings progressively.</p></details>
    <details><summary>Can students work in teams?</summary><p>Yes. Teams of two or three work well: one wiring lead, one code lead, and one test/documentation lead.</p></details>
    <details><summary>Should every mission have a quiz?</summary><p>No. Keep mission pages simple for normal learners. Use teacher-led MCQs, worksheets, lab checks, and presentations when assessment is needed.</p></details>
  </section>
