body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">For Parents</li></ol></nav>
  <h1>Learning Together with Your Child</h1>
  <p class="section-sub">ESP32 Engine is designed so children can learn safely while parents stay confident about what they're building.</p>
  <div class="parent-panel"><h3>📋 Learning Roadmap</h3><p>Age 10+: Start with Beginner path and ESP32 DevKit. Age 12+: Add sensors and simple projects. Age 14+: IoT and robotics with supervision.</p></div>
  <div class="parent-panel"><h3>🎂 Age Recommendation</h3><p>Recommended for ages 10 and up with adult supervision for soldering and mains-powered projects. Younger children can learn concepts with pre-wired kits.</p></div>
  <div class="parent-panel"><h3>⚠️ Safety Tips</h3><ul><li>Always use 3.3 V logic with ESP32 GPIO pins</li><li>Never connect mains AC without qualified adult help</li><li>Use USB power or low-voltage battery packs for beginners</li><li>Supervise use of hot glue guns and soldering irons</li><li>Take breaks — learning should stay fun!</li></ul></div>
  <div class="parent-panel"><h3>🏆 Printable Certificates</h3><p>Coming soon — download certificates when your child completes a learning path or project mission.</p><a class="btn btn-secondary" href="/contact.html">Get notified</a></div>
  <div class="parent-panel"><h3>🎁 Recommended Kits</h3><p>ESP32 DevKit + breadboard + jumper wires + DHT22 + LED kit. Look for "ESP32 starter kit" from reputable electronics suppliers.</p><a class="btn btn-primary" href="/components/esp32-devkit.html">View ESP32 DevKit Guide</a></div>
