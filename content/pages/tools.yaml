slug: tools
title: Tools | ESP32 Engine
nav: tools
meta_description: Helpful ESP32 tools - GPIO calculator, resistor color code, unit converter, and pin planner.
body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Tools</li></ol></nav>
  <section class="premium-page-hero premium-page-hero-tools">
    <div class="premium-page-copy">
      <p class="section-eyebrow">Maker Toolbox</p>
      <h1>Fast calculators for real ESP32 decisions.</h1>
      <p class="section-sub">Plan pins, size resistors, estimate battery life, check voltage dividers, and keep common ESP32 helper tools in one clean workspace.</p>
    </div>
    <div class="premium-page-visual"><img src="/assets/images/heroes/tools-hero.webp" alt="ESP32 maker toolbox with breadboards, sensors, LEDs, servo, and test components" width="1024" height="576" loading="eager" decoding="async" style="width:100%;height:100%;min-height:300px;object-fit:cover;display:block;"></div>
  </section>
  <section class="tool-workbench">
    <article class="tool-card tool-live">
      <span class="premium-icon">GPIO</span><h3>GPIO Planner</h3><p>Reserve safe pins before wiring sensors, relays, LEDs, and buses.</p>
      <label>Signal name <input data-tool="gpio-name" placeholder="DHT22 DATA"></label>
      <label>GPIO <input data-tool="gpio-pin" type="number" placeholder="4"></label>
      <output data-tool-output="gpio">Enter a GPIO to check common ESP32 guidance.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">LED</span><h3>LED Resistor Calculator</h3><p>Find a safe series resistor for a simple indicator LED.</p>
      <label>Supply V <input data-tool="led-vs" type="number" value="3.3" step="0.1"></label>
      <label>LED V <input data-tool="led-vf" type="number" value="2.0" step="0.1"></label>
      <label>Current mA <input data-tool="led-ma" type="number" value="10"></label>
      <output data-tool-output="led">Recommended resistor appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">DIV</span><h3>Voltage Divider Calculator</h3><p>Estimate output voltage from two resistors.</p>
      <label>Input V <input data-tool="div-vin" type="number" value="5" step="0.1"></label>
      <label>R1 ohms <input data-tool="div-r1" type="number" value="10000"></label>
      <label>R2 ohms <input data-tool="div-r2" type="number" value="20000"></label>
      <output data-tool-output="divider">Divider result appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">BAT</span><h3>Battery Life Calculator</h3><p>Quickly estimate runtime from capacity and current draw.</p>
      <label>Capacity mAh <input data-tool="bat-cap" type="number" value="2000"></label>
      <label>Average mA <input data-tool="bat-ma" type="number" value="80"></label>
      <output data-tool-output="battery">Battery estimate appears here.</output>
    </article>
  </section>
  <section class="premium-grid premium-grid-3 tool-library">
    <article class="premium-card"><span class="premium-icon">PIN</span><h3>ESP32 Pinout Explorer</h3><p>Map boot pins, ADC pins, I2C defaults, SPI pins, and safe GPIO choices.</p><span class="badge badge-cat">Reference</span></article>
    <article class="premium-card"><span class="premium-icon">PWM</span><h3>PWM Calculator</h3><p>Plan LED dimming and motor control frequency, duty cycle, and channel notes.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">PWR</span><h3>Power Consumption Calculator</h3><p>Estimate active, idle, Wi-Fi, and deep sleep current across a project cycle.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">UART</span><h3>UART Helper</h3><p>Track TX/RX wiring, baud rate, logic level, and serial monitor settings.</p><span class="badge badge-cat">Helper</span></article>
    <article class="premium-card"><span class="premium-icon">RSSI</span><h3>WiFi RSSI Helper</h3><p>Understand signal strength and decide whether a project needs better placement.</p><span class="badge badge-cat">Helper</span></article>
    <article class="premium-card"><span class="premium-icon">ADC</span><h3>ADC Calculator</h3><p>Convert raw ADC values to approximate voltage for sensor calibration.</p><span class="badge badge-cat">Coming soon</span></article>
    <article class="premium-card"><span class="premium-icon">SPI</span><h3>SPI Helper</h3><p>Keep MOSI, MISO, SCK, CS, bus sharing, and display wiring straight.</p><span class="badge badge-cat">Helper</span></article>
    <article class="premium-card"><span class="premium-icon">I2C</span><h3>I2C Address Scanner</h3><p>Use an address scan before blaming code. Great for OLEDs and sensor modules.</p><a class="btn btn-card" href="/guides/connect-oled-esp32.html">OLED guide -></a></article>
    <article class="premium-card"><span class="premium-icon">OHM</span><h3>Resistor Color Code</h3><p>Decode color bands and choose common values for LEDs and pull-ups.</p><span class="badge badge-cat">Coming soon</span></article>
  </section>
  <script>
  (function(){
    function num(sel){ var el=document.querySelector('[data-tool="'+sel+'"]'); return el ? Number(el.value) : 0; }
    function out(sel,msg){ var el=document.querySelector('[data-tool-output="'+sel+'"]'); if(el) el.textContent=msg; }
    function calc(){
      var pin=num('gpio-pin');
      if(pin || pin===0){
        var caution=[0,2,12,15].indexOf(pin)>=0 ? ' Boot strap pin - use carefully.' : '';
        var inputOnly=[34,35,36,39].indexOf(pin)>=0 ? ' Input-only ADC pin.' : ' General GPIO candidate.';
        out('gpio','GPIO '+pin+':'+inputOnly+caution);
      }
      var r=(num('led-vs')-num('led-vf'))/(num('led-ma')/1000);
      out('led', isFinite(r)&&r>0 ? 'Use about '+Math.ceil(r)+' ohms. Choose the next standard value up.' : 'Check voltage and current values.');
      var vin=num('div-vin'), r1=num('div-r1'), r2=num('div-r2'), vout=vin*(r2/(r1+r2));
      out('divider', isFinite(vout) ? 'Output is about '+vout.toFixed(2)+' V.' : 'Enter resistor values.');
      var hours=num('bat-cap')/num('bat-ma');
      out('battery', isFinite(hours)&&hours>0 ? 'About '+hours.toFixed(1)+' hours before losses.' : 'Enter capacity and current.');
    }
    document.querySelectorAll('[data-tool]').forEach(function(el){ el.addEventListener('input', calc); });
    calc();
  })();
  </script>
