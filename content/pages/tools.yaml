slug: tools
title: ESP32 Tools — GPIO, LED, PWM & More | ESP32 Engine
nav: tools
meta_description: Free ESP32 calculators — GPIO planner, LED resistor, PWM, ADC, voltage divider, battery life, resistor color code, and more.
body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Tools</li></ol></nav>
  <section class="premium-page-hero premium-page-hero-tools">
    <div class="premium-page-copy">
      <p class="section-eyebrow">Maker Toolbox</p>
      <h1>Fast calculators for real ESP32 decisions.</h1>
      <p class="section-sub">Plan pins, size resistors, estimate battery life, check voltage dividers, decode resistor bands, and calculate PWM and ADC values — all in one place.</p>
    </div>
    <div class="premium-page-visual"><img src="/assets/images/heroes/tools-hero.webp" alt="ESP32 maker toolbox with breadboards, sensors, LEDs, servo, and test components" width="1024" height="576" loading="eager" decoding="async" style="width:100%;height:100%;min-height:300px;object-fit:cover;display:block;"></div>
  </section>
  <section class="tool-workbench">
    <article class="tool-card tool-live">
      <span class="premium-icon">GPIO</span><h3>GPIO Planner</h3><p>Reserve safe pins before wiring sensors, relays, LEDs, and buses.</p>
      <label>Signal name <input data-tool="gpio-name" placeholder="DHT22 DATA"></label>
      <label>GPIO <input data-tool="gpio-pin" type="number" placeholder="4"></label>
      <output data-tool-output="gpio">Enter a GPIO to check common ESP32 guidance.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">LED</span><h3>LED Resistor Calculator</h3><p>Find a safe series resistor for a simple indicator LED.</p>
      <label>Supply V <input data-tool="led-vs" type="number" value="3.3" step="0.1"></label>
      <label>LED V <input data-tool="led-vf" type="number" value="2.0" step="0.1"></label>
      <label>Current mA <input data-tool="led-ma" type="number" value="10"></label>
      <output data-tool-output="led">Recommended resistor appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">Divider</span><h3>Voltage Divider Calculator</h3><p>Estimate output voltage from two resistors.</p>
      <label>Input V <input data-tool="div-vin" type="number" value="5" step="0.1"></label>
      <label>R1 ohms <input data-tool="div-r1" type="number" value="10000"></label>
      <label>R2 ohms <input data-tool="div-r2" type="number" value="20000"></label>
      <output data-tool-output="divider">Divider result appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">Battery</span><h3>Battery Life Calculator</h3><p>Quickly estimate runtime from capacity and current draw.</p>
      <label>Capacity mAh <input data-tool="bat-cap" type="number" value="2000"></label>
      <label>Average mA <input data-tool="bat-ma" type="number" value="80"></label>
      <output data-tool-output="battery">Battery estimate appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">PWM</span><h3>PWM Calculator</h3><p>Plan LED dimming and motor speed. Calculate frequency, period, and on-time from duty cycle.</p>
      <label>Frequency Hz <input data-tool="pwm-freq" type="number" value="1000"></label>
      <label>Duty cycle % <input data-tool="pwm-duty" type="number" value="50" min="0" max="100"></label>
      <label>Resolution bits <input data-tool="pwm-bits" type="number" value="8"></label>
      <output data-tool-output="pwm">PWM result appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">ADC</span><h3>ADC Calculator</h3><p>Convert raw ADC readings to approximate voltage. ESP32 ADC is 12-bit at 3.3V reference.</p>
      <label>Raw ADC (0-4095) <input data-tool="adc-raw" type="number" value="2048"></label>
      <label>Reference V <input data-tool="adc-ref" type="number" value="3.3" step="0.1"></label>
      <label>Resolution bits <input data-tool="adc-bits" type="number" value="12"></label>
      <output data-tool-output="adc">ADC result appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">Power</span><h3>Power Consumption Calculator</h3><p>Estimate average current across active and deep sleep phases in a duty-cycle project.</p>
      <label>Active mA <input data-tool="pwr-active-ma" type="number" value="240"></label>
      <label>Active time ms <input data-tool="pwr-active-ms" type="number" value="500"></label>
      <label>Sleep mA <input data-tool="pwr-sleep-ma" type="number" value="0.01" step="0.001"></label>
      <label>Sleep time ms <input data-tool="pwr-sleep-ms" type="number" value="9500"></label>
      <output data-tool-output="pwr">Power estimate appears here.</output>
    </article>
    <article class="tool-card tool-live">
      <span class="premium-icon">Ohms</span><h3>Resistor Color Code</h3><p>Decode 4-band resistors and find their value.</p>
      <label>Band 1 <input data-tool="ohm-b1" type="number" value="2" min="0" max="9"></label>
      <label>Band 2 <input data-tool="ohm-b2" type="number" value="2" min="0" max="9"></label>
      <label>Multiplier <input data-tool="ohm-mult" type="number" value="100"></label>
      <output data-tool-output="ohm">Resistor value appears here.</output>
    </article>
  </section>
  <section class="premium-grid premium-grid-3 tool-library">
    <article class="premium-card"><span class="premium-icon">PIN</span><h3>ESP32 Pinout Explorer</h3><p>GPIO 21/22 = I2C default. GPIO 18/19/23/5 = SPI default. GPIO 6-11 = flash, never use. GPIO 34/35/36/39 = input-only.</p><a class="btn btn-card" href="/components/esp32-devkit.html">Full pinout -></a></article>
    <article class="premium-card"><span class="premium-icon">UART</span><h3>UART Reference</h3><p>UART0 TX=GPIO1, RX=GPIO3 (USB). UART2 TX=GPIO17, RX=GPIO16 (free). Monitor baud: 115200. Logic level: 3.3V only.</p><span class="badge badge-cat">Reference</span></article>
    <article class="premium-card"><span class="premium-icon">RSSI</span><h3>WiFi RSSI Reference</h3><p>-30 to -50 dBm = Excellent. -50 to -70 = Good/Fair. Below -80 = move closer. Read via WiFi.RSSI().</p><span class="badge badge-cat">Reference</span></article>
    <article class="premium-card"><span class="premium-icon">SPI</span><h3>SPI Reference</h3><p>SCK=GPIO18, MOSI=GPIO23, MISO=GPIO19, CS=GPIO5 (one per device). Multiple devices share SCK/MOSI/MISO.</p><span class="badge badge-cat">Reference</span></article>
    <article class="premium-card"><span class="premium-icon">I2C</span><h3>I2C Address Reference</h3><p>SSD1306=0x3C, BME280=0x76/77, MPU-6050=0x68/69. SDA=GPIO21, SCL=GPIO22 default.</p><a class="btn btn-card" href="/guides/connect-oled-esp32.html">OLED guide -></a></article>
    <article class="premium-card"><span class="premium-icon">Safety</span><h3>Safe GPIO Quick List</h3><p>Beginner-safe pins: 4, 5, 18, 19, 21, 22, 23. Avoid 6-11 (flash) and be careful with 0, 2, 12, 15 (boot strap).</p><a class="btn btn-card" href="/guides/blink-led-esp32.html">Mission 01 -></a></article>
  </section>
  <script>
  (function(){
    function num(sel){ var el=document.querySelector('[data-tool="'+sel+'"]'); var value = el ? Number(el.value) : NaN; return Number.isFinite(value) ? value : NaN; }
    function out(sel,msg){ var el=document.querySelector('[data-tool-output="'+sel+'"]'); if(el) el.textContent=msg; }
    function calc(){
      var pin=num('gpio-pin');
      if(Number.isFinite(pin)){
        var caution=[0,2,12,15].indexOf(pin)>=0 ? ' Boot strap pin - use carefully.' : '';
        var flash=[6,7,8,9,10,11].indexOf(pin)>=0 ? ' Flash pin - do NOT use.' : '';
        var inputOnly=[34,35,36,39].indexOf(pin)>=0 ? ' Input-only ADC pin.' : '';
        var msg = flash ? ('GPIO '+pin+':'+flash) : ('GPIO '+pin+':'+(inputOnly||caution||' Safe general-purpose GPIO.'));
        out('gpio', msg);
      } else {
        out('gpio', 'Enter a GPIO number to check common ESP32 guidance.');
      }
      var r=(num('led-vs')-num('led-vf'))/(num('led-ma')/1000);
      out('led', isFinite(r)&&r>0 ? 'Use about '+Math.ceil(r)+' ohms. Choose the next standard value up.' : 'Check voltage and current values.');
      var vin=num('div-vin'), r1=num('div-r1'), r2=num('div-r2'), vout=vin*(r2/(r1+r2));
      out('divider', isFinite(vout)&&r1>=0&&r2>0&&(r1+r2)>0 ? 'Output is about '+vout.toFixed(2)+' V.' : 'Enter resistor values.');
      var hours=num('bat-cap')/num('bat-ma');
      out('battery', isFinite(hours)&&hours>0 ? 'About '+hours.toFixed(1)+' hours before losses.' : 'Enter capacity and current.');
      var freq=num('pwm-freq'), duty=num('pwm-duty'), bits=num('pwm-bits');
      if(freq>0 && duty>=0 && duty<=100 && bits>0){
        var period=(1/freq)*1000, onTime=period*(duty/100), maxVal=Math.pow(2,bits)-1, dutyCount=Math.round(maxVal*(duty/100));
        out('pwm','Period: '+period.toFixed(3)+'ms | On-time: '+onTime.toFixed(3)+'ms | ledcWrite value: '+dutyCount+'/'+maxVal);
      } else {
        out('pwm', 'Enter frequency, duty cycle, and resolution values.');
      }
      var raw=num('adc-raw'), ref=num('adc-ref'), abits=num('adc-bits'), maxRaw=Math.pow(2,abits)-1;
      if(raw>=0 && raw<=maxRaw && ref>0 && abits>0){
        out('adc','Voltage: ~'+((raw/maxRaw)*ref).toFixed(3)+'V ('+((raw/maxRaw)*100).toFixed(1)+'% of full scale)');
      } else {
        out('adc', 'Enter ADC raw, reference voltage, and resolution values.');
      }
      var aMa=num('pwr-active-ma'), aMs=num('pwr-active-ms'), sMa=num('pwr-sleep-ma'), sMs=num('pwr-sleep-ms'), total=aMs+sMs;
      if(total>0){
        var avg=((aMa*aMs)+(sMa*sMs))/total;
        out('pwr', isFinite(avg)&&avg>0 ? 'Average current: '+avg.toFixed(3)+'mA | Est. runtime on 2000mAh: ~'+(2000/avg/24).toFixed(1)+' days' : 'Enter active and sleep current values.');
      } else {
        out('pwr', 'Enter active and sleep timing values.');
      }
      var b1=num('ohm-b1'), b2=num('ohm-b2'), mult=num('ohm-mult'), ohms=(b1*10+b2)*mult;
      var display = ohms>=1000000 ? (ohms/1000000).toFixed(2)+' MΩ' : ohms>=1000 ? (ohms/1000).toFixed(2)+' kΩ' : ohms.toFixed(0)+' Ω';
      out('ohm', display+' (±5% tolerance typical)');
    }
    document.querySelectorAll('[data-tool]').forEach(function(el){ el.addEventListener('input', calc); });
    calc();
  })();
  </script>
