  <h2>Contact</h2>
  <p>Questions about these Terms: visit our <a href="/contact.html">Contact</a> page or open an issue on <a href="https://github.com/abdulmubeen7876773-dotcom/esp32/issues" target="_blank" rel="noopener">GitHub</a>.</p>
