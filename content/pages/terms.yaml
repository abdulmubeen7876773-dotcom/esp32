  <li>You may read, bookmark, and share links to our tutorials for personal or classroom learning.</li>
  <li>You may adapt code examples for your own non-commercial prototypes and experiments.</li>
  <li>You may not scrape the site in ways that degrade service, republish bulk content without attribution, or misrepresent our materials as official product documentation.</li>
  <li>You may not use the site to distribute malware, spam, or unlawful content through contact channels.</li>
  </ul>
