slug: learning
title: Learning Paths | ESP32 Engine
nav: learning
meta_description: Choose your ESP32 learning path — Beginner, Explorer, Builder, IoT, or Advanced. Fun missions for every age and skill level.
body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Learning</li></ol></nav>
  <section class="premium-page-hero">
    <div class="premium-page-copy">
      <h1>Choose Your Learning Path</h1>
  <p class="section-sub">Every path is a journey with missions, practical challenges, and real builds. Start where you feel comfortable — you can always switch paths!</p>
    </div>
    <div class="premium-page-visual"><img src="/assets/images/heroes/learning-hero.webp" alt="ESP32 learning workspace with multimeter, breadboard, and Arduino IDE" width="1024" height="576" loading="eager" decoding="async" style="width:100%;height:100%;min-height:300px;object-fit:cover;display:block;"></div>
  </section>
  <div class="learning-path-grid" style="margin-top:2rem">
    <div class="path-card" id="beginner"><span class="path-icon">🌱</span><h3>Beginner</h3><p>Complete short missions — blink an LED, read temperature, and connect a display.</p><div class="path-meta"><span class="badge badge-cat">{{missions}} missions</span><span class="badge badge-beginner">Beginner</span></div><a class="btn btn-primary" href="/guides.html#missions">Start Missions</a></div>
    <div class="path-card" id="explorer"><span class="path-icon">🔍</span><h3>Explorer</h3><p>Meet the parts — sensors, displays, and modules explained simply.</p><div class="path-meta"><span class="badge badge-cat">{{components}} components</span><span class="badge badge-beginner">Beginner</span></div><a class="btn btn-primary" href="/components.html">Explore Parts</a></div>
    <div class="path-card" id="builder"><span class="path-icon">🔧</span><h3>Builder</h3><p>Complete projects — plant monitors, alarms, and smart devices.</p><div class="path-meta"><span class="badge badge-cat">{{golden_projects}} projects</span><span class="badge badge-intermediate">Intermediate</span></div><a class="btn btn-primary" href="/projects.html">Build Projects</a></div>
    <div class="path-card" id="iot"><span class="path-icon">📡</span><h3>IoT</h3><p>Wi-Fi, web dashboards, and sending data to the cloud.</p><div class="path-meta"><span class="badge badge-cat">5 IoT builds</span><span class="badge badge-intermediate">Intermediate</span></div><a class="btn btn-primary" href="/projects/esp32-iot-weather-station.html">Go IoT</a></div>
    <div class="path-card" id="advanced"><span class="path-icon">🚀</span><h3>Advanced</h3><p>AI on device, industrial nodes, and production patterns.</p><div class="path-meta"><span class="badge badge-cat">3 advanced builds</span><span class="badge badge-advanced">Advanced</span></div><a class="btn btn-primary" href="/projects/esp32-ai-object-detector.html">Level Up</a></div>
  </div>
