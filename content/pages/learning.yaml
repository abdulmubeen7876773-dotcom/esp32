slug: learning
title: Learning Paths | ESP32 Engine
nav: learning
meta_description: Choose your ESP32 learning path — Beginner, Explorer, Builder, IoT, or Advanced. Fun missions for every age and skill level.
body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Learning</li></ol></nav>
  <h1>Choose Your Learning Path</h1>
  <p class="section-sub">Every path is a journey with missions, quizzes, and real builds. Start where you feel comfortable — you can always switch paths!</p>
  <div class="learning-path-grid" style="margin-top:2rem">
    <div class="path-card" id="beginner"><span class="path-icon">🌱</span><h3>Beginner</h3><p>What is ESP32? Blink an LED. Read your first sensor.</p><div class="path-meta"><span class="badge badge-cat">8 lessons</span><span class="badge badge-beginner">Beginner</span></div><a class="btn btn-primary" href="/guides/what-is-esp32.html">Start Path</a></div>
    <div class="path-card" id="explorer"><span class="path-icon">🔍</span><h3>Explorer</h3><p>Displays, buttons, and multiple sensors working together.</p><div class="path-meta"><span class="badge badge-cat">12 lessons</span><span class="badge badge-beginner">Beginner</span></div><a class="btn btn-primary" href="/components.html">Explore Parts</a></div>
    <div class="path-card" id="builder"><span class="path-icon">🔧</span><h3>Builder</h3><p>Complete projects — plant monitors, alarms, and smart devices.</p><div class="path-meta"><span class="badge badge-cat">15 lessons</span><span class="badge badge-intermediate">Intermediate</span></div><a class="btn btn-primary" href="/projects.html">Build Projects</a></div>
    <div class="path-card" id="iot"><span class="path-icon">📡</span><h3>IoT</h3><p>Wi-Fi, web dashboards, and sending data to the cloud.</p><div class="path-meta"><span class="badge badge-cat">10 lessons</span><span class="badge badge-intermediate">Intermediate</span></div><a class="btn btn-primary" href="/projects/esp32-iot-weather-station.html">Go IoT</a></div>
    <div class="path-card" id="advanced"><span class="path-icon">🚀</span><h3>Advanced</h3><p>AI on device, industrial nodes, and production patterns.</p><div class="path-meta"><span class="badge badge-cat">14 lessons</span><span class="badge badge-advanced">Advanced</span></div><a class="btn btn-primary" href="/projects/esp32-tinyml-sound-classifier.html">Level Up</a></div>
  </div>
