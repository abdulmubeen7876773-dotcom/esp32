body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Editorial Policy</li></ol></nav>
  <h1>Editorial Policy</h1>
  <p>ESP32 Engine publishes educational ESP32 tutorials designed to teach practical electronics clearly and responsibly.</p>
  <h2>How Tutorials Are Written</h2>
  <p>Each tutorial starts with the learner's problem: what they want to build, which concept they need to understand, and what can go wrong on a real breadboard. The page then explains the wiring, code, output, troubleshooting, and next step in the learning path.</p>
  <h2>Testing Methodology</h2>
  <p>Practical pages are written around common ESP32 DevKit, Arduino IDE, and breadboard workflows. Where possible, examples use common GPIO choices, standard Arduino libraries, and simple test procedures that readers can repeat. See our <a href="/testing-methodology.html">Testing Methodology</a> page for hardware and environment notes.</p>
  <h2>Fact-Checking Process</h2>
  <ul>
  <li>ESP32 platform details are checked against Espressif and Arduino ESP32 documentation when applicable.</li>
  <li>Component voltage, pin, and protocol information is checked against datasheets or manufacturer learning resources where available.</li>
  <li>Code examples are reviewed for beginner readability, required libraries, expected output, and obvious wiring failure modes.</li>
  </ul>
  <h2>Review Standards</h2>
  <p>A page is considered ready when a learner can identify required parts, wire the circuit safely, upload the code, understand the output, troubleshoot common failures, and know what to learn next.</p>
  <h2>Update Process</h2>
  <p>Pages are updated when readers report errors, when upstream libraries change, when a better explanation is available, or when new internal links make the learning path clearer. Last updated dates are included where the page format supports them.</p>
  <h2>Corrections</h2>
  <p>Corrections are welcome. Safety, factual, and code issues are prioritized. Report corrections through <a href="/contact.html">Contact</a> or GitHub Issues with the page URL, observed behavior, hardware used, and suggested fix.</p>
