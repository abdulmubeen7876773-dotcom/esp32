title: Privacy Policy | ESP32 Engine
meta_description: Privacy Policy for ESP32 Engine — cookies, analytics, and how we handle visitor data.
body_html: '<h1>Privacy Policy</h1>

  <p>Last updated: June 2026</p>

  <p>ESP32 Engine (https://esp32engine.com) is an educational website. We do not require account registration
  and we do not sell personal information.</p>

  <h2>Information we collect</h2>

  <ul>

  <li><strong>Hosting logs:</strong> Our hosting provider may record standard server logs such as browser
  type, pages viewed, referring URL, and approximate region for security and performance.</li>

  <li><strong>Analytics:</strong> If enabled, Google Analytics (GA4) collects anonymized usage data such
  as pages visited, session duration, and device type to help us improve content.</li>

  <li><strong>Contact messages:</strong> If you contact us via GitHub Issues, GitHub processes that information
  under its own privacy policy.</li>

  </ul>

  <h2>Cookies</h2>

  <p>We may use essential cookies to remember your cookie consent choice. Analytics partners may set additional
  cookies when you accept optional cookies in our banner.</p>

  <p>Questions? Visit our <a href="contact.html">Contact</a> page.</p>'
