title: Privacy Policy | ESP32 Engine
meta_description: Privacy Policy for ESP32 Engine — cookies, analytics, advertising, and how we handle visitor data.
body_html: |
  <h1>Privacy Policy</h1>
  <p>Last updated: June 2026</p>
  <p>ESP32 Engine (<a href="https://esp32engine.com/">https://esp32engine.com</a>) is an educational website operated by ESP32 Engine. We do not require account registration and we do not sell personal information.</p>
  <h2>Information we collect</h2>
  <ul>
  <li><strong>Hosting logs:</strong> Our hosting provider may record standard server logs such as browser type, pages viewed, referring URL, IP address, and approximate region for security and performance.</li>
  <li><strong>Analytics:</strong> When you accept optional cookies, Google Analytics (GA4) collects usage data such as pages visited, session duration, device type, and general location to help us improve content.</li>
  <li><strong>Advertising:</strong> If Google AdSense or similar ad services are enabled, they may use cookies or similar technologies to serve and measure ads. See <a href="https://policies.google.com/technologies/ads" target="_blank" rel="noopener">How Google uses data in advertising</a>.</li>
  <li><strong>Contact messages:</strong> If you contact us via GitHub Issues, GitHub processes that information under its own privacy policy.</li>
  </ul>
  <h2>Cookies and similar technologies</h2>
  <p>We use essential cookies to remember your cookie consent choice. Analytics and advertising partners may set additional cookies when you accept optional cookies in our banner. You can control cookies through your browser settings. Rejecting optional cookies limits analytics and personalized advertising but does not block access to tutorials.</p>
  <h2>Third-party services</h2>
  <ul>
  <li>Google Analytics — <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Google Privacy Policy</a></li>
  <li>Google AdSense (if enabled) — <a href="https://policies.google.com/technologies/ads" target="_blank" rel="noopener">Google Ads technologies</a></li>
  <li>GitHub — <a href="https://docs.github.com/en/site-policy/privacy-policies/github-privacy-statement" target="_blank" rel="noopener">GitHub Privacy Statement</a></li>
  </ul>
  <h2>Your choices</h2>
  <ul>
  <li>Opt out of Google personalized ads: <a href="https://adssettings.google.com/" target="_blank" rel="noopener">Google Ads Settings</a></li>
  <li>Industry opt-out (US): <a href="https://optout.networkadvertising.org/" target="_blank" rel="noopener">NAI Opt-Out</a></li>
  <li>Clear site data: remove cookies for esp32engine.com in your browser</li>
  </ul>
  <h2>Data retention</h2>
  <p>Server logs are retained by our hosting provider for a limited period. Analytics data is retained according to Google Analytics settings. We do not maintain user accounts on this site.</p>
  <h2>Children's privacy</h2>
  <p>This site is intended for general audiences interested in electronics education. We do not knowingly collect personal information from children under 13.</p>
  <h2>International visitors</h2>
  <p>Visitors from the EU, UK, and other regions may have rights to access, correct, or delete personal data processed by third-party services we use. Contact us to exercise applicable rights where we can assist.</p>
  <h2>Changes</h2>
  <p>We may update this policy when we add analytics, advertising, or new features. The "Last updated" date will change accordingly.</p>
  <p>Questions? Visit our <a href="/contact.html">Contact</a> page.</p>
