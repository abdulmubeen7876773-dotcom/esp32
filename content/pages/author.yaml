body_html: |
  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">Author & Editorial Team</li></ol></nav>
  <h1>Author & Editorial Team</h1>
  <p>ESP32 Engine was created by Abdul Mubeen and is maintained by the ESP32 Engine editorial team as a free educational platform for practical ESP32 learning.</p>
  <h2>Mission</h2>
  <p>Our mission is to help beginners, students, teachers, parents, and makers understand ESP32 hardware by building real circuits, reading real signals, and learning why each step works.</p>
  <h2>Experience</h2>
  <p>The site focuses on practical embedded systems education: ESP32 DevKit wiring, Arduino sketches, sensors, displays, relays, robotics outputs, Wi-Fi projects, and classroom-friendly electronics lessons. Tutorials are written from hands-on ESP32 project patterns and checked against official documentation where pin behavior, libraries, protocols, or safety limits matter.</p>
  <h2>Editorial Standards</h2>
  <ul>
  <li>Every practical tutorial must explain the goal, wiring, code, expected output, common mistakes, and troubleshooting.</li>
  <li>Beginner pages use plain English first, then add the engineering explanation.</li>
  <li>Safety notes are included where power, relays, batteries, motors, pumps, servos, or outdoor wiring may be involved.</li>
  <li>Official references are preferred over forum posts when documenting ESP32 behavior, libraries, protocols, and component limits.</li>
  </ul>
  <h2>Educational Purpose</h2>
  <p>ESP32 Engine is for learning and prototyping. It is not official Espressif documentation and it is not a substitute for a datasheet, safety standard, or qualified engineering review for production hardware.</p>
  <h2>Update Policy</h2>
  <p>Pages are reviewed when tutorials are expanded, when a build issue is found, when upstream Arduino or ESP-IDF behavior changes, or when readers report corrections. Important wiring, safety, and code fixes are prioritized before cosmetic improvements.</p>
  <h2>Contact</h2>
  <p>For corrections, safety issues, collaboration, or editorial questions, use the <a href="/contact.html">Contact</a> page or open a GitHub issue with the affected URL and the proposed correction.</p>
