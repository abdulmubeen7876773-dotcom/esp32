  <h1>Hardware Testing Methodology</h1>
  <p>This page explains the practical assumptions behind ESP32 Engine tutorials so readers understand how examples are prepared and where their own hardware may differ.</p>
  <h2>ESP32 Boards</h2>
  <p>Examples target common ESP32 DevKit-style boards using the Arduino ESP32 core. Pin names follow GPIO numbering, not physical board position, because board layouts vary.</p>
  <h2>Development Environment</h2>
  <ul>
  <li><strong>Primary environment:</strong> Arduino IDE or Arduino-compatible build flow.</li>
  <li><strong>ESP-IDF compatibility:</strong> Concept explanations apply to ESP-IDF, but Arduino sketches may need to be rewritten using ESP-IDF APIs.</li>
  <li><strong>Serial Monitor:</strong> Most beginner examples use 115200 baud for diagnostics.</li>
  </ul>
  <h2>Components and Sensors</h2>
  <p>Pages focus on widely available modules such as DHT22, BME280, HC-SR04, PIR sensors, SSD1306 OLED displays, relay modules, and ESP32 DevKit boards. Breakout boards from different sellers may change pin order, voltage handling, I2C address, or onboard pull-up resistors.</p>
  <h2>Breadboards and Wiring</h2>
  <p>Beginner tutorials assume short jumper wires, a standard solderless breadboard, shared ground, and USB power from a computer or safe USB supply. Loose breadboard contacts are a common cause of intermittent behavior.</p>
  <h2>Power Supplies</h2>
  <p>Most beginner circuits should run from ESP32 3.3 V logic and USB power. Motors, pumps, LED strips, servos, relays, and outdoor builds may require separate power supplies, proper grounding, flyback protection, fuses, and qualified supervision.</p>
  <h2>Testing Limitations</h2>
  <p>ESP32 Engine tutorials are educational references, not certified product designs. Environmental readings are affected by sensor tolerance, airflow, heat from the ESP32 board, enclosure design, and calibration. Safety-critical, medical, industrial, mains-voltage, and unattended systems require additional engineering review.</p>
