    <div class="resource-card"><h3>📌 ESP32 Pinout Reference</h3><p>Full GPIO reference for DevKit boards — safe pins, boot pins, ADC channels, I2C and SPI defaults.</p><a class="btn btn-card" href="/components/esp32-devkit.html">View Pinout →</a></div>
