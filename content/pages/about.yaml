  <nav class="breadcrumb" aria-label="Breadcrumb"><ol><li><a href="/">Home</a></li><li aria-current="page">About</li></ol></nav>
  <section class="premium-page-hero premium-page-hero-about">
    <div class="premium-page-copy">
      <p class="section-eyebrow">About ESP32 Engine</p>
      <h1>Practical electronics education, built for real makers.</h1>
      <p class="section-sub">ESP32 Engine is a free educational resource for students, hobbyists, parents, teachers, and engineers who want practical ESP32 tutorials in one place.</p>
      <div class="premium-actions"><a class="btn btn-primary" href="/projects.html">Explore projects</a><a class="btn btn-secondary" href="https://github.com/abdulmubeen7876773-dotcom/esp32" target="_blank" rel="noopener">View GitHub</a></div>
    </div>
    <div class="premium-page-visual"><img src="/assets/images/heroes/about-hero.webp" alt="ESP32 breadboard project beside an electronics checklist" width="1024" height="576" loading="eager" decoding="async" style="width:100%;height:100%;min-height:300px;object-fit:cover;display:block;"></div>
  </section>
  <section class="premium-stats">
    <div><strong>{{golden_projects}}</strong><span>Projects</span></div>
    <div><strong>{{components}}</strong><span>Core components</span></div>
    <div><strong>100%</strong><span>Free</span></div>
    <div><strong>{{missions}}</strong><span>Academy missions</span></div>
  </section>
  <section class="premium-grid">
    <article class="premium-card"><span class="premium-icon">MISSION</span><h3>Mission</h3><p>Help learners build confidence through real ESP32 circuits, clear code, safe wiring, and projects that exist beyond the screen.</p></article>
    <article class="premium-card"><span class="premium-icon">VISION</span><h3>Vision</h3><p>A world-class electronics learning platform where every student can move from curiosity to finished hardware.</p></article>
    <article class="premium-card"><span class="premium-icon">Open</span><h3>Open Philosophy</h3><p>No paywalls, no required login, and a transparent improvement loop through GitHub issues and public updates.</p></article>
  </section>
  <section class="premium-band">
    <p class="section-eyebrow">Editorial standards</p>
    <h2>Every tutorial must be reproducible.</h2>
    <div class="premium-check-grid">
      <span>Parts list</span><span>Wiring table</span><span>Working code</span><span>Safety notes</span><span>Troubleshooting</span><span>Next steps</span>
    </div>
    <p class="meta">Read more: <a href="/author.html">Author & Editorial Team</a> · <a href="/editorial-policy.html">Editorial Policy</a> · <a href="/testing-methodology.html">Testing Methodology</a></p>
  </section>
  <section class="premium-band premium-band-soft">
    <p class="section-eyebrow">Platform timeline</p>
    <h2>Built in public, improved continuously.</h2>
    <div class="premium-timeline">
      <div><strong>Foundation</strong><p>Core projects, guides, components, SEO, and static build system.</p></div>
      <div><strong>Design system</strong><p>Premium homepage, cards, navigation, dark mode, and visual rhythm.</p></div>
      <div><strong>Resources</strong><p>Parents, teachers, tools, component details, and classroom materials.</p></div>
      <div><strong>Roadmap</strong><p>More diagrams, downloads, project photos, and AI-assisted learning tools.</p></div>
    </div>
  </section>
  <section class="premium-grid premium-grid-2">
    <article class="premium-card"><span class="premium-icon">Editorial Team</span><h3>Maintainers</h3><p>ESP32 Engine was created by Abdul Mubeen and is maintained by the ESP32 Engine editorial team for practical ESP32 learning and prototyping.</p><a class="btn btn-card" href="/author.html">Meet the author -></a></article>
    <article class="premium-card"><span class="premium-icon">GitHub</span><h3>GitHub Integration</h3><p>Corrections and improvements are tracked openly on GitHub. Report errors, suggest topics, or ask questions through Issues.</p><a class="btn btn-card" href="https://github.com/abdulmubeen7876773-dotcom/esp32/issues" target="_blank" rel="noopener">Open issues -></a></article>
  </section>
  <section class="premium-faq">
    <h2>About FAQs</h2>
    <details><summary>Who is ESP32 Engine for?</summary><p>Students, hobbyists, parents, teachers, and engineers who want practical ESP32 learning resources.</p></details>
    <details><summary>Are the guides free?</summary><p>Yes. The platform is designed to stay free and accessible.</p></details>
    <details><summary>How can I suggest a correction?</summary><p>Use the Contact page or open an issue on GitHub with the page URL and suggested improvement.</p></details>
  </section>
