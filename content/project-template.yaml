  story: |
    Your desk needs a [thing]. Not a phone app — a real [part] you wired yourself.

    In this project you connect [sensor/part] to your ESP32 and watch [outcome]. That's the same building block used in [real-world example].

  eli12: |
    The [sensor] feels the [quantity] — how [plain description]. Your ESP32 reads those numbers and sends them to your laptop through the USB cable, like a tiny status message every two seconds.

  parent_safety: |
    This project uses 3.3 V USB power only — no mains electricity. Children should have an adult nearby for USB connections and breadboard wiring. Unplug before changing wires.

  what_you_build: |
    A breadboard circuit with [parts] and ESP32. Your code [behavior] and shows results in [Serial Monitor / OLED / etc.].

  components:
    - item: ESP32 DevKit board
      note: Any board with USB port
      link: /components/esp32-devkit.html
      icon: "🖥"
    - item: Primary sensor or module
      note: Module vs bare part hint
      link: /components/your-part-slug.html
      icon: "🔌"
    - item: Breadboard
      note: Half-size is fine
      icon: "🧩"
    - item: Jumper wires
      note: Male-to-male, count needed
      icon: "🔗"
    - item: USB cable
      note: Data-capable, not charge-only
      icon: "🔌"

  wiring:
    illustration_alt: Describe full circuit for screen readers — every wire and GPIO labeled
    summary: One short paragraph — module type, GPIO choice, unplug rule.
    steps:
      - "Unplug USB. Place the ESP32 and main module on your breadboard."
      - "Connect VCC on the module to 3.3 V on the ESP32."
      - "Connect GND on the module to GND on the ESP32."
      - "Connect signal/data on the module to your chosen GPIO on the ESP32."
      - "Double-check all wires match your code, then plug in USB."

  code:
    filename: your_project.ino
    content: |
      #define SENSOR_PIN 4

      void setup() {
        Serial.begin(115200);
        Serial.println("Project ready!");
      }

      void loop() {
        Serial.println("Replace with real read logic");
        delay(2000);
      }

  expected_output: |
    Open Serial Monitor at 115200 baud. Every 2 seconds you should see:

    [Sample output line]

    Interact with the sensor — the numbers should change. If you see errors, check wiring on your GPIO pin first.

  common_mistakes:
    - text: Signal wire on the wrong GPIO pin compared to your code.
    - text: Using a charge-only USB cable that cannot upload code.
    - text: Loose breadboard connections that look connected but are not seated.
    - text: Reading or polling faster than the sensor allows.

  troubleshooting:
    - problem: Serial shows read failed or no valid data
      fix: Check VCC, GND, and signal wiring. Confirm GPIO in code matches your wire.
    - problem: No output in Serial Monitor
      fix: Set baud rate to 115200 and select the correct COM port for your ESP32.
    - problem: Numbers look wrong or stuck
      fix: Wait after power-on. Keep the sensor away from heat sources for a stable reading.

  upgrade_ideas:
    - Add an OLED display to show readings without a laptop
    - Log readings to SD card every minute
    - Send data to a web dashboard over Wi-Fi (Advanced)
    - Trigger an alert when a value crosses a limit you choose

