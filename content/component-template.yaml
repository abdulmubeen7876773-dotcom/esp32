# ESP32 Engine — Golden Component Template
# Copy this file to content/components/your-part-slug.yaml
# Authoring standard: docs/editorial/GOLDEN_COMPONENT_STANDARD.md
# Do not deploy this template file — it is a blank scaffold only.

slug: your-part-slug
name: Your Component Display Name
category: Sensors
difficulty: Beginner
icon: "🔌"
image: /assets/visuals/components/photos/your-part-slug-photo.webp

# HERO — One emotional sentence: what the part does in the learner's project.
# Outcome-focused. No specs here.
summary: |
  One or two sentences — what this part does for your ESP32 project and why a beginner should care.

# ELI12 — Explain Like I'm 12. Real-life analogy. Short paragraphs.
# Answer: "What would a curious 12-year-old ask next?"
# No GPIO jargon before plain language.
eli12: |
  Start with an analogy kids already understand.

  Explain what the part tells the ESP32 in everyday words.

  End with a hook question the learner can test on the bench.

# QUICK FACTS — Scannable tiles. Minimum 4 labeled facts.
# Typical labels: Measures, Pins, Best for, Update speed, Voltage, First mission
quick_facts:
  - label: Measures
    value: What quantity or job this part performs
  - label: Pins
    value: How many wires and what they are called in plain language
  - label: Best for
    value: 2–3 project types
  - label: Logic level
    value: 3.3 V for ESP32 direct wiring
  - label: First mission
    value: Link to mission title if one exists

# SPECS — Layered teaching bullets. Use "Label — explanation" format.
# Include: what it does, how it works, inside simply, voltage, communication,
# ranges, comparison to similar parts, real-world uses, interesting facts, safety notes.
# Do not invent numbers — verify against datasheet.
specs:
  - "What it does — Plain description of the part's job in air/on the bench."
  - "How it works — Conceptual explanation without datasheet dump."
  - "Inside, simply — One-sentence internal model (detector + translator chip)."
  - "Voltage — Safe ESP32 wiring voltage and any level-shifting notes."
  - "Communication — I2C, SPI, one-wire, digital HIGH/LOW, etc."
  - "Real-world uses — Where makers use this in the wild."
  - "Safety notes — Unplug before rewiring, supervision, no mains for beginners."

# PINOUT — Structured rows (preferred over flat pins list).
# Each row: pin label, role, ESP32 connection, teaching note.
pinout:
  - pin: "VCC (+)"
    role: Power
    connects: ESP32 3.3 V
    note: Color or module label hint. Voltage warning if needed.
  - pin: "SIG / DATA"
    role: Signal
    connects: ESP32 GPIO4
    note: Must match DHTPIN or equivalent in code.
  - pin: "GND (−)"
    role: Ground
    connects: ESP32 GND
    note: Common ground with the board.

# WIRING — Numbered steps. Unplug first. Double-check before power-on.
wiring:
  illustration_alt: Describe the full circuit for screen readers — every connection labeled
  summary: |
    One short paragraph — module vs bare part, which GPIO you chose, unplug rule.
  steps:
    - "Unplug USB before changing wires."
    - "Place the part on the breadboard."
    - "Connect VCC to 3.3 V on the ESP32."
    - "Connect GND to GND on the ESP32."
    - "Connect signal pin to your chosen GPIO."
    - "Double-check all three connections match your code."
    - "Plug in USB, open Serial Monitor at 115200 baud, upload the code below."

# LIBRARY — Exact Arduino Library Manager name or Built-in note.
library: Library Name by Author (install via Arduino Library Manager)

# CODE — Pin constants must match wiring section. Include realistic error handling.
code:
  filename: your_part_read.ino
  content: |
    #define PART_PIN 4

    void setup() {
      Serial.begin(115200);
    }

    void loop() {
      Serial.println("Replace with real read logic");
      delay(1000);
    }

# OUTPUT — Sample Serial Monitor or display text. What changes when you interact?
output: |
  Describe exact success output.

  Explain how to interact (breathe, wave, press button) and what should change.

  Reassure if read failed — what it usually means.

# COMMON MISTAKES — Top 4–7 prevention callouts.
common_mistakes:
  - text: Wrong GPIO in code vs breadboard.
  - text: Wrong voltage on signal pin for ESP32.
  - text: Loose jumper that looks connected but is not seated.
  - text: Reading or polling faster than the part allows.

# TROUBLESHOOTING — Problem/fix pairs. Most common symptom first.
troubleshooting:
  - problem: Symptom the learner sees (NaN, blank, stuck value)
    fix: Ordered fix steps — wiring, GPIO, library, timing.
  - problem: Second most common symptom
    fix: Actionable recovery steps.

# RELATED GUIDES — Minimum 2. Link to missions that use this part.
related_guides:
  - title: Mission or guide title
    href: /guides/your-mission-slug.html
    description: One line — what the learner does with this part.
  - title: What Is ESP32?
    href: /guides/what-is-esp32.html
    description: Board background for first-time builders.

# RELATED PROJECTS — Minimum 1 capstone that uses this part.
related_projects:
  - title: Project title
    href: /projects/esp32-your-project.html
    description: One line — why this part matters in the build.

# DATASHEET — PDF for teachers and advanced builders.
datasheet_url: https://example.com/datasheet.pdf
datasheet_note: Who this PDF is for and when to open it.

# FAQ — Four bands using question prefixes (see GOLDEN_COMPONENT_STANDARD.md).
# Band 1: SEO questions (no prefix) — What is…? How to connect…? Comparison questions.
# Band 2: Glossary — prefix "Glossary —"
# Band 3: Mini quiz — prefix "Mini quiz —"
# Band 4: Challenge — prefix "Challenge yourself —"
# Band 5: Parent — prefix "Parent tips —"
# Band 6: Teacher — prefix "Teacher tips —"
faqs:
  - question: What is this component?
    answer: Plain-language definition for search and beginners.
  - question: How do I connect this to an ESP32?
    answer: Three-sentence wiring summary pointing to the mission or wiring section.
  - question: How does it compare to a similar part?
    answer: Honest comparison to help purchase decisions.
  - question: "Glossary — What does GPIO mean?"
    answer: Kid-friendly definition tied to this part.
  - question: "Glossary — Define one protocol or term used above"
    answer: Short definition with example from this component.
  - question: "Mini quiz — One factual check question?"
    answer: Answer that teaches even if wrong on a mission quiz.
  - question: "Mini quiz — Second check question?"
    answer: Reinforces wiring or timing rule.
  - question: "Challenge yourself — Optional extension idea?"
    answer: One step harder — combine with another mission or change output format.
  - question: "Challenge yourself — Second extension?"
    answer: Data logging, threshold alert, or display integration.
  - question: "Parent tips — Is this safe at home?"
    answer: Voltage, supervision, unplug rule, no mains for basic build.
  - question: "Parent tips — What should I buy and how long will it take?"
    answer: Parts list under budget note and realistic time.
  - question: "Teacher tips — Can this fit one class period?"
    answer: Setup assumptions and demo strategy.
  - question: "Teacher tips — Learning objective and low-stress assessment?"
    answer: Objectives plus checklist — not graded quiz stress.
