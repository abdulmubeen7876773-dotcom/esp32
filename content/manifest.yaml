version: 1
platform: esp32-engine
architecture: static-first

description: |
  All site content lives in version-controlled files under content/.
  Run `py tools/build_all.py` to regenerate HTML and JSON indexes.
  GitHub Actions rebuilds automatically on push to main.
  No database, admin panel, or live server is required to operate the site.

directories:
  site.yaml: Global settings (domain, analytics, CSS version)
  home.yaml: Homepage copy
  categories.yaml: Project category intros
  learning-paths.yaml: Learning path cards
  component-categories.yaml: Component encyclopedia categories
  guides/: Mission journeys and reference guides (YAML)
  components/: Component encyclopedia entries (YAML)
  projects/: Project source data (YAML)
  pages/: Static pages — about, parents, teachers, etc. (YAML)

generated_at_build:
  search-index.json: Client-side search (built from all content)
  projects.json: Project listing filter data
  project-icons.js: Category icon map
  sitemap.xml: SEO sitemap
  feed.xml: RSS feed
  "*.html": All public pages

edit_guide:
  add_guide: Create content/guides/my-mission.yaml with format mission
  add_component: Create content/components/my-part.yaml
  add_project: Create content/projects/my-project.yaml
  add_page: Create content/pages/my-page.yaml
  rebuild: py tools/build_all.py
  deploy: Push to main — GitHub Actions rebuilds and commits HTML

mission_guide_required_fields:
  - slug
  - title
  - headline
  - meta_description
  - mission
