faqs:
- question: What is the ESP32-CAM AI-Thinker board?
  answer: It is an ESP32 board with an OV2640 camera connected through a fixed AI-Thinker pin map.
- question: How do I connect IO0 when flashing?
  answer: Connect IO0 to GND only during upload, then disconnect it from GND before resetting the board to run the
    sketch.
- question: Why does my ESP32-CAM reset randomly?
  answer: The most common cause is weak 5 V power during Wi-Fi or camera capture current spikes.
- question: Why does upload fail even though power is connected?
  answer: 'Check IO0-to-GND for upload mode and cross the serial lines: adapter TX to board U0R, adapter RX to board
    U0T.'
- question: Is ESP32-CAM a professional security camera?
  answer: No. Treat it as an educational local camera board; do not expose example projects to the public internet.
- question: Glossary - What is IO0?
  answer: IO0 is a boot strap pin. Grounded at reset means programming mode; disconnected or high at reset means
    normal sketch execution.
- question: Glossary - What is PSRAM?
  answer: PSRAM is extra memory on many ESP32-CAM boards. It helps larger camera frames fit in memory.
- question: Parent tips - What is the main safety issue?
  answer: The board is low voltage; the main concern is privacy and consent. Keep the camera visible and use it
    only with awareness of people nearby.
- question: Parent tips - What should I check before a child uses it?
  answer: Check stable 5 V power, remove IO0 from GND after flashing, and confirm the camera is not aimed at private
    spaces.
- question: Teacher tips - How can this fit into class?
  answer: Use it to teach boot modes, pin maps, local web servers, and privacy-by-design in one contained lab.
- question: Teacher tips - What should students document?
  answer: Have students record upload wiring, normal-run wiring, selected frame size, and how they handled consent.
- question: Challenge yourself - How can I prove the pin map works?
  answer: Run the init-check sketch, then capture one local frame before adding any larger project logic.
- question: Challenge yourself - How can I improve privacy?
  answer: Add a visible status LED or physical lens cover and keep all access on the local network.
- question: Mini quiz - What changes between upload and run mode?
  answer: 'Only IO0 changes: grounded for upload, disconnected from GND for normal run.'
- question: Mini quiz - Why cross TX and RX?
  answer: The adapter transmits into the board receiver, and the board transmits back into the adapter receiver.
