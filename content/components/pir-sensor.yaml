slug: pir-sensor
name: HC-SR501 PIR Motion Sensor
category: Input Devices
difficulty: Beginner
icon: 👁
image: https://cdn.sparkfun.com/assets/parts/1/0/3/1/0/101-10627-01.jpg
summary: Detects movement and triggers alarms, lights, or notifications.
eli12: PIR sensor is like a guard that watches for movement. When someone walks by, it sends a signal
  to your ESP32 — perfect for security alarms or automatic lights.
specs:
- 'Detection range: up to 7 m'
- 'Operating voltage: 5 V to 20 V'
- 'Digital output: HIGH when motion detected'
- Adjustable sensitivity and delay
pins:
- VCC → 5 V
- GND → GND
- OUT → GPIO27
library: Built-in digitalRead
example_code: "#define PIR 27\nvoid setup() { Serial.begin(115200); pinMode(PIR, INPUT); }\nvoid loop()\
  \ {\n  if (digitalRead(PIR) == HIGH) Serial.println(\"Motion detected!\");\n  delay(200);\n}\n"
output: Serial Monitor prints "Motion detected!" when someone moves nearby.
applications:
- Security alarms
- Automatic lighting
- Visitor counters
related_projects:
- title: ESP32 Motion Security Alert
  href: /projects/esp32-motion-security-alert.html
faqs:
- question: It triggers randomly?
  answer: Point it away from heat sources like windows and adjust sensitivity screw.
