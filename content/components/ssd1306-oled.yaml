  href: /projects/esp32-distance-monitoring-system.html
datasheet_url: https://cdn-shop.adafruit.com/datasheets/SSD1306.pdf
faqs:
- question: Screen stays blank?
  answer: Check I2C address (usually 0x3C) and SDA/SCL wiring.
quality_status: legacy_import
