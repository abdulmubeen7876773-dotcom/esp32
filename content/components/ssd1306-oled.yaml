slug: ssd1306-oled
name: SSD1306 OLED Display
category: Displays
difficulty: Beginner
icon: 📺
image: https://cdn.sparkfun.com/assets/parts/1/2/2/2/4/1.3in_OLED_128x64-01.jpg
summary: A tiny bright screen that shows text, numbers, and simple graphics on your project.
eli12: This little screen is like a mini TV for your ESP32. You can show temperature, smiley faces, or
  messages — all on a glowing blue display smaller than your thumb.
specs:
- 'Resolution: 128×64 pixels'
- 'Interface: I2C'
- 'Operating voltage: 3.3 V to 5 V'
- Blue or white monochrome
pins:
- VCC → 3.3 V
- GND → GND
- SDA → GPIO21
- SCL → GPIO22
library: Adafruit SSD1306 + Adafruit GFX
example_code: "#include <Wire.h>\n#include <Adafruit_GFX.h>\n#include <Adafruit_SSD1306.h>\nAdafruit_SSD1306\
  \ display(128, 64, &Wire, -1);\nvoid setup() {\n  display.begin(SSD1306_SWITCHCAPVCC, 0x3C);\n  display.clearDisplay();\n\
  \  display.setTextSize(2);\n  display.setTextColor(SSD1306_WHITE);\n  display.setCursor(0, 20);\n  display.println(\"\
  Hello!\");\n  display.display();\n}\nvoid loop() {}\n"
output: OLED shows "Hello!" in large white text.
applications:
- Sensor readout displays
- Menu interfaces
- Status indicators
related_projects:
