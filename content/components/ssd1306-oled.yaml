  "library": "Adafruit SSD1306 plus Adafruit GFX",
  "code": {
    "filename": "ssd1306_esp32_hello_status.ino",
    "notes": "Wire.begin() starts I2C on the ESP32 default pins. The display object defines the screen size and reset behavior.\n\nsetup() initializes the display and prints a clear startup screen. loop() updates a counter once per second so you can prove the screen is refreshing, not just showing a static image.",
    "content": "#include <Wire.h>\n#include <Adafruit_GFX.h>\n#include <Adafruit_SSD1306.h>\n\n#define SCREEN_WIDTH 128\n#define SCREEN_HEIGHT 64\n#define OLED_RESET -1\n#define OLED_ADDRESS 0x3C\n\nAdafruit_SSD1306 display(SCREEN_WIDTH, SCREEN_HEIGHT, &Wire, OLED_RESET);\nunsigned long counter = 0;\n\nvoid setup() {\n  Serial.begin(115200);\n  Wire.begin(21, 22);\n\n  if (!display.begin(SSD1306_SWITCHCAPVCC, OLED_ADDRESS)) {\n    Serial.println(\"SSD1306 not found. Check address, SDA, SCL, power, and ground.\");\n    while (true) delay(1000);\n  }\n\n  display.clearDisplay();\n  display.setTextColor(SSD1306_WHITE);\n  display.setTextSize(1);\n  display.setCursor(0, 0);\n  display.println(\"ESP32 Engine\");\n  display.println(\"OLED ready\");\n  display.display();\n  Serial.println(\"OLED initialized\");\n}\n\nvoid loop() {\n  display.clearDisplay();\n  display.setTextSize(1);\n  display.setCursor(0, 0);\n  display.println(\"SSD1306 OLED\");\n  display.println(\"Status: running\");\n  display.print(\"Seconds: \");\n  display.println(counter++);\n  display.display();\n  delay(1000);\n}"
  },
  "output": "The OLED first shows ESP32 Engine and OLED ready. Then it refreshes once per second with a running seconds counter. Serial Monitor prints OLED initialized. If the display is blank and Serial Monitor reports not found, the address or I2C wiring is wrong.",
