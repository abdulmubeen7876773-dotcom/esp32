    {
      "question": "Is it color?",
      "answer": "Most beginner SSD1306 modules are monochrome, usually white or blue."
    },
    {
      "question": "What address does it use?",
      "answer": "Most I2C modules use 0x3C; some use 0x3D."
    },
    {
      "question": "Which ESP32 pins should I use?",
      "answer": "Use GPIO21 for SDA and GPIO22 for SCL for standard examples."
    },
    {
      "question": "Can it share I2C with BME280?",
      "answer": "Yes, if the addresses are different."
    },
    {
      "question": "Why is my screen blank?",
      "answer": "Common causes are wrong address, swapped SDA/SCL, missing power, or forgetting display.display()."
    },
    {
      "question": "Do I need Adafruit GFX?",
      "answer": "Yes, Adafruit SSD1306 depends on Adafruit GFX for drawing functions."
    },
    {
      "question": "Can I show images?",
      "answer": "Yes, but they must be converted to monochrome bitmaps."
    },
    {
      "question": "Can I use large fonts?",
      "answer": "Yes, but space is limited on 128x64 pixels."
    },
    {
      "question": "Does OLED need a backlight?",
      "answer": "No. OLED pixels emit their own light."
    },
    {
      "question": "Can OLED burn in?",
      "answer": "Long static images can age pixels, so finished devices should avoid permanent bright screens."
    },
    {
      "question": "Is 3.3 V enough?",
      "answer": "Usually yes for ESP32-compatible modules."
    },
    {
      "question": "What is display.display()?",
      "answer": "It sends the RAM buffer to the physical screen."
    },
    {
      "question": "Why do drawings not appear immediately?",
      "answer": "The library draws into memory first, then updates the screen when display.display() runs."
    },
    {
      "question": "Can I use U8g2 library?",
      "answer": "Yes. This page uses Adafruit libraries for beginner consistency."
    },
    {
      "question": "Can it run on battery?",
