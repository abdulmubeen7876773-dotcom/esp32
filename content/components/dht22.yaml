faqs:
  - question: What is a DHT22 sensor?
    answer: A small digital sensor that reports air temperature and relative humidity to a microcontroller like the ESP32 over one data wire. It is a popular first sensor because the wiring is simple and the readings feel meaningful right away.
  - question: How accurate is the DHT22?
    answer: Typical accuracy is about ±0.5 °C for temperature and ±2 % for relative humidity under normal room conditions. That is accurate enough for learning projects, room comfort checks, and classroom weather logs — not for laboratory calibration without extra steps.
  - question: Can the DHT22 measure humidity?
    answer: Yes — relative humidity from 0–100 % RH is the second number in each reading pair. Humidity tells you how damp the air feels, which changes when you breathe on the sensor or open a window.
  - question: How do I connect a DHT22 to an ESP32?
    answer: Wire module VCC to 3.3 V, GND to GND, and DATA to a GPIO such as GPIO4. Install the Adafruit DHT library, set the same pin in code, and read values every 2 seconds or slower. Follow Mission 2 for a full walkthrough with quiz and challenge.
  - question: How does the DHT22 work?
    answer: A sensing element inside reacts to heat and moisture. A chip converts that into a digital packet and sends it as timed pulses on the DATA pin. Your ESP32 library decodes those pulses into temperature and humidity numbers you can print or display.
  - question: DHT22 vs DHT11 — which should I buy?
    answer: Choose DHT22 for better accuracy and a wider range — best for ESP32 Engine missions and weather projects. Choose DHT11 if budget is tight and rough readings are OK. Both use similar wiring; change DHTTYPE in code if you swap parts.
  - question: "Glossary — What is relative humidity (RH)?"
    answer: RH is how full the air is with water vapor compared to the maximum it could hold at that temperature. 50 % RH feels comfortable in many rooms; 80 % feels sticky; 30 % can feel dry in winter.
  - question: "Glossary — What is a pull-up resistor?"
    answer: A resistor that keeps the DATA line at a steady 3.3 V until the sensor pulls it low to send bits. Many DHT22 modules include one on the board; bare sensors need a 10 kΩ resistor from DATA to 3.3 V.
  - question: "Glossary — What does NaN mean in Serial Monitor?"
    answer: Not a Number — the library could not get a valid reading. Treat it as a wiring or timing clue, not a personal failure. Check power, DATA, GPIO match, and the 2-second wait.
  - question: "Glossary — What is Serial Monitor?"
    answer: A window in Arduino IDE that shows text your ESP32 sends over USB. Set baud to 115200 to match the example code. It is your first dashboard before adding an OLED or web page.
  - question: "Mini quiz — How many wires does a DHT22 module need at minimum?"
    answer: Three — power (VCC), ground (GND), and data (DATA). That is why it is a great first sensor.
  - question: "Mini quiz — Why must we wait 2 seconds between reads?"
    answer: The sensor needs time to sample the air and prepare the next packet. Reading faster returns errors or stale values.
  - question: "Mini quiz — Which pin should DATA connect to?"
    answer: Any available ESP32 GPIO you choose — but the same number must appear as DHTPIN in your code. Mission 2 uses GPIO4 as the example.
  - question: "Challenge yourself — Can you make a comfort message?"
    answer: After you get stable readings, change the code to print Comfortable when humidity is between 40–60 % and Try a fan when humidity is above 65 %. You just wrote your first sensor rule.
  - question: "Challenge yourself — Can you log five readings?"
    answer: Copy five lines from Serial Monitor into a notebook with the time and room location (desk, window, hallway). You built a manual data log — the same habit scientists use before automation.
  - question: "Challenge yourself — Can you combine with Mission 3?"
    answer: After the OLED mission, show temperature on the screen instead of Serial Monitor. Two missions, one mini weather gadget.
  - question: "Parent tips — Is this project safe at home?"
    answer: Yes for typical USB-powered breadboard builds at 3.3 V. Supervise USB plugging, keep drinks away from electronics, and remind kids to unplug before rewiring. No mains voltage or soldering required for the basic module circuit.
  - question: "Parent tips — What should I buy?"
    answer: An ESP32 DevKit, a DHT22 module (three pins, pull-up built in), a breadboard, jumper wires, and a data-capable USB cable. Budget is usually under $20 for parts you reuse in later missions.
  - question: "Parent tips — How long does the first build take?"
    answer: Plan 30–45 minutes for a first attempt including software setup. Celebrate a successful Serial Monitor line even if numbers look boring — that means the hard part works.
  - question: "Teacher tips — Can this fit one class period?"
    answer: Yes for Mission 2 if Arduino IDE and ESP32 boards are pre-flashed with board support. Pre-wire one demo board, assign GPIO4 consistently, and use the 2-second delay as a teaching moment about sensor sampling rates.
  - question: "Teacher tips — What is the learning objective?"
    answer: Learners connect a digital sensor, match hardware pins to code, interpret live data, and debug NaN readings. That covers physical computing, data literacy, and systematic troubleshooting in one activity.
  - question: "Teacher tips — How do I assess without stress?"
    answer: Checklist — correct three-wire connection, Serial Monitor shows changing values when breathing on the sensor, learner explains one reading in their own words, optional challenge attempted. Wrong answers on the mission quiz are learning moments, not grades.
