faqs:
  - question: Can I power the DHT22 with 5 V?
    answer: Many modules accept 5 V on VCC, but keep the DATA line at 3.3 V logic when talking to an ESP32.
  - question: Why do I get NaN readings?
    answer: Check wiring, confirm the pull-up resistor, match the GPIO in code, and wait at least 2 seconds between reads.
  - question: DHT22 vs DHT11 — which should I use?
    answer: DHT22 is more accurate and better for learning projects. DHT11 is cheaper but less precise.
