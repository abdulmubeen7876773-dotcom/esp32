faqs:
  - question: What does the DHT22 measure?
    answer: It measures air temperature and relative humidity. It does not measure pressure, gas, dust, rain, soil moisture, or water temperature.
  - question: Is DHT22 digital or analog?
    answer: It is digital. The ESP32 reads timed HIGH and LOW pulses on one GPIO pin, so analogRead() is not used.
  - question: Can I connect DHT22 directly to ESP32?
    answer: Yes. Use 3.3 V, GND, and one GPIO data pin. Add a pull-up resistor if your sensor board does not already include one.
  - question: Can I power DHT22 from 5 V?
    answer: Avoid 5 V for direct ESP32 projects unless you are certain the DATA pull-up remains at 3.3 V. ESP32 GPIO pins are not 5 V tolerant.
  - question: Which GPIO is best for DHT22 on ESP32?
    answer: GPIO4 is a good beginner choice. Many normal GPIOs work, but avoid boot strapping pins until you understand ESP32 boot behavior.
  - question: Why do I need a pull-up resistor?
    answer: The data line must idle HIGH. The resistor pulls DATA to 3.3 V until the sensor pulls it LOW to send timed bits.
  - question: What resistor value should I use?
    answer: 10 k ohm works well for short breadboard wires. For longer wires, 4.7 k ohm may be more reliable.
  - question: How often can I read DHT22?
    answer: Read it about once every 2 seconds. Faster reads can return NaN, repeated values, or unstable output.
  - question: What does NaN mean?
    answer: NaN means Not a Number. The library did not receive a valid reading from the sensor.
  - question: Is DHT22 accurate?
    answer: It is accurate enough for beginner weather and room projects, but not for calibrated laboratory measurement.
  - question: Is DHT22 better than DHT11?
    answer: Yes. DHT22 has better range and accuracy. DHT11 is cheaper but less precise.
  - question: Is BME280 better than DHT22?
    answer: For many ESP32 projects, yes. BME280 uses I2C, is usually more stable, and also measures pressure. DHT22 is simpler for first lessons.
  - question: Can DHT22 be used outdoors?
    answer: Only with weather protection and airflow. Do not expose the sensor or ESP32 board directly to rain, condensation, or sunlight.
  - question: Can it measure water temperature?
    answer: No. Use a waterproof DS18B20 probe for water temperature.
  - question: Can it measure soil moisture?
    answer: No. Use a capacitive soil moisture sensor for soil.
  - question: Why does humidity change when I breathe on it?
    answer: Breath is warm and humid, so the sensor responds. This is a quick way to prove the sensor is alive.
  - question: Why is the temperature too high?
    answer: The sensor may be near your hand, the ESP32 regulator, sunlight, or another heat source. Move it away and wait.
  - question: Do I need a capacitor?
    answer: Usually not for short breadboard wiring. For long wires or unstable power, a small 0.1 uF capacitor across VCC and GND near the sensor can help.
  - question: Can I use multiple DHT22 sensors?
    answer: Yes, but each sensor needs its own GPIO data pin and its own DHT object in code.
  - question: Does DHT22 work with MicroPython?
    answer: Yes. MicroPython has DHT support on ESP32, but this page focuses on Arduino because it is easiest for beginners.
  - question: Can I use interrupts with DHT22?
    answer: Beginners do not need interrupts. Use the library read function at a slow interval and keep the rest of the loop non-blocking where possible.
  - question: Why does Wi-Fi sometimes affect readings?
    answer: Wi-Fi current bursts can disturb weak power setups. Use solid USB power, short wiring, and common ground.
