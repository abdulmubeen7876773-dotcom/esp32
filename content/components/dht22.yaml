datasheet_url: https://www.sparkfun.com/datasheets/Sensors/Temperature/DHT22.pdf
faqs:
  - question: Can I use 5 V with ESP32?
    answer: Yes on VCC if your board has a 3.3 V regulator, but keep the data line at 3.3 V logic.
  - question: Why do I get NaN readings?
    answer: Check wiring, add a pull-up resistor, and wait 2 seconds between reads.
