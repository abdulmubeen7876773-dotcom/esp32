  "library": "Built-in Arduino digitalWrite",
  "code": {
    "filename": "relay_esp32_safe_toggle.ino",
    "notes": "The constants RELAY_ON and RELAY_OFF make active-LOW behavior explicit. setup() starts with the relay off before configuring normal operation.\n\nloop() toggles the relay slowly so you can hear the click and measure the contact state. Do not use relay modules for rapid PWM; mechanical contacts wear out.",
    "content": "#define RELAY_PIN 26\n\nconst int RELAY_ON = LOW;\nconst int RELAY_OFF = HIGH;\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(RELAY_PIN, OUTPUT);\n  digitalWrite(RELAY_PIN, RELAY_OFF);\n  Serial.println(\"Relay module test. Load should start OFF.\");\n}\n\nvoid loop() {\n  Serial.println(\"Relay ON\");\n  digitalWrite(RELAY_PIN, RELAY_ON);\n  delay(2000);\n\n  Serial.println(\"Relay OFF\");\n  digitalWrite(RELAY_PIN, RELAY_OFF);\n  delay(2000);\n}"
  },
  "output": "The relay clicks on for two seconds, then clicks off for two seconds. Serial Monitor prints Relay ON and Relay OFF. If the LED on the relay module changes but your load does not, the contact-side wiring is wrong or the load supply is missing.",
