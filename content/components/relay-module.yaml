slug: relay-module
name: 1-Channel Relay Module
category: Motors
difficulty: Beginner
icon: "⚡"
image: https://cdn.sparkfun.com/assets/parts/1/1/3/4/9/101-10274-01-1.jpg
summary: Switches high-power devices like fans, pumps, and lights using a small ESP32 signal.
eli12: A relay is like a remote-controlled light switch. Your ESP32 sends a tiny signal and the relay clicks ON or OFF to control something big — like a water pump or a lamp.
specs:
  - "Control voltage: 3.3 V or 5 V"
  - "Switch rating: up to 10 A at 250 V AC"
  - "Opto-isolated input"
  - "Active LOW on most modules"
pins:
  - "VCC → 5 V"
  - "GND → GND"
  - "IN → GPIO26"
library: Built-in digitalWrite
example_code: |
  #define RELAY 26
  void setup() { pinMode(RELAY, OUTPUT); digitalWrite(RELAY, HIGH); }
  void loop() {
    digitalWrite(RELAY, LOW);
    delay(2000);
    digitalWrite(RELAY, HIGH);
    delay(2000);
  }
output: Relay clicks every 2 seconds, switching connected device on and off.
applications:
  - Smart irrigation pumps
  - Home automation
  - Fan and heater control
related_projects:
  - title: ESP32 Smart Irrigation System
    href: /projects/esp32-smart-irrigation-system.html
faqs:
  - question: Is it safe for mains voltage?
    answer: Only with adult supervision. Start with low-voltage DC loads like 5 V fans.
