  "faqs": [
    {
      "question": "What is a relay module?",
      "answer": "It is an electrically controlled switch module."
    },
    {
      "question": "Can ESP32 drive a bare relay coil?",
      "answer": "No. Use a driver transistor or relay module."
    },
    {
      "question": "Why is my relay active LOW?",
      "answer": "Many modules use input circuits that energize when IN is pulled LOW."
    },
    {
      "question": "What are COM, NO, and NC?",
      "answer": "COM is the moving contact, NO is open when off, and NC is closed when off."
    },
    {
      "question": "Which terminal should beginners use?",
      "answer": "Use COM and NO so the load is off by default."
    },
    {
      "question": "Can I switch mains voltage?",
      "answer": "Only with qualified supervision, proper enclosure, fuse, strain relief, and local electrical compliance."
    },
    {
      "question": "Can I test with a battery load?",
      "answer": "Yes. Low-voltage DC loads are best for learning."
    },
    {
      "question": "Does relay need separate power?",
      "answer": "Often yes, especially if the coil current causes ESP32 resets."
    },
    {
      "question": "Can I PWM a relay?",
      "answer": "No. Use MOSFET or solid-state switching for PWM."
    },
    {
      "question": "Why does it click?",
      "answer": "The internal mechanical switch moves when the coil energizes."
    },
    {
      "question": "Can relay switch DC motors?",
      "answer": "Yes if rated properly, but motors need flyback/noise protection."
    },
    {
      "question": "Is optocoupler isolation always safe?",
      "answer": "No. Board layout and jumper wiring determine real isolation."
    },
    {
      "question": "What GPIO should I use?",
      "answer": "GPIO26 is a good beginner output pin."
    },
    {
      "question": "Why does relay turn on during boot?",
      "answer": "Boot pin states or floating inputs can briefly trigger modules."
    },
    {
      "question": "Can I use 3.3 V relay module?",
      "answer": "Yes if designed for 3.3 V coil/input."
    },
    {
      "question": "Can relay switch AC and DC?",
      "answer": "Contacts can switch rated AC or DC, but ratings differ."
    },
    {
      "question": "Why does my load not turn on?",
      "answer": "The contact-side circuit may not have a complete power path."
    },
    {
      "question": "Do I need common ground?",
      "answer": "For normal module control, yes. True isolation wiring is module-specific."
    },
    {
      "question": "What is JD-VCC?",
      "answer": "Some modules use JD-VCC for separate relay coil power."
    },
    {
      "question": "What is safer than relay for DC loads?",
