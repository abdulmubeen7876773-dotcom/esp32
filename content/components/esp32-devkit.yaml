  "how_it_works": "The DevKit combines an ESP32 module with the support electronics needed for learning. USB power enters the board, a regulator creates 3.3 V, and the USB-to-serial chip converts computer USB signals into UART signals the ESP32 bootloader understands.\n\nWhen you click Upload, Arduino IDE compiles your sketch and sends it through USB. The board enters bootloader mode, writes the firmware into flash memory, then resets and starts running your program.\n\nGPIO pins are programmable connections to the outside world. Some pins can read digital inputs, some can output PWM, some can read analog voltage, and some are used by I2C, SPI, or UART. The key engineering rule is that GPIO pins are signal pins, not power supplies. They can control modules, but heavy loads need drivers, transistors, relays, or motor boards.\n\nThe wireless radio shares power with the rest of the board. When Wi-Fi transmits, current briefly rises. Weak USB cables, poor breadboards, or overloaded 3.3 V rails can cause resets.",
