slug: esp32-devkit
name: ESP32 DevKit Board
category: Boards
difficulty: Beginner
icon: 🖥
image: https://cdn.sparkfun.com/assets/parts/1/2/2/7/6/ESP32-WROOM-DevKit-v4-01.jpg
summary: The brain of your project — a powerful microcontroller with built-in Wi-Fi and Bluetooth.
eli12: ESP32 DevKit is the computer chip that runs your projects. Plug it in with USB, write code on your
  laptop, and it controls LEDs, sensors, motors, and even connects to the internet.
specs:
- Dual-core 240 MHz processor
- Wi-Fi 802.11 b/g/n
- Bluetooth 4.2 / BLE
- 520 KB SRAM, 4 MB flash typical
- 3.3 V logic, USB powered
pins:
- 3.3 V → Sensor power
- GND → Common ground
- GPIO → Sensors, LEDs, relays
- USB → Power and programming
library: Arduino ESP32 board package
example_code: "void setup() {\n  pinMode(2, OUTPUT);\n}\nvoid loop() {\n  digitalWrite(2, HIGH);\n  delay(500);\n\
  \  digitalWrite(2, LOW);\n  delay(500);\n}\n"
output: Built-in LED blinks on and off every half second.
applications:
- Every ESP32 Engine project
- IoT devices
- Robotics controllers
