  "faqs": [
    {
      "question": "Which ESP32 board should I buy first?",
      "answer": "Choose an ESP32-WROOM DevKit with USB, labeled pins, and good documentation."
    },
    {
      "question": "Is ESP32 an Arduino?",
      "answer": "No. ESP32 is a microcontroller, but it can be programmed using Arduino IDE."
    },
    {
      "question": "Can ESP32 use 5 V sensors?",
      "answer": "Only if the signal into GPIO is shifted to 3.3 V. ESP32 GPIO pins are not 5 V tolerant."
    },
    {
      "question": "What voltage powers the board?",
      "answer": "USB provides 5 V to the board, and the onboard regulator creates 3.3 V for the ESP32."
    },
    {
      "question": "Can I power motors from the ESP32?",
      "answer": "No. Use a motor driver and separate power supply with common ground."
    },
    {
      "question": "Why are there many GND pins?",
      "answer": "They are all ground references. Use any convenient GND pin."
    },
    {
      "question": "What is GPIO?",
      "answer": "GPIO means general-purpose input/output, a pin your code can read or control."
    },
    {
      "question": "Which pins are safe for beginners?",
      "answer": "GPIO4, 5, 16, 17, 18, 19, 21, 22, 23, 25, 26, and 27 are common choices."
    },
    {
      "question": "Which pins should beginners avoid?",
      "answer": "Avoid strapping pins such as GPIO0, GPIO2, GPIO12, and GPIO15 until you understand boot behavior."
    },
    {
      "question": "Why does upload need the BOOT button?",
      "answer": "Some boards do not auto-enter bootloader mode reliably, so BOOT forces it."
    },
    {
      "question": "What is EN?",
      "answer": "EN is the enable/reset pin. Pulling it low resets the ESP32."
    },
    {
      "question": "Can ESP32 connect to Wi-Fi?",
      "answer": "Yes. Wi-Fi is built into the chip."
    },
    {
      "question": "Can ESP32 use Bluetooth?",
      "answer": "Classic ESP32 supports Bluetooth and BLE, though support varies on newer ESP32 families."
    },
    {
      "question": "Why does my board reset randomly?",
      "answer": "Common causes are weak USB power, wiring shorts, heavy loads, or unstable code."
    },
    {
      "question": "Can I use MicroPython?",
      "answer": "Yes. ESP32 supports MicroPython, but ESP32 Engine beginner content uses Arduino first."
    },
    {
      "question": "What is flash memory?",
      "answer": "Flash stores your uploaded program and sometimes files."
    },
    {
      "question": "What is the difference between VIN and 3V3?",
      "answer": "VIN/5V is the USB/input rail. 3V3 is regulated output for the ESP32 and small sensors."
    },
    {
      "question": "Can I run ESP32 from battery?",
      "answer": "Yes, but choose the right regulator and use deep sleep for long life."
    },
    {
      "question": "Why does analogRead behave strangely?",
      "answer": "ESP32 ADC is useful but not laboratory-grade; ADC2 also conflicts with Wi-Fi."
    },
    {
      "question": "Can I connect many I2C devices?",
      "answer": "Yes, if addresses are unique and wiring stays short and clean."
    }
