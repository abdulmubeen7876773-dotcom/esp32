  "code": {
    "filename": "esp32_devkit_blink_test.ino",
    "notes": "This sketch proves that the board, USB cable, Arduino setup, selected port, and one GPIO pin all work.\n\nsetup() runs once and configures GPIO2 as an output. loop() toggles the pin without using any external libraries. If this sketch uploads and blinks, the board is ready for sensors, displays, and network projects.",
    "content": "#define LED_PIN 2\n\nvoid setup() {\n  Serial.begin(115200);\n  pinMode(LED_PIN, OUTPUT);\n  Serial.println(\"ESP32 DevKit blink test started\");\n}\n\nvoid loop() {\n  digitalWrite(LED_PIN, HIGH);\n  Serial.println(\"LED ON\");\n  delay(500);\n\n  digitalWrite(LED_PIN, LOW);\n  Serial.println(\"LED OFF\");\n  delay(500);\n}"
  },
  "output": "Serial Monitor at 115200 baud prints LED ON and LED OFF every half second. The external LED should blink at the same rhythm. Some DevKit boards also have an onboard LED, but the exact onboard LED pin varies by board.",
