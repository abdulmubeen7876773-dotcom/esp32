  "eli12": "The ESP32 DevKit is the brain of your project. It is a small computer board that you plug into USB, program from Arduino IDE, and connect to real parts like LEDs, sensors, displays, buttons, and relays.\n\nThe metal module on the board contains the ESP32 chip, flash memory, radio antenna, and support parts. The DevKit adds USB programming, voltage regulation, reset buttons, and breadboard-friendly pins so beginners can build without designing a circuit board first.\n\nUse it when you want one board that can read the physical world, control outputs, and connect to Wi-Fi or Bluetooth.",
