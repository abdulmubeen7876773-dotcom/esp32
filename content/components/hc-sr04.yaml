  "faqs": [
    {
      "question": "What does HC-SR04 measure?",
      "answer": "It measures distance to objects by timing ultrasonic echoes."
    },
    {
      "question": "Can I connect ECHO directly to ESP32?",
      "answer": "No. ECHO is often 5 V and should be level shifted to 3.3 V."
    },
    {
      "question": "Does TRIG need level shifting?",
      "answer": "Usually no. The ESP32 3.3 V HIGH is normally enough for the trigger input."
    },
    {
      "question": "What pins should I use?",
      "answer": "GPIO5 for TRIG and GPIO18 for ECHO are good beginner choices."
    },
    {
      "question": "Why divide by two?",
      "answer": "Sound travels to the object and back, so the measured time covers twice the distance."
    },
    {
      "question": "What is the minimum distance?",
      "answer": "About 2 cm, but 5 cm or more is more reliable for beginners."
    },
    {
      "question": "What is the maximum distance?",
      "answer": "About 400 cm under good conditions, less for small or soft targets."
    },
    {
      "question": "Can it detect people?",
      "answer": "Yes, but clothing and angle can make readings inconsistent."
    },
    {
      "question": "Can it measure water level?",
      "answer": "Sometimes, if the surface is calm and the sensor is protected from moisture."
    },
    {
      "question": "Is it waterproof?",
      "answer": "Standard HC-SR04 is not waterproof."
    },
    {
      "question": "Why are readings noisy?",
      "answer": "Surface angle, soft material, vibration, and power noise all affect echoes."
    },
    {
      "question": "Can I use more than one sensor?",
      "answer": "Yes, trigger them one at a time to avoid echo interference."
    },
    {
      "question": "Does temperature affect readings?",
      "answer": "Yes. Sound speed changes with temperature, but beginner projects often ignore the small error."
    },
    {
      "question": "Can I use NewPing library?",
      "answer": "Yes, but built-in pulseIn is enough for first ESP32 lessons."
    },
    {
