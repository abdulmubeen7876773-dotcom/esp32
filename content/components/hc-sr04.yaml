  href: /guides/what-is-esp32.html
datasheet_url: https://cdn.sparkfun.com/datasheets/Sensors/Proximity/HCSR04.pdf
faqs:
- question: Why does it show 0 cm?
  answer: The object may be too close (under 2 cm) or the sensor is angled wrong.
