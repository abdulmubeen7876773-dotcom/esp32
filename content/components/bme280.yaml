faqs:
- question: BME280 vs DHT22 — which should I use?
  answer: DHT22 is simpler to wire with one data pin. BME280 adds barometric pressure and uses I2C, so
    it fits well when you already have other I2C devices on the bus.
- question: Why do I get sensor not found?
  answer: Check SDA and SCL wiring, confirm 3.3 V power, and try both I2C addresses 0x76 and 0x77 in your
    code.
- question: Can I connect BME280 and an OLED on the same I2C bus?
  answer: Yes. Share VCC, GND, SDA, and SCL. Each device needs a unique I2C address — the OLED is usually
    0x3C while the BME280 is 0x76 or 0x77.
