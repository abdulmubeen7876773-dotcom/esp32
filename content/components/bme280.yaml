faqs:
  - question: What does the BME280 measure?
    answer: It measures temperature, relative humidity, and barometric pressure. Pressure can also be used to estimate altitude.
  - question: Is BME280 digital or analog?
    answer: It is digital. ESP32 reads it over I2C or SPI, not with analogRead().
  - question: Is BME280 the same as BMP280?
    answer: No. BMP280 measures temperature and pressure only. BME280 adds humidity.
  - question: Which is better, BME280 or DHT22?
    answer: BME280 is usually better for weather projects because it adds pressure, uses I2C, and is generally more stable. DHT22 is simpler for first sensor lessons.
  - question: What I2C address does BME280 use?
    answer: Most modules use 0x76 or 0x77. The address depends on the SDO pin or breakout board design.
  - question: Which ESP32 pins should I use?
    answer: Use GPIO21 for SDA and GPIO22 for SCL when following standard ESP32 Arduino examples.
  - question: Can I use different I2C pins?
    answer: Yes. ESP32 can map I2C to other pins, but you must call Wire.begin(SDA, SCL) with the pins you wired.
  - question: Does BME280 need pull-up resistors?
    answer: I2C needs pull-ups on SDA and SCL. Most breakout boards include them, but bare chips do not.
  - question: Can I power BME280 from 5 V?
    answer: Only if your breakout board is designed for 5 V input and level shifting. For ESP32 beginners, use 3.3 V.
  - question: Can BME280 share I2C with an OLED?
    answer: Yes. Connect both devices to the same SDA and SCL lines as long as their I2C addresses are different.
  - question: Why does my scanner show 0x76 but the code fails?
    answer: The sketch may be using 0x77, the wrong library, or a different Wire bus. Match bme.begin() to the scanner result.
  - question: Why is pressure not exactly 1013 hPa?
    answer: 1013.25 hPa is standard sea-level pressure, not the value every room should show. Weather and altitude change the measured pressure.
  - question: Why is altitude wrong?
    answer: Altitude estimates require current sea-level pressure. If you use a default value, weather changes create altitude error.
  - question: Can BME280 predict rain?
    answer: It cannot predict rain by itself, but falling pressure over time can be a useful weather trend signal.
  - question: How often should I read BME280?
    answer: Once per second is fine for beginner displays. Slower intervals are better for battery logging.
  - question: Is BME280 good for battery projects?
    answer: Yes, the sensor can be very low power, but the ESP32 must use deep sleep and avoid always-on Wi-Fi for long battery life.
  - question: Can BME280 be used outdoors?
    answer: Yes, if protected from rain and direct sun while still allowing airflow. Do not seal it in an airtight box.
  - question: Why does humidity respond slowly?
    answer: Humidity sensing depends on moisture exchange with the sensing material and the surrounding air, so it naturally settles over time.
  - question: Can I use BME280 with MicroPython?
    answer: Yes. MicroPython has BME280 drivers, but this page focuses on Arduino for beginner consistency.
  - question: Does BME280 measure air quality?
    answer: No. It does not measure VOCs, CO2, smoke, or dust. Use a dedicated air-quality sensor for those.
  - question: Is the BME280 waterproof?
    answer: No. Keep the chip dry. Use a ventilated weather shield for outdoor air measurements.
  - question: Why do I see heat from the ESP32 in readings?
    answer: The ESP32 and regulator warm nearby air. Put the sensor away from the board or on a short cable for better ambient readings.
