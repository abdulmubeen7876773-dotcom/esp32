name: Build and Deploy Static Site
on:
  push:
    branches: [main]
    paths:
      - content/**
      - tools/**
      - assets/**
      - docs/reports/**
      - static.config.yaml
      - style.css
      - ui.js
      - search.js
      - .nojekyll
      - mission-guide.js
      - projects.js
      - project.js
      - amplify.yml
      - CNAME
      - requirements.txt
      - .github/workflows/**
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages-build-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: pip install -r requirements.txt
      - name: Validate content and build static site
        run: python tools/build_all.py
      - name: Commit generated static artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild static site from content files"
          file_pattern: |
            *.html
            *.xml
            *.json
            *.js
            build-report.json
            content-dashboard.json
            release-report.json
            guide-quality-report.json
            project-quality-report.json
            component-quality-report.json
            docs/reports/latest-build.md
            docs/reports/content-dashboard.md
            docs/reports/release-report.md
            docs/reports/guide-quality-report.md
            docs/reports/project-quality-report.md
            docs/reports/visual-assets-report.md
            assets/visuals/manifest.json
            assets/visuals/**
            category/**
            guides/**
            components/**
            projects/*.html
            sitemap.*
            feed.xml
            esp32engineindex*.txt
      - name: Push main
        run: git push origin HEAD:refs/heads/main
      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: .
          if-no-files-found: error
  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://esp32engine.com
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-site
          path: site
      - uses: actions/configure-pages@v4
      - name: Upload production GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy production to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
