name: Build Static Site

on:
  push:
    branches: [main]
    paths:
      - content/**
      - tools/**
      - static.config.yaml
      - style.css
      - ui.js
      - search.js
      - mission-guide.js
      - projects.js
      - project.js
      - amplify.yml
      - .github/workflows/build-site.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install -r requirements.txt

      - name: Validate content and build static site
        run: python tools/build_all.py

      - name: Commit generated static artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: rebuild static site from content files"
          file_pattern: |
            *.html
            *.xml
            *.json
            *.js
            build-report.json
            content-dashboard.json
            docs/reports/latest-build.md
            docs/reports/content-dashboard.md
            category/**
            guides/**
            components/**
            projects/*.html
            sitemap.*
            feed.xml
            esp32engineindex*.txt

      - name: Sync staging branch for stg.esp32engine.com
        run: git push origin HEAD:staging --force
