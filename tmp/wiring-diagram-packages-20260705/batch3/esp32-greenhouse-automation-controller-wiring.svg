<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="460" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Greenhouse Automation Controller — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-greenhouse-automation-controller_beginner.ino</text>
<rect x="60" y="90" width="220" height="320" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="220" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="270" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="350" width="15" height="8" fill="#64748b"/><text x="40" y="357" text-anchor="end">GND</text>
  <line x1="45" y1="354" x2="10" y2="354" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="200" width="15" height="8" fill="#3b82f6"/><text x="330" y="207">GPIO4 (DHT22 DATA)</text>
  <line x1="295" y1="204" x2="330" y2="204" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="230" width="15" height="8" fill="#ef4444"/><text x="330" y="237">GPIO26 (Fan Relay)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#ef4444" stroke-width="2"/>
  <rect x="280" y="260" width="15" height="8" fill="#a855f7"/><text x="330" y="267">GPIO21 (OLED SDA)</text>
  <line x1="295" y1="264" x2="330" y2="264" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="290" width="15" height="8" fill="#06b6d4"/><text x="330" y="297">GPIO22 (OLED SCL)</text>
  <line x1="295" y1="294" x2="330" y2="294" stroke="#06b6d4" stroke-width="2"/>
</g>
<rect x="440" y="120" width="180" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">DHT22 Sensor</text>
<text x="460" y="165" font-size="10" fill="#1e40af">DATA → GPIO4 (10k pull-up)</text>
<text x="460" y="180" font-size="10" fill="#1e40af">VCC 3.3V / GND</text>
<rect x="440" y="230" width="180" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="530" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Fan Relay Module</text>
<text x="460" y="270" font-size="10" fill="#991b1b">IN → GPIO26 (active LOW)</text>
<rect x="440" y="310" width="180" height="80" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="530" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#5b21b6">SSD1306 OLED</text>
<text x="460" y="350" font-size="10" fill="#5b21b6">SDA → GPIO21</text>
<text x="460" y="365" font-size="10" fill="#5b21b6">SCL → GPIO22 (legit I2C)</text>
<line x1="330" y1="204" x2="440" y2="165" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="234" x2="440" y2="260" stroke="#ef4444" stroke-width="2"/>
<line x1="330" y1="264" x2="440" y2="350" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="294" x2="440" y2="365" stroke="#06b6d4" stroke-width="2"/>
<line x1="280" y1="154" x2="400" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="154" x2="400" y2="180" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="180" x2="440" y2="180" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="354" x2="420" y2="354" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="420" width="780" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="442" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V  ⬛ GND  🟦 DHT22 data  🟥 Fan relay (active LOW)  🟪🟦(cyan) I2C bus — OLED is legitimately I2C, no defect here.</text>
