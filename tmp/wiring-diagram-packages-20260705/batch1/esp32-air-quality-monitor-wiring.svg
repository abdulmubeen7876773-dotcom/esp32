<rect x="60" y="350" width="780" height="55" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
<text x="75" y="368" font-size="11" font-weight="bold" fill="#92400e">⚠ Content Mismatch Found — Not Drawn</text>
<text x="75" y="384" font-size="10" fill="#78350f">Site wiring table lists "Air Quality Led → SDA GPIO21 / SCL GPIO22" as an I2C device. An LED cannot use I2C,</text>
<text x="75" y="397" font-size="10" fill="#78350f">and GPIO21/22/Wire are never referenced in the beginner .ino. This entry was excluded — see mismatch report.</text>
