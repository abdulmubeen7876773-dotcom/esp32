<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 640" font-family="Arial, Helvetica, sans-serif">
<rect width="950" height="640" fill="#ffffff"/>
<text x="475" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32-CAM QR Code Scanner — Wiring Diagram</text>
<text x="475" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-cam-qr-scanner_beginner.ino — AI-Thinker OV2640 pin map (verified)</text>

<!-- ESP32-CAM board -->
<rect x="60" y="90" width="260" height="480" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="190" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32-CAM (AI-Thinker)</text>
<rect x="100" y="260" width="180" height="120" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="190" y="325" text-anchor="middle" font-size="10" fill="#475569">ESP32-S / OV2640</text>

<!-- Camera pin table on the left board -->
<g font-size="10" fill="#dbeafe">
<text x="80" y="150" font-weight="bold" fill="#60a5fa">Camera Interface (internal ribbon):</text>
<text x="80" y="165">PWDN → GPIO32</text>
<text x="80" y="178">RESET → not connected (-1)</text>
<text x="80" y="191">XCLK → GPIO0</text>
<text x="80" y="204">SIOD (SDA) → GPIO26</text>
<text x="80" y="217">SIOC (SCL) → GPIO27</text>
<text x="80" y="230">VSYNC → GPIO25   HREF → GPIO23   PCLK → GPIO22</text>
<text x="80" y="243">Y9-Y2 → GPIO35,34,39,36,21,19,18,5</text>
</g>

<!-- Power/upload pins -->
<g font-size="11" fill="#f1f5f9">
  <rect x="45" y="400" width="15" height="8" fill="#f97316"/><text x="40" y="407" text-anchor="end" fill="#1e293b">5V</text>
  <line x1="45" y1="404" x2="10" y2="404" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="430" width="15" height="8" fill="#64748b"/><text x="40" y="437" text-anchor="end" fill="#1e293b">GND</text>
  <line x1="45" y1="434" x2="10" y2="434" stroke="#64748b" stroke-width="2"/>
  <rect x="45" y="460" width="15" height="8" fill="#eab308"/><text x="40" y="467" text-anchor="end" fill="#1e293b">U0R (RX)</text>
  <line x1="45" y1="464" x2="10" y2="464" stroke="#eab308" stroke-width="2"/>
  <rect x="45" y="490" width="15" height="8" fill="#22c55e"/><text x="40" y="497" text-anchor="end" fill="#1e293b">U0T (TX)</text>
  <line x1="45" y1="494" x2="10" y2="494" stroke="#22c55e" stroke-width="2"/>
  <rect x="45" y="520" width="15" height="8" fill="#ef4444"/><text x="40" y="527" text-anchor="end" fill="#1e293b">IO0</text>
  <line x1="45" y1="524" x2="10" y2="524" stroke="#ef4444" stroke-width="2"/>
</g>

<!-- FTDI Adapter -->
<rect x="420" y="380" width="200" height="180" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
<text x="520" y="402" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">FTDI USB-Serial</text>
<text x="520" y="416" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">Programmer</text>
<text x="440" y="440" font-size="10" fill="#854d0e">5V → ESP32-CAM 5V</text>
<text x="440" y="455" font-size="10" fill="#854d0e">GND → ESP32-CAM GND</text>
<text x="440" y="470" font-size="10" fill="#854d0e">TX → ESP32-CAM U0R</text>
<text x="440" y="485" font-size="10" fill="#854d0e">RX → ESP32-CAM U0T</text>
<text x="440" y="505" font-size="10" fill="#991b1b" font-weight="bold">IO0 → GND</text>
<text x="440" y="519" font-size="9" fill="#991b1b">(upload mode only —</text>
<text x="440" y="531" font-size="9" fill="#991b1b">remove wire to run sketch)</text>

<!-- Camera module visual -->
<rect x="420" y="110" width="200" height="230" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="520" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">OV2640 Camera</text>
<text x="520" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Module (onboard)</text>
<rect x="480" y="165" width="80" height="60" rx="30" fill="#1e293b"/>
<circle cx="520" cy="195" r="22" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
<circle cx="520" cy="195" r="10" fill="#1e40af"/>
<text x="520" y="250" text-anchor="middle" font-size="9" fill="#1e40af">Pre-soldered ribbon —</text>
<text x="520" y="263" text-anchor="middle" font-size="9" fill="#1e40af">no manual wiring needed</text>
<text x="520" y="280" text-anchor="middle" font-size="9" fill="#1e40af">for GPIO 0,5,18,19,21,</text>
<text x="520" y="293" text-anchor="middle" font-size="9" fill="#1e40af">22,23,25,26,27,32,34,35,36,39</text>
<text x="520" y="315" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="bold">⚠ GPIO 0,5,18,19,21,22,23,25,26,27,32,34-36,39 reserved by camera</text>

<!-- Wires -->
<line x1="60" y1="404" x2="380" y2="404" stroke="#f97316" stroke-width="2"/>
<line x1="380" y1="404" x2="380" y2="425" stroke="#f97316" stroke-width="2"/>
<line x1="380" y1="425" x2="420" y2="425" stroke="#f97316" stroke-width="2"/>
<line x1="60" y1="434" x2="390" y2="434" stroke="#64748b" stroke-width="2"/>
<line x1="390" y1="434" x2="390" y2="440" stroke="#64748b" stroke-width="2"/>
<line x1="390" y1="440" x2="420" y2="440" stroke="#64748b" stroke-width="2"/>
<line x1="60" y1="464" x2="400" y2="464" stroke="#eab308" stroke-width="2"/>
<line x1="400" y1="464" x2="400" y2="455" stroke="#eab308" stroke-width="2"/>
<line x1="400" y1="455" x2="420" y2="455" stroke="#eab308" stroke-width="2"/>
<line x1="60" y1="494" x2="410" y2="494" stroke="#22c55e" stroke-width="2"/>
<line x1="410" y1="494" x2="410" y2="470" stroke="#22c55e" stroke-width="2"/>
<line x1="410" y1="470" x2="420" y2="470" stroke="#22c55e" stroke-width="2"/>
<line x1="60" y1="524" x2="370" y2="524" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<line x1="370" y1="524" x2="370" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<line x1="370" y1="500" x2="420" y2="500" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

<rect x="60" y="580" width="830" height="55" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
<text x="75" y="598" font-size="11" font-weight="bold" fill="#166534">✓ Verified against source: pins match esp32-cam-qr-scanner_beginner.ino exactly</text>
<text x="75" y="614" font-size="10" fill="#166534">PWDN=32, XCLK=0, SIOD=26, SIOC=27, VSYNC=25, HREF=23, PCLK=22, Y9-Y2=35,34,39,36,21,19,18,5 — standard AI-Thinker map.</text>
<text x="75" y="627" font-size="9" fill="#94a3b8">Dashed red = upload-mode-only wire (IO0→GND); disconnect after flashing so the sketch runs normally on reset.</text>
</svg>
