<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 CNC Controller — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-cnc-controller_beginner.ino</text>

<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="200" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="250" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="190" width="15" height="8" fill="#3b82f6"/><text x="330" y="197">GPIO14 (STEP)</text>
  <line x1="295" y1="194" x2="330" y2="194" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="220" width="15" height="8" fill="#a855f7"/><text x="330" y="227">GPIO27 (DIR)</text>
  <line x1="295" y1="224" x2="330" y2="224" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="250" width="15" height="8" fill="#ef4444"/><text x="330" y="257">GPIO26 (EN)</text>
  <line x1="295" y1="254" x2="330" y2="254" stroke="#ef4444" stroke-width="2"/>
</g>

<rect x="440" y="120" width="180" height="180" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">A4988 Driver</text>
<text x="460" y="165" font-size="10" fill="#1e40af">STEP → GPIO14</text>
<text x="460" y="180" font-size="10" fill="#1e40af">DIR → GPIO27</text>
<text x="460" y="195" font-size="10" fill="#1e40af">EN → GPIO26</text>
<text x="460" y="210" font-size="10" fill="#1e40af">VDD → 3.3V (logic)</text>
<text x="460" y="225" font-size="10" fill="#dc2626" font-weight="bold">VMOT → 12V (separate supply!)</text>
<text x="460" y="240" font-size="10" fill="#1e40af">MS1/MS2/MS3 → GND (full step)</text>
<text x="460" y="255" font-size="10" fill="#1e40af">GND ×2 → common GND</text>
<text x="460" y="272" font-size="9" fill="#dc2626">100µF cap across VMOT/GND — mandatory</text>

<!-- 12V supply -->
<rect x="440" y="320" width="120" height="60" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="500" y="345" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">12V 2A Supply</text>
<text x="500" y="360" text-anchor="middle" font-size="9" fill="#991b1b">Separate from ESP32 5V</text>

<!-- NEMA17 -->
<rect x="660" y="140" width="160" height="140" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<circle cx="740" cy="200" r="45" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
<circle cx="740" cy="200" r="15" fill="#7c3aed"/>
<text x="740" y="260" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">NEMA 17</text>
<text x="740" y="273" text-anchor="middle" font-size="9" fill="#5b21b6">200 steps/rev</text>

<line x1="280" y1="194" x2="440" y2="194" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="224" x2="440" y2="212" stroke="#a855f7" stroke-width="2"/>
<line x1="280" y1="254" x2="440" y2="230" stroke="#ef4444" stroke-width="2"/>
<line x1="280" y1="154" x2="410" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="154" x2="410" y2="245" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="245" x2="440" y2="245" stroke="#f59e0b" stroke-width="2"/>
<line x1="500" y1="320" x2="500" y2="260" stroke="#dc2626" stroke-width="2.5"/>
<line x1="500" y1="260" x2="440" y2="220" stroke="#dc2626" stroke-width="2.5"/>
<line x1="620" y1="200" x2="660" y2="200" stroke="#7c3aed" stroke-width="2.5"/>
<line x1="620" y1="220" x2="660" y2="220" stroke="#7c3aed" stroke-width="2"/>
<line x1="620" y1="240" x2="660" y2="240" stroke="#7c3aed" stroke-width="2"/>
<line x1="620" y1="260" x2="660" y2="260" stroke="#7c3aed" stroke-width="1.5"/>

<rect x="60" y="410" width="780" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="428" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V logic  ⬛ GND  🟦 STEP  🟪 DIR  🟥 EN (LOW=enabled)</text>
<text x="75" y="442" font-size="9" fill="#dc2626" font-weight="bold">Critical: 12V motor supply MUST be separate from ESP32 5V rail — shared supply risks ESP32 reset from back-EMF.</text>
<text x="75" y="456" font-size="9" fill="#94a3b8">Set A4988 current limit via trim pot (Vref = Imax × 8 × Rs) before connecting motor.</text>
</svg>
