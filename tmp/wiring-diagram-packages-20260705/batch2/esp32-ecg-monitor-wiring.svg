<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 ECG Monitor — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-ecg-monitor_beginner.ino</text>

<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="200" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="250" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="200" width="15" height="8" fill="#3b82f6"/><text x="330" y="207">GPIO34 (ADC1, OUTPUT)</text>
  <line x1="295" y1="204" x2="330" y2="204" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="230" width="15" height="8" fill="#a855f7"/><text x="330" y="237">GPIO32 (LO+)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="260" width="15" height="8" fill="#ec4899"/><text x="330" y="267">GPIO33 (LO-)</text>
  <line x1="295" y1="264" x2="330" y2="264" stroke="#ec4899" stroke-width="2"/>
</g>

<rect x="440" y="120" width="200" height="200" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="540" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">AD8232 ECG Module</text>
<text x="460" y="165" font-size="10" fill="#1e40af">OUTPUT → GPIO34</text>
<text x="460" y="180" font-size="10" fill="#1e40af">LO+ → GPIO32</text>
<text x="460" y="195" font-size="10" fill="#1e40af">LO- → GPIO33</text>
<text x="460" y="210" font-size="10" fill="#1e40af">3.3V / GND</text>
<text x="460" y="230" font-size="9" fill="#64748b">Two-pole HPF (0.5Hz) +</text>
<text x="460" y="243" font-size="9" fill="#64748b">LPF (40Hz) built in</text>

<!-- Electrode connector -->
<rect x="480" y="270" width="120" height="30" rx="4" fill="#374151"/>
<text x="540" y="290" text-anchor="middle" font-size="9" fill="white">3.5mm electrode jack</text>

<!-- Body diagram with 3 electrodes -->
<ellipse cx="740" cy="220" rx="70" ry="110" fill="#fce7f3" stroke="#be185d" stroke-width="1.5"/>
<circle cx="710" cy="150" r="8" fill="#ef4444"/><text x="640" y="145" font-size="9" fill="#991b1b">RA (right collarbone)</text>
<circle cx="770" cy="150" r="8" fill="#3b82f6"/><text x="800" y="145" font-size="9" fill="#1e40af">LA (left collarbone)</text>
<circle cx="770" cy="290" r="8" fill="#22c55e"/><text x="795" y="300" font-size="9" fill="#166534">RL (lower rib, ref)</text>

<line x1="280" y1="204" x2="500" y2="204" stroke="#3b82f6" stroke-width="2"/>
<line x1="500" y1="204" x2="500" y2="165" stroke="#3b82f6" stroke-width="2"/>
<line x1="500" y1="165" x2="440" y2="165" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="234" x2="470" y2="234" stroke="#a855f7" stroke-width="2"/>
<line x1="470" y1="234" x2="470" y2="180" stroke="#a855f7" stroke-width="2"/>
<line x1="470" y1="180" x2="440" y2="180" stroke="#a855f7" stroke-width="2"/>
<line x1="280" y1="264" x2="460" y2="264" stroke="#ec4899" stroke-width="2"/>
<line x1="460" y1="264" x2="460" y2="195" stroke="#ec4899" stroke-width="2"/>
<line x1="460" y1="195" x2="440" y2="195" stroke="#ec4899" stroke-width="2"/>
<line x1="280" y1="154" x2="420" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="420" y1="154" x2="420" y2="210" stroke="#f59e0b" stroke-width="2"/>
<line x1="420" y1="210" x2="440" y2="210" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="334" x2="430" y2="334" stroke="#64748b" stroke-width="2"/>
<line x1="430" y1="334" x2="430" y2="225" stroke="#64748b" stroke-width="2"/>
<line x1="430" y1="225" x2="440" y2="225" stroke="#64748b" stroke-width="2"/>
<line x1="600" y1="285" x2="710" y2="155" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
<line x1="600" y1="285" x2="770" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3,2"/>
<line x1="600" y1="285" x2="770" y2="285" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,2"/>

<rect x="60" y="400" width="780" height="60" rx="6" fill="#fef2f2" stroke="#dc2626"/>
<text x="75" y="418" font-size="11" font-weight="bold" fill="#991b1b">⚠ Educational Use Only</text>
<text x="75" y="434" font-size="10" fill="#78350f">This is a learning project, not a medical device. Do not use for diagnosis or health monitoring decisions.</text>
<text x="75" y="450" font-size="9" fill="#78350f">Legend: 🟦 ECG analog (GPIO34, ADC1) 🟪 LO+ 🟬 LO- 🟧 3.3V ⬛ GND — dashed lines show electrode body placement.</text>
</svg>
