<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="500" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Digital Piano — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-digital-piano_beginner.ino</text>

<rect x="60" y="90" width="220" height="340" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="240" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="290" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<g font-size="10" fill="#f1f5f9">
  <rect x="45" y="140" width="15" height="7" fill="#22c55e"/><text x="40" y="146" text-anchor="end" fill="#1e293b">GPIO4 (T0=C4)</text>
  <rect x="45" y="160" width="15" height="7" fill="#3b82f6"/><text x="40" y="166" text-anchor="end" fill="#1e293b">GPIO15 (T3=D4)</text>
  <rect x="45" y="180" width="15" height="7" fill="#a855f7"/><text x="40" y="186" text-anchor="end" fill="#1e293b">GPIO13 (T4=E4)</text>
  <rect x="45" y="200" width="15" height="7" fill="#eab308"/><text x="40" y="206" text-anchor="end" fill="#1e293b">GPIO12 (T5=F4)</text>
  <rect x="45" y="220" width="15" height="7" fill="#ef4444"/><text x="40" y="226" text-anchor="end" fill="#1e293b">GPIO14 (T6=G4)</text>
  <rect x="45" y="240" width="15" height="7" fill="#06b6d4"/><text x="40" y="246" text-anchor="end" fill="#1e293b">GPIO27 (T7=A4)</text>
  <rect x="45" y="260" width="15" height="7" fill="#f97316"/><text x="40" y="266" text-anchor="end" fill="#1e293b">GPIO33 (T8=B4)</text>
  <rect x="45" y="280" width="15" height="7" fill="#84cc16"/><text x="40" y="286" text-anchor="end" fill="#1e293b">GPIO32 (T9=C5)</text>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="320" width="15" height="8" fill="#ec4899"/><text x="330" y="327">GPIO25 (Buzzer)</text>
  <line x1="295" y1="324" x2="330" y2="324" stroke="#ec4899" stroke-width="2"/>
  <rect x="45" y="380" width="15" height="8" fill="#64748b"/><text x="40" y="387" text-anchor="end">GND</text>
  <line x1="45" y1="384" x2="10" y2="384" stroke="#64748b" stroke-width="2"/>
</g>

<!-- 8 copper touch pads -->
<g>
<rect x="380" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="402" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">C4</text>
<rect x="430" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="452" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">D4</text>
<rect x="480" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="502" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">E4</text>
<rect x="530" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="552" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">F4</text>
<rect x="580" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="602" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">G4</text>
<rect x="630" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="652" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">A4</text>
<rect x="680" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="702" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">B4</text>
<rect x="730" y="110" width="45" height="60" rx="4" fill="#fde68a" stroke="#92400e" stroke-width="1"/><text x="752" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#78350f">C5</text>
</g>
<text x="577" y="195" text-anchor="middle" font-size="9" fill="#78350f">Copper foil tape pads (~5×2cm) — capacitive touch keys</text>

<!-- Wires from GPIO to pads (colored matching) -->
<line x1="60" y1="143" x2="330" y2="143" stroke="#22c55e" stroke-width="1.5"/><line x1="330" y1="143" x2="402" y2="110" stroke="#22c55e" stroke-width="1.5"/>
<line x1="60" y1="163" x2="340" y2="163" stroke="#3b82f6" stroke-width="1.5"/><line x1="340" y1="163" x2="452" y2="110" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="60" y1="183" x2="350" y2="183" stroke="#a855f7" stroke-width="1.5"/><line x1="350" y1="183" x2="502" y2="110" stroke="#a855f7" stroke-width="1.5"/>
<line x1="60" y1="203" x2="360" y2="203" stroke="#eab308" stroke-width="1.5"/><line x1="360" y1="203" x2="552" y2="110" stroke="#eab308" stroke-width="1.5"/>
<line x1="60" y1="223" x2="370" y2="223" stroke="#ef4444" stroke-width="1.5"/><line x1="370" y1="223" x2="602" y2="110" stroke="#ef4444" stroke-width="1.5"/>
<line x1="60" y1="243" x2="380" y2="243" stroke="#06b6d4" stroke-width="1.5"/><line x1="380" y1="243" x2="652" y2="110" stroke="#06b6d4" stroke-width="1.5"/>
<line x1="60" y1="263" x2="390" y2="263" stroke="#f97316" stroke-width="1.5"/><line x1="390" y1="263" x2="702" y2="110" stroke="#f97316" stroke-width="1.5"/>
<line x1="60" y1="283" x2="400" y2="283" stroke="#84cc16" stroke-width="1.5"/><line x1="400" y1="283" x2="752" y2="110" stroke="#84cc16" stroke-width="1.5"/>

<!-- Buzzer -->
<rect x="500" y="280" width="60" height="45" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
<text x="530" y="306" text-anchor="middle" font-size="9" fill="#831843">Passive</text>
<text x="530" y="318" text-anchor="middle" font-size="9" fill="#831843">Buzzer</text>
<line x1="330" y1="324" x2="500" y2="303" stroke="#ec4899" stroke-width="2"/>
<line x1="280" y1="384" x2="530" y2="384" stroke="#64748b" stroke-width="2"/>
<line x1="530" y1="384" x2="530" y2="325" stroke="#64748b" stroke-width="2"/>

<rect x="60" y="440" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="458" font-size="10" fill="#334155" font-weight="bold">Legend: 8 touch pads T0/T3/T4/T5/T6/T7/T8/T9 (real ESP32 touch-GPIO map) + LEDC PWM buzzer output</text>
<text x="75" y="472" font-size="9" fill="#dc2626" font-weight="bold">Must use a PASSIVE buzzer — active buzzers have a built-in oscillator and will not respond to PWM frequency changes.</text>
</svg>
