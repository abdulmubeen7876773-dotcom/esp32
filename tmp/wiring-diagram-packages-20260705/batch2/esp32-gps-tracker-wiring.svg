<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="420" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 GPS Tracker — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-gps-tracker_beginner.ino</text>

<rect x="60" y="90" width="220" height="260" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="180" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="230" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="300" width="15" height="8" fill="#64748b"/><text x="40" y="307" text-anchor="end">GND</text>
  <line x1="45" y1="304" x2="10" y2="304" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="200" width="15" height="8" fill="#3b82f6"/><text x="330" y="207">GPIO16 (RX2 ← GPS TX)</text>
  <line x1="295" y1="204" x2="330" y2="204" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="230" width="15" height="8" fill="#a855f7"/><text x="330" y="237">GPIO17 (TX2 → GPS RX, optional)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#a855f7" stroke-width="2"/>
</g>

<rect x="480" y="140" width="200" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="580" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">NEO-6M GPS Module</text>
<text x="500" y="185" font-size="10" fill="#1e40af">TX → GPIO16 (ESP32 RX2)</text>
<text x="500" y="200" font-size="10" fill="#1e40af">RX → GPIO17 (ESP32 TX2)</text>
<text x="500" y="215" font-size="10" fill="#1e40af">VCC → 3.3V or 5V</text>
<text x="500" y="230" font-size="10" fill="#1e40af">GND</text>
<text x="500" y="250" font-size="9" fill="#64748b">Onboard regulator accepts both</text>
<text x="500" y="263" font-size="9" fill="#64748b">9600 baud NMEA 0183 output</text>

<!-- Antenna -->
<rect x="620" y="100" width="40" height="30" rx="4" fill="#374151"/>
<text x="640" y="119" text-anchor="middle" font-size="7" fill="white">ANT</text>
<line x1="640" y1="100" x2="640" y2="140" stroke="#374151" stroke-width="2"/>

<line x1="280" y1="204" x2="480" y2="185" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="234" x2="480" y2="200" stroke="#a855f7" stroke-width="2"/>
<line x1="280" y1="154" x2="440" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="154" x2="440" y2="215" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="215" x2="480" y2="215" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="304" x2="450" y2="304" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="304" x2="450" y2="230" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="230" x2="480" y2="230" stroke="#64748b" stroke-width="2"/>

<rect x="60" y="370" width="780" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="392" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V/5V power  ⬛ GND  🟦 UART2 RX (GPS TX)  🟪 UART2 TX (optional, GPS RX) — needs clear sky view for fix.</text>
</svg>
