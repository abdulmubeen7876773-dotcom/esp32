title: Contact | ESP32 Engine
meta_description: Contact ESP32 Engine for questions, feedback, or collaboration about our ESP32 tutorials.
body_html: |
  <h1>Contact</h1>
  <p>We welcome questions, feedback, tutorial corrections, and topic suggestions. For the fastest response, include the project page URL and a short description of your issue.</p>
  <h2>How to reach us</h2>
  <ul>
  <li><strong>Email:</strong> <a href="mailto:contact@esp32engine.com">contact@esp32engine.com</a> (general inquiries and AdSense or partnership questions)</li>
  <li><strong>GitHub Issues:</strong> <a href="https://github.com/abdulmubeen7876773-dotcom/esp32/issues" target="_blank" rel="noopener">Report bugs or suggest improvements</a></li>
  <li><strong>Repository:</strong> <a href="https://github.com/abdulmubeen7876773-dotcom/esp32" target="_blank" rel="noopener">View source on GitHub</a></li>
  </ul>
  <h2>Response time</h2>
  <p>We aim to respond within 2–5 business days. Tutorial corrections that affect wiring safety or code accuracy are prioritized.</p>
  <h2>What to include</h2>
  <ul>
  <li>Project name or URL</li>
  <li>ESP32 board model and sensor modules used</li>
  <li>Steps you already tried and any error messages</li>
  </ul>
