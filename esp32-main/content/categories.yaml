categories:
- name: AI Projects
  intro: On-device inference and TinyML experiments with ESP32 — audio, vision, and classification tutorials.
- name: Agriculture
  intro: Automate irrigation, soil monitoring, and greenhouse control with ESP32 sensor nodes and relay
    outputs.
- name: ESP32-CAM
  intro: Camera capture, streaming, and image server projects using ESP32-CAM modules and OTA updates.
- name: Education
  intro: Classroom-friendly trainer projects that teach GPIO, sensors, and displays in progressive difficulty
    stages.
- name: Energy Monitoring
  intro: Measure and log power draw with current sensors, displays, and optional cloud logging on ESP32.
- name: Environmental
  intro: Air quality, weather, and environmental monitoring builds with gas sensors, BME modules, and
    fans.
- name: Healthcare
  intro: Educational biosignal and wellness logging projects for learning — not for medical diagnosis
    or treatment.
- name: Home Automation
  intro: Build smart home projects — climate control, lighting, and appliance automation using ESP32 and
    common sensors.
- name: Industrial Automation
  intro: Machine monitoring, energy tracking, and status nodes for benches, workshops, and small facilities.
- name: IoT Projects
  intro: Connected ESP32 builds that publish sensor data to dashboards, APIs, and local web servers over
    Wi-Fi.
- name: LED Projects
  intro: RGB strips, patterns, and addressable LED control with ESP32 — from breadboard demos to Wi-Fi
    control.
- name: Robotics
  intro: Motor control, teleoperation, and sensor-assisted navigation projects powered by ESP32 microcontrollers.
- name: Security Projects
  intro: Motion detection, alerts, and access monitoring tutorials with PIR sensors, relays, and Wi-Fi
    notifications.
- name: Sensor Projects
  intro: Learn analog and digital sensing on ESP32 — distance, environmental, and signal processing project
    guides.
- name: Smart City
  intro: Street lighting, urban sensing, and infrastructure-style automation prototypes using ESP32.
