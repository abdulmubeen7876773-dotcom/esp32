backend:
  name: github
  repo: abdulmubeen7876773-dotcom/esp32
  branch: main
  squash_merges: true

local_backend: false

media_folder: uploads
public_folder: /uploads

site_url: https://esp32engine.com
display_url: https://esp32engine.com
logo_url: https://esp32engine.com/og-image.jpg

slug:
  encoding: unicode
  clean_accents: true

collections:
  - name: settings
    label: Site Settings
    files:
      - name: site
        label: Global Settings
        file: content/site.yaml
        fields:
          - { label: Site Name, name: site_name, widget: string }
          - { label: Organization Name, name: org_name, widget: string }
          - { label: Site Domain, name: site_domain, widget: string, hint: "Include https://" }
          - { label: GitHub URL, name: github_url, widget: string }
          - { label: Contact Issues URL, name: contact_issues_url, widget: string }
          - { label: GA4 Measurement ID, name: ga4_measurement_id, widget: string, required: false }
          - { label: Google Search Console Verification, name: gsc_verification, widget: string, required: false }
          - { label: Pinterest Verification, name: pinterest_verification, widget: string, required: false }
          - { label: IndexNow Key, name: indexnow_key, widget: string, required: false }
          - { label: CSS Cache Version, name: css_version, widget: string }
          - { label: Projects Per Page, name: projects_page_size, widget: number, min: 10, max: 100 }

  - name: home
    label: Homepage
    files:
      - name: home
        label: Homepage Hero & SEO
        file: content/home.yaml
        fields:
          - { label: Hero Eyebrow, name: hero_eyebrow, widget: string }
          - { label: Hero Title, name: hero_title, widget: string }
          - { label: Hero Subtitle, name: hero_sub, widget: text }
          - { label: Meta Title, name: meta_title, widget: string }
          - { label: Meta Description, name: meta_description, widget: text }

  - name: categories
    label: Categories
    files:
      - name: categories
        label: Category Intros
        file: content/categories.yaml
        fields:
          - label: Categories
            name: categories
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Intro, name: intro, widget: text }

  - name: projects
    label: Projects
    label_singular: Project
    folder: content/projects
    create: true
    slug: "{{slug}}"
    extension: yaml
    format: yaml
    identifier_field: title
    summary: "{{title}} — {{category}}"
    fields:
      - { label: Slug, name: slug, widget: string, hint: "URL slug, e.g. esp32-air-quality-monitor" }
      - { label: Title, name: title, widget: string }
      - label: Category
        name: category
        widget: select
        options:
          - Agriculture
          - Home Automation
          - Security Projects
          - IoT Projects
          - Sensor Projects
          - Robotics
          - Industrial Automation
          - LED Projects
          - ESP32-CAM
          - AI Projects
          - Energy Monitoring
          - Healthcare
          - Environmental
          - Smart City
          - Education
      - { label: Description, name: description, widget: text }
      - { label: Source Base, name: source_base, widget: string, required: false }
      - { label: Sensor, name: sensor, widget: string, required: false }
      - { label: Output, name: output, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Date Published, name: date_published, widget: datetime, date_format: YYYY-MM-DD, time_format: false }
      - { label: Date Modified, name: date_modified, widget: datetime, date_format: YYYY-MM-DD, time_format: false }

  - name: pages
    label: Static Pages
    label_singular: Page
    folder: content/pages
    create: true
    slug: "{{slug}}"
    extension: yaml
    format: yaml
    identifier_field: title
    summary: "{{title}}"
    fields:
      - { label: Slug, name: slug, widget: string }
      - label: Nav Highlight
        name: nav
        widget: select
        options:
          - { label: About section, value: about }
          - { label: Contact, value: contact }
          - { label: Home, value: home }
          - { label: Projects, value: projects }
      - { label: Title, name: title, widget: string }
      - { label: Meta Description, name: meta_description, widget: text }
      - { label: Body HTML, name: body_html, widget: code, default_language: html, height: 400 }
