<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Blink LED wiring  ESP32 GPIO 2 to resistor, LED, and GND</title>
  <desc id="desc">Breadboard wiring diagram  ESP32 GPIO 2 through a 220 ohm resistor to the LED long leg, LED short leg to GND</desc>

  <rect width="960" height="540" fill="#F5F5F7"/>

  <g id="labels-header">
    <text x="480" y="36" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#1D1D1F">Blink LED Wiring (Placeholder)</text>
    <text x="480" y="58" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" fill="#6E6E73">GPIO 2 ’ 220© resistor ’ LED (+) ’ LED () ’ GND</text>
  </g>

  <g id="esp32">
    <rect x="48" y="120" width="140" height="280" rx="10" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="118" y="108" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#1D1D1F">ESP32 DevKit</text>
    <rect x="68" y="150" width="100" height="220" rx="4" fill="#E8E8ED" stroke="#333333" stroke-width="1.5"/>
    <circle cx="88" cy="220" r="6" fill="#0071E3"/>
    <text x="102" y="224" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#0071E3">GPIO 2</text>
    <circle cx="88" cy="320" r="6" fill="#333333"/>
    <text x="102" y="324" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">GND</text>
    <rect x="98" y="380" width="40" height="12" rx="2" fill="#BBBBBB" stroke="#333333" stroke-width="1"/>
    <text x="118" y="410" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="11" fill="#6E6E73">USB</text>
  </g>

  <g id="breadboard">
    <rect x="520" y="150" width="360" height="220" rx="8" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
    <text x="700" y="138" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#1D1D1F">Breadboard</text>
    <line x1="540" y1="220" x2="860" y2="220" stroke="#D1D1D6" stroke-width="2" stroke-dasharray="6 4"/>
    <rect x="560" y="180" width="320" height="18" rx="2" fill="#E8E8ED"/>
    <rect x="560" y="322" width="320" height="18" rx="2" fill="#E8E8ED"/>
  </g>

  <g id="resistor">
    <path d="M 430 210 L 450 210 L 460 198 L 470 222 L 480 198 L 490 222 L 500 198 L 510 210 L 530 210" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="480" y="188" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">220© resistor</text>
  </g>

  <g id="led">
    <polygon points="620,250 650,235 650,265" fill="#FFD60A" stroke="#333333" stroke-width="2"/>
    <rect x="650" y="242" width="28" height="16" rx="3" fill="#FFF9E6" stroke="#333333" stroke-width="2"/>
    <line x1="678" y1="246" x2="678" y2="258" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="678" y1="254" x2="678" y2="290" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
    <text x="640" y="312" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1D1D1F">LED long leg (+)</text>
    <line x1="710" y1="250" x2="710" y2="290" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
    <text x="740" y="312" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1D1D1F">LED short leg ()</text>
  </g>

  <g id="wire-signal">
    <path d="M 188 220 C 260 220, 320 210, 430 210" fill="none" stroke="#E6B800" stroke-width="4" stroke-linecap="round"/>
    <path d="M 530 210 L 600 240" fill="none" stroke="#E6B800" stroke-width="4" stroke-linecap="round"/>
    <text x="300" y="198" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#9A7600">Yellow signal wire</text>
  </g>

  <g id="wire-gnd">
    <path d="M 710 290 C 710 360, 420 360, 188 320" fill="none" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>
    <text x="430" y="382" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#1A1A1A">Black ground wire</text>
    <text x="160" y="348" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#1D1D1F">GND</text>
  </g>
</svg>
