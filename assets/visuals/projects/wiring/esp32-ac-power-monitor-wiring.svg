<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="460" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 AC Power Monitor — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-ac-power-monitor_beginner.ino</text>

<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="200" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="250" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="230" width="15" height="8" fill="#3b82f6"/><text x="330" y="237">GPIO34 (ADC1)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#3b82f6" stroke-width="2"/>
</g>

<!-- Voltage divider -->
<rect x="420" y="150" width="14" height="35" fill="#d97706"/>
<text x="445" y="172" font-size="9" fill="#92400e">10kΩ</text>
<rect x="420" y="200" width="14" height="35" fill="#d97706"/>
<text x="445" y="222" font-size="9" fill="#92400e">10kΩ</text>
<text x="400" y="145" font-size="9" fill="#334155" text-anchor="middle">3.3V rail</text>
<line x1="427" y1="150" x2="427" y2="140" stroke="#f59e0b" stroke-width="2"/>
<line x1="427" y1="235" x2="427" y2="250" stroke="#64748b" stroke-width="2"/>
<text x="400" y="262" font-size="9" fill="#334155" text-anchor="middle">GND</text>

<!-- AC coupling cap -->
<rect x="460" y="185" width="24" height="14" rx="2" fill="#6366f1"/>
<text x="472" y="215" font-size="9" fill="#4338ca" text-anchor="middle">10µF</text>

<!-- SCT-013 clamp -->
<rect x="560" y="130" width="180" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="650" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">SCT-013-030</text>
<text x="650" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Current Transformer</text>
<circle cx="650" cy="200" r="22" fill="none" stroke="#1e40af" stroke-width="3"/>
<line x1="650" y1="178" x2="650" y2="222" stroke="#dc2626" stroke-width="3"/>
<text x="650" y="228" font-size="8" fill="#dc2626" text-anchor="middle">mains live wire</text>
<text x="580" y="145" font-size="9" fill="#1e40af"></text>

<!-- Jack -->
<rect x="490" y="192" width="30" height="16" rx="3" fill="#374151"/>
<text x="505" y="203" font-size="7" fill="white" text-anchor="middle">3.5mm</text>

<!-- Wires -->
<line x1="280" y1="234" x2="427" y2="234" stroke="#3b82f6" stroke-width="2"/>
<line x1="427" y1="234" x2="427" y2="199" stroke="#3b82f6" stroke-width="2"/>
<line x1="427" y1="199" x2="460" y2="199" stroke="#3b82f6" stroke-width="2"/>
<line x1="484" y1="199" x2="490" y2="199" stroke="#3b82f6" stroke-width="2"/>
<line x1="520" y1="200" x2="560" y2="200" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="334" x2="505" y2="334" stroke="#64748b" stroke-width="2"/>
<line x1="505" y1="334" x2="505" y2="208" stroke="#64748b" stroke-width="2"/>
<line x1="505" y1="208" x2="520" y2="208" stroke="#64748b" stroke-width="2"/>
<line x1="520" y1="208" x2="560" y2="220" stroke="#64748b" stroke-width="1.5"/>

<rect x="60" y="400" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="418" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V bias rail  ⬛ GND  🟦 GPIO34 analog input (AC-coupled + biased to 1.65V midpoint)</text>
<text x="75" y="432" font-size="9" fill="#94a3b8">Safety: SCT-013 clamp is non-invasive (never opens the live wire) — safe for beginners around mains wiring.</text>
</svg>
