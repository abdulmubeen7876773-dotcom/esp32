<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="400" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 MQTT Sensor Dashboard — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-mqtt-sensor-dashboard_beginner.ino</text>

<rect x="80" y="100" width="240" height="220" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="200" y="125" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="130" y="180" width="140" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="200" y="230" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<text x="200" y="250" text-anchor="middle" font-size="9" fill="#3b82f6">📡 Wi-Fi → MQTT Broker</text>

<g font-size="11" fill="#1e293b">
  <rect x="65" y="150" width="15" height="8" fill="#f59e0b"/><text x="60" y="157" text-anchor="end">3.3V</text>
  <line x1="65" y1="154" x2="30" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="65" y="290" width="15" height="8" fill="#64748b"/><text x="60" y="297" text-anchor="end">GND</text>
  <line x1="65" y1="294" x2="30" y2="294" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="320" y="200" width="15" height="8" fill="#3b82f6"/><text x="360" y="207">GPIO4 (DATA)</text>
  <line x1="335" y1="204" x2="360" y2="204" stroke="#3b82f6" stroke-width="2"/>
</g>

<rect x="480" y="130" width="200" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="580" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">DHT22</text>
<text x="580" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Temperature &amp; Humidity</text>
<text x="500" y="188" font-size="10" fill="#1e40af">VCC → 3.3V</text>
<text x="500" y="201" font-size="10" fill="#1e40af">DATA → GPIO4 (10kΩ pull-up to 3.3V)</text>
<text x="500" y="214" font-size="10" fill="#1e40af">GND</text>

<!-- pull-up resistor -->
<rect x="420" y="160" width="14" height="35" fill="#d97706"/>
<text x="440" y="182" font-size="9" fill="#92400e">10kΩ pull-up</text>

<line x1="360" y1="204" x2="480" y2="204" stroke="#3b82f6" stroke-width="2"/>
<line x1="427" y1="160" x2="427" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="320" y1="154" x2="427" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="427" y1="154" x2="500" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="500" y1="154" x2="500" y2="188" stroke="#f59e0b" stroke-width="2"/>
<line x1="320" y1="294" x2="450" y2="294" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="294" x2="450" y2="214" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="214" x2="480" y2="214" stroke="#64748b" stroke-width="2"/>

<rect x="80" y="340" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="95" y="358" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V  ⬛ GND  🟦 DHT22 single-wire data (needs 10kΩ pull-up to 3.3V)</text>
<text x="95" y="372" font-size="9" fill="#94a3b8">This beginner stage has no physical output pin — readings publish over Wi-Fi/MQTT to a broker, viewed in Node-RED.</text>
</svg>
