<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32-CAM Face Detection — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-cam-face-detection_beginner.ino — AI-Thinker OV2640 pin map (verified)</text>

<rect x="60" y="90" width="240" height="340" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="180" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32-CAM (AI-Thinker)</text>
<rect x="95" y="220" width="170" height="100" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="180" y="275" text-anchor="middle" font-size="10" fill="#475569">ESP32-S / OV2640</text>
<g font-size="10" fill="#dbeafe">
<text x="75" y="150" font-weight="bold" fill="#60a5fa">Camera Interface (internal ribbon):</text>
<text x="75" y="165">PWDN=32 XCLK=0 SIOD=26 SIOC=27</text>
<text x="75" y="178">VSYNC=25 HREF=23 PCLK=22</text>
<text x="75" y="191">Y9-Y2 = 35,34,39,36,21,19,18,5</text>
</g>

<g font-size="11" fill="#f1f5f9">
  <rect x="45" y="340" width="15" height="8" fill="#f97316"/><text x="40" y="347" text-anchor="end" fill="#1e293b">5V</text>
  <line x1="45" y1="344" x2="10" y2="344" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="365" width="15" height="8" fill="#64748b"/><text x="40" y="372" text-anchor="end" fill="#1e293b">GND</text>
  <line x1="45" y1="369" x2="10" y2="369" stroke="#64748b" stroke-width="2"/>
  <rect x="45" y="390" width="15" height="8" fill="#eab308"/><text x="40" y="397" text-anchor="end" fill="#1e293b">U0R</text>
  <line x1="45" y1="394" x2="10" y2="394" stroke="#eab308" stroke-width="2"/>
  <rect x="45" y="410" width="15" height="8" fill="#22c55e"/><text x="40" y="417" text-anchor="end" fill="#1e293b">U0T</text>
  <line x1="45" y1="414" x2="10" y2="414" stroke="#22c55e" stroke-width="2"/>
</g>

<rect x="380" y="330" width="200" height="120" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
<text x="480" y="352" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">FTDI USB-Serial</text>
<text x="400" y="374" font-size="10" fill="#854d0e">5V → 5V   GND → GND</text>
<text x="400" y="389" font-size="10" fill="#854d0e">TX → U0R   RX → U0T</text>
<text x="400" y="410" font-size="10" fill="#991b1b" font-weight="bold">IO0 → GND (upload only)</text>
<text x="400" y="425" font-size="9" fill="#991b1b">Remove after flashing to run normally</text>

<rect x="380" y="110" width="200" height="200" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="480" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">OV2640 Camera (onboard)</text>
<rect x="440" y="150" width="80" height="60" rx="30" fill="#1e293b"/>
<circle cx="480" cy="180" r="22" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
<circle cx="480" cy="180" r="10" fill="#1e40af"/>
<text x="480" y="240" text-anchor="middle" font-size="9" fill="#1e40af">Streams to /stream (port 81)</text>
<text x="480" y="255" text-anchor="middle" font-size="9" fill="#1e40af">MTMN face detection runs on-chip</text>
<circle cx="520" cy="280" r="7" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
<text x="480" y="290" text-anchor="middle" font-size="8" fill="#64748b">Flash LED GPIO4 (web-toggle)</text>

<line x1="60" y1="344" x2="340" y2="344" stroke="#f97316" stroke-width="2"/>
<line x1="340" y1="344" x2="340" y2="365" stroke="#f97316" stroke-width="2"/>
<line x1="340" y1="365" x2="380" y2="365" stroke="#f97316" stroke-width="2"/>
<line x1="60" y1="369" x2="350" y2="369" stroke="#64748b" stroke-width="2"/>
<line x1="350" y1="369" x2="350" y2="380" stroke="#64748b" stroke-width="2"/>
<line x1="350" y1="380" x2="380" y2="380" stroke="#64748b" stroke-width="2"/>
<line x1="60" y1="394" x2="360" y2="394" stroke="#eab308" stroke-width="2"/>
<line x1="360" y1="394" x2="360" y2="395" stroke="#eab308" stroke-width="2"/>
<line x1="360" y1="395" x2="380" y2="395" stroke="#eab308" stroke-width="2"/>
<line x1="60" y1="414" x2="370" y2="414" stroke="#22c55e" stroke-width="2"/>
<line x1="370" y1="414" x2="370" y2="410" stroke="#22c55e" stroke-width="2"/>
<line x1="370" y1="410" x2="380" y2="410" stroke="#22c55e" stroke-width="2"/>

<rect x="60" y="460" width="0" height="0"/>
<text x="450" y="465" text-anchor="middle" font-size="9" fill="#94a3b8">Verified: pin map matches standard AI-Thinker layout. Requires dedicated 5V/2A supply — FTDI 3.3V insufficient for streaming.</text>
</svg>
