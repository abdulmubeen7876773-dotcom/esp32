<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 LoRa Remote Sensor Node — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage (Transmitter) — Heltec WiFi LoRa 32 V2 pinout — Source: esp32-lora-remote-sensor-node_beginner.ino</text>
<rect x="60" y="90" width="220" height="330" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="12" fill="#4ade80" font-weight="bold">Heltec LoRa32 V2 (ESP32)</text>
<rect x="110" y="220" width="120" height="100" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="275" text-anchor="middle" font-size="10" fill="#475569">ESP32 + SX1276</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="340" width="15" height="8" fill="#64748b"/><text x="40" y="347" text-anchor="end">GND</text>
  <line x1="45" y1="344" x2="10" y2="344" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="10" fill="#1e293b">
  <rect x="280" y="180" width="15" height="8" fill="#3b82f6"/><text x="330" y="187">GPIO5 (SCK)</text>
  <rect x="280" y="200" width="15" height="8" fill="#06b6d4"/><text x="330" y="207">GPIO19 (MISO)</text>
  <rect x="280" y="220" width="15" height="8" fill="#84cc16"/><text x="330" y="227">GPIO27 (MOSI)</text>
  <rect x="280" y="240" width="15" height="8" fill="#eab308"/><text x="330" y="247">GPIO18 (NSS/SS)</text>
  <rect x="280" y="260" width="15" height="8" fill="#ec4899"/><text x="330" y="267">GPIO14 (RST)</text>
  <rect x="280" y="280" width="15" height="8" fill="#a855f7"/><text x="330" y="287">GPIO26 (DIO0)</text>
  <rect x="280" y="300" width="15" height="8" fill="#ef4444"/><text x="330" y="307">GPIO4 (DHT22 DATA)</text>
</g>
<rect x="480" y="120" width="200" height="220" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="580" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">SX1276 LoRa Radio</text>
<text x="500" y="165" font-size="9" fill="#1e40af">SCK=5 MISO=19 MOSI=27</text>
<text x="500" y="178" font-size="9" fill="#1e40af">NSS=18 RST=14 DIO0=26</text>
<rect x="500" y="195" width="160" height="80" rx="8" fill="#1e293b"/>
<line x1="580" y1="195" x2="580" y2="150" stroke="#374151" stroke-width="3"/>
<text x="580" y="240" text-anchor="middle" font-size="9" fill="#dbeafe">868/915MHz Antenna</text>
<text x="500" y="295" font-size="9" fill="#1e40af">↓ mandatory before TX or RF stage may be damaged</text>
<rect x="480" y="355" width="200" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="580" y="377" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">DHT22 Sensor</text>
<text x="500" y="395" font-size="9" fill="#991b1b">DATA → GPIO4 (10k pull-up), 3.3V, GND</text>
<line x1="330" y1="184" x2="480" y2="165" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="330" y1="204" x2="480" y2="172" stroke="#06b6d4" stroke-width="1.5"/>
<line x1="330" y1="224" x2="480" y2="179" stroke="#84cc16" stroke-width="1.5"/>
<line x1="330" y1="244" x2="480" y2="186" stroke="#eab308" stroke-width="1.5"/>
<line x1="330" y1="264" x2="480" y2="193" stroke="#ec4899" stroke-width="1.5"/>
<line x1="330" y1="284" x2="480" y2="200" stroke="#a855f7" stroke-width="1.5"/>
<line x1="330" y1="304" x2="480" y2="385" stroke="#ef4444" stroke-width="1.5"/>
<line x1="280" y1="154" x2="440" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="154" x2="440" y2="395" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="395" x2="480" y2="395" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="344" x2="450" y2="344" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="344" x2="450" y2="405" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="405" x2="480" y2="405" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="440" width="0" height="0"/>
<text x="450" y="445" text-anchor="middle" font-size="9" fill="#94a3b8">Verified: exact Heltec WiFi LoRa 32 V2 pin map — SX1276 is onboard, no manual SPI wiring needed on this board.</text>
</svg>
