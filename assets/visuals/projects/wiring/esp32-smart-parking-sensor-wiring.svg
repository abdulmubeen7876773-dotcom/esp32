<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="460" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Smart Parking Sensor — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-smart-parking-sensor_beginner.ino</text>

<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="200" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="250" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f97316"/><text x="40" y="157" text-anchor="end">Vin (5V)</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="180" width="15" height="8" fill="#3b82f6"/><text x="330" y="187">GPIO5 (TRIG)</text>
  <line x1="295" y1="184" x2="330" y2="184" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="215" width="15" height="8" fill="#a855f7"/><text x="330" y="222">GPIO18 (ECHO, via divider)</text>
  <line x1="295" y1="219" x2="330" y2="219" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="270" width="15" height="8" fill="#22c55e"/><text x="330" y="277">GPIO25</text>
  <line x1="295" y1="274" x2="330" y2="274" stroke="#22c55e" stroke-width="2"/>
  <rect x="280" y="310" width="15" height="8" fill="#ef4444"/><text x="330" y="317">GPIO26</text>
  <line x1="295" y1="314" x2="330" y2="314" stroke="#ef4444" stroke-width="2"/>
</g>

<!-- HC-SR04 -->
<rect x="440" y="120" width="180" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">HC-SR04</text>
<text x="530" y="154" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Ultrasonic Sensor</text>
<text x="460" y="175" font-size="10" fill="#1e40af">VCC → 5V (Vin)</text>
<text x="460" y="188" font-size="10" fill="#1e40af">TRIG → GPIO5</text>
<text x="460" y="201" font-size="10" fill="#1e40af">ECHO → 10kΩ/20kΩ divider → GPIO18</text>
<text x="460" y="214" font-size="10" fill="#1e40af">GND</text>

<!-- Voltage divider box -->
<rect x="640" y="200" width="120" height="60" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
<text x="700" y="218" text-anchor="middle" font-size="9" fill="#5b21b6">Voltage Divider</text>
<text x="700" y="232" text-anchor="middle" font-size="9" fill="#5b21b6">10kΩ + 20kΩ</text>
<text x="700" y="246" text-anchor="middle" font-size="8" fill="#5b21b6">5V ECHO → ~3.3V</text>

<!-- LEDs -->
<circle cx="490" cy="280" r="14" fill="#22c55e"/>
<text x="520" y="285" font-size="11" fill="#166534">Green LED — Bay FREE (220Ω to GND)</text>
<circle cx="490" cy="325" r="14" fill="#ef4444"/>
<text x="520" y="330" font-size="11" fill="#991b1b">Red LED — Bay OCCUPIED (220Ω to GND)</text>

<!-- Wires -->
<line x1="330" y1="184" x2="440" y2="184" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="219" x2="640" y2="219" stroke="#a855f7" stroke-width="2"/>
<line x1="640" y1="219" x2="620" y2="219" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="274" x2="476" y2="274" stroke="#22c55e" stroke-width="2"/>
<line x1="476" y1="274" x2="476" y2="280" stroke="#22c55e" stroke-width="2"/>
<line x1="330" y1="314" x2="476" y2="314" stroke="#ef4444" stroke-width="2"/>
<line x1="476" y1="314" x2="476" y2="325" stroke="#ef4444" stroke-width="2"/>
<line x1="280" y1="154" x2="400" y2="154" stroke="#f97316" stroke-width="2"/>
<line x1="400" y1="154" x2="400" y2="175" stroke="#f97316" stroke-width="2"/>
<line x1="400" y1="175" x2="440" y2="175" stroke="#f97316" stroke-width="2"/>
<line x1="280" y1="334" x2="405" y2="334" stroke="#64748b" stroke-width="2"/>
<line x1="405" y1="334" x2="405" y2="214" stroke="#64748b" stroke-width="2"/>
<line x1="405" y1="214" x2="440" y2="214" stroke="#64748b" stroke-width="2"/>

<rect x="60" y="400" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="418" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 5V (Vin)  ⬛ GND  🟦 TRIG (3.3V output OK)  🟪 ECHO via divider (5V→3.3V)  🟩 Free LED  🟥 Occupied LED</text>
<text x="75" y="432" font-size="9" fill="#94a3b8">Critical: HC-SR04 ECHO outputs 5V — the 10k/20k divider is mandatory to protect the ESP32 GPIO18 input (3.3V max).</text>
</svg>
