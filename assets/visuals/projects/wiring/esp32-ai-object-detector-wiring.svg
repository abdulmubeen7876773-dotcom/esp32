<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 560" font-family="Arial, Helvetica, sans-serif">
<rect width="950" height="560" fill="#ffffff"/>
<text x="475" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 AI Object Detector — Wiring Diagram</text>
<text x="475" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-ai-object-detector_beginner.ino — AI-Thinker OV2640 pin map (verified)</text>

<rect x="60" y="90" width="260" height="420" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="190" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32-CAM (AI-Thinker)</text>
<rect x="100" y="250" width="180" height="110" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="190" y="310" text-anchor="middle" font-size="10" fill="#475569">ESP32-S / OV2640</text>

<g font-size="10" fill="#dbeafe">
<text x="80" y="150" font-weight="bold" fill="#60a5fa">Camera Interface (internal ribbon):</text>
<text x="80" y="165">PWDN=32 XCLK=0 SIOD=26 SIOC=27</text>
<text x="80" y="178">VSYNC=25 HREF=23 PCLK=22</text>
<text x="80" y="191">Y9-Y2 = 35,34,39,36,21,19,18,5</text>
</g>

<g font-size="11" fill="#f1f5f9">
  <rect x="45" y="380" width="15" height="8" fill="#f97316"/><text x="40" y="387" text-anchor="end" fill="#1e293b">5V</text>
  <line x1="45" y1="384" x2="10" y2="384" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="410" width="15" height="8" fill="#64748b"/><text x="40" y="417" text-anchor="end" fill="#1e293b">GND</text>
  <line x1="45" y1="414" x2="10" y2="414" stroke="#64748b" stroke-width="2"/>
  <rect x="45" y="440" width="15" height="8" fill="#eab308"/><text x="40" y="447" text-anchor="end" fill="#1e293b">U0R (RX)</text>
  <line x1="45" y1="444" x2="10" y2="444" stroke="#eab308" stroke-width="2"/>
  <rect x="45" y="470" width="15" height="8" fill="#22c55e"/><text x="40" y="477" text-anchor="end" fill="#1e293b">U0T (TX)</text>
  <line x1="45" y1="474" x2="10" y2="474" stroke="#22c55e" stroke-width="2"/>
</g>
<g font-size="11" fill="#f1f5f9">
  <rect x="280" y="280" width="15" height="8" fill="#ef4444"/><text x="330" y="287" fill="#1e293b">GPIO33 (Red LED, onboard)</text>
  <line x1="295" y1="284" x2="330" y2="284" stroke="#ef4444" stroke-width="2"/>
</g>

<!-- FTDI -->
<rect x="480" y="360" width="200" height="150" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
<text x="580" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#854d0e">FTDI USB-Serial</text>
<text x="500" y="404" font-size="10" fill="#854d0e">5V → ESP32-CAM 5V</text>
<text x="500" y="419" font-size="10" fill="#854d0e">GND → ESP32-CAM GND</text>
<text x="500" y="434" font-size="10" fill="#854d0e">TX → ESP32-CAM U0R</text>
<text x="500" y="449" font-size="10" fill="#854d0e">RX → ESP32-CAM U0T</text>
<text x="500" y="469" font-size="10" fill="#991b1b" font-weight="bold">IO0 → GND (upload mode only)</text>

<!-- Camera visual -->
<rect x="480" y="110" width="200" height="220" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="580" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">OV2640 Camera (onboard)</text>
<rect x="540" y="150" width="80" height="60" rx="30" fill="#1e293b"/>
<circle cx="580" cy="180" r="22" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
<circle cx="580" cy="180" r="10" fill="#1e40af"/>
<text x="580" y="240" text-anchor="middle" font-size="9" fill="#1e40af">Pre-soldered ribbon —</text>
<text x="580" y="253" text-anchor="middle" font-size="9" fill="#1e40af">no manual wiring needed</text>
<circle cx="620" cy="280" r="8" fill="#ef4444" opacity="0.8"/>
<text x="600" y="305" text-anchor="middle" font-size="9" fill="#991b1b">Onboard Red LED — GPIO33</text>
<text x="600" y="318" text-anchor="middle" font-size="8" fill="#991b1b">(detection indicator, no wiring needed)</text>

<line x1="60" y1="384" x2="440" y2="384" stroke="#f97316" stroke-width="2"/>
<line x1="440" y1="384" x2="440" y2="405" stroke="#f97316" stroke-width="2"/>
<line x1="440" y1="405" x2="480" y2="405" stroke="#f97316" stroke-width="2"/>
<line x1="60" y1="414" x2="450" y2="414" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="414" x2="450" y2="420" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="420" x2="480" y2="420" stroke="#64748b" stroke-width="2"/>
<line x1="60" y1="444" x2="460" y2="444" stroke="#eab308" stroke-width="2"/>
<line x1="460" y1="444" x2="460" y2="435" stroke="#eab308" stroke-width="2"/>
<line x1="460" y1="435" x2="480" y2="435" stroke="#eab308" stroke-width="2"/>
<line x1="60" y1="474" x2="470" y2="474" stroke="#22c55e" stroke-width="2"/>
<line x1="470" y1="474" x2="470" y2="450" stroke="#22c55e" stroke-width="2"/>
<line x1="470" y1="450" x2="480" y2="450" stroke="#22c55e" stroke-width="2"/>

<rect x="60" y="520" width="830" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
<text x="75" y="539" font-size="10" font-weight="bold" fill="#166534">✓ Verified: pin map exactly matches standard AI-Thinker ESP32-CAM. Red LED GPIO33 is onboard — no external wiring.</text>
</svg>
