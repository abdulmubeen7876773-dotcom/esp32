<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="460" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Water Leak Detector — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-water-leak-detector_beginner.ino</text>

<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="200" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="250" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="180" width="15" height="8" fill="#3b82f6"/><text x="330" y="187">GPIO34 (AOUT, ADC1)</text>
  <line x1="295" y1="184" x2="330" y2="184" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="215" width="15" height="8" fill="#06b6d4"/><text x="330" y="222">GPIO35 (DOUT)</text>
  <line x1="295" y1="219" x2="330" y2="219" stroke="#06b6d4" stroke-width="2"/>
  <rect x="280" y="255" width="15" height="8" fill="#a855f7"/><text x="330" y="262">GPIO25 (Buzzer)</text>
  <line x1="295" y1="259" x2="330" y2="259" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="290" width="15" height="8" fill="#ef4444"/><text x="330" y="297">GPIO26 (Red LED)</text>
  <line x1="295" y1="294" x2="330" y2="294" stroke="#ef4444" stroke-width="2"/>
  <rect x="280" y="325" width="15" height="8" fill="#22c55e"/><text x="330" y="332">GPIO27 (Green LED)</text>
  <line x1="295" y1="329" x2="330" y2="329" stroke="#22c55e" stroke-width="2"/>
</g>

<rect x="470" y="120" width="180" height="110" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="560" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Resistive Water</text>
<text x="560" y="154" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Sensor Strip</text>
<text x="490" y="175" font-size="10" fill="#1e40af">VCC → 3.3V</text>
<text x="490" y="188" font-size="10" fill="#1e40af">AOUT → GPIO34</text>
<text x="490" y="201" font-size="10" fill="#1e40af">DOUT → GPIO35</text>
<text x="490" y="214" font-size="10" fill="#1e40af">GND</text>

<rect x="470" y="245" width="60" height="40" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.2"/>
<text x="500" y="269" text-anchor="middle" font-size="9" fill="#5b21b6">BUZ</text>
<text x="540" y="270" font-size="10" fill="#5b21b6">Active Buzzer 5V (other leg → GND)</text>

<circle cx="500" cy="310" r="12" fill="#ef4444"/>
<text x="530" y="315" font-size="11" fill="#991b1b">Red LED — LEAK! (220Ω to GND)</text>
<circle cx="500" cy="345" r="12" fill="#22c55e"/>
<text x="530" y="350" font-size="11" fill="#166534">Green LED — Normal (220Ω to GND)</text>

<line x1="330" y1="184" x2="450" y2="184" stroke="#3b82f6" stroke-width="2"/>
<line x1="450" y1="184" x2="450" y2="188" stroke="#3b82f6" stroke-width="2"/>
<line x1="450" y1="188" x2="470" y2="188" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="219" x2="440" y2="219" stroke="#06b6d4" stroke-width="2"/>
<line x1="440" y1="219" x2="440" y2="201" stroke="#06b6d4" stroke-width="2"/>
<line x1="440" y1="201" x2="470" y2="201" stroke="#06b6d4" stroke-width="2"/>
<line x1="330" y1="259" x2="500" y2="259" stroke="#a855f7" stroke-width="2"/>
<line x1="500" y1="259" x2="500" y2="265" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="294" x2="486" y2="294" stroke="#ef4444" stroke-width="2"/>
<line x1="486" y1="294" x2="486" y2="310" stroke="#ef4444" stroke-width="2"/>
<line x1="330" y1="329" x2="486" y2="329" stroke="#22c55e" stroke-width="2"/>
<line x1="486" y1="329" x2="486" y2="345" stroke="#22c55e" stroke-width="2"/>
<line x1="280" y1="154" x2="410" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="154" x2="410" y2="175" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="175" x2="470" y2="175" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="334" x2="425" y2="334" stroke="#64748b" stroke-width="2"/>
<line x1="425" y1="334" x2="425" y2="214" stroke="#64748b" stroke-width="2"/>
<line x1="425" y1="214" x2="470" y2="214" stroke="#64748b" stroke-width="2"/>

<rect x="60" y="400" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="418" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V  ⬛ GND  🟦 AOUT analog  🟦(cyan) DOUT digital  🟪 Buzzer  🟥 Red LED  🟩 Green LED</text>
<text x="75" y="432" font-size="9" fill="#94a3b8">Corrosion tip: power the sensor only while reading (GPIO-switched VCC) to extend copper track life — see project notes.</text>
</svg>
