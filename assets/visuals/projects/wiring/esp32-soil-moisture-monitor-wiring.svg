<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Arial, Helvetica, sans-serif">
<defs>
  <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3"><circle cx="3" cy="3" r="2.5" fill="#0f172a"/></marker>
</defs>
<rect width="900" height="560" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Soil Moisture Monitor — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-soil-moisture-monitor_beginner.ino</text>

<!-- ESP32 Board -->
<rect x="60" y="90" width="220" height="380" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="230" width="120" height="100" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="285" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<!-- Left pins -->
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>

  <rect x="45" y="180" width="15" height="8" fill="#64748b"/><text x="40" y="187" text-anchor="end">GND</text>
  <line x1="45" y1="184" x2="10" y2="184" stroke="#64748b" stroke-width="2"/>

  <rect x="45" y="360" width="15" height="8" fill="#3b82f6"/><text x="40" y="367" text-anchor="end">GPIO34</text>
  <line x1="45" y1="364" x2="10" y2="364" stroke="#3b82f6" stroke-width="2"/>

  <rect x="45" y="390" width="15" height="8" fill="#22c55e"/><text x="40" y="397" text-anchor="end">GPIO25</text>
  <line x1="45" y1="394" x2="10" y2="394" stroke="#22c55e" stroke-width="2"/>

  <rect x="45" y="420" width="15" height="8" fill="#eab308"/><text x="40" y="427" text-anchor="end">GPIO26</text>
  <line x1="45" y1="424" x2="10" y2="424" stroke="#eab308" stroke-width="2"/>

  <rect x="45" y="450" width="15" height="8" fill="#ef4444"/><text x="40" y="457" text-anchor="end">GPIO27</text>
  <line x1="45" y1="454" x2="10" y2="454" stroke="#ef4444" stroke-width="2"/>
</g>

<!-- Right pin -->
<g font-size="11" fill="#1e293b">
  <rect x="280" y="360" width="15" height="8" fill="#a855f7"/><text x="330" y="367">GPIO32</text>
  <line x1="295" y1="364" x2="330" y2="364" stroke="#a855f7" stroke-width="2"/>
</g>

<!-- Capacitive Soil Sensor Module -->
<rect x="380" y="130" width="180" height="90" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="470" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Capacitive Soil</text>
<text x="470" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="#166534">Moisture Sensor v1.2</text>
<text x="400" y="185" font-size="10" fill="#166534">VCC</text>
<text x="400" y="198" font-size="10" fill="#166534">AOUT</text>
<text x="400" y="211" font-size="10" fill="#166534">GND</text>

<!-- LEDs -->
<circle cx="470" cy="270" r="14" fill="#22c55e"/>
<text x="500" y="275" font-size="11" fill="#166534">Green LED — Moist &gt;60% (220Ω to GND)</text>

<circle cx="470" cy="320" r="14" fill="#eab308"/>
<text x="500" y="325" font-size="11" fill="#854d0e">Yellow LED — Moderate 30–60% (220Ω to GND)</text>

<circle cx="470" cy="370" r="14" fill="#ef4444"/>
<text x="500" y="375" font-size="11" fill="#991b1b">Red LED — Dry &lt;30% (220Ω to GND)</text>

<!-- Buzzer -->
<rect x="450" y="410" width="40" height="40" rx="6" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="1.5"/>
<text x="470" y="435" text-anchor="middle" font-size="9" fill="#7e22ce">BUZ</text>
<text x="500" y="435" font-size="11" fill="#7e22ce">Active Buzzer 5V — critical dry alert (other leg → GND)</text>

<!-- Wires -->
<line x1="280" y1="154" x2="400" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="154" x2="400" y2="185" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="364" x2="380" y2="364" stroke="#3b82f6" stroke-width="2"/>
<line x1="380" y1="364" x2="380" y2="198" stroke="#3b82f6" stroke-width="2"/>
<line x1="380" y1="198" x2="400" y2="198" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="184" x2="410" y2="184" stroke="#64748b" stroke-width="2"/>
<line x1="410" y1="184" x2="410" y2="211" stroke="#64748b" stroke-width="2"/>
<line x1="410" y1="211" x2="400" y2="211" stroke="#64748b" stroke-width="2"/>

<line x1="280" y1="394" x2="456" y2="394" stroke="#22c55e" stroke-width="2"/>
<line x1="456" y1="394" x2="456" y2="270" stroke="#22c55e" stroke-width="2"/>
<line x1="456" y1="270" x2="456" y2="270" stroke="#22c55e" stroke-width="2"/>

<line x1="280" y1="424" x2="440" y2="424" stroke="#eab308" stroke-width="2"/>
<line x1="440" y1="424" x2="440" y2="320" stroke="#eab308" stroke-width="2"/>

<line x1="280" y1="454" x2="424" y2="454" stroke="#ef4444" stroke-width="2"/>
<line x1="424" y1="454" x2="424" y2="370" stroke="#ef4444" stroke-width="2"/>

<line x1="330" y1="364" x2="330" y2="430" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="430" x2="450" y2="430" stroke="#a855f7" stroke-width="2"/>

<!-- Legend -->
<rect x="60" y="490" width="780" height="55" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="508" font-size="10" fill="#334155" font-weight="bold">Legend:</text>
<text x="75" y="524" font-size="10" fill="#334155">🟧 3.3V power   ⬛ GND   🟦 Analog input (ADC1, GPIO34)   🟩 Green LED   🟨 Yellow LED   🟥 Red LED   🟪 Buzzer output</text>
<text x="75" y="538" font-size="9" fill="#94a3b8">Note: GPIO34 is input-only (ADC1 channel) — never drive it as an output. Calibrate AIR_VALUE / WATER_VALUE per sensor.</text>
</svg>
