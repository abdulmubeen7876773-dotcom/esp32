<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="420" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Motion Security Alert — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: motion-security-alert.ino</text>
<rect x="60" y="90" width="220" height="260" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="180" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="230" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V/5V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="300" width="15" height="8" fill="#64748b"/><text x="40" y="307" text-anchor="end">GND</text>
  <line x1="45" y1="304" x2="10" y2="304" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="190" width="15" height="8" fill="#3b82f6"/><text x="330" y="197">GPIO27 (PIR digital)</text>
  <line x1="295" y1="194" x2="330" y2="194" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="230" width="15" height="8" fill="#ef4444"/><text x="330" y="237">GPIO25 (Buzzer/LED)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#ef4444" stroke-width="2"/>
  <rect x="280" y="270" width="15" height="8" fill="#22c55e"/><text x="330" y="277">GPIO2 (Status LED, onboard)</text>
  <line x1="295" y1="274" x2="330" y2="274" stroke="#22c55e" stroke-width="2"/>
</g>
<rect x="440" y="130" width="180" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">PIR Motion Sensor</text>
<text x="460" y="175" font-size="10" fill="#1e40af">OUT → GPIO27 (digital HIGH/LOW)</text>
<text x="460" y="190" font-size="10" fill="#1e40af">VCC per module / GND</text>
<rect x="440" y="240" width="180" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="530" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Buzzer or Alert LED</text>
<text x="460" y="280" font-size="10" fill="#991b1b">Control → GPIO25</text>
<line x1="330" y1="194" x2="440" y2="175" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="234" x2="440" y2="262" stroke="#ef4444" stroke-width="2"/>
<line x1="280" y1="154" x2="400" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="154" x2="400" y2="190" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="190" x2="440" y2="190" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="304" x2="415" y2="304" stroke="#64748b" stroke-width="2"/>
<line x1="415" y1="304" x2="415" y2="280" stroke="#64748b" stroke-width="2"/>
<line x1="415" y1="280" x2="440" y2="280" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="330" width="780" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="348" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V/5V  ⬛ GND  🟦 PIR digital output  🟥 Buzzer/LED control  🟩 GPIO2 onboard status LED</text>
<text x="75" y="364" font-size="9" fill="#94a3b8">PIR sensors need a 30-60s warm-up after power-on (matches the code's 30-second startup delay) before readings stabilize.</text>
<text x="75" y="378" font-size="9" fill="#94a3b8">Verified: all pins match code exactly, no I2C/ADC defects in this project.</text>
</svg>
