<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Fire Alarm System — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-fire-alarm-system_beginner.ino</text>

<rect x="60" y="90" width="220" height="320" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="220" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="270" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f97316"/><text x="40" y="157" text-anchor="end">5V (Vin)</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="350" width="15" height="8" fill="#64748b"/><text x="40" y="357" text-anchor="end">GND</text>
  <line x1="45" y1="354" x2="10" y2="354" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="200" width="15" height="8" fill="#3b82f6"/><text x="330" y="207">GPIO34 (AOUT)</text>
  <line x1="295" y1="204" x2="330" y2="204" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="230" width="15" height="8" fill="#06b6d4"/><text x="330" y="237">GPIO35 (DOUT)</text>
  <line x1="295" y1="234" x2="330" y2="234" stroke="#06b6d4" stroke-width="2"/>
  <rect x="280" y="260" width="15" height="8" fill="#ef4444"/><text x="330" y="267">GPIO25 (Red LED)</text>
  <line x1="295" y1="264" x2="330" y2="264" stroke="#ef4444" stroke-width="2"/>
  <rect x="280" y="290" width="15" height="8" fill="#22c55e"/><text x="330" y="297">GPIO26 (Green LED)</text>
  <line x1="295" y1="294" x2="330" y2="294" stroke="#22c55e" stroke-width="2"/>
  <rect x="280" y="320" width="15" height="8" fill="#a855f7"/><text x="330" y="327">GPIO27 (Buzzer)</text>
  <line x1="295" y1="324" x2="330" y2="324" stroke="#a855f7" stroke-width="2"/>
</g>

<!-- Voltage divider (implied by wiring note, missing from components list per audit) -->
<rect x="420" y="140" width="14" height="30" fill="#d97706"/>
<text x="445" y="160" font-size="9" fill="#92400e">10kΩ</text>
<rect x="420" y="180" width="14" height="30" fill="#d97706"/>
<text x="445" y="200" font-size="9" fill="#92400e">20kΩ</text>
<text x="400" y="135" font-size="8" fill="#dc2626" text-anchor="middle">5V→3.3V divider</text>
<text x="400" y="220" font-size="8" fill="#dc2626" text-anchor="middle">(added — see notes)</text>

<rect x="470" y="120" width="180" height="130" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="560" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">MQ-2 Smoke Sensor</text>
<text x="490" y="165" font-size="10" fill="#1e40af">AOUT → divider → GPIO34</text>
<text x="490" y="180" font-size="10" fill="#1e40af">DOUT → GPIO35</text>
<text x="490" y="195" font-size="10" fill="#1e40af">VCC → 5V (heater 150mA)</text>
<text x="490" y="210" font-size="10" fill="#1e40af">GND</text>
<text x="490" y="230" font-size="9" fill="#dc2626">30s preheat before stable reading</text>

<circle cx="700" cy="300" r="14" fill="#ef4444"/><text x="730" y="305" font-size="11" fill="#991b1b">Red LED — ALARM</text>
<circle cx="700" cy="340" r="14" fill="#22c55e"/><text x="730" y="345" font-size="11" fill="#166534">Green LED — Normal</text>
<rect x="680" y="365" width="40" height="35" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="700" y="386" text-anchor="middle" font-size="8" fill="#5b21b6">BUZ</text>

<line x1="280" y1="204" x2="427" y2="204" stroke="#3b82f6" stroke-width="2"/>
<line x1="427" y1="204" x2="427" y2="170" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="234" x2="470" y2="234" stroke="#06b6d4" stroke-width="2"/>
<line x1="470" y1="234" x2="470" y2="180" stroke="#06b6d4" stroke-width="2"/>
<line x1="280" y1="154" x2="410" y2="154" stroke="#f97316" stroke-width="2"/>
<line x1="410" y1="154" x2="410" y2="195" stroke="#f97316" stroke-width="2"/>
<line x1="410" y1="195" x2="470" y2="195" stroke="#f97316" stroke-width="2"/>
<line x1="280" y1="354" x2="450" y2="354" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="354" x2="450" y2="210" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="210" x2="470" y2="210" stroke="#64748b" stroke-width="2"/>
<line x1="280" y1="264" x2="686" y2="264" stroke="#ef4444" stroke-width="2"/>
<line x1="686" y1="264" x2="686" y2="300" stroke="#ef4444" stroke-width="2"/>
<line x1="280" y1="294" x2="686" y2="294" stroke="#22c55e" stroke-width="2"/>
<line x1="686" y1="294" x2="686" y2="340" stroke="#22c55e" stroke-width="2"/>
<line x1="280" y1="324" x2="700" y2="324" stroke="#a855f7" stroke-width="2"/>
<line x1="700" y1="324" x2="700" y2="365" stroke="#a855f7" stroke-width="2"/>

<rect x="60" y="420" width="780" height="45" rx="6" fill="#fffbeb" stroke="#f59e0b"/>
<text x="75" y="438" font-size="10" font-weight="bold" fill="#92400e">⚠ Documentation gap noted (non-critical): wiring notes say "use voltage divider from 5V output" for MQ-2 AOUT,</text>
<text x="75" y="452" font-size="9" fill="#78350f">but the site's components list omits the 10kΩ/20kΩ resistors. Divider shown here for a safe, complete build.</text>
</svg>
