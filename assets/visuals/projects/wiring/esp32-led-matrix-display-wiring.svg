<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="420" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 LED Matrix Display — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-led-matrix-display_beginner.ino</text>

<rect x="60" y="90" width="220" height="260" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="180" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="230" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f97316"/><text x="40" y="157" text-anchor="end">Vin (5V)</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f97316" stroke-width="2"/>
  <rect x="45" y="300" width="15" height="8" fill="#64748b"/><text x="40" y="307" text-anchor="end">GND</text>
  <line x1="45" y1="304" x2="10" y2="304" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="190" width="15" height="8" fill="#3b82f6"/><text x="330" y="197">GPIO23 (MOSI/DIN)</text>
  <line x1="295" y1="194" x2="330" y2="194" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="220" width="15" height="8" fill="#a855f7"/><text x="330" y="227">GPIO5 (CS)</text>
  <line x1="295" y1="224" x2="330" y2="224" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="250" width="15" height="8" fill="#22c55e"/><text x="330" y="257">GPIO18 (CLK)</text>
  <line x1="295" y1="254" x2="330" y2="254" stroke="#22c55e" stroke-width="2"/>
</g>

<rect x="460" y="150" width="200" height="140" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="560" y="172" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">MAX7219 8x8</text>
<text x="560" y="186" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">LED Matrix Module</text>
<text x="480" y="210" font-size="10" fill="#1e40af">DIN (MOSI) → GPIO23</text>
<text x="480" y="225" font-size="10" fill="#1e40af">CS → GPIO5</text>
<text x="480" y="240" font-size="10" fill="#1e40af">CLK → GPIO18</text>
<text x="480" y="255" font-size="10" fill="#1e40af">VCC → 5V (Vin)</text>
<text x="480" y="270" font-size="10" fill="#1e40af">GND</text>

<line x1="330" y1="194" x2="460" y2="194" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="224" x2="450" y2="224" stroke="#a855f7" stroke-width="2"/>
<line x1="450" y1="224" x2="450" y2="222" stroke="#a855f7" stroke-width="2"/>
<line x1="450" y1="222" x2="460" y2="222" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="254" x2="440" y2="254" stroke="#22c55e" stroke-width="2"/>
<line x1="440" y1="254" x2="440" y2="237" stroke="#22c55e" stroke-width="2"/>
<line x1="440" y1="237" x2="460" y2="237" stroke="#22c55e" stroke-width="2"/>
<line x1="280" y1="154" x2="420" y2="154" stroke="#f97316" stroke-width="2"/>
<line x1="420" y1="154" x2="420" y2="252" stroke="#f97316" stroke-width="2"/>
<line x1="420" y1="252" x2="460" y2="252" stroke="#f97316" stroke-width="2"/>
<line x1="280" y1="304" x2="405" y2="304" stroke="#64748b" stroke-width="2"/>
<line x1="405" y1="304" x2="405" y2="267" stroke="#64748b" stroke-width="2"/>
<line x1="405" y1="267" x2="460" y2="267" stroke="#64748b" stroke-width="2"/>

<rect x="60" y="350" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="368" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 5V (Vin — matrix needs 5V for full brightness)  ⬛ GND  🟦 MOSI/DIN  🟪 CS  🟩 CLK</text>
<text x="75" y="382" font-size="9" fill="#94a3b8">Chaining multiple modules: connect DOUT of module N to DIN of module N+1; CS and CLK are shared across the chain.</text>
</svg>
