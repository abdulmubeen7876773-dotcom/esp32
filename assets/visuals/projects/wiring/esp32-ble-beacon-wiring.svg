<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="380" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 BLE Beacon — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-ble-beacon_beginner.ino</text>

<rect x="340" y="110" width="220" height="160" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="450" y="140" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="390" y="170" width="120" height="70" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="450" y="210" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>

<!-- BLE radiating rings -->
<circle cx="450" cy="190" r="90" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
<circle cx="450" cy="190" r="130" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
<circle cx="450" cy="190" r="170" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
<text x="450" y="260" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">📶 BLE 4.2 Advertising (iBeacon packet)</text>

<rect x="620" y="150" width="160" height="80" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
<text x="700" y="180" text-anchor="middle" font-size="20">📱</text>
<text x="700" y="205" text-anchor="middle" font-size="10" fill="#334155">Smartphone with</text>
<text x="700" y="218" text-anchor="middle" font-size="10" fill="#334155">nRF Connect (scanner)</text>

<rect x="60" y="300" width="780" height="60" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
<text x="75" y="320" font-size="11" font-weight="bold" fill="#166534">✓ No external wiring required</text>
<text x="75" y="336" font-size="10" fill="#166534">Per the source (esp32-ble-beacon_beginner.ino) and the site's own wiring table: "No external wiring required —</text>
<text x="75" y="350" font-size="10" fill="#166534">Built-in BLE antenna." The ESP32's on-chip BLE 4.2 radio broadcasts the iBeacon packet with zero extra hardware.</text>
</svg>
