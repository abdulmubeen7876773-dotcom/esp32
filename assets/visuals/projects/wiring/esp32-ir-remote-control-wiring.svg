<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="400" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 IR Remote Control — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-ir-remote-control_beginner.ino</text>
<rect x="60" y="90" width="220" height="260" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="180" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="230" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="300" width="15" height="8" fill="#64748b"/><text x="40" y="307" text-anchor="end">GND</text>
  <line x1="45" y1="304" x2="10" y2="304" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="200" width="15" height="8" fill="#3b82f6"/><text x="330" y="207">GPIO15 (IR RX OUT)</text>
  <line x1="295" y1="204" x2="330" y2="204" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="250" width="15" height="8" fill="#ef4444"/><text x="330" y="257">GPIO4 (IR LED anode)</text>
  <line x1="295" y1="254" x2="330" y2="254" stroke="#ef4444" stroke-width="2"/>
</g>
<rect x="440" y="140" width="180" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">TSOP38238 IR Rx</text>
<text x="460" y="185" font-size="10" fill="#1e40af">OUT → GPIO15</text>
<text x="460" y="200" font-size="10" fill="#1e40af">VCC 3.3V / GND</text>
<rect x="440" y="250" width="180" height="70" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="530" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">IR LED 940nm</text>
<text x="460" y="290" font-size="10" fill="#991b1b">Anode → 100Ω → GPIO4</text>
<text x="460" y="303" font-size="10" fill="#991b1b">Cathode → GND</text>
<line x1="330" y1="204" x2="440" y2="185" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="254" x2="440" y2="290" stroke="#ef4444" stroke-width="2"/>
<line x1="280" y1="154" x2="400" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="154" x2="400" y2="200" stroke="#f59e0b" stroke-width="2"/>
<line x1="400" y1="200" x2="440" y2="200" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="304" x2="415" y2="304" stroke="#64748b" stroke-width="2"/>
<line x1="415" y1="304" x2="415" y2="303" stroke="#64748b" stroke-width="2"/>
<line x1="415" y1="303" x2="440" y2="303" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="330" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="348" font-size="10" fill="#334155" font-weight="bold">Legend: 🟧 3.3V  ⬛ GND  🟦 IR receiver output (38kHz demodulated)  🟥 IR LED transmit (100Ω current limit)</text>
<text x="75" y="362" font-size="9" fill="#94a3b8">TSOP38238 pinout varies — verify OUT/GND/VCC order against your specific module's datasheet.</text>
</svg>
