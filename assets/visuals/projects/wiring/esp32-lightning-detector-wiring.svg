<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Lightning Detector — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-lightning-detector_beginner.ino</text>
<rect x="60" y="90" width="220" height="330" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="230" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="280" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="340" width="15" height="8" fill="#64748b"/><text x="40" y="347" text-anchor="end">GND</text>
  <line x1="45" y1="344" x2="10" y2="344" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="10" fill="#1e293b">
  <rect x="280" y="180" width="15" height="8" fill="#3b82f6"/><text x="330" y="187">GPIO5 (CS)</text>
  <rect x="280" y="200" width="15" height="8" fill="#06b6d4"/><text x="330" y="207">GPIO18 (SCK)</text>
  <rect x="280" y="220" width="15" height="8" fill="#84cc16"/><text x="330" y="227">GPIO23 (MOSI)</text>
  <rect x="280" y="240" width="15" height="8" fill="#eab308"/><text x="330" y="247">GPIO19 (MISO)</text>
  <rect x="280" y="260" width="15" height="8" fill="#ec4899"/><text x="330" y="267">GPIO4 (IRQ)</text>
  <rect x="280" y="290" width="15" height="8" fill="#a855f7"/><text x="330" y="297">GPIO21 (OLED SDA)</text>
  <rect x="280" y="310" width="15" height="8" fill="#f97316"/><text x="330" y="317">GPIO22 (OLED SCL)</text>
  <rect x="280" y="330" width="15" height="8" fill="#ef4444"/><text x="330" y="337">GPIO26 (Red LED)</text>
</g>
<rect x="480" y="120" width="200" height="220" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="580" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">AS3935 Lightning IC</text>
<text x="500" y="165" font-size="9" fill="#1e40af">CS=GPIO5  SCK=GPIO18</text>
<text x="500" y="178" font-size="9" fill="#1e40af">MOSI=GPIO23  MISO=GPIO19</text>
<text x="500" y="191" font-size="9" fill="#1e40af">IRQ=GPIO4 (interrupt)</text>
<text x="500" y="204" font-size="9" fill="#dc2626">VCC 3.3V only — not 5V tolerant</text>
<rect x="500" y="220" width="160" height="90" rx="30" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="580" y="270" text-anchor="middle" font-size="9" fill="#1e40af">500kHz antenna</text>
<rect x="480" y="355" width="200" height="60" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="580" y="377" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">OLED + Red LED</text>
<text x="500" y="395" font-size="9" fill="#5b21b6">OLED I2C legit; LED via 220Ω to GPIO26</text>
<line x1="330" y1="184" x2="480" y2="160" stroke="#3b82f6" stroke-width="1.5"/>
<line x1="330" y1="204" x2="480" y2="170" stroke="#06b6d4" stroke-width="1.5"/>
<line x1="330" y1="224" x2="480" y2="180" stroke="#84cc16" stroke-width="1.5"/>
<line x1="330" y1="244" x2="480" y2="190" stroke="#eab308" stroke-width="1.5"/>
<line x1="330" y1="264" x2="480" y2="200" stroke="#ec4899" stroke-width="1.5"/>
<line x1="330" y1="294" x2="480" y2="377" stroke="#a855f7" stroke-width="1.5"/>
<line x1="330" y1="314" x2="480" y2="390" stroke="#f97316" stroke-width="1.5"/>
<line x1="330" y1="334" x2="480" y2="395" stroke="#ef4444" stroke-width="1.5"/>
<line x1="280" y1="154" x2="440" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="154" x2="440" y2="200" stroke="#f59e0b" stroke-width="2"/>
<line x1="440" y1="200" x2="480" y2="200" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="344" x2="450" y2="344" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="344" x2="450" y2="385" stroke="#64748b" stroke-width="2"/>
<line x1="450" y1="385" x2="480" y2="385" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="440" width="0" height="0"/>
<text x="450" y="445" text-anchor="middle" font-size="9" fill="#94a3b8">Verified: SPI + IRQ + legit I2C OLED all match code exactly. GPIO18/19/23/5 = standard ESP32 VSPI pins.</text>
</svg>
