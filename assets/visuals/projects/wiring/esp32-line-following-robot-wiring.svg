<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="460" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Line Following Robot — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Intermediate — Source: line-following-robot.ino</text>
<rect x="60" y="90" width="220" height="300" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="210" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="260" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="330" width="15" height="8" fill="#64748b"/><text x="40" y="337" text-anchor="end">GND</text>
  <line x1="45" y1="334" x2="10" y2="334" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="10" fill="#1e293b">
  <rect x="280" y="180" width="15" height="8" fill="#3b82f6"/><text x="330" y="187">GPIO34 (Left IR, ADC)</text>
  <rect x="280" y="200" width="15" height="8" fill="#06b6d4"/><text x="330" y="207">GPIO35 (Right IR, ADC)</text>
  <rect x="280" y="230" width="15" height="8" fill="#ef4444"/><text x="330" y="237">GPIO16 (L_IN1)</text>
  <rect x="280" y="250" width="15" height="8" fill="#f97316"/><text x="330" y="257">GPIO17 (L_IN2)</text>
  <rect x="280" y="270" width="15" height="8" fill="#a855f7"/><text x="330" y="277">GPIO18 (R_IN1)</text>
  <rect x="280" y="290" width="15" height="8" fill="#84cc16"/><text x="330" y="297">GPIO19 (R_IN2)</text>
  <rect x="280" y="310" width="15" height="8" fill="#eab308"/><text x="330" y="317">GPIO2 (Status LED, opt)</text>
</g>
<rect x="440" y="130" width="180" height="90" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="152" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">IR Line Sensors ×2</text>
<text x="460" y="175" font-size="10" fill="#1e40af">Left → GPIO34, Right → GPIO35</text>
<text x="460" y="190" font-size="10" fill="#1e40af">VCC per module label / GND</text>
<rect x="440" y="240" width="180" height="140" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="530" y="262" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Dual Motor Driver</text>
<text x="460" y="285" font-size="10" fill="#991b1b">L_IN1=16 L_IN2=17</text>
<text x="460" y="300" font-size="10" fill="#991b1b">R_IN1=18 R_IN2=19</text>
<text x="460" y="318" font-size="9" fill="#dc2626">Motor supply: separate from ESP32</text>
<text x="460" y="332" font-size="9" fill="#dc2626">Common GND with ESP32 required</text>
<line x1="330" y1="184" x2="440" y2="175" stroke="#3b82f6" stroke-width="2"/>
<line x1="330" y1="204" x2="440" y2="190" stroke="#06b6d4" stroke-width="2"/>
<line x1="330" y1="234" x2="440" y2="280" stroke="#ef4444" stroke-width="2"/>
<line x1="330" y1="254" x2="440" y2="290" stroke="#f97316" stroke-width="2"/>
<line x1="330" y1="274" x2="440" y2="300" stroke="#a855f7" stroke-width="2"/>
<line x1="330" y1="294" x2="440" y2="310" stroke="#84cc16" stroke-width="2"/>
<line x1="280" y1="334" x2="410" y2="334" stroke="#64748b" stroke-width="2"/>
<line x1="410" y1="334" x2="410" y2="330" stroke="#64748b" stroke-width="2"/>
<line x1="410" y1="330" x2="440" y2="330" stroke="#64748b" stroke-width="2"/>
<rect x="60" y="400" width="780" height="45" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="418" font-size="10" fill="#334155" font-weight="bold">Legend: 🟦 Left IR (ADC1_CH6)  🟦(cyan) Right IR (ADC1_CH7)  🟥🟧🟪🟢 Motor driver H-bridge control (4 digital outputs)</text>
<text x="75" y="432" font-size="9" fill="#dc2626" font-weight="bold">Never power motors from ESP32 3.3V pin — use a separate motor supply with shared ground only.</text>
</svg>
