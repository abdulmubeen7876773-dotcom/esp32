<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
<rect width="900" height="480" fill="#ffffff"/>
<text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#0f172a">ESP32 Gesture Recognition — Wiring Diagram</text>
<text x="450" y="50" text-anchor="middle" font-size="11" fill="#64748b">Beginner Stage — Source: esp32-gesture-recognition_beginner.ino</text>

<rect x="60" y="90" width="220" height="330" rx="10" fill="#0d2318" stroke="#22c55e" stroke-width="2"/>
<text x="170" y="115" text-anchor="middle" font-size="13" fill="#4ade80" font-weight="bold">ESP32 DevKit V1</text>
<rect x="110" y="230" width="120" height="90" rx="4" fill="#0a0e1a" stroke="#334155"/>
<text x="170" y="280" text-anchor="middle" font-size="10" fill="#475569">ESP32-WROOM</text>
<g font-size="11" fill="#1e293b">
  <rect x="45" y="150" width="15" height="8" fill="#f59e0b"/><text x="40" y="157" text-anchor="end">3.3V</text>
  <line x1="45" y1="154" x2="10" y2="154" stroke="#f59e0b" stroke-width="2"/>
  <rect x="45" y="340" width="15" height="8" fill="#64748b"/><text x="40" y="347" text-anchor="end">GND</text>
  <line x1="45" y1="344" x2="10" y2="344" stroke="#64748b" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="190" width="15" height="8" fill="#3b82f6"/><text x="330" y="197">GPIO21 (SDA)</text>
  <line x1="295" y1="194" x2="330" y2="194" stroke="#3b82f6" stroke-width="2"/>
  <rect x="280" y="215" width="15" height="8" fill="#a855f7"/><text x="330" y="222">GPIO22 (SCL)</text>
  <line x1="295" y1="219" x2="330" y2="219" stroke="#a855f7" stroke-width="2"/>
  <rect x="280" y="240" width="15" height="8" fill="#ec4899"/><text x="330" y="247">GPIO4 (INT)</text>
  <line x1="295" y1="244" x2="330" y2="244" stroke="#ec4899" stroke-width="2"/>
</g>
<g font-size="11" fill="#1e293b">
  <rect x="280" y="280" width="15" height="8" fill="#ef4444"/><text x="330" y="287">GPIO25 (UP)</text>
  <rect x="280" y="305" width="15" height="8" fill="#22c55e"/><text x="330" y="312">GPIO26 (DOWN)</text>
  <rect x="280" y="330" width="15" height="8" fill="#06b6d4"/><text x="330" y="337">GPIO27 (LEFT)</text>
  <rect x="280" y="355" width="15" height="8" fill="#eab308"/><text x="330" y="362">GPIO14 (RIGHT)</text>
</g>

<rect x="440" y="120" width="180" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="530" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">APDS-9960</text>
<text x="530" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e40af">Gesture Sensor</text>
<text x="460" y="178" font-size="10" fill="#1e40af">SDA → GPIO21</text>
<text x="460" y="193" font-size="10" fill="#1e40af">SCL → GPIO22</text>
<text x="460" y="208" font-size="10" fill="#1e40af">INT → GPIO4 (active LOW)</text>
<text x="460" y="223" font-size="10" fill="#1e40af">VCC → 3.3V only</text>
<text x="460" y="238" font-size="10" fill="#1e40af">GND</text>
<text x="460" y="255" font-size="9" fill="#dc2626">5V will damage this sensor</text>

<circle cx="700" cy="290" r="13" fill="#ef4444"/><text x="725" y="295" font-size="10" fill="#991b1b">UP</text>
<circle cx="700" cy="320" r="13" fill="#22c55e"/><text x="725" y="325" font-size="10" fill="#166534">DOWN</text>
<circle cx="700" cy="350" r="13" fill="#06b6d4"/><text x="725" y="355" font-size="10" fill="#155e75">LEFT</text>
<circle cx="700" cy="380" r="13" fill="#eab308"/><text x="725" y="385" font-size="10" fill="#854d0e">RIGHT</text>

<line x1="280" y1="194" x2="440" y2="180" stroke="#3b82f6" stroke-width="2"/>
<line x1="280" y1="219" x2="440" y2="195" stroke="#a855f7" stroke-width="2"/>
<line x1="280" y1="244" x2="440" y2="210" stroke="#ec4899" stroke-width="2"/>
<line x1="280" y1="154" x2="410" y2="154" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="154" x2="410" y2="225" stroke="#f59e0b" stroke-width="2"/>
<line x1="410" y1="225" x2="440" y2="225" stroke="#f59e0b" stroke-width="2"/>
<line x1="280" y1="344" x2="420" y2="344" stroke="#64748b" stroke-width="2"/>
<line x1="420" y1="344" x2="420" y2="240" stroke="#64748b" stroke-width="2"/>
<line x1="420" y1="240" x2="440" y2="240" stroke="#64748b" stroke-width="2"/>
<line x1="295" y1="284" x2="686" y2="290" stroke="#ef4444" stroke-width="2"/>
<line x1="295" y1="309" x2="686" y2="320" stroke="#22c55e" stroke-width="2"/>
<line x1="295" y1="334" x2="686" y2="350" stroke="#06b6d4" stroke-width="2"/>
<line x1="295" y1="359" x2="686" y2="380" stroke="#eab308" stroke-width="2"/>

<rect x="60" y="430" width="780" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="75" y="452" font-size="10" fill="#334155" font-weight="bold">Legend: I2C bus (SDA/SCL, 3.3V only) + active-LOW interrupt + 4 direction LEDs, one per swipe direction (220Ω each).</text>
</svg>
